 pipeline, then they are hidden from me."],"story_points":2,"roles":["EM/TL/PM"],"mockup_ref":{"screen":"hiring/candidates","persona":"manager"},"dependencies":["EN-M2.3-01","EN-M2.2-02"],"status":"not-started"},{"id":"US-M2.3.S1-05","type":"story","title":"Search & filter candidates","story":"As a recruiter or hiring stakeholder, I want to search by name/role/skill and filter by open role so that I can quickly find specific candidates.","acceptance_criteria":["Given the pipeline, when I type in the search box, then the board and list narrow to candidates whose name, applied role or skills match.","Given I select an open role in the role filter, when it applies, then only candidates applying to that role are shown.","Given no candidate matches the search or filter, when I view the pipeline, then an empty state is shown."],"story_points":3,"roles":["BOD","PMO","AM","EM/TL/PM"],"dependencies":["EN-M2.3-01","EN-M2.2-01"],"status":"not-started"},{"id":"US-M2.3.S1-06","type":"story","title":"Toggle Board / List view","story":"As a recruiter or hiring stakeholder, I want to switch between a kanban Board and a List table so that I can view the pipeline in whichever layout suits the task.","acceptance_criteria":["Given Board view, when I switch to List, then candidates appear in a table with candidate, position, seniority, source, stage and rating columns.","Given List view, when I switch back to Board, then the kanban columns are shown.","Given an active search or role filter, when I switch views, then both layouts honor the same filter."],"story_points":2,"roles":["BOD","PMO","AM","EM/TL/PM"],"dependencies":["EN-M2.3-01"],"status":"not-started"},{"id":"US-M2.3.S1-07","type":"story","title":"See age-in-stage warning badge on candidate cards","story":"As a recruiter or hiring stakeholder, I want each candidate card to show how long the candidate has sat in their stage so that I can act on stalled candidates.","acceptance_criteria":["Given an active candidate, when I view their card, then a badge shows the number of days since they entered the current stage.","Given a candidate has been in a stage 7 or more days, when I view the badge, then it shows a warning style; at 14 or more days, a critical style.","Given a Hired or Rejected candidate, when I view their card, then no age badge is shown."],"story_points":2,"roles":["BOD","PMO","AM","EM/TL/PM"],"dependencies":["EN-M2.3-01"],"notes":"Age-in-stage is days since the candidate entered the current stage; the badge warns at 7 days and turns critical at 14 days, and is shown only for active (non-Hired, non-Rejected) candidates.","status":"not-started"},{"id":"US-M2.3.S1-08","type":"story","title":"View Talent pool of rejected candidates re-matched to open roles","story":"As a recruiter or hiring stakeholder, I want past rejected candidates auto-matched to currently open roles so that I can reconsider strong candidates for new openings.","acceptance_criteria":["Given there are past rejected candidates, when I open the Talent pool section, then each is shown with the open roles they are recommended for.","Given a rejected candidate's skills and seniority match one or more open roles, when matches are computed, then the top matching open roles are listed as recommendations.","Given a rejected candidate matches no open role, when I view their entry, then it shows that there is no matching open role right now.","Given there are no rejected candidates, when I view the pipeline, then the Talent pool section is hidden."],"story_points":5,"roles":["BOD","PMO","AM","EM/TL/PM"],"dependencies":["EN-M2.3-01","EN-M2.2-01"],"notes":"Talent pool lists only candidates with status Rejected; matches are derived by overlapping the candidate's skills and seniority against currently open roles, with the top matches surfaced.","status":"not-started"}]},{"id":"M2.3.S2","name":"Candidate detail drawer","description":"A drawer opened from a candidate card: a clickable pipeline-stage row to move the candidate forward/back, contact and application blocks, the parsed CV doc, skills tags, notes, the candidate's interviews, a full activity timeline, and footer actions to Reject or Schedule an interview. Stage moves and rejection are logged.","roles":["BOD","PMO","AM","EM/TL/PM"],"mockup_ref":{"screen":"hiring/candidates"},"sub_screens":[{"id":"M2.3.S2.1","name":"Pipeline stage row"},{"id":"M2.3.S2.2","name":"Profile (contact, application, CV, skills, notes)"},{"id":"M2.3.S2.3","name":"Interviews list"},{"id":"M2.3.S2.4","name":"Activity timeline"},{"id":"M2.3.S2.5","name":"Footer actions (Reject, Schedule interview)"}],"items":[{"id":"US-M2.3.S2-01","type":"story","title":"View candidate profile in drawer","story":"As a recruiter or hiring stakeholder, I want to open a candidate's drawer and see their full profile so that I can assess them in one place.","acceptance_criteria":["Given I click a candidate card, when the drawer opens, then I see contact (email, phone, DOB, gender), application (position, account/project, source, rating), the parsed CV document, skills tags and notes.","Given the candidate has been rejected, when the drawer opens, then a rejected banner is shown."],"story_points":3,"roles":["BOD","PMO","AM","EM/TL/PM"],"dependencies":["EN-M2.3-01","EN-M2.2-01"],"status":"not-started"},{"id":"US-M2.3.S2-02","type":"story","title":"View candidate activity timeline","story":"As a recruiter or hiring stakeholder, I want a chronological activity timeline for the candidate so that I can see the full history of decisions and stage changes.","acceptance_criteria":["Given the candidate drawer, when I view the Activity section, then I see a chronological timeline of creation, stage changes and rejection, each with timestamp, actor and any note.","Given an event has no note, when I view the timeline, then the event is still shown without a note line."],"story_points":2,"roles":["BOD","PMO","AM","EM/TL/PM"],"dependencies":["EN-M2.3-01"],"status":"not-started"},{"id":"US-M2.3.S2-03","type":"story","title":"Move candidate through pipeline stages","story":"As a recruiter or hiring stakeholder, I want to move a candidate forward or back through the pipeline stages so that the pipeline reflects their real progress.","acceptance_criteria":["Given an active candidate, when I click a stage in the pipeline-stage row, then the candidate moves to that stage and the change is recorded in the activity history with actor and time.","Given I move a candidate to Hired, when the move is applied, then the candidate is marked Hired and handed off to employee onboarding.","Given a candidate is already Hired or Rejected, when I view the stage row, then it is locked and no further moves are allowed."],"story_points":3,"roles":["BOD","PMO","AM","EM/TL/PM"],"dependencies":["EN-M2.3-01","EN-M1.6-01"],"notes":"Stage moves are appended to the candidate's activity history; moving to Offer or Hired records a decision date, and once a candidate is Hired or Rejected the stage row is locked.","status":"not-started"},{"id":"US-M2.3.S2-04","type":"story","title":"Reject a candidate","story":"As a recruiter or hiring stakeholder, I want to reject a candidate with a confirmation so that the decision is deliberate and recorded.","acceptance_criteria":["Given an active candidate, when I click Reject, then I am asked to confirm before the rejection is applied.","Given I confirm, when the rejection is applied, then the candidate moves to Rejected and the decision is recorded in the activity history.","Given a candidate is already Hired or Rejected, when I view the footer, then the Reject action is disabled."],"story_points":3,"roles":["BOD","PMO","AM","EM/TL/PM"],"dependencies":["EN-M2.3-01"],"notes":"Rejected candidates remain visible under the Rejected/Talent-pool filter for later re-matching.","status":"not-started"},{"id":"US-M2.3.S2-05","type":"story","title":"View candidate's interviews in drawer","story":"As a recruiter or hiring stakeholder, I want to see the candidate's scheduled and completed interviews in the drawer so that I know where they stand in the interview process.","acceptance_criteria":["Given the candidate drawer, when I view the Interviews section, then I see the candidate's scheduled and completed interview rounds with date, mode and result.","Given the candidate has no interviews, when I view the section, then an empty state is shown."],"story_points":2,"roles":["BOD","PMO","AM","EM/TL/PM"],"dependencies":["EN-M2.3-01","EN-M2.4-01"],"status":"not-started"},{"id":"US-M2.3.S2-06","type":"story","title":"Schedule an interview from the drawer","story":"As a recruiter or hiring stakeholder, I want to schedule an interview directly from the candidate drawer so that I can progress the candidate without leaving their profile.","acceptance_criteria":["Given the candidate drawer, when I click Schedule interview, then I can schedule an interview for this candidate.","Given an interview is scheduled, when I return to the drawer, then it appears in the candidate's Interviews section."],"story_points":2,"roles":["BOD","PMO","AM","EM/TL/PM"],"dependencies":["EN-M2.3-01","US-M2.4.S2-01"],"notes":"This story is the drawer entry-point that launches scheduling; the interview-scheduling workflow itself is owned by the Interviews sub-module (M2.4).","status":"not-started"}]},{"id":"M2.3.S3","name":"New candidate (CV-parse intake)","description":"A modal to create a candidate: drop a CV, the system parses it and auto-fills name, contact, DOB, gender, seniority and detected skills (all editable); pick the position applied for and source, add notes, and save to create the candidate at stage New. A banner reminds the recruiter to verify parsed values against the original CV.","roles":["BOD","PMO","AM","EM/TL/PM"],"mockup_ref":{"screen":"hiring/candidates"},"sub_screens":[{"id":"M2.3.S3.1","name":"CV drop & parse"},{"id":"M2.3.S3.2","name":"Candidate fields form (auto-filled, editable)"}],"items":[{"id":"US-M2.3.S3-01","type":"story","title":"Create a candidate by uploading a CV that auto-fills the fields","story":"As a recruiter, I want to upload a CV that auto-fills the candidate's details so that I can add a candidate quickly and accurately.","acceptance_criteria":["Given the New candidate modal, when I upload a CV, then the system parses it and auto-fills name, contact, DOB, gender, seniority and detected skills, all of which remain editable.","Given parsed values are shown, when I review the form, then a banner reminds me to verify the values against the original CV before saving.","Given I select the position applied for and the source, add notes and save, then a candidate is created at stage New and appears in the pipeline.","Given I try to save without a name or CV, when I click save, then I am warned and no candidate is created."],"story_points":5,"roles":["BOD","PMO","AM","EM/TL/PM"],"dependencies":["EN-M2.3-01","EN-M2.2-01"],"status":"not-started"}]}]},{"id":"M2.4","name":"Interviews","description":"Interview control table and feedback loop for Hiring Management: a scoped, sortable table of all interviews (scheduled to completed) with a KPI strip and filter segment, a schedule form, inline status changes, a structured feedback modal (result/rating/recommendation/Teams transcript/notes), and cancel/no-show reason capture. Interview visibility is scoped exactly like requisitions and candidates (BOD/PMO all; AM their account's roles; EM/TL/PM their projects' roles).","status":"not-started","screens":[{"id":"M2.4.S1","name":"Interview Control Table","description":"A KPI strip (Scheduled, This week, Completed, Pass rate), a filter segment (All/Upcoming/Completed), a Schedule interview button, and a scoped table where each row shows candidate, position, round, when (relative label + date/time/duration with a Today highlight), mode, panel avatars, an online Join link, an inline status select, and a result pill with an Add feedback affordance once completed.","roles":["BOD","PMO","AM","EM/TL/PM"],"mockup_ref":{"screen":"hiring/interviews"},"sub_screens":[{"id":"M2.4.S1.1","name":"KPI strip"},{"id":"M2.4.S1.2","name":"Filter segment"},{"id":"M2.4.S1.3","name":"Interview row (when/mode/panel/Join/status/result)"},{"id":"M2.4.S1.4","name":"Inline status change"}],"items":[{"id":"EN-M2.4-01","type":"enabler","title":"Interview record & scheduling lifecycle","story":"Establish the interview as a first-class record and the schedule → conduct → feedback lifecycle that the whole sub-module depends on: an interview captures candidate, round (Screening/Technical/Culture-fit/Final), date, time, duration, mode (Online/Onsite), interview panel, meeting link, status (Scheduled → Completed/Cancelled/No-show), and result (Pending/Pass/Fail/Hold) plus rating, recommendation, transcript and notes once feedback is recorded.","acceptance_criteria":["Given an interview is created, when it is saved, then it is persisted with status Scheduled and result Pending and appears in the control table.","Given an interview, when its status moves to Completed, Cancelled or No-show, then the change and its outcome (result, or cancellation reason) are retained on the record.","Given any state change to an interview, then a timestamped audit entry is written naming the actor and the action."],"story_points":5,"roles":["BOD","PMO","AM","EM/TL/PM"],"dependencies":["EN-M2.3-01"],"status":"not-started"},{"id":"US-M2.4.S1-01","type":"story","title":"View interview KPI strip","story":"As a hiring stakeholder (BOD/PMO/AM/EM/TL/PM), I want a KPI strip summarising Scheduled, This week, Completed and Pass rate so that I can gauge interview activity and outcomes at a glance.","acceptance_criteria":["Given interviews I am allowed to see, when the screen loads, then I see counts for Scheduled and Completed and a count of interviews scheduled within the current week.","Given completed interviews, then Pass rate is shown as the percentage of completed interviews with a Pass result.","Given no completed interviews are in scope, then Pass rate shows 0% rather than an error."],"story_points":3,"roles":["BOD","PMO","AM","EM/TL/PM"],"dependencies":["EN-M2.4-01"],"notes":"Pass rate = passed completed interviews / all completed interviews in scope; 'This week' counts only Scheduled interviews dated within the current week.","status":"not-started"},{"id":"US-M2.4.S1-02","type":"story","title":"View the full interview control table","story":"As a BOD or PMO user, I want to see every interview in one sortable table so that I can oversee all hiring activity across the company.","acceptance_criteria":["Given I am BOD or PMO, when I open the table, then I see all interviews regardless of account or project, sorted chronologically by date and time.","Given an interview row, then it shows the candidate, the position the candidate applied for, round, when (relative label + date/time/duration), mode, the interview panel, an online Join link, the status, and a result pill.","Given an interview scheduled for today and still Scheduled, then its row is highlighted as Today.","Given no interviews exist, then an empty-state message is shown instead of an empty table."],"story_points":3,"roles":["BOD","PMO"],"dependencies":["EN-M2.4-01","EN-M2.3-01","EN-M2.2-01"],"status":"not-started"},{"id":"US-M2.4.S1-03","type":"story","title":"View account-scoped interviews as AM","story":"As an AM, I want the interview table limited to interviews for my account's roles so that I only see hiring activity I am responsible for.","acceptance_criteria":["Given I am an AM, when I open the table, then I see only interviews whose candidate applied for a role on one of my accounts.","Given an interview outside my accounts, then it never appears in my table or KPI counts.","Given I have no in-scope interviews, then an empty-state message is shown."],"story_points":2,"roles":["AM"],"mockup_ref":{"screen":"hiring/interviews","persona":"am"},"dependencies":["EN-M2.4-01","EN-M2.2-02","EN-M2.3-01","EN-M2.2-01"],"status":"not-started"},{"id":"US-M2.4.S1-04","type":"story","title":"View project-scoped interviews as EM/TL/PM","story":"As an EM/TL/PM, I want the interview table limited to interviews for my projects' roles so that I only see hiring activity for my teams.","acceptance_criteria":["Given I am an EM/TL/PM, when I open the table, then I see only interviews whose candidate applied for a role on one of my projects.","Given an interview outside my projects, then it never appears in my table or KPI counts.","Given I have no in-scope interviews, then an empty-state message is shown."],"story_points":2,"roles":["EM/TL/PM"],"mockup_ref":{"screen":"hiring/interviews","persona":"manager"},"dependencies":["EN-M2.4-01","EN-M2.2-02","EN-M2.3-01","EN-M2.2-01"],"status":"not-started"},{"id":"US-M2.4.S1-05","type":"story","title":"Filter the interview table","story":"As a hiring stakeholder, I want to filter the table by All, Upcoming or Completed so that I can focus on what is still to happen or on past outcomes.","acceptance_criteria":["Given the filter segment, when I choose Upcoming, then only Scheduled interviews remain visible.","Given the filter segment, when I choose Completed, then only Completed interviews remain visible.","Given the chosen filter excludes everything in my scope, then an empty-state message is shown."],"story_points":2,"roles":["BOD","PMO","AM","EM/TL/PM"],"dependencies":["EN-M2.4-01"],"status":"not-started"},{"id":"US-M2.4.S1-06","type":"story","title":"Join an online interview","story":"As a hiring stakeholder, I want a Join link on online interview rows so that I can open the meeting directly from the table.","acceptance_criteria":["Given an Online interview with a meeting link, then the row shows a Join link that opens the meeting in a new tab.","Given an Onsite interview or an interview with no meeting link, then no Join link is shown.","Given I click Join, then the row's other actions (e.g. opening detail) are not triggered."],"story_points":1,"roles":["BOD","PMO","AM","EM/TL/PM"],"dependencies":["EN-M2.4-01"],"notes":"Online meeting links integrate with Microsoft Teams.","status":"not-started"},{"id":"US-M2.4.S1-07","type":"story","title":"Change interview status inline","story":"As a hiring stakeholder, I want to change an interview's status inline from the table so that I can keep its state current without opening a separate screen.","acceptance_criteria":["Given a row's status select, when I choose Scheduled, then the interview is set to Scheduled, its result returns to Pending, and the change is logged.","Given I choose Completed, then the feedback modal opens to capture the outcome before the status is committed.","Given I choose Cancelled or No-show, then the reason modal opens to capture a reason before the status is committed.","Given a Completed interview, then a result pill plus an Add feedback affordance (or the existing rating) is shown."],"story_points":3,"roles":["BOD","PMO","AM","EM/TL/PM"],"dependencies":["EN-M2.4-01"],"status":"not-started"}]},{"id":"M2.4.S2","name":"Schedule Interview (form)","description":"Modal to schedule an interview: pick the candidate from the active pipeline, round, date, time, duration, mode, meeting link (auto-generated for Online), a multi-select interview panel (at least one required), and a note. Saving creates the interview as Scheduled, advances a New/Screening candidate to the Interview stage, and is logged.","roles":["BOD","PMO","AM","EM/TL/PM"],"mockup_ref":{"screen":"hiring/interviews"},"items":[{"id":"US-M2.4.S2-01","type":"story","title":"Schedule an interview","story":"As a hiring stakeholder, I want to schedule an interview by picking a candidate, round, date/time/duration, mode, panel and note so that the interview is booked and appears on the control table.","acceptance_criteria":["Given the form, when I select a candidate from the active pipeline (candidates not yet Hired or Rejected) and complete round, date, time, duration and mode, then a new interview is created with status Scheduled.","Given the panel multi-select, when I try to save with no panel member selected, then saving is blocked with a prompt to pick at least one.","Given mode is Online and I leave the meeting link blank, then a meeting link is auto-generated; given mode is Onsite, then no link is required.","Given the interview is saved, then it is added to the control table and the action is logged against the candidate."],"story_points":5,"roles":["BOD","PMO","AM","EM/TL/PM"],"dependencies":["EN-M2.4-01","EN-M2.3-01"],"notes":"Candidate pool excludes Hired and Rejected candidates. Online meeting links integrate with Microsoft Teams (auto-generated meeting link).","status":"not-started"}]},{"id":"M2.4.S3","name":"Interview Feedback (modal)","description":"Modal to record an interview outcome: Result (Pass/Hold/Fail), an overall star rating, a Recommendation (Hire/Next round/No hire), a Microsoft Teams transcript (paste or Pull from Teams), and free-text strengths/concerns. Saving marks the interview Completed, writes the result back to the candidate, and may surface that the candidate is ready to move to Offer.","roles":["BOD","PMO","EM/TL/PM"],"mockup_ref":{"screen":"hiring/interviews"},"sub_screens":[{"id":"M2.4.S3.1","name":"Result / rating / recommendation"},{"id":"M2.4.S3.2","name":"Teams transcript"},{"id":"M2.4.S3.3","name":"Feedback notes"}],"items":[{"id":"US-M2.4.S3-01","type":"story","title":"Record interview result, rating and recommendation","story":"As an interviewer (BOD/PMO/EM/TL/PM), I want to record a result, an overall star rating and a hiring recommendation so that the interview outcome is captured and reflected on the candidate.","acceptance_criteria":["Given the feedback modal, when I pick a Result (Pass/Hold/Fail), an overall rating (1-5 stars) and a Recommendation (Hire/Next round/No hire) and save, then the interview is marked Completed with that result and rating.","Given the result is saved, then the result pill and rating are shown on the interview row.","Given a Pass result with a Hire recommendation for a candidate currently at the Interview stage, then the user is informed the candidate is ready to move to Offer."],"story_points":5,"roles":["BOD","PMO","EM/TL/PM"],"dependencies":["EN-M2.4-01","EN-M2.3-01"],"status":"not-started"},{"id":"US-M2.4.S3-02","type":"story","title":"Capture the Teams transcript","story":"As an interviewer, I want to paste or pull the Microsoft Teams transcript into the feedback so that the conversation record is attached to the interview.","acceptance_criteria":["Given the transcript field, when I paste text, then it is stored with the feedback on save.","Given an interview held over Microsoft Teams, when I choose Pull from Teams, then the transcript field is populated from the meeting.","Given no transcript is provided, then feedback can still be saved without one."],"story_points":3,"roles":["BOD","PMO","EM/TL/PM"],"dependencies":["EN-M2.4-01"],"notes":"Transcript pull integrates with Microsoft Teams.","status":"not-started"},{"id":"US-M2.4.S3-03","type":"story","title":"Write feedback strengths and concerns","story":"As an interviewer, I want to write free-text strengths and concerns so that I can capture the qualitative reasoning behind the result.","acceptance_criteria":["Given the feedback notes field, when I enter text and save, then it is retained on the interview.","Given existing notes on the interview, when I reopen the modal, then the previous notes are pre-filled and editable.","Given the notes field is left empty, then feedback can still be saved."],"story_points":2,"roles":["BOD","PMO","EM/TL/PM"],"dependencies":["EN-M2.4-01"],"status":"not-started"}]},{"id":"M2.4.S4","name":"Cancel / No-show (modal)","description":"Modal that captures a reason when an interview is set to Cancelled or No-show; the interview's result returns to Pending and the action is logged.","roles":["BOD","PMO","AM","EM/TL/PM"],"mockup_ref":{"screen":"hiring/interviews"},"items":[{"id":"US-M2.4.S4-01","type":"story","title":"Capture a cancel / no-show reason","story":"As a hiring stakeholder, I want to record why an interview was Cancelled or marked No-show so that the reason is preserved for the hiring record.","acceptance_criteria":["Given I set an interview to Cancelled or No-show, when the reason modal opens, then I can enter a reason and confirm.","Given I confirm, then the interview's status is updated to the chosen state, its result returns to Pending, the reason is stored, and the action is logged.","Given I close or go back without confirming, then the interview's status is left unchanged."],"story_points":3,"roles":["BOD","PMO","AM","EM/TL/PM"],"dependencies":["EN-M2.4-01"],"status":"not-started"}]}]},{"id":"M2.5","name":"Knowledge Base","description":"Recruitment Knowledge Base — the learning layer over every closed position and final-stage interview: an executive read on final-round conversion and systemic gaps, interview-effectiveness analysis (pass rates by round + the traits winning candidates share), failure root-cause clustering, an owned improvement plan, the hardest-to-fill roles by leadtime, and the raw case-study evidence log. The clean dataset future hiring recommendations are built on. Company-wide; audience is the executive/governance side.","status":"not-started","screens":[{"id":"M2.5.S1","name":"Recruitment Knowledge Base","description":"A single scrolling learning dashboard: an Executive read (final pass rate, systemic-gap clustering, top hire predictors, avg time-to-hire), interview effectiveness (pass rate per round + traits winning candidates share), failure root-cause themes, an owned & prioritized improvement plan, the hardest roles to fill by leadtime, and the raw case-study log.","roles":["BOD","PMO"],"mockup_ref":{"screen":"hiring/knowledge"},"sub_screens":[{"id":"M2.5.S1.1","name":"Executive read"},{"id":"M2.5.S1.2","name":"Interview effectiveness (by-round pass rates + winning-candidate signals)"},{"id":"M2.5.S1.3","name":"Failure analysis (root-cause themes)"},{"id":"M2.5.S1.4","name":"Improvement plan (owned actions)"},{"id":"M2.5.S1.5","name":"Evidence (hardest roles + case-study log)"}],"items":[{"id":"EN-M2.5-01","type":"enabler","title":"Recruitment knowledge dataset & learning analytics","story":"Provide the recruitment-learning layer over closed positions and final-stage interviews: the case-study corpus (each with role, round, pass/fail result, reason and cause tags), the failure-theme taxonomy (a named cluster with its tags, recommended action, owner and priority), and the derived analytics — final-round pass rate, pass rate per interview round, the traits winning candidates share, failure clustering by root cause, and time-to-hire by closed position — that power the knowledge-base screen.","acceptance_criteria":["Given the closed positions and final-stage case studies, when the learning layer runs, then it computes the final-round pass rate, pass rate per round, and the frequency of each trait among passing candidates.","Given the failure cases and the failure-theme taxonomy, when clustering runs, then each rejected case is grouped under its root-cause theme with the theme's recommended action, owner and priority, ranked by how many rejections it explains.","Given closed-position history, when time-to-hire is computed, then each role's leadtime is available and ranked to surface the hardest roles.","Given no failure cases exist, when clustering runs, then it reports no systemic failure theme rather than fabricating one."],"story_points":5,"roles":["BOD","PMO"],"dependencies":["EN-M2.2-01","EN-M2.4-01"],"notes":"The failure-theme taxonomy and case-study corpus are knowledge-base-owned content; closed-position records come from Requisitions and the final-stage interview outcomes come from Interviews.","status":"not-started"},{"id":"US-M2.5.S1-01","type":"story","title":"Read the executive summary of hiring quality","story":"As a member of hiring leadership, I want an executive read that states the final-round conversion rate, whether failures are systemic or random, the clearest hire predictors and the average time-to-hire so that I get the one-paragraph verdict on hiring quality and where to act.","acceptance_criteria":["Given the analyzed final-stage candidates, when the executive read renders, then it shows the final pass rate with a healthy / mixed / inefficient verdict and a KPI row (final pass rate, rejected-and-analyzed count, number of systemic gaps, avg time-to-hire).","Given failures cluster on a dominant theme, when the read renders, then it states how many rejections that theme explains and frames it as a process gap rather than a sourcing gap.","Given the passing candidates, when the read renders, then it names the clearest hire predictors to screen for earlier.","Given no analyzed candidates, when the read renders, then it shows an empty state without dividing by zero."],"story_points":5,"roles":["BOD","PMO"],"dependencies":["EN-M2.5-01"],"status":"not-started"},{"id":"US-M2.5.S1-02","type":"story","title":"View pass rate by interview round","story":"As a member of hiring leadership, I want pass rate broken down per interview round so that I can see which stage is the harshest filter and check it is real signal, not a mis-calibrated panel.","acceptance_criteria":["Given the case studies, when the by-round card renders, then each round shows its passed-of-total count and pass-rate bar, sorted with the harshest round first.","Given the lowest-passing round, when the card renders, then it is highlighted with an insight prompting a check that it is genuine signal and not an over-tough panel.","Given a round with no cases, when the card renders, then it is omitted rather than shown as zero of zero."],"story_points":3,"roles":["BOD","PMO"],"dependencies":["EN-M2.5-01"],"status":"not-started"},{"id":"US-M2.5.S1-03","type":"story","title":"View the traits winning candidates share","story":"As a member of hiring leadership, I want the traits most common among candidates who passed so that we can source and screen for the clearest hire predictors earlier.","acceptance_criteria":["Given the passing candidates' tags, when the signals card renders, then each trait is shown with its frequency as a ranked bar.","Given the top trait, when the insight renders, then it recommends adding an explicit screening check for it at the CV / phone stage.","Given no passing candidates, when the card renders, then it shows an empty state without error."],"story_points":3,"roles":["BOD","PMO"],"dependencies":["EN-M2.5-01"],"status":"not-started"},{"id":"US-M2.5.S1-04","type":"story","title":"View failure patterns clustered by root cause","story":"As a member of hiring leadership, I want rejected candidates clustered by root-cause theme so that I can see the systemic reasons we lose candidates rather than one-off rejections.","acceptance_criteria":["Given the rejected candidates, when the failure-analysis card renders, then each theme shows the number and percentage of rejections it explains and which candidates fall under it, ranked by size.","Given a theme has no matching rejections, when the card renders, then that theme is not shown.","Given no rejected candidates, when the card renders, then it states interview quality is healthy rather than showing empty themes."],"story_points":3,"roles":["BOD","PMO"],"dependencies":["EN-M2.5-01"],"status":"not-started"},{"id":"US-M2.5.S1-05","type":"story","title":"View the owned, prioritized improvement plan","story":"As a member of hiring leadership, I want each failure theme turned into a prioritized action with an owner and the evidence behind it so that the interview process is fixed by accountable changes, not opinions.","acceptance_criteria":["Given the failure themes, when the improvement plan renders, then each entry shows the recommended action, its priority, the evidence (how many rejections cite it) and a named owner.","Given the plan, when it renders, then entries are ordered to reflect the themes that explain the most rejections.","Given no systemic themes, when the plan renders, then it states there is nothing to fix rather than an empty list."],"story_points":3,"roles":["BOD","PMO"],"dependencies":["EN-M2.5-01"],"status":"not-started"},{"id":"US-M2.5.S1-06","type":"story","title":"View the hardest roles to fill by leadtime","story":"As a member of hiring leadership, I want closed positions ranked by time-to-hire with a difficulty marker so that I can see which roles are structurally hard to fill.","acceptance_criteria":["Given closed-position history, when the table renders, then each role shows its account and leadtime in days with an Easy / Moderate / Hard difficulty marker, longest leadtime first.","Given the set, when the card header renders, then it shows the average leadtime across closed positions.","Given no closed positions, when the card renders, then it shows an empty state without error."],"story_points":3,"roles":["BOD","PMO"],"dependencies":["EN-M2.5-01","EN-M2.2-01"],"status":"not-started"},{"id":"US-M2.5.S1-07","type":"story","title":"Browse the raw case-study log","story":"As a member of hiring leadership, I want the raw log of pass/fail final-stage write-ups with their reasons and tags so that I can inspect the evidence behind the analysis.","acceptance_criteria":["Given the case studies, when the log renders, then each entry shows the candidate, role, round, pass/fail result, the reason and the cause tags, with overall pass and fail counts.","Given a pass and a fail entry, when they render, then they are visually distinguished by result.","Given no case studies, when the log renders, then it shows an empty state without error."],"story_points":3,"roles":["BOD","PMO"],"dependencies":["EN-M2.5-01","EN-M2.4-01"],"status":"not-started"}]}]}]},{"id":"M3","name":"Project Monitoring","description":"PM/PMO project-governance module: portfolio health, project-request approvals, weekly reports, resource-allocation monitoring, risks & issues, and KPI metrics. Owns the project record, QCDP health and staffing/allocations the People module reads.","status":"in-progress","sub_modules":[{"id":"M3.1","name":"Portfolio","description":"The portfolio command centre: a role-scoped, week-by-week read on delivery health — headline KPIs, an insights-and-exceptions feed of everything non-green, and an account-by-account health rollup that drills into individual projects' weekly reports.","status":"in-progress","screens":[{"id":"M3.1.S1","name":"Portfolio Overview","description":"The default portfolio view for BOD/PMO (full) and AM/EM/TL/Member (scoped): a scoped header with week picker, the portfolio KPI strip, the insights & exceptions summary, and the Account Health rollup table.","roles":["BOD","PMO","AM","EM/TL/PM","Member"],"mockup_ref":{"screen":"project/portfolio"},"sub_screens":[{"id":"M3.1.S1.1","name":"Scoped header & week picker","description":"Role-aware title/subtitle (full vs scoped persona) and a reporting-week selector."},{"id":"M3.1.S1.2","name":"Portfolio KPI strip","description":"Account health counts (healthy/watch/critical), billable rate (≥80% target), predictability, report compliance."},{"id":"M3.1.S1.3","name":"Insights & exceptions summary","description":"Critical/watch/not-reported/stale-green counts and a paginated list of non-green projects, with 'View all'."},{"id":"M3.1.S1.4","name":"Account Health table","description":"Per-account rollup (health, QCDP, team, BMM, CSS, owner) expandable to project rows; expand/collapse-all."}],"items":[{"id":"EN-M3.1-01","type":"enabler","title":"Project record & account-health rollup model","story":"Provide the canonical project record (account, PM, phase, status [active/on-hold/closed], RAG health, QCDP pillars with auto vs reported values, team size, billable man-months, CSS, predictability, weekly-reported flag, open risk) and the account-level rollups every PM screen reads: account health (worst-of project RAG), account QCDP (worst pillar across projects), team/BMM totals and average CSS.","acceptance_criteria":["Given a set of projects, when an account is rolled up, then its health is the worst RAG among its projects, its QCDP is the worst value per pillar, and team, BMM and CSS are aggregated.","Given a project's QCDP has an auto-computed value and a reported override, when surfaced, then both are available and an override is distinguishable from the auto value.","Given an account has no projects in the current scope, when rolled up, then it is omitted rather than shown with zeroes.","Given a project's status, when active health, billability and report-compliance are aggregated, then only active and on-hold projects are counted and closed projects are excluded (surfaced separately as closed)."],"story_points":5,"roles":["BOD","PMO","AM","EM/TL/PM","Member"],"notes":"Health rollup: Red if any project Red, else Yellow if any Yellow, else Green. QCDP pillars = Quality, Cost, Delivery, Process (each RAG); account QCDP = worst pillar across its projects. Owns the project record the People allocation/org views and the rest of M3 read. Status lifecycle: active → on-hold → closed (default active on creation); closed projects leave the active portfolio and closure releases their allocations (M3.8).","dependencies":[],"external_deps":[{"needs":"account / client master data (and account→AM ownership)","likely_module":"M0","reason":"projects and the portfolio are keyed by account; the account master record has no management screen here and is owned by Admin/org-configuration (out of scope)."}],"status":"not-started"},{"id":"EN-M3.1-02","type":"enabler","title":"PM-module role/scope visibility","story":"Provide the visibility rules that scope every portfolio/project view to the caller: full portfolio for BOD/PMO, account-scoped for AM, project-scoped for EM/TL, and own-projects for Member.","acceptance_criteria":["Given a BOD/PMO caller, when the portfolio loads, then all accounts and projects are visible.","Given an AM, when the portfolio loads, then only projects in their assigned (and granted) account(s) are visible.","Given an EM/TL or Member, when the portfolio loads, then only the projects they lead / are staffed on are visible, and an empty state is shown when nothing is in scope."],"story_points":3,"roles":["BOD","PMO","AM","EM/TL/PM","Member"],"notes":"Scope tiers: BOD/PMO = whole portfolio; AM = own + granted accounts; EM/TL = projects they run; Member = projects they are allocated to.","dependencies":["EN-M3.1-01"],"status":"not-started"},{"id":"US-M3.1.S1-01","type":"story","title":"View the portfolio KPI strip","story":"As a BOD or PMO, I want a portfolio KPI strip — account health counts, billable rate, predictability and report compliance — so that I can gauge delivery health in seconds.","acceptance_criteria":["Given the portfolio loads, when the KPI strip renders, then it shows account counts split into healthy/watch/critical, billable rate against the ≥80% target (with billable/total man-months), average predictability, and report compliance (% of in-scope projects reported this week).","Given billable rate is below 80% or report compliance below 90%, when rendered, then the metric is visually flagged.","Given a metric has no data in scope, when rendered, then an empty state is shown instead of a zero."],"story_points":3,"roles":["BOD","PMO"],"dependencies":["EN-M3.1-01","EN-M3.4-01","EN-M3.3-01"],"status":"not-started"},{"id":"US-M3.1.S1-02","type":"story","title":"Review the insights & exceptions summary","story":"As a BOD or PMO, I want a summary that counts critical, watch, not-reported and stale-green projects and lists the non-green ones so that I can see what needs attention this week.","acceptance_criteria":["Given the portfolio loads, when the summary renders, then it shows counts of critical, watch, not-reported and stale-green projects, plus a paginated list of non-green projects each with its account, open risk and a critical/watch tag.","Given more non-green projects than fit one page, when rendered, then the list paginates.","Given all in-scope projects are green this week, when rendered, then an all-green empty state is shown."],"story_points":3,"roles":["BOD","PMO"],"dependencies":["EN-M3.1-01","EN-M3.3-01"],"status":"not-started"},{"id":"US-M3.1.S1-03","type":"story","title":"View the Account Health rollup table","story":"As a BOD or PMO, I want an account-health table that rolls each account's projects up into health, QCDP, team, BMM, CSS and owner so that I can compare account delivery health at a glance.","acceptance_criteria":["Given the portfolio loads, when the table renders, then each account row shows its health (with project count), worst-of QCDP pillars, total team, total BMM, average CSS and the owning Account Manager.","Given accounts exist, when rendered, then they can be expanded/collapsed individually and via expand-all / collapse-all.","Given no accounts are in scope, when rendered, then an empty state is shown."],"story_points":5,"roles":["BOD","PMO"],"notes":"Owner = AM on account rows. BMM = billable man-months. CSS = customer satisfaction /5. Account QCDP = worst pillar across its projects.","dependencies":["EN-M3.1-01","EN-M3.4-01"],"status":"not-started"},{"id":"US-M3.1.S1-04","type":"story","title":"Expand an account to its projects","story":"As a BOD, PMO or AM, I want to expand an account to see its projects so that I can drill from account health into the individual projects driving it.","acceptance_criteria":["Given an account row, when I expand it, then its projects are listed, each with phase, QCDP, staff, BMM, CSS and PM.","Given I collapse it (or use collapse-all), when applied, then the project rows are hidden.","Given an account has a single project, when expanded, then that one project row is shown."],"story_points":2,"roles":["BOD","PMO","AM"],"dependencies":["US-M3.1.S1-03"],"status":"not-started"},{"id":"US-M3.1.S1-05","type":"story","title":"Switch the reporting week","story":"As any portfolio viewer, I want to switch the reporting week so that I can view delivery health for a chosen week.","acceptance_criteria":["Given the portfolio is shown, when I pick a different week, then the KPIs, exceptions and account health recompute for that week.","Given a project has no report for the selected week, when rendered, then its RAG is carried over and it is counted as not-reported."],"story_points":2,"roles":["BOD","PMO","AM","EM/TL/PM","Member"],"dependencies":["EN-M3.1-01","EN-M3.3-01"],"status":"not-started"},{"id":"US-M3.1.S1-06","type":"story","title":"Drill into a project's weekly report from the portfolio","story":"As an authorized viewer, I want to click a project in the portfolio to open its weekly report so that I can see the detail behind its health.","acceptance_criteria":["Given a project row in the account-health table or the exceptions list, when I click it, then that project's weekly report opens.","Given the row is an account (not a project), when I click it, then it expands/collapses instead of opening a report."],"story_points":2,"roles":["BOD","PMO","AM","EM/TL/PM","Member"],"dependencies":["EN-M3.1-01","US-M3.3.S2-01"],"status":"not-started"},{"id":"US-M3.1.S1-07","type":"story","title":"View the portfolio scoped to my accounts (AM)","story":"As an Account Manager, I want the portfolio scoped to my account(s) so that I see only my accounts' projects and health.","acceptance_criteria":["Given I am an AM, when the portfolio loads, then the header indicates a scoped view and the KPIs, exceptions and account health reflect only my assigned (and granted) accounts.","Given I have no projects in scope, when rendered, then an empty state is shown."],"story_points":2,"roles":["AM"],"mockup_ref":{"screen":"project/portfolio","persona":"am"},"dependencies":["EN-M3.1-02"],"status":"not-started"},{"id":"US-M3.1.S1-08","type":"story","title":"View the portfolio scoped to my projects (EM/TL)","story":"As an EM/Team Lead, I want the portfolio scoped to the projects I run so that I see only my projects' delivery health.","acceptance_criteria":["Given I am an EM/TL, when the portfolio loads, then the header indicates a scoped view and every section reflects only the projects I lead.","Given I lead no project, when rendered, then an empty state explains there is nothing in scope."],"story_points":2,"roles":["EM/TL/PM"],"mockup_ref":{"screen":"project/portfolio","persona":"manager"},"dependencies":["EN-M3.1-02"],"status":"not-started"},{"id":"US-M3.1.S1-09","type":"story","title":"View the portfolio scoped to my projects (Member)","story":"As a Member, I want the portfolio scoped to the projects I'm staffed on so that I can see my projects' delivery health.","acceptance_criteria":["Given I am a Member, when the portfolio loads, then only the projects I am allocated to are shown.","Given I am on no project, when rendered, then an empty state is shown."],"story_points":2,"roles":["Member"],"mockup_ref":{"screen":"project/portfolio","persona":"employee"},"dependencies":["EN-M3.1-02","EN-M3.4-01"],"status":"not-started"}]},{"id":"M3.1.S2","name":"Insights & Exceptions (detail)","description":"The 'View all' detail reached from the summary: a full table of every non-green project this week with health, QCDP, open risk, reporting status and PM, plus the not-reported and stale-green compliance flags. Rows drill into the weekly report.","roles":["BOD","PMO"],"mockup_ref":{"screen":"project/portfolio"},"sub_screens":[{"id":"M3.1.S2.1","name":"Exceptions KPIs","description":"Critical, watch, not-reported and stale-green counts for the selected week."},{"id":"M3.1.S2.2","name":"Non-green projects table","description":"Every non-green project with health, QCDP, open risk/issue, reported status and PM; critical first."},{"id":"M3.1.S2.3","name":"Reporting flags","description":"Not-reported and stale-green project lists."}],"items":[{"id":"US-M3.1.S2-01","type":"story","title":"View all non-green projects (exceptions detail)","story":"As a BOD or PMO, I want a full table of every non-green project — with health, QCDP, open risk, reporting status and PM — so that I can triage everything that needs attention this week.","acceptance_criteria":["Given I open 'View all' from the summary, when the detail renders, then a table lists every non-green project with its account, health, QCDP, open risk/issue, reported status and PM, sorted critical first, above a critical/watch/not-reported/stale-green KPI row.","Given I click a row, when selected, then that project's weekly report opens.","Given all in-scope projects are green, when rendered, then a no-exceptions empty state is shown."],"story_points":3,"roles":["BOD","PMO"],"dependencies":["EN-M3.1-01","US-M3.1.S1-02","EN-M3.3-01","US-M3.3.S2-01"],"status":"not-started"},{"id":"US-M3.1.S2-02","type":"story","title":"Review reporting-compliance flags","story":"As a BOD or PMO, I want the not-reported and stale-green projects called out so that I can chase missing reports and unverified green status.","acceptance_criteria":["Given the exceptions detail renders, when projects have no report for the selected week, then they are listed as not-reported.","Given a project has been green for 3+ weeks with no metric movement, when rendered, then it is flagged as stale-green for a PMO spot-check.","Given neither applies, when rendered, then the flags are omitted."],"story_points":2,"roles":["BOD","PMO"],"notes":"Stale green = Green for ≥3 consecutive weeks with no metric movement. Not-reported = no weekly report submitted for the selected week.","dependencies":["EN-M3.1-01","EN-M3.3-01"],"status":"not-started"}]}]},{"id":"M3.2","name":"Project Requests","description":"Project-charter governance, visible to BOD/PMO and the requesting PM (EM/TL): submit a charter → PMO sign-off → BoD approval (creates the project live in Portfolio) → staffing & access (R&R: Owner/Edit/View per person). Owns the request/approval workflow and the initial staffing; the workspace-access grant crosses to Admin/access-control (M0).","status":"in-progress","screens":[{"id":"M3.2.S1","name":"Project Requests list","description":"The request pipeline: counts by stage (total, awaiting PMO, awaiting BoD, approved & created, rejected) and a card per request with its stage badge and stepper. Entry point for a new request.","roles":["BOD","PMO","EM/TL/PM"],"mockup_ref":{"screen":"project/requests"},"sub_screens":[{"id":"M3.2.S1.1","name":"Pipeline KPIs","description":"Total, awaiting PMO, awaiting BoD, approved & created, rejected."},{"id":"M3.2.S1.2","name":"Request cards","description":"Per-request card: id, name, account, PM, BMM, team, stage badge and stepper; rejection reason if rejected."}],"items":[{"id":"EN-M3.2-01","type":"enabler","title":"Project request (charter) model & approval workflow","story":"Provide the project-request record (charter: name, account, requesting PM, budget BMM, team size, methodology, pricing, timeline, objective, scope) and its approval stage machine — Submitted → PMO Review → BoD Review → Project created — with rejection (and a reason) possible at either review stage.","acceptance_criteria":["Given a request, when its stage is shown, then it reflects exactly one of awaiting-PMO, awaiting-BoD, Approved & created, or Rejected, with a stepper showing progress.","Given a request is rejected, when displayed, then the stage it was rejected at and the reason are retained.","Given a request advances or is rejected, when the change is made, then it is recorded with an audit entry."],"story_points":5,"roles":["BOD","PMO","EM/TL/PM"],"notes":"Stages: Submitted → PMO sign-off → BoD approval → Project created (live in Portfolio). PM = the requesting manager (EM/TL).","dependencies":[],"status":"not-started"},{"id":"US-M3.2.S1-01","type":"story","title":"View the project-request pipeline","story":"As a BOD, PMO or PM, I want to see the project-request pipeline with counts by stage so that I can track what needs review and what's been approved.","acceptance_criteria":["Given I open Project Requests, when the list renders, then it shows counts of total, awaiting PMO, awaiting BoD, approved & created and rejected, plus a card per request with its stage badge and stepper.","Given a request was rejected, when its card renders, then the rejection reason is shown.","Given there are no requests, when the list renders, then an empty state is shown."],"story_points":3,"roles":["BOD","PMO","EM/TL/PM"],"dependencies":["EN-M3.2-01"],"status":"not-started"}]},{"id":"M3.2.S2","name":"Request charter & approval","description":"The charter modal: full charter, stage stepper and rejection reason, with the stage-gated actions — PMO sign-off, BoD approval (creates the project), and reject with a reason.","roles":["BOD","PMO","EM/TL/PM"],"mockup_ref":{"screen":"project/requests"},"sub_screens":[{"id":"M3.2.S2.1","name":"Charter detail","description":"Account, PM, BMM, team, methodology, pricing, timeline, submitted, objective, scope, stepper."},{"id":"M3.2.S2.2","name":"Approval actions","description":"Stage-gated PMO sign-off, BoD approve & create, and reject."}],"items":[{"id":"US-M3.2.S2-01","type":"story","title":"Open a request's charter","story":"As a BOD, PMO or PM, I want to open a request's charter so that I can review its objective, scope and commercials before deciding.","acceptance_criteria":["Given I open a request, when the charter renders, then it shows account, requesting PM, budget (BMM), team size, methodology, pricing, timeline, submitted date, objective and scope, plus the stage stepper.","Given the request is rejected, when opened, then the rejection stage and reason are shown.","Given the request has been created into a project, when opened, then the linked project and its staffing are shown."],"story_points":3,"roles":["BOD","PMO","EM/TL/PM"],"dependencies":["EN-M3.2-01"],"status":"not-started"},{"id":"US-M3.2.S2-02","type":"story","title":"PMO sign-off on a request","story":"As a PMO, I want to sign off a submitted request so that only PMO-approved charters reach the Board.","acceptance_criteria":["Given a request is awaiting PMO review, when I approve it, then it advances to BoD review and the action is audit-logged.","Given a request is not at PMO review, when I open it, then the PMO sign-off action is not available."],"story_points":3,"roles":["PMO","BOD"],"dependencies":["US-M3.2.S2-01"],"status":"not-started"},{"id":"US-M3.2.S2-03","type":"story","title":"BoD approval that creates the project","story":"As a BOD member, I want to approve a PMO-signed request so that the project is created live in the Portfolio.","acceptance_criteria":["Given a request is awaiting BoD review, when I approve it, then a new project is created in the Portfolio with a generated id and the request is marked Approved & created.","Given the project is created, when I confirm, then the action is audit-logged and staffing & access can be granted next.","Given a request is not at BoD review, when I open it, then the BoD approval action is not available."],"story_points":5,"roles":["BOD"],"dependencies":["US-M3.2.S2-01","EN-M3.1-01"],"status":"not-started"},{"id":"US-M3.2.S2-04","type":"story","title":"Reject a request with a reason","story":"As a PMO or BOD member, I want to reject a request with a reason so that the requester knows why it didn't proceed.","acceptance_criteria":["Given a request is at PMO or BoD review, when I reject it with a reason, then it is marked Rejected at that stage with the reason recorded and audit-logged.","Given I cancel the rejection, when dismissed, then the request is unchanged."],"story_points":2,"roles":["PMO","BOD"],"dependencies":["US-M3.2.S2-01"],"status":"not-started"}]},{"id":"M3.2.S3","name":"Staffing & Access (R&R)","description":"After a project is created: staff people onto it with a role and allocation %, and grant each their workspace access (Owner/Edit/View).","roles":["BOD","PMO","EM/TL/PM"],"mockup_ref":{"screen":"project/requests"},"sub_screens":[{"id":"M3.2.S3.1","name":"Staffing list","description":"People on the project with role, RA % and access level."},{"id":"M3.2.S3.2","name":"Add person","description":"Add a person with role, RA % and access."}],"items":[{"id":"US-M3.2.S3-01","type":"story","title":"Staff people and grant access on a created project","story":"As a PMO or PM, I want to staff people onto a created project and grant each their access (Owner/Edit/View) so that the team can start with the right permissions.","acceptance_criteria":["Given a created project, when I add a person with a role, allocation % and access level, then they appear on the project's staffing list, the project's staff count updates and the grant is audit-logged.","Given I add someone already staffed, when I try, then they are not added twice.","Given the project is not yet created, when I open the request, then the staffing section is unavailable."],"story_points":5,"roles":["PMO","EM/TL/PM","BOD"],"notes":"Initial staffing creates allocations (the RA source, EN-M3.4-01); the Owner/Edit/View workspace-access grant is an access-control concern owned by Admin (M0).","dependencies":["US-M3.2.S2-03","EN-M3.4-01"],"external_deps":[{"needs":"grant/revoke workspace access (Owner/Edit/View) and audit it","likely_module":"M0","reason":"per-person access control is owned by Admin/access-control, which is out of scope for this WBS."}],"status":"not-started"}]},{"id":"M3.2.S4","name":"New Project Request","description":"The charter submission form: name (required), account, PM, budget BMM, team size, methodology, pricing, timeline, objective and scope.","roles":["BOD","PMO","EM/TL/PM"],"mockup_ref":{"screen":"project/requests"},"sub_screens":[{"id":"M3.2.S4.1","name":"Charter form","description":"Charter fields with name required; submit enters the pipeline awaiting PMO."}],"items":[{"id":"US-M3.2.S4-01","type":"story","title":"Submit a new project request","story":"As a PM (EM/TL), PMO or BOD, I want to submit a new project-request charter so that it enters the approval pipeline.","acceptance_criteria":["Given I open the new-request form, when I enter at least a project name (plus account, budget, team, methodology, pricing, timeline, objective, scope), then on submit a request is created at 'awaiting PMO review' and audit-logged.","Given I omit the project name, when I submit, then I am warned it is required and nothing is created.","Given the request is created, when I return to the list, then it appears at the top awaiting PMO review."],"story_points":3,"roles":["EM/TL/PM","PMO","BOD"],"dependencies":["EN-M3.2-01"],"status":"not-started"}]}]},{"id":"M3.3","name":"Weekly Reports","description":"Per-project weekly delivery reporting: a role-scoped list (account→project, by week), the report drawer Portfolio drills into (health, QCDP, trend, staffing, narrative, comments), and the submit form (QCDP per pillar, overall = worst, mandatory road-to-green for non-Green). Owns the per-week health, reported flag and stale-green basis the Portfolio reads; non-Green reports spawn Recovery actions in Risks & Issues (M3.5).","status":"in-progress","screens":[{"id":"M3.3.S1","name":"Weekly Reports list","description":"Role-scoped list of projects and their weekly-report status for a chosen week: cards with RAG, QCDP, latest summary, reporter (PM/PMO) and report count, with week/account/project filters and pagination.","roles":["BOD","PMO","AM","EM/TL/PM","Member"],"mockup_ref":{"screen":"project/weekly"},"sub_screens":[{"id":"M3.3.S1.1","name":"Filter toolbar","description":"Week, account and project selectors with project count."},{"id":"M3.3.S1.2","name":"Report cards","description":"Per-project card: RAG, QCDP, latest summary, reporter tag(s), report count for the week."}],"items":[{"id":"EN-M3.3-01","type":"enabler","title":"Weekly report model & project-health write-back","story":"Provide the weekly report record (project × week × reporter PM/PMO, QCDP per pillar, overall RAG = worst of the four, executive summary, risk/issue, optional road-to-green, comments) and the rule that submitting a report writes its QCDP/RAG back to the project, marks it reported for the week and resets its green-streak — the basis the Portfolio reads for per-week health, the reported flag and stale-green.","acceptance_criteria":["Given a submitted report, when stored, then it captures project, week, reporter (PM or PMO), QCDP per pillar, overall RAG, summary, risk and any road-to-green, with overall RAG = the worst of the four QCDP pillars.","Given a report is submitted for a project and week, when saved, then the project's QCDP/RAG are updated, it is marked reported for that week and its green-streak is reset.","Given a reporter already submitted for the same project and week, when they submit again, then their report is replaced rather than duplicated (one report per reporter per project per week)."],"story_points":5,"roles":["BOD","PMO","EM/TL/PM"],"notes":"Reporter = PMO for full-access submitters, otherwise PM. The reported flag and reset green-streak feed Portfolio report-compliance and stale-green via the project record (EN-M3.1-01).","dependencies":["EN-M3.1-01"],"status":"not-started"},{"id":"US-M3.3.S1-01","type":"story","title":"Browse weekly reports by account and project","story":"As a BOD or PMO, I want to browse weekly reports by account and project for a chosen week so that I can find and open any project's report.","acceptance_criteria":["Given I open Weekly Reports, when the list renders, then each in-scope project shows a card with its RAG, QCDP, latest summary, who reported (PM/PMO) and how many reports it has for the selected week.","Given I change the week, account or project filter, when applied, then the cards update and paginate to match.","Given a project has no report for the selected week, when its card renders, then it shows a 'no report' indicator."],"story_points":3,"roles":["BOD","PMO"],"dependencies":["EN-M3.3-01","EN-M3.1-01"],"status":"not-started"},{"id":"US-M3.3.S1-02","type":"story","title":"View weekly reports scoped to my access","story":"As an AM, EM/TL or Member, I want the weekly-reports list scoped to my access so that I only see reports for my accounts/projects.","acceptance_criteria":["Given I am an AM, when I open Weekly Reports, then only my accounts' projects are listed; given an EM/TL or Member, then only my projects are listed.","Given nothing is in my scope, when the list renders, then an empty state is shown."],"story_points":2,"roles":["AM","EM/TL/PM","Member"],"dependencies":["EN-M3.1-02"],"status":"not-started"}]},{"id":"M3.3.S2","name":"Weekly Report (detail)","description":"The report drawer Portfolio and the list drill into: project header and health, QCDP and trend, staffing/utilization/predictability/CSS, each report's summary/risk/road-to-green, a comment thread, and a backfill action when understaffed.","roles":["BOD","PMO","AM","EM/TL/PM","Member"],"mockup_ref":{"screen":"project/weekly"},"sub_screens":[{"id":"M3.3.S2.1","name":"Report header & health","description":"Account/PM/PMO/phase, RAG + QCDP, health trend, staffing/util/predictability/CSS, not-reported badge."},{"id":"M3.3.S2.2","name":"Report narrative","description":"Per-report summary, risk/issue and road-to-green (action/owner/due)."},{"id":"M3.3.S2.3","name":"Comments","description":"Per-report comment thread."},{"id":"M3.3.S2.4","name":"Backfill action","description":"Raise a backfill requisition when staffed below plan."}],"items":[{"id":"US-M3.3.S2-01","type":"story","title":"Open a project's weekly report","story":"As an authorized viewer, I want to open a project's weekly report to see its health, QCDP, trend, staffing and narrative so that I understand the detail behind its status.","acceptance_criteria":["Given I open a project's report for the selected week, when the drawer renders, then it shows the project header (account, PM, PMO, phase), overall RAG with QCDP, a health trend, staffing (staffed/plan, utilization, predictability, CSS) and each report's summary, risk and road-to-green.","Given the project has not reported for the week, when the drawer renders, then a 'not reported' badge is shown and the carried-over health is indicated.","Given a report has a road-to-green, when shown, then its action, owner and due are displayed."],"story_points":5,"roles":["BOD","PMO","AM","EM/TL/PM","Member"],"dependencies":["EN-M3.3-01","EN-M3.1-01"],"status":"not-started"},{"id":"US-M3.3.S2-02","type":"story","title":"Comment on a weekly report","story":"As an authorized viewer, I want to comment on a weekly report so that I can discuss it in context.","acceptance_criteria":["Given I open a report, when I write a comment and send it, then it is added to that report's thread with my name, role and timestamp.","Given a report has comments, when the drawer renders, then they are listed in order with author and role."],"story_points":2,"roles":["BOD","PMO","AM","EM/TL/PM","Member"],"dependencies":["US-M3.3.S2-01"],"status":"not-started"},{"id":"US-M3.3.S2-03","type":"story","title":"Raise a backfill from a report","story":"As a BOD, PMO or EM/TL, I want to raise a backfill from an understaffed project's report so that the staffing gap is sent to recruitment.","acceptance_criteria":["Given a project is staffed below plan, when I view its report, then a 'raise backfill' action shows the number of open seats.","Given I raise the backfill, when confirmed, then a backfill requisition is created for the gap and the action is audit-logged.","Given the project is fully staffed, when I view the report, then no backfill action is shown."],"story_points":3,"roles":["BOD","PMO","EM/TL/PM"],"dependencies":["US-M3.3.S2-01","EN-M2.2-01"],"status":"not-started"}]},{"id":"M3.3.S3","name":"Submit Weekly Report","description":"The submit form: pick a project, set QCDP per pillar (overall = worst, auto), executive summary and risk, with a mandatory road-to-green when non-Green that becomes a tracked Recovery action.","roles":["BOD","PMO","EM/TL/PM"],"mockup_ref":{"screen":"project/weekly"},"sub_screens":[{"id":"M3.3.S3.1","name":"QCDP & overall","description":"Quality/Cost/Delivery/Process selectors with auto overall = worst."},{"id":"M3.3.S3.2","name":"Summary & risk","description":"Executive summary and risk/issue."},{"id":"M3.3.S3.3","name":"Road-to-green","description":"Mandatory action/owner/due when non-Green."}],"items":[{"id":"US-M3.3.S3-01","type":"story","title":"Submit a weekly report with QCDP","story":"As a PM (EM/TL) or PMO, I want to submit a project's weekly report with QCDP per pillar and an overall status so that its health is recorded for the week.","acceptance_criteria":["Given I open the submit form and pick a project, when the QCDP pillars pre-fill from the project's current auto values, then I can adjust each pillar (Green/Yellow/Red) and the overall status updates to the worst of the four.","Given I provide the QCDP, summary and any risk, when I submit a Green report, then the report is saved, the project's health is updated and it is marked reported for the week.","Given I am a PM, when I submit, then it is recorded as a PM report (PMO when submitted by full-access), and a second submission for the same project/week replaces my earlier one."],"story_points":5,"roles":["EM/TL/PM","PMO","BOD"],"notes":"PM submits their own projects; PMO/BOD any project. Overall status = worst of the four QCDP pillars.","dependencies":["EN-M3.3-01"],"status":"not-started"},{"id":"US-M3.3.S3-02","type":"story","title":"Require a road-to-green for a non-Green report","story":"As a PM or PMO, I want a non-Green report to require a road-to-green so that every amber/red status has a tracked recovery action.","acceptance_criteria":["Given my overall status is non-Green, when I submit, then a road-to-green action with an owner (and due) is mandatory and submission is blocked until it is provided.","Given I submit a non-Green report with a road-to-green, when saved, then it is recorded on the report and a tracked Recovery action is created in Risks & Issues.","Given the status is Green, when I submit, then no road-to-green is required."],"story_points":3,"roles":["EM/TL/PM","PMO","BOD"],"dependencies":["US-M3.3.S3-01","EN-M3.5-01"],"status":"not-started"}]}]},{"id":"M3.4","name":"RA Monitoring","description":"Resource-allocation monitoring: the editable staffing grid where people are allocated onto projects with a planned effort over a date range, yielding calendar man-months, billable rate and per-person utilization. Owns the single allocation source the People module reads (resolves EN-M1.4-01) and the portfolio's billable-rate man-months.","status":"in-progress","screens":[{"id":"M3.4.S1","name":"RA Monitoring","description":"Role-scoped resource-allocation grid: allocation KPIs, the per-person planned-effort table (with computed calendar effort), inline add/edit/remove and assign dialog, and account/project filters. BOD/PMO edit all; EM/TL edit their own projects; AM read-only.","roles":["BOD","PMO","AM","EM/TL/PM"],"mockup_ref":{"screen":"project/resourcing"},"sub_screens":[{"id":"M3.4.S1.1","name":"Allocation KPIs","description":"Total calendar effort (MM), billable effort (MM and % of total), people allocated (and editable count), active scope."},{"id":"M3.4.S1.2","name":"Allocation table","description":"Per-person rows: name, seniority, planned effort, start/end dates, computed calendar effort, note."},{"id":"M3.4.S1.3","name":"Add / assign allocation","description":"Inline quick-add row and the 'Assign person to project' dialog (person, project, role, level, effort)."},{"id":"M3.4.S1.4","name":"Filters","description":"Account and project filters scoping the grid and KPIs."}],"items":[{"id":"EN-M3.4-01","type":"enabler","title":"Allocation source model, man-month aggregation & edit rights","story":"Provide the canonical resource-allocation record (person × project × planned effort × date range, billable flag, seniority/role) and the derived aggregations every consumer reads — calendar effort, billable man-months and billable rate, per-account/project rollups, and per-person utilization/bench — together with the edit-rights rules (BOD/PMO edit all; EM/TL edit only their own projects; AM and Member read-only).","acceptance_criteria":["Given an allocation with a planned effort and a start/end date, when aggregated, then its calendar effort = whole months in the range (inclusive) × planned effort.","Given a set of allocations, when rolled up for the current scope, then total and billable man-months, billable rate and people-allocated counts are computed.","Given a caller edits an allocation, when attempted, then it succeeds only for BOD/PMO (any allocation) or an EM/TL on their own project; AM and Member are read-only.","Given allocations exist, when queried per person or per project, then per-person utilization (and bench when unallocated in a period) and per-project membership are returned for the People module and org chart to read."],"story_points":5,"roles":["BOD","PMO","AM","EM/TL/PM","Member"],"notes":"The single allocation source of truth; People M1.4 (EN-M1.4-01) and the org chart read it. Billable rate = billable effort ÷ total effort. Bench = no allocation in a period.","dependencies":["EN-M3.1-01","EN-M1.2-01"],"status":"not-started"},{"id":"US-M3.4.S1-01","type":"story","title":"View allocation KPIs","story":"As a BOD or PMO, I want allocation KPIs — total calendar effort, billable man-months and rate, people allocated, and current scope — so that I can see staffing load and billability at a glance.","acceptance_criteria":["Given the RA Monitoring screen loads, when the KPI row renders, then it shows total calendar effort (MM), billable effort (MM and % of total), the number of people allocated (with how many are editable by me), and the active scope (all projects or the selected one).","Given a filter narrows the scope, when applied, then the KPIs recompute to the filtered allocations.","Given no allocations are in scope, when rendered, then an empty state is shown instead of zeros."],"story_points":3,"roles":["BOD","PMO"],"dependencies":["EN-M3.4-01"],"status":"not-started"},{"id":"US-M3.4.S1-02","type":"story","title":"View the per-person allocation table","story":"As a BOD or PMO, I want a per-person allocation table showing planned effort over a date range with the computed calendar effort so that I can review how each person is staffed.","acceptance_criteria":["Given the screen loads, when the table renders, then each row shows the person's name, seniority, planned effort, start and end dates, computed calendar effort and an optional note.","Given allocations span multiple accounts/projects, when rendered, then they are grouped/sorted by account then project.","Given there are no allocations in scope, when rendered, then an empty-table state is shown."],"story_points":3,"roles":["BOD","PMO"],"dependencies":["EN-M3.4-01"],"status":"not-started"},{"id":"US-M3.4.S1-03","type":"story","title":"Staff a person onto a project","story":"As a BOD, PMO or EM/TL, I want to staff a person onto a project with a planned effort so that the allocation is tracked and rolled into utilization and billability.","acceptance_criteria":["Given I add a person via the inline quick-add row or the assign dialog, when I provide at least a name and a project, then a new allocation is created with the chosen seniority/role, planned effort and date range, and the action is audit-logged.","Given I omit the name (or, for inline add, have not selected a project first), when I try to add, then I am warned and nothing is created.","Given the allocation is created, when the table refreshes, then the new row and the recomputed KPIs include it."],"story_points":3,"roles":["BOD","PMO","EM/TL/PM"],"notes":"Two entry points: the inline top-row quick-add and the 'Assign person to project' dialog.","dependencies":["EN-M3.4-01"],"status":"not-started"},{"id":"US-M3.4.S1-04","type":"story","title":"Edit an allocation inline","story":"As a BOD or PMO, I want to edit an allocation's planned effort, dates, seniority or note inline so that I can keep staffing current.","acceptance_criteria":["Given I edit a row's planned effort, start/end date, seniority or note, when I save, then the change persists, the calendar effort recomputes and the change is audit-logged.","Given I change the date range or planned effort, when saved, then the row's calendar effort and the KPI totals update.","Given I make no change, when I leave the field, then nothing is saved."],"story_points":3,"roles":["BOD","PMO"],"dependencies":["EN-M3.4-01"],"status":"not-started"},{"id":"US-M3.4.S1-05","type":"story","title":"Remove an allocation","story":"As a BOD or PMO, I want to remove an allocation so that people no longer staffed drop off the plan.","acceptance_criteria":["Given I remove an allocation, when I confirm, then it is deleted, the KPIs recompute and the removal is audit-logged.","Given I cancel the confirmation, when dismissed, then nothing is removed."],"story_points":2,"roles":["BOD","PMO"],"dependencies":["EN-M3.4-01"],"status":"not-started"},{"id":"US-M3.4.S1-06","type":"story","title":"Filter allocations by account and project","story":"As any RA Monitoring viewer, I want to filter allocations by account and project so that I can focus on a team's staffing.","acceptance_criteria":["Given I pick an account, when applied, then the table and KPIs show only that account's allocations and the project filter narrows to its projects.","Given I pick a project, when applied, then only that project's allocations are shown.","Given a filter yields nothing, when applied, then an empty state is shown."],"story_points":2,"roles":["BOD","PMO","AM","EM/TL/PM"],"dependencies":["EN-M3.4-01"],"status":"not-started"},{"id":"US-M3.4.S1-07","type":"story","title":"Manage allocations for my own projects (EM/TL)","story":"As an EM/Team Lead, I want to add, edit and remove allocations only for the projects I run so that I can manage my team's staffing without affecting others.","acceptance_criteria":["Given I am an EM/TL, when I open RA Monitoring, then I can add/edit/remove allocations on my own projects while rows outside my projects are read-only.","Given I add a person, when I have not selected one of my own projects, then I cannot allocate them to a project I don't run."],"story_points":2,"roles":["EM/TL/PM"],"dependencies":["EN-M3.4-01"],"status":"not-started"},{"id":"US-M3.4.S1-08","type":"story","title":"View allocations read-only scoped to my accounts (AM)","story":"As an Account Manager, I want a read-only view of allocations for my accounts so that I can see how my accounts are staffed without editing.","acceptance_criteria":["Given I am an AM, when I open RA Monitoring, then allocations for my assigned (and granted) accounts are shown read-only with no add/edit/remove controls.","Given nothing is in my scope, when rendered, then an empty state is shown."],"story_points":2,"roles":["AM"],"dependencies":["EN-M3.4-01"],"status":"not-started"}]}]},{"id":"M3.5","name":"Risks & Issues","description":"Consolidated RAID log across the portfolio — risks/issues with type, severity, priority, status, owner and due — with headline counts and a type filter. Read-only in the mockup: items originate from manual seed, Recovery actions auto-created by non-Green weekly reports (M3.3) and Action items promoted from Retro (M3.7).","status":"in-progress","screens":[{"id":"M3.5.S1","name":"Risk & Issue log","description":"Role-scoped RAID log: KPIs (total, open, recovery, critical/P0), a type filter and the consolidated risk/issue table.","roles":["BOD","PMO","AM","EM/TL/PM","Member"],"mockup_ref":{"screen":"project/risks"},"sub_screens":[{"id":"M3.5.S1.1","name":"RAID KPIs","description":"Total logged, open, Recovery actions (from road-to-green), Critical/P0."},{"id":"M3.5.S1.2","name":"Type filter","description":"Filter by item type (Customer, Bug, Resource, Stability, Recovery, Action…)."},{"id":"M3.5.S1.3","name":"RAID table","description":"ID, project, title/action, type, severity, priority, status, owner, due."}],"items":[{"id":"EN-M3.5-01","type":"enabler","title":"RAID register model","story":"Provide the consolidated risk/issue (RAID) register — each item with project, title, type, severity, priority, status, owner, due and action — aggregating manually-noted risks/issues, Recovery actions auto-created by non-Green weekly reports (M3.3) and Action items promoted from Retro (M3.7) into one log.","acceptance_criteria":["Given risk/issue items exist, when the register is read, then each carries project, title, type, severity (Critical/High/Important), priority (P0–P2), status (Open/In Progress/Monitoring/Resolved), owner, due and action.","Given a non-Green weekly report with a road-to-green, when submitted, then a Recovery item is added to the register linked to that project.","Given a Retro Try item is promoted, when actioned, then an Action item is added to the register."],"story_points":3,"roles":["BOD","PMO","AM","EM/TL/PM","Member"],"notes":"Read-only log in the mockup: items originate from manual seed, weekly-report Recovery (M3.3) and Retro Action (M3.7). There is no manual create/edit/resolve screen — manual risk logging and status updates are a likely future requirement, not in the current mockup.","dependencies":["EN-M3.1-01"],"status":"not-started"},{"id":"US-M3.5.S1-01","type":"story","title":"View the consolidated RAID log","story":"As a BOD or PMO, I want the consolidated RAID log with headline counts so that I can see every open risk and issue across the portfolio.","acceptance_criteria":["Given I open Risks & Issues, when it renders, then KPIs show total logged, open, Recovery actions (from road-to-green) and Critical/P0, above a table of all in-scope items with project, title/action, type, severity, priority, status, owner and due.","Given an item is a Recovery action, when listed, then it is visually distinguished from ordinary risks/issues.","Given there are no items in scope, when it renders, then an empty state is shown."],"story_points":3,"roles":["BOD","PMO"],"dependencies":["EN-M3.5-01"],"status":"not-started"},{"id":"US-M3.5.S1-02","type":"story","title":"Filter the RAID log by type","story":"As a BOD or PMO, I want to filter the log by type so that I can focus on a category (e.g. Resource, Bug, Recovery).","acceptance_criteria":["Given I select a type, when applied, then only items of that type are shown.","Given I reset to All, when applied, then all in-scope items are shown again."],"story_points":2,"roles":["BOD","PMO"],"dependencies":["US-M3.5.S1-01"],"status":"not-started"},{"id":"US-M3.5.S1-03","type":"story","title":"View the RAID log scoped to my access","story":"As an AM, EM/TL or Member, I want the RAID log scoped to my access so that I only see risks/issues for my accounts/projects.","acceptance_criteria":["Given I am an AM, when I open Risks & Issues, then only items on my accounts' projects are shown; given an EM/TL or Member, then only items on my projects.","Given nothing is in my scope, when it renders, then an empty state is shown."],"story_points":2,"roles":["AM","EM/TL/PM","Member"],"dependencies":["EN-M3.1-02"],"status":"not-started"}]}]},{"id":"M3.6","name":"KPI Metrics","description":"Operational Health Score (OHS) and QCDP pillar KPIs across the portfolio. S1 is the wired screen (OHS hero, AI summary, configurable KPI Explorer, manual KPI input). S2 captures the KPI deep-dive sections that exist in the mockup code (per-KPI drill, trends/benchmark, EQI×TDI matrix, CAPA register) but are NOT currently wired — the KPI sub-tab navigation that would surface them is never rendered (flagged, like Retro).","status":"in-progress","screens":[{"id":"M3.6.S1","name":"KPI Metrics (Performance)","description":"The reachabl
