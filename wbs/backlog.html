e KPI screen: OHS gauge + pillar scores, an AI performance summary, the configurable per-project KPI Explorer table (rows drill to the weekly report), and manual KPI input. Role-scoped.","roles":["BOD","PMO","AM","EM/TL/PM","Member"],"mockup_ref":{"screen":"project/metrics"},"sub_screens":[{"id":"M3.6.S1.1","name":"OHS hero","description":"OHS gauge (0–100) with RAG verdict and the four pillar scores."},{"id":"M3.6.S1.2","name":"AI summary","description":"OHS, weakest pillar and projects needing attention."},{"id":"M3.6.S1.3","name":"KPI Explorer","description":"Per-project metric table with configurable columns; rows open the weekly report."},{"id":"M3.6.S1.4","name":"Manual KPI input","description":"Enter a project's weekly KPIs → live QCDP/RAG; current-week writes back project health."}],"items":[{"id":"EN-M3.6-01","type":"enabler","title":"KPI scoring & OHS model","story":"Provide the KPI scoring model: the catalog of 16 KPIs across Quality/Cost/Delivery/Process (each with unit, direction, green/amber thresholds and a defined formula), the per-KPI RAG status rule, the pillar scores (average of a pillar's KPI status scores) and the Operational Health Score (OHS = Quality×0.3 + Delivery×0.3 + Cost×0.2 + Process×0.2) with its RAG bands.","acceptance_criteria":["Given a project and a KPI, when its value is computed, then it is rated Green/Amber/Red against that KPI's threshold and direction (higher-is-better, lower-is-better, or in-band).","Given a set of projects, when a pillar is scored, then it is the average of its KPIs' status scores, and the OHS is the weighted roll-up (Quality 0.3, Delivery 0.3, Cost 0.2, Process 0.2) with bands Green ≥80 / Amber ≥62 / Red below.","Given a KPI is requested, when surfaced, then its formula and threshold are available."],"story_points":5,"roles":["BOD","PMO","AM","EM/TL/PM","Member"],"notes":"16 KPIs — Quality: Defect Leakage, Reopened Rate, DRE, Defect Density; Cost: Gross Margin, Billable Rate, Utilization, Effort Consumption; Delivery: On-time, Forecast Accuracy, Release Predictability, SPI; Process: Process Compliance, Retro Closure, Audit Compliance, CAPA Closure. Values derive from project QCDP/metrics owned by EN-M3.1-01.","dependencies":["EN-M3.1-01"],"status":"not-started"},{"id":"US-M3.6.S1-01","type":"story","title":"View the OHS hero and pillar scores","story":"As a BOD or PMO, I want the Operational Health Score with its pillar breakdown so that I can read overall delivery health at a glance.","acceptance_criteria":["Given KPI Metrics loads, when the hero renders, then an OHS gauge (0–100) with its RAG verdict and the four pillar scores (Quality/Cost/Delivery/Process) are shown.","Given projects are in scope, when the hero renders, then the project count, critical-project count and reported count are shown.","Given no projects are in scope, when it renders, then an empty state is shown."],"story_points":3,"roles":["BOD","PMO"],"dependencies":["EN-M3.6-01"],"status":"not-started"},{"id":"US-M3.6.S1-02","type":"story","title":"Read the AI performance summary","story":"As a BOD or PMO, I want an AI summary of performance so that I know the weakest pillar and which projects need attention.","acceptance_criteria":["Given the hero is shown, when the summary renders, then it states the OHS, the weakest pillar and the projects needing attention (or that none are critical).","Given scope changes via the account/project filter, when applied, then the summary recomputes."],"story_points":2,"roles":["BOD","PMO"],"dependencies":["EN-M3.6-01"],"status":"not-started"},{"id":"US-M3.6.S1-03","type":"story","title":"Explore per-project KPIs in the KPI Explorer","story":"As a BOD or PMO, I want a per-project KPI table so that I can compare projects across the key delivery metrics.","acceptance_criteria":["Given the explorer renders, when shown, then each project row lists its health and the selected metrics (on-time, leakage, defect, predictability, utilization, CSAT), colour-coded by threshold and sorted with the weakest predictability first.","Given I click a project row, when selected, then its weekly report opens.","Given there are no projects in scope, when it renders, then an empty state is shown."],"story_points":5,"roles":["BOD","PMO"],"dependencies":["EN-M3.6-01","US-M3.3.S2-01"],"status":"not-started"},{"id":"US-M3.6.S1-04","type":"story","title":"Configure the KPI Explorer columns","story":"As a BOD, PMO or EM/TL, I want to choose which KPI columns appear in the Explorer so that I can focus on the metrics I care about.","acceptance_criteria":["Given the configure dialog, when I toggle a metric, then the Explorer adds or removes that column.","Given I try to turn off the last remaining metric, when attempted, then it is kept and I am told at least one must stay on."],"story_points":2,"roles":["BOD","PMO","EM/TL/PM"],"dependencies":["US-M3.6.S1-03"],"status":"not-started"},{"id":"US-M3.6.S1-05","type":"story","title":"Manually input a project's weekly KPIs","story":"As a PM (EM/TL) or PMO, I want to manually input a project's KPIs for a week so that its QCDP and RAG are recorded when not auto-derived.","acceptance_criteria":["Given I open Manual KPI input and pick a project and week, when I enter on-time, leakage/defect, cost and velocity, then the QCDP pillars and overall RAG compute live from the inputs.","Given I save for the current week, when confirmed, then the project's QCDP/RAG are updated, it is marked reported, and the record is stored for that week (editing an existing record if present).","Given a non-current week, when I save, then the record is stored without overwriting the project's live health."],"story_points":5,"roles":["EM/TL/PM","PMO","BOD"],"notes":"Current-week input writes back project health & the reported flag (same effect as a weekly report, EN-M3.3-01); past weeks store a record only. Only full-access and EM/TL on their own projects can input.","dependencies":["EN-M3.6-01","EN-M3.3-01"],"status":"not-started"},{"id":"US-M3.6.S1-06","type":"story","title":"View KPI Metrics scoped to my access","story":"As an AM, EM/TL or Member, I want KPI Metrics scoped to my access so that I only see my accounts'/projects' performance.","acceptance_criteria":["Given I am an AM, when KPI Metrics loads, then the OHS, pillars and explorer reflect only my accounts' projects; given an EM/TL or Member, only my projects.","Given nothing is in scope, when it renders, then an empty state is shown."],"story_points":2,"roles":["AM","EM/TL/PM","Member"],"dependencies":["EN-M3.1-02"],"status":"not-started"}]},{"id":"M3.6.S2","name":"KPI deep-dive sections (built, not wired)","description":"FLAGGED: these sections exist in the mockup code (kpiDrill, kpiTrends, kpiMatrix, kpiCapa) but are not reachable — the KPI sub-tab navigation that would render them is never invoked (kpiSub is declared but unused). Decomposed because they are clearly intended PM capabilities; confirm wiring/scope with the team before build.","roles":["BOD","PMO"],"mockup_ref":{"screen":"project/metrics"},"sub_screens":[{"id":"M3.6.S2.1","name":"Per-KPI drill","description":"Single-KPI value, formula, threshold, trend, root cause, action history."},{"id":"M3.6.S2.2","name":"Trends & benchmark","description":"OHS history vs portfolio; pillars vs portfolio & industry target."},{"id":"M3.6.S2.3","name":"Engineering Health Matrix","description":"EQI × TDI quadrant (Healthy / Hidden Risk / Legacy Burden / System Failure)."},{"id":"M3.6.S2.4","name":"Corrective action register","description":"CAPA / Risk / Improvement from KPI breaches; filter and advance status."}],"items":[{"id":"US-M3.6.S2-01","type":"story","title":"Drill into a single KPI","story":"As a BOD or PMO, I want to drill into a single KPI so that I can see its formula, trend and root cause.","acceptance_criteria":["Given I open a KPI, when the drill renders, then it shows the current value and status, its formula, its threshold, a historical trend and a root-cause note.","Given the KPI has corrective history, when shown, then an action timeline (e.g. threshold breached → CAPA opened → recovered/in-progress) is displayed."],"story_points":3,"roles":["BOD","PMO"],"notes":"Built in the mockup (kpiDrill) but not currently reachable — surfaced only from the unwired KPI Explorer cards.","dependencies":["EN-M3.6-01"],"status":"not-started"},{"id":"US-M3.6.S2-02","type":"story","title":"Compare OHS and pillars against benchmarks","story":"As a BOD or PMO, I want OHS trend and pillar benchmarks so that I can compare against the portfolio and industry.","acceptance_criteria":["Given the trends section renders, when shown, then the OHS history is plotted against the portfolio average.","Given the benchmark section renders, when shown, then each pillar is shown versus the portfolio average and an industry target."],"story_points":3,"roles":["BOD","PMO"],"notes":"Built in the mockup (kpiTrends) but not currently wired.","dependencies":["EN-M3.6-01"],"status":"not-started"},{"id":"US-M3.6.S2-03","type":"story","title":"View the Engineering Health Matrix","story":"As a BOD or PMO, I want an EQI×TDI matrix so that I can see which projects are healthy versus in system failure.","acceptance_criteria":["Given the matrix renders, when shown, then each project is plotted by Engineering Quality Index (EQI) and Technical Debt Index (TDI) into one of four quadrants (Healthy / Hidden Risk / Legacy Burden / System Failure).","Given projects fall in System Failure, when shown, then they are called out for refactoring / quality recovery."],"story_points":3,"roles":["BOD","PMO"],"notes":"Built in the mockup (kpiMatrix) but not currently wired. EQI = quality+process composite; TDI = technical-debt index.","dependencies":["EN-M3.6-01"],"status":"not-started"},{"id":"US-M3.6.S2-04","type":"story","title":"Track corrective actions (CAPA register)","story":"As a BOD or PMO, I want a corrective-action register so that I can track CAPA, risks and improvements raised from KPI breaches.","acceptance_criteria":["Given KPIs breach their thresholds, when the register builds, then a corrective action (CAPA / Risk / Improvement) is generated per breach with severity, owner, due, progress and status.","Given I filter by type, when applied, then only that type is shown, with open / CAPA / risk / improvement counts.","Given an action is not done, when I advance it, then its status moves Open → In progress → Done and progress updates."],"story_points":5,"roles":["BOD","PMO"],"notes":"Built in the mockup (kpiCapa/pmBuildCapa) but not currently wired. CAPA here is KPI-breach-driven, distinct from the weekly-report Recovery actions in M3.5 (RAID) — the two registers may need to converge; flag for the team.","dependencies":["EN-M3.6-01"],"status":"not-started"}]}]},{"id":"M3.7","name":"Retro","description":"Account-level retrospective (Keep / Problem / Try) seeded from the week's reports and open risks; a Try item can be promoted into a tracked Action in Risks & Issues (M3.5). FLAGGED: built in the mockup (pmRetro) but not wired to a module tab — its only entry trigger (data-gotoretro) is never rendered, so it is currently unreachable. Decomposed (it's a genuine continuous-improvement capability); confirm wiring/scope with the team before build.","status":"in-progress","screens":[{"id":"M3.7.S1","name":"Retro board","description":"Account-level Keep / Problem / Try board seeded from the account's project health and open risks, with an account selector, free-add (with @owner) and promote-Try-to-task. Built in the mockup but not currently reachable.","roles":["BOD","PMO","EM/TL/PM"],"sub_screens":[{"id":"M3.7.S1.1","name":"Account selector","description":"Pick which account to retrospect."},{"id":"M3.7.S1.2","name":"Keep / Problem / Try columns","description":"Seeded retro items with owners across three columns."},{"id":"M3.7.S1.3","name":"Add & promote","description":"Add an item with @owner; promote a Try item into a tracked task."}],"items":[{"id":"EN-M3.7-01","type":"enabler","title":"Account retro seed model","story":"Provide the account-level retrospective seed: from an account's projects derive Keep (stable/green projects, reliable estimates), Problem (non-Green project risks plus the account's open RAID items) and Try (the next corrective actions on non-Green projects) — each item carrying an owner.","acceptance_criteria":["Given an account, when the retro is seeded, then Keep lists its green/stable and reliable-estimate projects, Problem lists its non-Green project risks and open RAID items, and Try lists the next actions on its non-Green projects.","Given an account has no green projects, when seeded, then a default Keep item (reporting discipline maintained) is shown.","Given each seeded item, when shown, then it carries an owner."],"story_points":3,"roles":["BOD","PMO","EM/TL/PM"],"notes":"Built in the mockup (pmRetroSeed) but the Retro view is not currently wired. Seed draws on project health (EN-M3.1-01) and open RAID items (EN-M3.5-01).","dependencies":["EN-M3.1-01","EN-M3.5-01"],"status":"not-started"},{"id":"US-M3.7.S1-01","type":"story","title":"View the account retrospective board","story":"As a BOD, PMO or PM, I want an account-level retrospective board (Keep / Problem / Try) so that I can run continuous improvement from the week's signals.","acceptance_criteria":["Given I open Retro and pick an account, when it renders, then three columns — Keep, Problem, Try — show the seeded items with their owners.","Given I change the account, when applied, then the board reseeds for that account.","Given an account has nothing to surface in a column, when it renders, then that column shows an empty/default state."],"story_points":3,"roles":["BOD","PMO","EM/TL/PM"],"notes":"Built in the mockup (pmRetro) but not currently reachable (no nav entry).","dependencies":["EN-M3.7-01"],"status":"not-started"},{"id":"US-M3.7.S1-02","type":"story","title":"Add a retro item with an owner","story":"As a BOD, PMO or PM, I want to add a retro item with an owner to any column so that I can capture points the seed missed.","acceptance_criteria":["Given a column, when I add text with an @owner mention, then a new item is added to that column with the parsed owner.","Given I add without an @owner, when saved, then the item is created with me as owner."],"story_points":2,"roles":["BOD","PMO","EM/TL/PM"],"notes":"Built in the mockup but not currently wired.","dependencies":["US-M3.7.S1-01"],"status":"not-started"},{"id":"US-M3.7.S1-03","type":"story","title":"Promote a Try item into a tracked task","story":"As a BOD, PMO or PM, I want to promote a Try item into a tracked task so that improvement actions are followed up in Risks & Issues.","acceptance_criteria":["Given a Try item, when I promote it, then an Action item is created in the Risks & Issues register (M3.5) with its owner, and the action is audit-logged.","Given the item is promoted, when I open Risks & Issues, then it appears as a tracked Action."],"story_points":3,"roles":["BOD","PMO","EM/TL/PM"],"notes":"Built in the mockup but not currently wired. Closes the Retro→RAID loop: the Action item lands in EN-M3.5-01.","dependencies":["US-M3.7.S1-01","EN-M3.5-01"],"status":"not-started"}]}]},{"id":"M3.8","name":"Project Closure","description":"USER-DEFINED (beyond the current mockup): the project status lifecycle and shutdown. Set a project active / on-hold / closed, and on closure release its resource allocations so staff return to the bench. Status is owned by the project record (EN-M3.1-01); closure cascades to the allocation source (EN-M3.4-01). No closure screen exists in the mockup yet — likely hosted on the Portfolio or a project-detail view.","status":"in-progress","screens":[{"id":"M3.8.S1","name":"Project status & closure","description":"Governance control to change a project's status and shut it down; on closure the project's allocations are released and it leaves the active portfolio. User-defined; not in the current mockup.","roles":["BOD","PMO"],"sub_screens":[{"id":"M3.8.S1.1","name":"Status control","description":"Set project status: active / on-hold / closed."},{"id":"M3.8.S1.2","name":"Closure confirmation","description":"Confirm shutdown and the resulting allocation release."}],"items":[{"id":"US-M3.8.S1-01","type":"story","title":"Set a project's status (active / on-hold / closed)","story":"As a BOD or PMO, I want to set a project's status to active, on-hold or closed so that the portfolio reflects where each project really is in its lifecycle.","acceptance_criteria":["Given a project, when I change its status to active, on-hold or closed, then the new status is saved and the change is audit-logged.","Given a project is put on-hold, when the portfolio renders, then it is shown as on-hold and is not chased for a weekly report while remaining visible.","Given a status change, when applied, then it is reversible (e.g. on-hold back to active), except that closure has already released allocations."],"story_points":3,"roles":["BOD","PMO"],"notes":"Status lifecycle: active → on-hold → closed; default active on creation (M3.2). On-hold pauses reporting expectations but keeps staffing; closed triggers allocation release (US-M3.8.S1-02).","dependencies":["EN-M3.1-01"],"status":"not-started"},{"id":"US-M3.8.S1-02","type":"story","title":"Release allocations when a project is closed","story":"As a BOD or PMO, I want closing a project to release its resource allocations so that staff free up to the bench and utilization stops counting the closed work.","acceptance_criteria":["Given I close a project, when I confirm, then every allocation on that project is ended (planned effort set to 0 / end-dated at closure) and the people return to the bench.","Given allocations are released, when People utilization and the portfolio billable rate next aggregate, then the closed project's effort no longer contributes.","Given a person was staffed only on the closed project, when it closes, then they are shown as idle/bench rather than mis-counted."],"story_points":3,"roles":["BOD","PMO"],"notes":"Closure cascade: ending the project's allocations is a write to the allocation source (EN-M3.4-01); the freed capacity flows to People utilization via EN-M1.4-01.","dependencies":["US-M3.8.S1-01","EN-M3.4-01"],"status":"not-started"},{"id":"US-M3.8.S1-03","type":"story","title":"Drop closed projects from the active portfolio","story":"As a BOD or PMO, I want closed projects to leave the active portfolio so that health, billability and report-compliance reflect only live work.","acceptance_criteria":["Given a project is closed, when the portfolio aggregates active health, billable rate and report compliance, then the closed project is excluded and shown separately as closed.","Given a closed project, when Weekly Reports renders, then it is not expected to report and is not flagged as not-reported.","Given a closed project is reopened to active, when applied, then it re-enters the active portfolio."],"story_points":2,"roles":["BOD","PMO"],"dependencies":["EN-M3.1-01","US-M3.8.S1-01"],"status":"not-started"}]}]}]}]};
