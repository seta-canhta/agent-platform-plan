<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Agent Platform — WBS</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Instrument+Serif:ital@0;1&family=Archivo:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/d3@7"></script>
<script src="https://cdn.jsdelivr.net/npm/xlsx-js-style@1.2.0/dist/xlsx.bundle.js"></script>
<script src="https://cdn.jsdelivr.net/npm/lucide@0.469.0/dist/umd/lucide.min.js"></script>
<style>
  :root {
    --paper:   #eef2f8;
    --paper-2: #f6f8fc;
    --ink:     #1c2738;
    --ink-dim: #5a6b82;
    --ink-faint:#94a3b8;
    --line:    rgba(40,72,116,0.14);
    --line-bright: rgba(37,99,235,0.45);
    --card:    #ffffff;
    --accent:  #2563eb;
    --done:    #16a34a;
    --prog:    #d97706;
    --block:   #dc2626;
    --idle:    #64748b;
    --enabler: #7c3aed;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  html, body { height: 100%; }
  body {
    font-family: 'Archivo', system-ui, sans-serif;
    color: var(--ink);
    background-color: var(--paper);
    background-image:
      radial-gradient(circle at 1px 1px, rgba(40,80,140,0.10) 1px, transparent 0),
      radial-gradient(circle at 1px 1px, rgba(40,80,140,0.05) 1px, transparent 0);
    background-size: 28px 28px, 140px 140px;
    overflow: hidden;
    position: relative;
  }
  /* soft paper lighting */
  body::before {
    content: ''; position: fixed; inset: 0; pointer-events: none; z-index: 0;
    background:
      radial-gradient(75% 60% at 15% -5%, rgba(255,255,255,0.85), transparent 60%),
      radial-gradient(60% 60% at 100% 105%, rgba(219,232,250,0.55), transparent 55%);
  }

  /* ── instrument bar ─────────────────────────────────────── */
  #header {
    position: fixed; top: 0; left: 0; right: 0; z-index: 100;
    height: 60px; padding: 0 22px;
    display: flex; align-items: center; gap: 22px;
    background: linear-gradient(180deg, rgba(255,255,255,0.92), rgba(246,248,252,0.74));
    border-bottom: 1px solid var(--line);
    backdrop-filter: blur(10px) saturate(120%);
  }
  #header h1 {
    font-family: 'Instrument Serif', Georgia, serif;
    font-size: 26px; font-weight: 400; font-style: italic;
    letter-spacing: 0.2px; color: var(--ink); white-space: nowrap;
  }
  #header h1 .v { font-family: 'JetBrains Mono', monospace; font-style: normal; font-size: 11px; color: var(--accent); vertical-align: super; margin-left: 5px; }
  .rule { width: 1px; height: 30px; background: var(--line); }
  .readout { display: flex; flex-direction: column; gap: 2px; }
  .readout .k { font-family: 'JetBrains Mono', monospace; font-size: 9px; letter-spacing: 1.5px; text-transform: uppercase; color: var(--ink-faint); }
  .readout .val { font-family: 'JetBrains Mono', monospace; font-size: 15px; font-weight: 600; color: var(--ink); }
  .readout .val small { font-size: 10px; color: var(--ink-dim); font-weight: 400; margin-left: 5px; }
  .hist { display: flex; gap: 5px; align-items: flex-end; height: 30px; padding-bottom: 11px; }
  .hist .bar { width: 13px; background: linear-gradient(180deg, var(--accent), rgba(37,99,235,0.35)); border-radius: 2px 2px 0 0; position: relative; min-height: 2px; }
  .hist .bar span { position: absolute; bottom: -12px; left: 0; right: 0; text-align: center; font-family: 'JetBrains Mono', monospace; font-size: 8px; color: var(--ink-faint); }

  /* ── global filter dropdowns (multi-select) ─────────────── */
  .flt-bar { display: flex; gap: 7px; align-items: center; }
  .flt { position: relative; }
  .flt-btn {
    font-family: 'JetBrains Mono', monospace; font-size: 10px; letter-spacing: 0.3px; white-space: nowrap;
    color: var(--ink-dim); background: var(--card); border: 1px solid var(--line);
    border-radius: 7px; padding: 5px 9px; cursor: pointer; display: inline-flex; align-items: center; gap: 5px;
  }
  .flt-btn:hover { border-color: var(--line-bright); color: var(--ink); }
  .flt-btn i { font-style: normal; font-size: 8px; opacity: 0.6; }
  .flt.on .flt-btn { color: var(--accent); border-color: var(--line-bright); background: rgba(37,99,235,0.06); }
  .flt-pop {
    position: absolute; top: calc(100% + 6px); left: 0; z-index: 120;
    min-width: 165px; max-height: 300px; overflow-y: auto;
    background: var(--card); border: 1px solid var(--line); border-radius: 9px;
    box-shadow: 0 16px 40px rgba(28,46,82,0.20); padding: 7px;
    display: none; flex-direction: column; gap: 1px;
  }
  .flt.open .flt-pop { display: flex; }
  .flt-opt { display: flex; align-items: center; gap: 8px; padding: 5px 7px; border-radius: 5px; cursor: pointer; font-family: 'Archivo', sans-serif; font-size: 12px; color: var(--ink); }
  .flt-opt:hover { background: var(--paper-2); }
  .flt-opt input { accent-color: var(--accent); cursor: pointer; margin: 0; }
  .flt-empty { padding: 6px 7px; font-size: 11px; color: var(--ink-faint); }
  .flt-clear { margin-top: 5px; font-family: 'JetBrains Mono', monospace; font-size: 9px; letter-spacing: 0.5px; text-transform: uppercase; color: var(--ink-dim); background: var(--paper-2); border: 1px solid var(--line); border-radius: 5px; padding: 5px; cursor: pointer; }
  .flt-clear:hover { color: var(--block); border-color: rgba(220,38,38,0.3); }

  #live { margin-left: auto; display: flex; align-items: center; gap: 7px; font-family: 'JetBrains Mono', monospace; font-size: 10px; letter-spacing: 1px; text-transform: uppercase; padding: 5px 11px; border-radius: 20px; border: 1px solid var(--line); background: var(--card); }
  #live::before { content: ''; width: 7px; height: 7px; border-radius: 50%; }
  #live.on  { color: var(--done); border-color: rgba(22,163,74,0.35); }
  #live.on::before  { background: var(--done); box-shadow: 0 0 0 0 rgba(22,163,74,0.5); animation: pulse 2s infinite; }
  #live.off { color: var(--block); border-color: rgba(220,38,38,0.3); }
  #live.off::before { background: var(--block); }
  @keyframes pulse { 0% { box-shadow: 0 0 0 0 rgba(22,163,74,0.45); } 70% { box-shadow: 0 0 0 7px rgba(22,163,74,0); } 100% { box-shadow: 0 0 0 0 rgba(22,163,74,0); } }

  .rule.push { margin-left: auto; }
  .legend { display: flex; gap: 9px; font-size: 10.5px; color: var(--ink-dim); font-family: 'JetBrains Mono', monospace; letter-spacing: 0.3px; }
  .legend-item { display: flex; align-items: center; gap: 6px; }
  .legend-dot { width: 8px; height: 8px; border-radius: 2px; }
  #hint { font-size: 10px; color: var(--ink-faint); font-family: 'JetBrains Mono', monospace; letter-spacing: 0.3px; }

  #svg-container { position: fixed; inset: 60px 0 0 0; z-index: 1; }
  #tree-svg { width: 100%; height: 100%; cursor: grab; display: block; }
  #tree-svg:active { cursor: grabbing; }

  /* ── mindmap nodes & links ──────────────────────────────── */
  .link { fill: none; stroke: var(--line-bright); stroke-width: 1.3px; opacity: 0.4; }
  .node { cursor: pointer; }
  .node text { pointer-events: none; }
  .node-bg { transition: stroke .16s ease, filter .16s ease; }
  .node:hover .node-bg { stroke: var(--accent); filter: drop-shadow(0 6px 18px rgba(37,99,235,0.22)); }
  .node .node-id    { font-family: 'JetBrains Mono', monospace; font-size: 9.5px; fill: var(--accent); opacity: 0.9; letter-spacing: 0.3px; }
  .node .node-name  { font-family: 'Archivo', sans-serif; font-weight: 600; font-size: 12px; fill: var(--ink); }
  .node .node-name.is-module { font-weight: 800; font-size: 13px; letter-spacing: 0.2px; }
  .node .node-sp    { font-family: 'JetBrains Mono', monospace; font-size: 10px; font-weight: 700; }
  .node .node-meta  { font-family: 'JetBrains Mono', monospace; font-size: 9px; fill: var(--ink-faint); letter-spacing: 0.5px; }
  .node .node-expand{ font-family: 'JetBrains Mono', monospace; font-size: 10px; fill: var(--ink-dim); }

  /* ── tooltip ────────────────────────────────────────────── */
  .tooltip {
    position: fixed; z-index: 200; max-width: 380px; pointer-events: none;
    opacity: 0; transform: translateY(4px); transition: opacity .16s, transform .16s;
    background: var(--card); border: 1px solid var(--line); border-radius: 10px;
    padding: 13px 16px; font-size: 12.5px; line-height: 1.6; color: var(--ink-dim);
    box-shadow: 0 18px 44px rgba(28,46,82,0.18);
  }
  .tooltip.visible { opacity: 1; transform: translateY(0); }
  .tt-id { font-family: 'JetBrains Mono', monospace; font-size: 10px; letter-spacing: 1px; color: var(--accent); }
  .tt-name { font-family: 'Archivo', sans-serif; font-weight: 700; font-size: 14px; color: var(--ink); margin: 2px 0 8px; line-height: 1.3; }
  .tt-badge { display: inline-block; font-family: 'JetBrains Mono', monospace; font-size: 10px; font-weight: 600; letter-spacing: 0.5px; padding: 2px 9px; border-radius: 5px; margin-bottom: 9px; border: 1px solid currentColor; }
  .tt-story { color: var(--ink); }
  .tt-ac { margin-top: 9px; }
  .tt-ac b { font-family: 'JetBrains Mono', monospace; font-size: 9px; letter-spacing: 1.5px; text-transform: uppercase; color: var(--ink-faint); }
  .tt-ac ul { list-style: none; margin-top: 4px; }
  .tt-ac li { position: relative; padding-left: 16px; margin: 4px 0; color: var(--ink-dim); }
  .tt-ac li::before { content: '▸'; position: absolute; left: 2px; color: var(--accent); }
  .tt-meta { margin-top: 8px; font-family: 'JetBrains Mono', monospace; font-size: 10.5px; color: var(--ink-faint); }
  .dep-link { color: var(--accent); text-decoration: underline; text-underline-offset: 2px; cursor: pointer; }
  .tooltip .dep-link { pointer-events: none; }

  /* ── detail modal (click to pin) ────────────────────────── */
  .modal-back {
    position: fixed; inset: 0; z-index: 250; display: flex; align-items: center; justify-content: center;
    background: rgba(20,34,60,0.34); opacity: 0; pointer-events: none; transition: opacity .18s;
  }
  .modal-back.visible { opacity: 1; pointer-events: auto; }
  .modal-panel {
    position: relative; max-width: 1100px; width: calc(100% - 56px); max-height: 90vh; overflow-y: auto;
    background: var(--card); border: 1px solid var(--line); border-radius: 14px;
    padding: 34px 40px; font-size: 15px; line-height: 1.7; color: var(--ink-dim);
    box-shadow: 0 28px 70px rgba(28,46,82,0.32);
    transform: translateY(8px) scale(.98); transition: transform .18s;
  }
  .modal-panel .tt-id { font-size: 12px; }
  .modal-panel .tt-name { font-size: 19px; margin: 4px 0 12px; }
  .modal-panel .tt-badge { font-size: 12px; padding: 3px 12px; margin-bottom: 12px; }
  .modal-panel .tt-ac b { font-size: 11px; }
  .modal-panel .tt-ac li { padding-left: 20px; margin: 7px 0; }
  .modal-panel .tt-meta { font-size: 13px; margin-top: 11px; }
  .modal-back.visible .modal-panel { transform: translateY(0) scale(1); }
  .modal-close {
    position: absolute; top: 10px; right: 12px; width: 26px; height: 26px; border: none; cursor: pointer;
    background: none; color: var(--ink-faint); font-size: 22px; line-height: 1; border-radius: 6px;
    transition: background .14s, color .14s;
  }
  .modal-close:hover { background: rgba(37,99,235,0.08); color: var(--accent); }

  /* ── related-screen screenshot (modal only) ─────────────── */
  .tt-shot-wrap { margin-top: 16px; }
  .tt-shot-h { display: block; font-family: 'JetBrains Mono', monospace; font-size: 11px; letter-spacing: 1.5px; color: var(--ink-faint); margin-bottom: 7px; }
  .tt-shot {
    display: block; width: 100%; height: auto; border-radius: 10px;
    border: 1px solid var(--line); background: var(--paper-2);
    box-shadow: 0 8px 24px rgba(28,46,82,0.14); transition: box-shadow .16s, transform .08s;
  }
  .tt-shot-wrap a { display: block; }
  .tt-shot-wrap a:hover .tt-shot { box-shadow: 0 12px 32px rgba(37,99,235,0.26); }
  .tt-shot-wrap a:active .tt-shot { transform: translateY(1px); }

  #flash {
    position: fixed; bottom: 26px; left: 50%; transform: translateX(-50%) translateY(24px);
    z-index: 300; pointer-events: none; opacity: 0; transition: all .3s cubic-bezier(.2,.9,.3,1);
    font-family: 'JetBrains Mono', monospace; font-size: 11px; letter-spacing: 1px; text-transform: uppercase;
    color: #fff; background: var(--accent); padding: 9px 20px; border-radius: 22px;
    box-shadow: 0 8px 24px rgba(37,99,235,0.35);
  }
  #flash.show { opacity: 1; transform: translateX(-50%) translateY(0); }
  #err {
    position: fixed; top: 60px; left: 0; right: 0; z-index: 90; display: none;
    background: #fef2f2; border-bottom: 1px solid var(--block);
    color: #b91c1c; font-family: 'JetBrains Mono', monospace; font-size: 11.5px;
    padding: 10px 22px; white-space: pre-wrap;
  }

  /* ── page nav (two items) + export ──────────────────────── */
  .nav { display: flex; gap: 2px; padding: 3px; background: var(--paper); border: 1px solid var(--line); border-radius: 9px; }
  .nav-item {
    display: flex; align-items: center; gap: 7px; text-decoration: none; white-space: nowrap; cursor: pointer;
    font-family: 'JetBrains Mono', monospace; font-size: 10.5px; letter-spacing: 0.6px; text-transform: uppercase;
    color: var(--ink-dim); background: none; border-radius: 6px;
    padding: 6px 13px; transition: background .14s, color .14s;
  }
  .nav-item:hover { color: var(--ink); }
  .nav-item.active { color: #fff; background: var(--accent); box-shadow: 0 2px 8px rgba(37,99,235,0.32); }
  #btn-export {
    font-family: 'JetBrains Mono', monospace; font-size: 10.5px; letter-spacing: 0.6px; text-transform: uppercase;
    display: flex; align-items: center; gap: 7px; cursor: pointer;
    color: var(--done); background: var(--card); border: 1px solid rgba(22,163,74,0.35); border-radius: 8px;
    padding: 7px 14px; transition: background .14s, box-shadow .14s, transform .08s;
  }
  #btn-export:hover { background: rgba(22,163,74,0.08); box-shadow: 0 4px 14px rgba(22,163,74,0.18); }
  #btn-export:active { transform: translateY(1px); }
  #btn-export svg { width: 13px; height: 13px; }

  /* ── table view ─────────────────────────────────────────── */
  #table-container { position: fixed; inset: 60px 0 0 0; z-index: 1; display: none; flex-direction: column; background: var(--card); }
  body.page-table #table-container { display: flex; }
  body.page-table #svg-container, body.page-table #hint { display: none; }
  body.page-map #table-container { display: none; }

  .t-toolbar {
    display: flex; align-items: center; gap: 16px; padding: 10px 22px; flex: 0 0 auto;
    background: linear-gradient(180deg, rgba(255,255,255,0.9), rgba(246,248,252,0.7));
    border-bottom: 1px solid var(--line); backdrop-filter: blur(6px);
  }
  .t-search { display: flex; align-items: center; gap: 8px; color: var(--ink-faint);
    background: var(--card); border: 1px solid var(--line); border-radius: 8px; padding: 6px 11px; min-width: 320px; }
  .t-search:focus-within { border-color: var(--line-bright); box-shadow: 0 0 0 3px rgba(37,99,235,0.1); }
  .t-search input { border: none; outline: none; background: none; flex: 1;
    font-family: 'JetBrains Mono', monospace; font-size: 12px; color: var(--ink); letter-spacing: 0.2px; }
  .t-search input::placeholder { color: var(--ink-faint); }
  .t-count { font-family: 'JetBrains Mono', monospace; font-size: 11px; font-weight: 600; color: var(--accent); white-space: nowrap; }
  .t-hint { margin-left: auto; font-family: 'JetBrains Mono', monospace; font-size: 10px; color: var(--ink-faint); letter-spacing: 0.3px; }

  .t-scroll { flex: 1 1 auto; overflow: auto; padding: 0 0 60px; background: var(--card); }
  .t-table { border-collapse: separate; border-spacing: 0; min-width: 100%; font-size: 12px; background: var(--card); }
  .t-table thead th {
    position: sticky; top: 0; z-index: 5; text-align: left; cursor: pointer; user-select: none;
    font-family: 'JetBrains Mono', monospace; font-size: 9.5px; font-weight: 600; letter-spacing: 0.8px; text-transform: uppercase;
    color: var(--ink-dim); background: var(--paper-2); padding: 10px 12px; white-space: nowrap;
    border-bottom: 2px solid var(--line-bright); box-shadow: 0 1px 0 var(--line);
  }
  .t-table thead th:hover { color: var(--accent); }
  .t-table th.sorted { color: var(--accent); }
  .t-table th .sort-i { margin-left: 5px; font-size: 8px; }
  .th-num span, .td-num { text-align: center; }

  .t-table td { padding: 8px 12px; border-bottom: 1px solid var(--line); vertical-align: top; color: var(--ink); line-height: 1.5; }
  .t-table tbody tr:hover td { background: rgba(37,99,235,0.045); }
  .t-table tr.is-enabler td { background: rgba(124,58,237,0.04); }
  .t-table tr.is-enabler:hover td { background: rgba(124,58,237,0.08); }
  .td-code { font-family: 'JetBrains Mono', monospace; font-size: 11px; color: var(--ink-dim); white-space: nowrap; }
  .td-num { font-family: 'JetBrains Mono', monospace; font-weight: 700; color: var(--accent); }
  .td-text { white-space: normal; min-width: 120px; max-width: 210px; }
  .td-wide { white-space: normal; }
  .td-wide .t-wide { min-width: 240px; max-width: 380px; color: var(--ink); font-size: 12px; }
  .td-tag { white-space: nowrap; text-align: center; }
  .t-tag { display: inline-block; font-family: 'JetBrains Mono', monospace; font-size: 9px; font-weight: 600;
    letter-spacing: 0.5px; text-transform: uppercase; padding: 2px 8px; border-radius: 5px; border: 1px solid currentColor; }
  .t-sp { font-family: 'JetBrains Mono', monospace; }
  .t-ac { list-style: none; min-width: 260px; max-width: 420px; }
  .t-ac li { position: relative; padding-left: 15px; margin: 3px 0; color: #34425a; font-size: 12px; line-height: 1.5; }
  .t-ac li::before { content: '▸'; position: absolute; left: 2px; color: var(--accent); }
  .t-dep { font-family: 'JetBrains Mono', monospace; font-size: 11px; color: var(--ink-dim); white-space: nowrap; }
  .t-dep.x { color: var(--block); }

  /* band/total use an inner flex div — flex on a <td> would cancel its colspan */
  .t-band td { padding: 0; position: sticky; top: 34px; z-index: 4; }
  .t-band-row { display: flex; align-items: center; gap: 12px; padding: 8px 14px; cursor: pointer;
    background: linear-gradient(180deg, #eef3fb, #e6edf8); border-bottom: 2px solid var(--line-bright);
    transition: background .12s; user-select: none; }
  .t-band-row:hover { background: linear-gradient(180deg, #e6eefb, #dde8f6); }
  .t-band .b-caret { font-family: 'JetBrains Mono', monospace; font-size: 10px; color: var(--accent); width: 10px; text-align: center; }
  .t-band .b-id { font-family: 'JetBrains Mono', monospace; font-size: 10px; font-weight: 700; color: var(--accent); }
  .t-band .b-name { font-family: 'Archivo', sans-serif; font-weight: 800; font-size: 13px; color: var(--ink); }
  .t-band .b-stat { margin-left: auto; font-family: 'JetBrains Mono', monospace; font-size: 10.5px; color: var(--ink-dim); }
  .t-empty { text-align: center; color: var(--ink-faint); padding: 40px; font-family: 'JetBrains Mono', monospace; font-size: 12px; }
  /* deep-link from a table/backlog cell → opens the detail modal (#item=<id>) */
  a.item-link { color: var(--accent); text-decoration: none; cursor: pointer; }
  a.item-link:hover { text-decoration: underline; }
  a.item-link.t-code { color: var(--accent); }
  /* inline type prefix sitting before the modal title, on the same line */
  .tt-type { display: inline-block; font-family: 'JetBrains Mono', monospace; font-size: 11px; font-weight: 600;
    letter-spacing: 0.6px; vertical-align: middle; border: 1px solid currentColor; border-radius: 5px; padding: 2px 8px; margin-right: 9px; }

  /* ── backlog view (reuses the .t-* table styles) ─────────── */
  #backlog-container { position: fixed; inset: 60px 0 0 0; z-index: 1; display: none; flex-direction: column; background: var(--card); }
  body.page-backlog #backlog-container { display: flex; }
  body.page-backlog #svg-container, body.page-backlog #hint { display: none; }
  .th-ctl span { text-align: left; }

  /* ── inline quick-edit selects (backlog cells + modal strip) ── */
  .qe { font-family: 'JetBrains Mono', monospace; font-size: 11px; color: var(--ink); background: var(--card);
    border: 1px solid var(--line); border-radius: 7px; padding: 5px 8px; cursor: pointer; max-width: 150px; }
  .qe:hover { border-color: var(--line-bright); }
  .qe:focus { outline: none; border-color: var(--line-bright); box-shadow: 0 0 0 3px rgba(37,99,235,0.1); }
  .qe:disabled { cursor: default; opacity: 0.55; }
  .td-ctl { white-space: nowrap; }
  .qe-strip { display: flex; gap: 14px; flex-wrap: wrap; margin: 14px 0 22px; padding: 16px 0; border-top: 1px solid var(--line); border-bottom: 1px solid var(--line); }
  .qe-field { flex: 1 1 150px; }
  .qe-field label { display: block; font-family: 'JetBrains Mono', monospace; font-size: 9.5px; letter-spacing: 0.8px; text-transform: uppercase; color: var(--ink-faint); margin-bottom: 5px; }
  .qe-field .qe { width: 100%; max-width: none; }

  /* ── item comments (modal) ──────────────────────────────── */
  .cm-wrap { margin-top: 22px; border-top: 1px solid var(--line); padding-top: 18px; }

<script>/* WBS row-shaping — the single source of truth for both the table view and the
   Excel export, so the two can never drift. Plain browser script (no modules).
   Exposes window.WBS.toRows(data) → { columns, rows, modules, total }.

   One row per item (story | enabler). Hierarchy (Module ▸ Epic ▸ Screen) is
   carried in columns; a deterministic WBS code (m.s.sc.i, 1-based ordinals)
   gives the outline. modules[] / total carry the subtotals both views render. */
(function () {
  // Column contract — order, header label, kind (drives alignment/width/wrap),
  // and an Excel column width in characters. `kind`: code | text | wide | num | tag.
  const COLUMNS = [
    { key: 'wbs',    label: 'WBS',                 kind: 'code', width: 10 },
    { key: 'module', label: 'Module',              kind: 'text', width: 20 },
    { key: 'epic',   label: 'Epic',                kind: 'text', width: 24 },
    { key: 'screen', label: 'Screen',              kind: 'text', width: 22 },
    { key: 'id',     label: 'Item ID',             kind: 'code', width: 16 },
    { key: 'type',   label: 'Type',                kind: 'tag',  width: 9  },
    { key: 'title',  label: 'Title',               kind: 'text', width: 34 },
    { key: 'story',  label: 'User Story',          kind: 'wide', width: 52 },
    { key: 'ac',     label: 'Acceptance Criteria', kind: 'wide', width: 60 },
    { key: 'sp',     label: 'SP',                  kind: 'num',  width: 5  },
    { key: 'roles',  label: 'Roles',               kind: 'text', width: 22 },
    { key: 'deps',   label: 'Dependencies',        kind: 'text', width: 22 },
    { key: 'notes',  label: 'Notes',               kind: 'wide', width: 40 },
    { key: 'status',   label: 'Status',            kind: 'tag',  width: 13 },
    { key: 'assignee', label: 'Assignee',          kind: 'text', width: 18 },
    { key: 'sprint',   label: 'Sprint',            kind: 'text', width: 14 },
  ];

  const join = (a, sep) => (Array.isArray(a) ? a.filter(Boolean).join(sep) : (a || ''));
  const normExt = (e) => (typeof e === 'string' ? { needs: e } : (e || {}));

  function toRows(data) {
    // id → module id, so a dependency can be flagged cross-module.
    const idMod = {};
    for (const m of data.modules || [])
      for (const sm of m.sub_modules || [])
        for (const sc of sm.screens || [])
          for (const it of sc.items || []) idMod[it.id] = m.id;

    const rows = [];
    const modules = [];
    let gItems = 0, gPoints = 0;

    (data.modules || []).forEach((m, mi) => {
      let modItems = 0, modPoints = 0;
      (m.sub_modules || []).forEach((sm, si) => {
        (sm.screens || []).forEach((sc, ci) => {
          (sc.items || []).forEach((it, ii) => {
            const deps = (it.dependencies || []).map((d) =>
              idMod[d] && idMod[d] !== m.id ? d + ' ⤴' : d);
            const ext = (it.external_deps || []).map(normExt)
              .map((e) => '⚠ ' + e.needs + (e.likely_module ? ' [' + e.likely_module + ']' : ''));
            const crossBlocked =
              (it.dependencies || []).some((d) => idMod[d] && idMod[d] !== m.id) ||
              (it.external_deps || []).length > 0;
            const sp = it.story_points || 0;

            rows.push({
              wbs: `${mi + 1}.${si + 1}.${ci + 1}.${ii + 1}`,
              module: m.name,
              epic: sm.name,
              screen: sc.name,
              id: it.id,
              type: it.type === 'enabler' ? 'Enabler' : 'Story',
              title: it.title || '',
              story: it.story || '',
              ac: join(it.acceptance_criteria, '\n'),
              sp,
              roles: join(it.roles, ', '),
              deps: [...deps, ...ext].join('\n'),
              notes: it.notes || '',
              mockup: it.mockup_ref || sc.mockup_ref || '',
              status: it.status || 'not-started',
              sprint: it.sprint || '',
              assignee: it.assignee || '',
              // --- meta (not a column; drives styling/grouping) ---
              _type: it.type,
              _status: it.status || 'not-started',
              _moduleId: m.id,
              _blocked: (it.dependencies || []).length + (it.external_deps || []).length > 0,
              _crossBlocked: crossBlocked,
            });
            modItems++; modPoints += sp;
          });
        });
      });
      modules.push({ id: m.id, name: m.name, items: modItems, points: modPoints });
      gItems += modItems; gPoints += modPoints;
    });

    return { columns: COLUMNS, rows, modules, total: { items: gItems, points: gPoints } };
  }

  window.WBS = window.WBS || {};
  window.WBS.toRows = toRows;
})();

;
/* Global multi-select filter — shared across mindmap, table and backlog.
   Selection (Status · Assignee · Sprint · Module) persists to localStorage so it
   survives the full-page navigation between the three views ("global" filter).
   Exposes window.WBS.filter: { itemMatches, active, mount, onChange }.
   itemMatches(item, moduleId) is the single predicate every view filters by, so
   the three views can never drift — same contract as rows.js for the table/Excel. */
(function () {
  const KEY = 'wbs.filter.v1';
  const NONE = '__none__';                       // sentinel: "Unassigned" / "No sprint"
  const ALL_FIELDS = ['status', 'assignee', 'sprint', 'module'];   // all filterable dimensions
  const BAR_FIELDS = ['status', 'assignee', 'sprint', 'module'];   // dropdowns; status ALSO togglable via the legend chips
  const LABELS = { status: 'Status', assignee: 'Assignee', sprint: 'Sprint', module: 'Module' };
  const STATUS_OPTS = [['done', 'done'], ['in-progress', 'active'], ['blocked', 'blocked'], ['not-started', 'queued']];

  const esc = (s) => String(s == null ? '' : s)
    .replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;').replace(/"/g, '&quot;');
  const sortNat = (a, b) => a.localeCompare(b, undefined, { numeric: true });

  const state = load();
  let _cb = null, _data = null, _wiredDoc = false;

  function load() {
    const base = { status: [], assignee: [], sprint: [], module: [] };
    try {
      const s = JSON.parse(localStorage.getItem(KEY) || '{}');
      for (const f of ALL_FIELDS) if (Array.isArray(s[f])) base[f] = s[f];
    } catch { /* first run / storage unavailable */ }
    return base;
  }
  function save() { try { localStorage.setItem(KEY, JSON.stringify(state)); } catch { /* ignore */ } }

  const active = () => ALL_FIELDS.some((f) => state[f].length);

  // The one predicate. `o` carries status/assignee/sprint; `modId` is its module id.
  function itemMatches(o, modId) {
    if (state.status.length   && !state.status.includes(o.status || 'not-started')) return false;
    if (state.assignee.length && !state.assignee.includes(o.assignee ? o.assignee : NONE)) return false;
    if (state.sprint.length   && !state.sprint.includes(o.sprint ? o.sprint : NONE)) return false;
    if (state.module.length   && !state.module.includes(modId)) return false;
    return true;
  }

  // Option lists [value,label], derived from the items actually present.
  function options(data) {
    const asg = new Set(), spr = new Set(); let unAsg = false, unSpr = false;
    for (const m of data.modules || [])
      for (const sm of m.sub_modules || [])
        for (const sc of sm.screens || [])
          for (const it of sc.items || []) {
            if (it.assignee) asg.add(it.assignee); else unAsg = true;
            if (it.sprint) spr.add(it.sprint); else unSpr = true;
          }
    return {
      status: STATUS_OPTS,
      assignee: [...[...asg].sort(sortNat).map((a) => [a, a]), ...(unAsg ? [[NONE, 'Unassigned']] : [])],
      sprint: [...[...spr].sort(sortNat).map((s) => [s, s]), ...(unSpr ? [[NONE, 'No sprint']] : [])],
      module: (data.modules || []).map((m) => [m.id, m.name]),
    };
  }

  const btnLabel = (f) => LABELS[f] + ': ' + (state[f].length || 'All');

  // Header readouts reflect the filtered set, so the count agrees with each view.
  function applyCounts(data) {
    let items = 0, stories = 0, enablers = 0, points = 0;
    for (const m of data.modules || [])
      for (const sm of m.sub_modules || [])
        for (const sc of sm.screens || [])
          for (const it of sc.items || []) {
            if (!itemMatches(it, m.id)) continue;
            items++; points += it.story_points || 0;
            if (it.type === 'enabler') enablers++; else stories++;
          }
    const si = document.getElementById('s-items'), sp = document.getElementById('s-points');
    if (si) si.innerHTML = items + '<small>' + stories + ' story · ' + enablers + ' enabler</small>';
    if (sp) sp.textContent = points;
  }

  function fire() {
    save();
    if (_data) applyCounts(_data);
    if (_cb) _cb();
  }

  // Build the dropdown bar into #filters; rebuilt on every renderHeader (state is
  // held in localStorage, so a rebuild keeps the user's selection).
  function mount(data) {
    _data = data;
    const host = document.getElementById('filters');
    if (!host) return;
    const opts = options(data);
    host.innerHTML = BAR_FIELDS.map((f) => {
      const checks = opts[f].map(([v, l]) =>
        `<label class="flt-opt"><input type="checkbox" value="${esc(v)}"${state[f].includes(v) ? ' checked' : ''}><span>${esc(l)}</span></label>`).join('');
      return `<div class="flt${state[f].length ? ' on' : ''}" data-field="${f}">`
        + `<button type="button" class="flt-btn">${esc(btnLabel(f))}<i>▾</i></button>`
        + `<div class="flt-pop">${checks || '<div class="flt-empty">none</div>'}`
        + `<button type="button" class="flt-clear">Clear</button></div></div>`;
    }).join('');

    host.querySelectorAll('.flt').forEach((el) => {
      const field = el.dataset.field;
      const btn = el.querySelector('.flt-btn');
      const sync = () => { el.classList.toggle('on', state[field].length > 0); btn.firstChild.textContent = btnLabel(field); };

          acceptance_criteria: [...body.querySelectorAll('.ed-ac-input')].map(i => i.value.trim()).filter(Boolean),
        };
        save.disabled = true;
        postItem(id, patch).then(() => { editing = null; flash('saved'); }).catch(()=>{}).finally(() => { save.disabled = false; });
        return;
      }
      if (t && (t.id === 'modal-back' || t.id === 'modal-close')) closeModal();
    });
    // Keep the draft in sync so an SSE re-render never loses half-typed text.
    document.addEventListener('input', e => {
      if (e.target && e.target.classList && e.target.classList.contains('cm-input')){
        const body = document.getElementById('modal-body');

      }
    });
    document.addEventListener('keydown', e => { if (e.key === 'Escape') closeModal(); });
    window.addEventListener('hashchange', syncModalFromHash);
  }

  function wbsToHierarchy(data){
    const root = { id:'root', name:data._meta.project, status:data._meta.status||'in-progress', type:'root', children:[] };
    const idMod = {}, flatItems = [];
    // When the global filter is active, prune item/screen/epic/module nodes that
    // have nothing matching — so the map shows only what passes the filter.
    const filtering = !!(window.WBS.filter && window.WBS.filter.active());
    itemsById = {};
    for (const mod of data.modules||[]){
      const modNode = { id:mod.id, name:mod.name, description:mod.description||'', status:mod.status||'not-started', type:'module', children:[] };
      for (const sub of (mod.sub_modules||[])){
        const subNode = { id:sub.id, name:sub.name, description:sub.description||'', status:sub.status||'not-started', type:'submodule', children:[] };
        for (const screen of (sub.screens||[])){
          const items = (screen.items||[]).map(it => {
            const node = {
              id:it.id, name:it.title, type:it.type, story:it.story||'', status:it.status||'not-started',
              sp:it.story_points||0, roles:it.roles||[], ac:it.acceptance_criteria||[], assignee:it.assignee||'', sprint:it.sprint||'',
              deps:it.dependencies||[], ext:(it.external_deps||[]).map(e=> typeof e==='string'?{needs:e}:e), notes:it.notes||'',
              mockup: it.mockup_ref || screen.mockup_ref || null, _mod:mod.id
            };
            idMod[it.id] = mod.id; flatItems.push(node); itemsById[it.id] = node;
            return node;
          });
          // idMod/flatItems/itemsById are populated above for ALL items (so dependency
          // classification + modal lookups stay complete); only the shown subset is rendered.
          const shown = filtering ? items.filter(n => window.WBS.filter.itemMatches(n, mod.id)) : items;
          if (filtering && !shown.length) continue;
          subNode.children.push({ id:screen.id, name:screen.name, description:screen.description||'', status:screen.status||'not-started',
            type:'screen', roles:screen.roles||[], children: shown.length?shown:undefined });
        }
        if (!subNode.children.length){ if (filtering) continue; delete subNode.children; }
        modNode.children.push(subNode);
      }
      if (!modNode.children.length){ if (filtering) continue; delete modNode.children; }
      root.children.push(modNode);
    }
    // classify blockers: cross-module if a resolved dep lives in another module, or any external flag exists
    for (const it of flatItems){
      it.crossDeps = it.deps.filter(d => idMod[d] && idMod[d] !== it._mod);
      it.blocked = it.deps.length > 0 || it.ext.length > 0;
      it.crossBlocked = it.crossDeps.length > 0 || it.ext.length > 0;
    }
    // reverse edges: for each item, which items it blocks (the inverse of `deps`).
    const blockMap = {};
    for (const it of flatItems)
      for (const d of it.deps) (blockMap[d] = blockMap[d] || []).push(it.id);
    for (const it of flatItems){
      it.blocks = blockMap[it.id] || [];
      it.crossBlocks = it.blocks.filter(b => idMod[b] && idMod[b] !== it._mod);
    }
    const oosNode = (o) => ({ id:o.id, name:o.name, description:o.reason||'', status:'out-of-scope', type:'oos',
      children: (o.children && o.children.length) ? o.children.map(oosNode) : undefined });
    for (const oos of (data.out_of_scope||[]))
      root.children.push(oosNode(oos));
    (function annotate(n){
      if (isItem({data:n})){ n.total_sp=n.sp; n.total_us=1; n.done_us=n.status==='done'?1:0; return; }
      if (!n.children){ n.total_sp=0; n.total_us=0; n.done_us=0; return; }
      n.children.forEach(annotate);
      n.total_sp=n.children.reduce((a,c)=>a+(c.total_sp||0),0);
      n.total_us=n.children.reduce((a,c)=>a+(c.total_us||0),0);
      n.done_us =n.children.reduce((a,c)=>a+(c.done_us||0),0);
    })(root);
    return root;
  }

  function renderHeader(data, S){
    const $ = id => document.getElementById(id);

    $('s-items').innerHTML = S.items + '<small>' + S.stories + ' story · ' + S.enablers + ' enabler</small>';
    $('s-points').textContent = S.points;

      blk.innerHTML = (x+f) + '<small>' + x + ' x-mod · ' + f + ' open</small>';

      ne.append('text').attr('class','node-expand').attr('x',RECT_W/2-12).attr('text-anchor','end').attr('y',0).attr('dominant-baseline','middle');
      ne.append('text').attr('class','node-blk').attr('text-anchor','end').attr('dominant-baseline','middle').attr('font-size',11).style('display',d=>isItem(d)&&d.data.blocked?null:'none');

      const nu = ne.merge(node);
      nu.transition().duration(initial?600:280).delay(d=> initial ? d.depth*55 + (d.parent?d.parent.children.indexOf(d):0)*18 : 0)
        .attr('transform',d=>'translate('+d.y+','+d.x+')').style('opacity',1);

      nu.select('.node-bg').attr('y',d=>-cardH(d)/2).attr('height',d=>cardH(d))
        .attr('stroke',d=>d.data.type==='enabler'?ENABLER:C.line).attr('stroke-dasharray',d=>d.data.type==='enabler'?'5 4':null);
      nu.select('.node-strip').attr('y',d=>-cardH(d)/2+8).attr('height',d=>cardH(d)-16).attr('fill',col);
      nu.select('.node-pip').attr('cy',d=>-cardH(d)/2+13).attr('fill',col);

      // item
      nu.select('.i-id').attr('y',d=>-cardH(d)/2+16).text(d=>d.data.id);

  // hex (#rrggbb) → rgba string with alpha

/* WBS table view — architect's spec-sheet edition. Plain browser script.

(function () {
  const STATUS = {
    done: '#16a34a', 'in-progress': '#d97706', blocked: '#dc2626',
    'not-started': '#64748b',
  };
  const ENABLER = '#7c3aed';
  const statusColor = (s) => STATUS[s] || STATUS['not-started'];
  const stripColor = (r) => (r._type === 'enabler' ? ENABLER : statusColor(r._status));
  const statusLabel = (s) => ({ 'not-started': 'queued', 'in-progress': 'active' }[s] || s);

  const esc = (s) => String(s == null ? '' : s)
    .replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;');
  const lines = (s) => esc(s).split('\n').filter(Boolean);

  // Per-column-kind cell HTML.
  function cell(r, col) {
    const v = r[col.key];
    const link = '#item=' + encodeURIComponent(r.id);
    if (col.key === 'id') return `<a class="item-link t-code" href="${link}" title="open detail">${esc(v)}</a>`;
    if (col.key === 'title') return `<a class="item-link" href="${link}" title="open detail">${esc(v)}</a>`;
    if (col.key === 'type') {
      const c = r._type === 'enabler' ? ENABLER : 'var(--ink-dim)';
      return `<span class="t-tag" style="color:${c};border-color:${c}">${esc(v)}</span>`;
    }
    if (col.key === 'status') {
      const c = statusColor(r._status);
      return `<span class="t-tag" style="color:${c};border-color:${c}">${esc(statusLabel(r._status))}</span>`;
    }
    if (col.key === 'sp') return `<span class="t-sp">${esc(v)}</span>`;
    if (col.key === 'ac' && v) return `<ul class="t-ac">${lines(v).map((l) => `<li>${l}</li>`).join('')}</ul>`;
    if (col.key === 'deps' && v) {
      return lines(v).map((l) => {
        const warn = /[⤴⚠]/.test(l);
        return `<div class="t-dep${warn ? ' x' : ''}">${l}</div>`;
      }).join('');

    if (col.kind === 'code') return `<span class="t-code">${esc(v)}</span>`;

  function renderTable(data) {

    const modName = Object.fromEntries(modules.map((m) => [m.id, m]));

          <svg viewBox="0 0 24 24" width="13" height="13" aria-hidden="true"><path fill="none" stroke="currentColor" stroke-width="2" d="M10 4a6 6 0 1 0 0 12A6 6 0 0 0 10 4zm5 11 5 5"/></svg>

          if (!mr.length) continue;
          const collapsed = state.collapsed.has(m.id);
          html += bandHtml(m, collapsed) + (collapsed ? '' : mr.map(rowHtml).join(''));
        }
      } else {
        html += rs.map(rowHtml).join('');
      }
      body.innerHTML = html || `<tr><td colspan="${ncol}" class="t-empty">no items match “${esc(state.q)}”</td></tr>`;

      const vItems = rs.length;
      const vPoints = rs.reduce((a, r) => a + (r.sp || 0), 0);
      count.textContent = `${vItems}${vItems !== total.items ? ' / ' + total.items : ''} item${vItems === 1 ? '' : 's'} · Σ ${vPoints} pt`;

      host.querySelectorAll('th').forEach((th) => {
        const on = th.dataset.key === state.sort;
        th.classList.toggle('sorted', on);
        th.querySelector('.sort-i').textContent = on ? (state.dir > 0 ? '▲' : '▼') : '';
      });
    }

    host.querySelector('#t-q').addEventListener('input', (e) => { state.q = e.target.value; draw(); });
    body.addEventListener('click', (e) => {                         // collapse/expand a module band
      const band = e.target.closest && e.target.closest('tr.t-band');
      if (!band) return;
      const id = band.dataset.mod;
      if (state.collapsed.has(id)) state.collapsed.delete(id); else state.collapsed.add(id);
      draw();
    });
    host.querySelectorAll('th').forEach((th) => th.addEventListener('click', () => {
      const k = th.dataset.key;
      if (k === 'wbs') { state.sort = null; state.dir = 1; }       // restore natural grouped order
      else if (state.sort === k) state.dir *= -1;
      else { state.sort = k; state.dir = 1; }
      draw();
    }));

    if (window.WBS.filter) window.WBS.filter.onChange(draw);   // global filter → redraw table
    draw();
  }

  window.WBS = window.WBS || {};
  window.WBS.renderTable = renderTable;
})();

/* WBS → styled .xlsx export. Plain browser script. Needs the global `XLSX`
   from the xlsx-js-style CDN bundle (loaded in the page <head>).
   Exposes window.WBS.exportExcel(data). Reuses WBS.toRows() so the spreadsheet
   matches the table view exactly. */
(function () {
  // Blueprint palette (rgb hex, no '#').
  const NAVY = '1F3A5F', ACCENT = '2563EB', BAND = 'E8EEF7', ZEBRA = 'F7F9FC',
        BORDER = 'D7E0EC', INK = '1C2738', WHITE = 'FFFFFF';
  const SCOL = { done: '16A34A', 'in-progress': 'D97706', blocked: 'DC2626', 'not-started': '64748B' };
  const ENABLER = '7C3AED';
  const sColor = (s) => SCOL[s] || SCOL['not-started'];
  const sLabel = (s) => ({ 'not-started': 'queued', 'in-progress': 'active' }[s] || s);

  const edge = { style: 'thin', color: { rgb: BORDER } };
  const allBorders = { top: edge, bottom: edge, left: edge, right: edge };

  function exportExcel(data) {
    if (typeof XLSX === 'undefined') {
      (window.WBS.flash || console.warn)('Excel library not loaded — check your connection');
      return;
    }
    const { columns, rows, modules, total } = window.WBS.toRows(data);
    const ncol = columns.length;
    const ws = {};
    let r = 0;

    const put = (row, col, v, s, t) => {
      ws[XLSX.utils.encode_cell({ r: row, c: col })] =
        { v: v == null ? '' : v, t: t || (typeof v === 'number' ? 'n' : 's'), s };
    };
    const merges = [];
    const rowMeta = [];           // !rows: heights + outline levels

    // ── Title banner ──────────────────────────────────────────
    const meta = data._meta || {};
    const titleTxt = `${meta.project || 'Work Breakdown Structure'}  ·  WBS` +
      (meta.version ? `  ·  v${meta.version}` : '') + (meta.updated ? `  ·  ${meta.updated}` : '');
    put(r, 0, titleTxt, {
      font: { name: 'Arial', sz: 14, bold: true, color: { rgb: WHITE } },
      fill: { patternType: 'solid', fgColor: { rgb: NAVY } },
      alignment: { horizontal: 'left', vertical: 'center' },
    });
    for (let c = 1; c < ncol; c++) put(r, c, '', { fill: { patternType: 'solid', fgColor: { rgb: NAVY } } });
    merges.push({ s: { r, c: 0 }, e: { r, c: ncol - 1 } });
    rowMeta[r] = { hpt: 30 }; r++;

    // ── Header row ────────────────────────────────────────────
    const headerRow = r;
    columns.forEach((col, c) => put(r, c, col.label, {
      font: { name: 'Arial', sz: 10, bold: true, color: { rgb: WHITE } },
      fill: { patternType: 'solid', fgColor: { rgb: ACCENT } },
      alignment: { horizontal: col.kind === 'num' ? 'center' : 'left', vertical: 'center', wrapText: true },
      border: allBorders,
    }));
    rowMeta[r] = { hpt: 22 }; r++;

    // ── Per-module bands + item rows ──────────────────────────
    const cellStyle = (col, r0, isEnabler, zebra) => {
      const base = {
        font: { name: 'Arial', sz: 9, color: { rgb: INK } },
        alignment: {
          horizontal: col.kind === 'num' ? 'center' : 'left',
          vertical: 'top',
          wrapText: col.kind === 'wide' || col.kind === 'text',
        },
        border: allBorders,
      };
      if (zebra) base.fill = { patternType: 'solid', fgColor: { rgb: ZEBRA } };
      if (col.key === 'id' || col.kind === 'code') base.font.name = 'Consolas';
      return base;
    };

    let zebra = false;
    for (const m of modules) {
      const mr = rows.filter((row) => row._moduleId === m.id);
      if (!mr.length) continue;

      // band row (merged, tinted)
      put(r, 0, `${m.id}  ${m.name}`, {
        font: { name: 'Arial', sz: 10, bold: true, color: { rgb: NAVY } },
        fill: { patternType: 'solid', fgColor: { rgb: BAND } },
        alignment: { horizontal: 'left', vertical: 'center' },
        border: { bottom: { style: 'medium', color: { rgb: ACCENT } } },
      });
      for (let c = 1; c < ncol; c++) {
        const last = c === ncol - 1;
        put(r, c, last ? `${m.items} items · Σ ${m.points} pt` : '', {
          font: { name: 'Arial', sz: 9, bold: true, italic: last, color: { rgb: NAVY } },
          fill: { patternType: 'solid', fgColor: { rgb: BAND } },
          alignment: { horizontal: last ? 'right' : 'left', vertical: 'center' },
          border: { bottom: { style: 'medium', color: { rgb: ACCENT } } },
        });
      }
      merges.push({ s: { r, c: 0 }, e: { r, c: ncol - 2 } });
      rowMeta[r] = { hpt: 18 }; r++;
      zebra = false;

      for (const row of mr) {
        columns.forEach((col, c) => {
          const s = cellStyle(col, r, row._type === 'enabler', zebra);
          if (col.key === 'sp') { put(r, c, row.sp, { ...s, numFmt: '0', font: { ...s.font, bold: true } }, 'n'); return; }
          if (col.key === 'type') {
            const cc = row._type === 'enabler' ? ENABLER : '5A6B82';
            put(r, c, row.type, { ...s, font: { ...s.font, bold: true, color: { rgb: cc } }, alignment: { ...s.alignment, horizontal: 'center' } });
            return;
          }
          if (col.key === 'status') {
            const cc = sColor(row._status);
            put(r, c, sLabel(row._status), { ...s, font: { ...s.font, bold: true, color: { rgb: cc } }, alignment: { ...s.alignment, horizontal: 'center' } });
            return;
          }
          put(r, c, row[col.key], s);
        });
        // outline: items nest under the band (collapsible in Excel; ignored if unsupported)
        rowMeta[r] = { level: 1 };
        r++; zebra = !zebra;
      }
    }

    // ── Grand total ───────────────────────────────────────────
    const totStyle = (align, last) => ({
      font: { name: 'Arial', sz: 10, bold: true, italic: !!last, color: { rgb: WHITE } },
      fill: { patternType: 'solid', fgColor: { rgb: NAVY } },
      alignment: { horizontal: align, vertical: 'center' },
      border: { top: { style: 'medium', color: { rgb: NAVY } } },
    });
    put(r, 0, 'TOTAL', totStyle('left'));
    for (let c = 1; c < ncol; c++) {
      const last = c === ncol - 1;
      put(r, c, last ? `${total.items} items · Σ ${total.points} pt` : '', totStyle(last ? 'right' : 'left', last));
    }
    merges.push({ s: { r, c: 0 }, e: { r, c: ncol - 2 } });
    rowMeta[r] = { hpt: 20 }; r++;

    // ── Sheet assembly ────────────────────────────────────────
    ws['!ref'] = XLSX.utils.encode_range({ s: { r: 0, c: 0 }, e: { r: r - 1, c: ncol - 1 } });
    ws['!cols'] = columns.map((c) => ({ wch: c.width }));
    ws['!merges'] = merges;
    ws['!rows'] = rowMeta;
    ws['!autofilter'] = { ref: XLSX.utils.encode_range({ s: { r: headerRow, c: 0 }, e: { r: headerRow, c: ncol - 1 } }) };
    ws['!freeze'] = { xSplit: 0, ySplit: headerRow + 1, topLeftCell: XLSX.utils.encode_cell({ r: headerRow + 1, c: 0 }), activePane: 'bottomLeft', state: 'frozen' };

    const wb = XLSX.utils.book_new();
    XLSX.utils.book_append_sheet(wb, ws, 'WBS');

    const safe = (meta.project || 'WBS').replace(/[^A-Za-z0-9]+/g, '-').replace(/^-|-$/g, '');
    const fname = `${safe}-WBS${meta.version ? '-v' + meta.version : ''}.xlsx`;
    XLSX.writeFile(wb, fname);
    (window.WBS.flash || console.log)('exported ' + fname);
  }

  window.WBS = window.WBS || {};
  window.WBS.exportExcel = exportExcel;
})();

/* Shared inline quick-edit controls for status / assignee / sprint — the single
   source of the <select> option HTML AND the change → POST /item wiring, used by
   both the map-view modal (render.js) and the Backlog page (backlog.js).

   Builders are pure (current state is passed in via `ctx = { sprints, assignees,
   live }`); one delegated `change` listener does the save. When ctx.live is false
   (e.g. the static snapshot, which has no server) the controls render disabled and
   never fire. Plain browser script. */
(function () {
  const STATUSES = ['not-started', 'in-progress', 'done', 'blocked'];
  const NEW = '__new__';   // sentinel option value → prompt for a brand-new sprint
  const esc = (s) => (s == null ? '' : String(s)).replace(/[&<>"]/g, (m) => ({ '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;' }[m]));
  const opt = (v, label, cur) => '<option value="' + esc(v) + '"' + (String(v) === String(cur == null ? '' : cur) ? ' selected' : '') + '>' + esc(label) + '</option>';

  // Distinct non-empty sprint strings across all items, natural-sorted
  // ("Sprint 2" < "Sprint 10"). This derived list IS the set of known sprints.
  function quickSprints(data) {
    const set = new Set();
    for (const m of (data && data.modules) || [])
      for (const sm of m.sub_modules || [])
        for (const sc of sm.screens || [])
          for (const it of sc.items || []) if (it.sprint) set.add(it.sprint);
    return [...set].sort((a, b) => a.localeCompare(b, undefined, { numeric: true }));
  }

  // One <select> for `field` ('status' | 'assignee' | 'sprint') bound to item.id.
  // `item` only needs { id, [field] }.
  function quickControl(field, item, ctx) {
    ctx = ctx || {};
    // story_points is carried as `sp` on the modal node and as `sp` on table rows.
    const cur = field === 'story_points'
      ? (item.story_points != null ? item.story_points : (item.sp != null ? item.sp : ''))
      : (item[field] || '');
    let opts = '';
    if (field === 'status') opts = STATUSES.map((s) => opt(s, s, cur)).join('');
    else if (field === 'story_points') opts = [1, 2, 3, 5, 8, 13].map((v) => opt(v, v, cur)).join('');
    else if (field === 'assignee') opts = opt('', '— Unassigned —', cur) + (ctx.assignees || []).map((m) => opt(m, m, cur)).join('');
    else if (field === 'sprint') {
      const sp = ctx.sprints || [];
      opts = opt('', 'Backlog (none)', cur)
        + sp.map((s) => opt(s, s, cur)).join('')
        + (cur && sp.indexOf(cur) < 0 ? opt(cur, cur, cur) : '')   // keep a value not yet in the list
        + '<option value="' + NEW + '">＋ new sprint…</option>';
    }
    return '<select class="qe qe-' + field + '" data-field="' + field + '" data-id="' + esc(item.id) + '" data-cur="' + esc(cur) + '"' + (ctx.live ? '' : ' disabled') + '>' + opts + '</select>';
  }

  // Labelled trio for the modal quick-edit strip.
  function quickControlsHTML(item, ctx) {
    const f = (label, field) => '<div class="qe-field"><label>' + label + '</label>' + quickControl(field, item, ctx) + '</div>';
    return f('Status', 'status') + f('Story points', 'story_points') + f('Assignee', 'assignee') + f('Sprint', 'sprint');
  }

  function postItem(id, patch) {
    return fetch('/item', { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ id, patch }) })
      .then((r) => r.json())
      .then((res) => { if (res && res.error) throw new Error(res.error); return res; });
  }

  // Delegated change handler — fires for any enabled .qe select; saves the one
  // changed field via /item. The server validates + writes wbs.json + broadcasts
  // over SSE, so the view re-renders with the new value. Reverts on failure.
  function onChange(e) {
    const sel = e.target;
    if (!sel || !sel.classList || !sel.classList.contains('qe')) return;
    const field = sel.dataset.field, id = sel.dataset.id, prev = sel.dataset.cur || '';
    if (!field || !id) return;
    let value = sel.value;
    if (field === 'sprint' && value === NEW) {
      const name = (window.prompt('New sprint name (e.g. "Sprint 3"):', '') || '').trim();
      if (!name) { sel.value = prev; return; }          // cancelled → restore
      value = name;
    }
    sel.disabled = true;
    postItem(id, { [field]: value })
      .then(() => { if (window.WBS && window.WBS.flash) window.WBS.flash('saved'); })
      .catch((err) => { sel.value = prev; if (window.WBS && window.WBS.flash) window.WBS.flash('✗ ' + err.message); })
      .finally(() => { sel.disabled = false; });
  }

  if (typeof document !== 'undefined' && document.body && !document.body.dataset.qeWired) {
    document.body.dataset.qeWired = '1';
    document.addEventListener('change', onChange);
  }

  window.WBS = window.WBS || {};
  Object.assign(window.WBS, { quickControl, quickControlsHTML, quickSprints });
})();

/* WBS Backlog view — every item grouped by its sprint, with inline quick-edit of
   status / assignee / sprint right in the row. Plain browser script.
   Exposes window.WBS.renderBacklog(data, { assignees, live }).

   Reuses WBS.toRows (row data), WBS.quickControl (the inline selects) and the
   table view's CSS (.t-*), so the two views stay visually consistent.
   Bands: "Backlog (unscheduled)" first, then each sprint, natural-sorted. */
(function () {
  const ENABLER = '#7c3aed';
  const STATUS = { done: '#16a34a', 'in-progress': '#d97706', blocked: '#dc2626', 'not-started': '#64748b' };
  const statusColor = (s) => STATUS[s] || STATUS['not-started'];
  const esc = (s) => String(s == null ? '' : s).replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;');

  const COLS = [
    { key: 'id',       label: 'Item ID',  kind: 'code' },
    { key: 'type',     label: 'Type',     kind: 'tag'  },
    { key: 'title',    label: 'Title',    kind: 'text' },
    { key: 'screen',   label: 'Screen',   kind: 'text' },
    { key: 'sp',       label: 'SP',       kind: 'num'  },
    { key: 'roles',    label: 'Roles',    kind: 'text' },
    { key: 'status',   label: 'Status',   kind: 'ctl'  },
    { key: 'assignee', label: 'Assignee', kind: 'ctl'  },
    { key: 'sprint',   label: 'Sprint',   kind: 'ctl'  },
  ];

  // Group rows by sprint string ('' → Backlog). Backlog first, then natural-sorted.
  function group(rows) {
    const map = new Map();
    for (const r of rows) { const k = r.sprint || ''; (map.get(k) || map.set(k, []).get(k)).push(r); }
    const keys = [...map.keys()].sort((a, b) =>
      (a === '' ? -1 : b === '' ? 1 : a.localeCompare(b, undefined, { numeric: true })));
    return keys.map((k) => {
      const rs = map.get(k);
      return { key: k, name: k === '' ? 'Backlog (unscheduled)' : k, rows: rs,
        items: rs.length, points: rs.reduce((a, r) => a + (r.sp || 0), 0) };
    });
  }

  function renderBacklog(data, opts) {
    opts = opts || {};
    const host = document.getElementById('backlog-container');
    if (!host) return;
    const { rows, total } = window.WBS.toRows(data);
    const ctx = { sprints: window.WBS.quickSprints(data), assignees: opts.assignees || [], live: !!opts.live };
    const ncol = COLS.length;
    const state = { q: '', collapsed: new Set() };

    host.innerHTML = `
      <div class="t-toolbar">
        <div class="t-search">
          <svg viewBox="0 0 24 24" width="13" height="13" aria-hidden="true"><path fill="none" stroke="currentColor" stroke-width="2" d="M10 4a6 6 0 1 0 0 12A6 6 0 0 0 10 4zm5 11 5 5"/></svg>
          <input id="b-q" type="text" placeholder="filter id · title · role · screen · sprint" autocomplete="off" spellcheck="false">
        </div>
        <span class="t-count" id="b-count"></span>
        <span class="t-hint">${ctx.live ? 'set status · assignee · sprint inline — saves live' : 'snapshot — run serve.mjs to edit inline'}</span>
      </div>
      <div class="t-scroll">
        <table class="t-table">
          <thead><tr>${COLS.map((c) => `<th class="th-${c.kind}"><span>${esc(c.label)}</span></th>`).join('')}</tr></thead>
          <tbody id="b-body"></tbody>
        </table>
      </div>`;

    const body = host.querySelector('#b-body');
    const count = host.querySelector('#b-count');

    function cell(r, c) {
      if (c.kind === 'ctl') return window.WBS.quickControl(c.key, r, ctx);
      const link = '#item=' + encodeURIComponent(r.id);
      if (c.key === 'id') return `<a class="item-link t-code" href="${link}" title="open detail">${esc(r.id)}</a>`;
      if (c.key === 'title') return `<a class="item-link" href="${link}" title="open detail">${esc(r.title)}</a>`;
      if (c.key === 'type') {
        const col = r._type === 'enabler' ? ENABLER : 'var(--ink-dim)';
        return `<span class="t-tag" style="color:${col};border-color:${col}">${esc(r.type)}</span>`;
      }
      if (c.key === 'sp') return `<span class="t-sp">${esc(r.sp)}</span>`;
      if (c.kind === 'code') return `<span class="t-code">${esc(r[c.key])}</span>`;
      return esc(r[c.key]);
    }

    function rowHtml(r) {
      const strip = r._type === 'enabler' ? ENABLER : statusColor(r._status);
      return `<tr class="${r._type === 'enabler' ? 'is-enabler' : ''}">` +
        COLS.map((c, i) =>
          `<td class="td-${c.kind}"${i === 0 ? ` style="box-shadow: inset 3px 0 0 ${strip}"` : ''}>${cell(r, c)}</td>`).join('') +
        '</tr>';
    }

    function bandHtml(g, collapsed) {
      return `<tr class="t-band" data-key="${esc(g.key)}"><td colspan="${ncol}">` +
        `<div class="t-band-row" title="click to ${collapsed ? 'expand' : 'collapse'}">` +
        `<span class="b-caret">${collapsed ? '▸' : '▾'}</span>` +
        `<span class="b-name">${esc(g.name)}</span>` +
        `<span class="b-stat">${g.items} item${g.items === 1 ? '' : 's'} · Σ ${g.points} pt</span></div></td></tr>`;
    }

    function visibleRows() {
      let rs = rows;
      if (window.WBS.filter && window.WBS.filter.active())
        rs = rs.filter((r) => window.WBS.filter.itemMatches(r, r._moduleId));
      const q = state.q.trim().toLowerCase();
      if (!q) return rs;
      return rs.filter((r) =>
        (r.id + ' ' + r.title + ' ' + r.story + ' ' + r.roles + ' ' + r.screen + ' ' + (r.sprint || ''))
          .toLowerCase().includes(q));
    }

    function draw() {
      const rs = visibleRows();
      let html = '';
      for (const g of group(rs)) {
        const collapsed = state.collapsed.has(g.key);
        html += bandHtml(g, collapsed) + (collapsed ? '' : g.rows.map(rowHtml).join(''));
      }
      body.innerHTML = html || `<tr><td colspan="${ncol}" class="t-empty">no items match “${esc(state.q)}”</td></tr>`;
      const vItems = rs.length, vPoints = rs.reduce((a, r) => a + (r.sp || 0), 0);
      count.textContent = `${vItems}${vItems !== total.items ? ' / ' + total.items : ''} item${vItems === 1 ? '' : 's'} · Σ ${vPoints} pt`;
    }

    host.querySelector('#b-q').addEventListener('input', (e) => { state.q = e.target.value; draw(); });
    body.addEventListener('click', (e) => {                  // collapse/expand a sprint band
      const band = e.target.closest && e.target.closest('tr.t-band');
      if (!band) return;
      const k = band.dataset.key;
      if (state.collapsed.has(k)) state.collapsed.delete(k); else state.collapsed.add(k);
      draw();
    });

    if (window.WBS.filter) window.WBS.filter.onChange(draw);   // global filter → redraw backlog
    draw();
  }

  window.WBS = window.WBS || {};
  window.WBS.renderBacklog = renderBacklog;
})();

/* App glue — shared by the mindmap page and the table page.
   The two views now live on separate pages (no tabs); this just stashes the
   latest data for the Excel button and wires that button once.
   Plain browser script; depends on WBS.exportExcel. */
(function () {
  let current = null; // latest data — what the Excel button exports

  function setData(data) { current = data; }

  function bindExport() {
    const ex = document.getElementById('btn-export');
    if (ex) ex.addEventListener('click', () => { if (current) window.WBS.exportExcel(current); });
  }

  window.WBS = window.WBS || {};
  Object.assign(window.WBS, { setData, bindExport });
})();

<script>
const data = {"_meta":{"project":"Agent Platform","version":"1.0","updated":"2026-06-26","status":"in-progress","story_format":"As a [role], I want to [action] so that [benefit]","point_scale":[1,2,3,5,8,13],"notes":["WBS in progress. Broken down so far: People M1.1 Dashboard, M1.2 Employees, M1.3 Org Chart, M1.4 Resource Allocation; and Project Monitoring (M3) — all sub-modules M3.1–M3.8 — decomposed from the mockup (Seta People.dc.html). People M1.5 Performance and lifecycle M1.6/M1.7/M1.8 remain stubs; M2 Hiring not started.","Canonical role taxonomy (locked): BOD = board/executive; PMO = project governance; HR = people operations (employee records, onboarding, sensitive data); AM = account manager; EM/TL/PM = engineering manager / team lead / project manager (the project-level lead); Member = individual contributor. 'Admin' = SYSTEM administrator — a separate platform/access-control role that lives only in out-of-scope M0 (RBAC config, access grants, Directory, Accounts), never attributed to a business story. People's former 'Admin/BOD' label was normalized to 'BOD' and 'EM/TL' to 'EM/TL/PM'; in AC prose 'EM/TL' may still appear as shorthand for the EM/TL/PM role.","M3 Project Monitoring fully decomposed: M3.1 Portfolio, M3.2 Project Requests, M3.3 Weekly Reports, M3.4 RA Monitoring, M3.5 Risks & Issues, M3.6 KPI Metrics, M3.7 Retro and M3.8 Project Closure (user-defined). Built-but-unwired views flagged for the team: M3.6.S2 (KPI deep-dive sections) and M3.7 Retro (no nav entry). M3.7 promote-to-task closes the Retro→RAID loop into EN-M3.5-01.","M3.6 KPI Metrics has two screens: S1 is the wired screen (OHS hero, AI summary, configurable KPI Explorer, manual KPI input). S2 (per-KPI drill, trends/benchmark, EQI×TDI matrix, CAPA register) is built in the mockup but NOT wired — the KPI sub-tab nav is never rendered; flagged like Retro/dashAM. Note: the S2 CAPA register (KPI-breach-driven) overlaps with M3.5 RAID Recovery actions (weekly-report-driven) — may need to converge.","Reconcile done with M3.4 and M3.3: EN-M3.4-01 is the single allocation source (resolves EN-M1.4-01 and the Portfolio billable-rate/Member-scope deps); EN-M3.3-01 + US-M3.3.S2-01 own the weekly-report data and drawer (resolve all six Portfolio per-week/reported/stale-green/drill deps). Portfolio now has zero unresolved external_deps. With M3.5 decomposed, the Recovery-action flag (US-M3.3.S3-02) now resolves to the RAID register EN-M3.5-01. The remaining M3 cross-boundary flag is backfill → M2 Hiring (US-M3.3.S2-03, pending M2).","Full M3 lifecycle inventoried (request → approve → create → staff/R&R → weekly report → RA monitoring → risks/recovery → KPI/CAPA → retro). FLAG: M3.7 Retro (pmRetro) is built but unwired — not a module tab and its only entry trigger (data-gotoretro) is never rendered, so it is currently unreachable in the UI (an orphaned view, like the dashAM dead-code case). Confirm scope before breaking it down.","Reconcile: dashboard skill/tech deps resolve to EN-M1.2-01; dashboard utilization/bench and org-chart project members resolve to EN-M1.4-01 (the allocation model). The one remaining cross-module link is EN-M1.4-01 → M3 (allocations are staffed/edited in the PM module; People reads them) — the canonical 'People utilization fed by PM workload' dependency. Other external_deps await M1.5 Performance, the M1.6/M1.8 lifecycle stubs, M2 Hiring and M0 Admin.","Structure change: the former Journey/Lifecycle module is dissolved — Onboarding/Probation/Offboarding moved into People as M1.6/M1.7/M1.8; the Directory is now a child of Admin (M0.1, deferred); the Journey dashboard is dropped entirely.","Remaining People sub-modules (Performance, Onboarding, Probation, Offboarding) are stubs pending their own breakdown.","Account/client master data has no owner in this WBS: the ACCOUNTS list (id, name, industry, owning AM, projects) is referenced across People and PM but has no management screen in the mockup. Captured as out-of-scope M0.2 (Admin/org-config), with the two data backbones that key off it — EN-M1.2-01 (employee record) and EN-M3.1-01 (project/portfolio) — flagged to M0. (Projects, by contrast, are in-scope: seeded + created via M3.2.)","Project lifecycle end-state is absent from the mockup (no close/complete/archive screen; phase is seed/display-only). Approve/reject is covered in M3.2. Per user direction, project STATUS (active/on-hold/closed) and the SHUTDOWN cascade (closing a project releases its RA → staff to bench) are now decomposed as user-defined sub-module M3.8 Project Closure, with status added to the project record (EN-M3.1-01). M3.8 is flagged as beyond the current mockup (no closure screen exists yet; candidate host = Portfolio/project detail).","external_deps left in the file are the documented cross-boundary dependency map; reconcile resolves each to a concrete item id once the owning sub-module/module is decomposed (those pointing at M0 Admin are permanent out-of-scope flags)."]},"out_of_scope":[{"id":"M0","name":"Admin","reason":"System administration / access-control console — out of scope for this WBS.","children":[{"id":"M0.1","name":"Directory","reason":"Org-wide people directory — an Admin-owned screen (the former Journey 'Directory' tab). Deferred."},{"id":"M0.2","name":"Accounts / Clients","reason":"Account/client master data (id, name, industry, owning AM, projects) referenced across People and PM — employees' account, the account org chart, portfolio account rollups, allocations and requisitions all read it — but with NO create/edit-account screen anywhere in the mockup. Owned by Admin / org-configuration (or an upstream CRM); out of scope."}]},{"id":"AI","name":"Super Century AI","reason":"Standalone AI assistant module — out of scope for this WBS."},{"id":"SHELL","name":"App shell / platform chrome","reason":"Cross-cutting shell — global search, notifications bell, 'Ask Seta' agent panel, theme & persona switch, sidebar/top-bar nav. Platform-level, belongs to no single People sub-module; tracked separately."}],"modules":[{"id":"M1","name":"People","description":"Workforce management across the employee lifecycle — dashboard, employees, org, resource allocation, performance, and lifecycle (onboarding, probation, offboarding).","status":"in-progress","sub_modules":[{"id":"M1.1","name":"Dashboard","description":"Role-aware workforce analytics: an executive Workforce Overview for leadership/management (company-, account- or project-scoped) and a personal My Scorecard for members.","status":"in-progress","screens":[{"id":"M1.1.S1","name":"Workforce Overview (Executive Dashboard)","description":"The 30-second read on the workforce for BOD/PMO (company-wide), AM (account-scoped) and EM/TL/PM (project-scoped): KPIs, utilization, forecast, distribution, attrition, performance, skills and AI signals.","roles":["BOD","PMO","AM","EM/TL/PM"],"mockup_ref":{"screen":"people/dashboard"},"sub_screens":[{"id":"M1.1.S1.1","name":"Scoped page header","description":"Role-aware title + subtitle indicating company-wide vs account/project scope."},{"id":"M1.1.S1.2","name":"Seta signals (AI insights)","description":"Ranked workforce signals filterable by severity (Critical/Warning/Opportunity/Positive)."},{"id":"M1.1.S1.3","name":"Filter bar","description":"Period / department / account / employment-type filters."},{"id":"M1.1.S1.4","name":"Executive KPI strip","description":"Active workforce, Utilization, Attrition, Workforce health — each with sparkline."},{"id":"M1.1.S1.5","name":"Workforce overview","description":"Headcount movement (joiners vs leavers) and people by department."},{"id":"M1.1.S1.6","name":"Utilization & allocation","description":"Deployment split (billable/internal/idle/leave) overall and per department."},{"id":"M1.1.S1.7","name":"Forecast & planning","description":"6-month forecast headcount vs demand with the projected gap."},{"id":"M1.1.S1.8","name":"Workforce distribution","description":"Seniority mix, tech-stack coverage, tenure, exit reasons."},{"id":"M1.1.S1.9","name":"Attrition & retention","description":"Attrition trend, leavers by tenure, turnover by team/account."},{"id":"M1.1.S1.10","name":"Performance summary","description":"Score distribution and review completion/flags across in-scope people."},{"id":"M1.1.S1.11","name":"Skill gaps & capacity risk","description":"Skill-gap matrix and critical roles without backup."},{"id":"M1.1.S1.12","name":"Skill inventory & capacity","description":"Searchable, category-filterable skill inventory vs open demand."},{"id":"M1.1.S1.13","name":"Account-access request (AM)","description":"AM requests a grant to view another account."}],"items":[{"id":"EN-M1.1-01","type":"enabler","title":"Apply role scoping to dashboard metric aggregation","story":"Apply the canonical role/account/project visibility (EN-M1.2-01) when aggregating dashboard metrics, so every KPI and section reflects only the data the current role may see.","acceptance_criteria":["Given the caller's canonical RBAC scope, when a dashboard metric is aggregated, then only in-scope people contribute to it, with no out-of-scope figures leaking in.","Given an AM, EM/TL or Member, when they open the dashboard, then KPIs and sections recompute to their account(s) / projects / self respectively.","Given a fully scoped view contains no people, when metrics aggregate, then empty states are shown rather than zeros."],"story_points":3,"roles":["BOD","PMO","AM","EM/TL/PM","Member"],"notes":"Builds on the canonical RBAC (EN-M1.2-01) rather than re-defining it. Scope tiers: BOD/PMO = company-wide; AM = assigned + granted accounts; EM/TL/PM = own projects; Member = self.","dependencies":["EN-M1.2-01"],"status":"not-started"},{"id":"EN-M1.1-02","type":"enabler","title":"Shared dashboard visualization building blocks","story":"Provide a reusable set of dashboard visualization building blocks (KPI cards with sparklines, trend lines, stacked/segmented bars, donuts, coverage tables) used consistently across every dashboard section.","acceptance_criteria":["Given any dashboard section renders a metric, when displayed, then it uses the shared visual style consistently (colors, legends, tooltips).","Given a metric has no data, when its chart renders, then a shared empty state is shown instead of a broken or zeroed chart."],"story_points":5,"roles":["BOD","PMO","AM","EM/TL/PM","Member"],"notes":"Shared across all dashboard sections and reusable by other analytical People screens.","dependencies":[],"status":"not-started"},{"id":"US-M1.1.S1-01","type":"story","title":"View the executive workforce KPI strip","story":"As an Admin/BOD or PMO, I want a KPI strip showing active workforce, utilization, attrition rate and workforce health with trend sparklines so that I can assess overall workforce health in seconds.","acceptance_criteria":["Given I am BOD or PMO, when the dashboard loads, then the KPI strip shows active workforce (active/total, % active, MoM delta, on-leave), utilization % (idle count, target, gap to target), attrition rate (vs prior) and workforce health, each with a sparkline.","Given a metric has no data for the selected period, when the strip renders, then an empty state is shown instead of a misleading zero.","Given the view is scoped (AM/EM/TL), when the strip renders, then every KPI reflects only the in-scope people."],"story_points":3,"roles":["BOD","PMO"],"dependencies":["EN-M1.1-01","EN-M1.1-02","EN-M1.4-01"],"status":"not-started"},{"id":"US-M1.1.S1-02","type":"story","title":"View workforce growth and department breakdown","story":"As an Admin/BOD or PMO, I want to see headcount movement (joiners vs leavers over 12 months) and people by department so that I understand how the workforce is growing and where people sit.","acceptance_criteria":["Given the dashboard loads, when the overview renders, then a 12-month joiners-vs-leavers trend is shown with a net-change summary.","Given the dashboard loads, when the overview renders, then a people-by-department breakdown shows each department's share of total headcount.","Given no movement data for the period, when the section renders, then an empty state is shown."],"story_points":3,"roles":["BOD","PMO"],"dependencies":["EN-M1.1-01","EN-M1.6-01","EN-M1.8-01"],"status":"not-started"},{"id":"US-M1.1.S1-03","type":"story","title":"Analyze workforce utilization and allocation","story":"As an Admin/BOD or PMO, I want to see how the workforce is deployed (billable / internal / idle / on-leave) overall and per department so that I can find idle capacity before opening new hires.","acceptance_criteria":["Given the dashboard loads, when the utilization section renders, then an overall deployment bar shows billable, internal, idle and on-leave counts with percentages.","Given the dashboard loads, when the section renders, then a per-department breakdown shows how each team splits across billable/internal/idle/leave.","Given there are idle (bench) people, when the section renders, then they are highlighted as staffable capacity."],"story_points":5,"roles":["BOD","PMO"],"notes":"Utilization = billable share of active staff vs target. Bench = available, not yet staffed.","dependencies":["EN-M1.1-01","EN-M1.4-01"],"status":"not-started"},{"id":"US-M1.1.S1-04","type":"story","title":"Review the 6-month workforce forecast vs demand","story":"As an Admin/BOD or PMO, I want a 6-month forecast of headcount vs demand with the projected gap so that I know whether we can staff upcoming work.","acceptance_criteria":["Given the dashboard loads, when the forecast section renders, then a forecast-vs-demand trend and table show projected headcount, demand and the monthly gap for the next 6 months.","Given the projected gap is widening, when the section renders, then an insight quantifies the shortfall and the implied change in hiring velocity.","Given no forecast data, when the section renders, then an empty state is shown."],"story_points":5,"roles":["BOD","PMO"],"dependencies":["EN-M1.1-01","EN-M2.2-01"],"status":"not-started"},{"id":"US-M1.1.S1-05","type":"story","title":"Explore workforce distribution","story":"As an Admin/BOD or PMO, I want to see seniority mix, tech-stack coverage, tenure and exit reasons so that I understand the shape and risks of the team.","acceptance_criteria":["Given the dashboard loads, when the distribution section renders, then seniority mix (with % shares), tech-stack coverage (people per technology), tenure bands and exit-reason breakdown are each shown.","Given a thin senior layer or a thin skill bench, when the section renders, then the relevant chart surfaces a risk insight.","Given a category has no data, when its chart renders, then an empty state is shown."],"story_points":5,"roles":["BOD","PMO"],"dependencies":["EN-M1.1-01","EN-M1.2-01"],"status":"not-started"},{"id":"US-M1.1.S1-06","type":"story","title":"Analyze attrition and retention","story":"As an Admin/BOD or PMO, I want attrition trend, leavers-by-tenure and turnover by team/account so that I can target retention where it matters.","acceptance_criteria":["Given the dashboard loads, when the attrition section renders, then a voluntary-vs-involuntary attrition trend, a leavers-by-tenure breakdown and turnover-by-team/account (vs company average) are shown.","Given the dashboard loads, when the attrition section renders, then a forward-looking attrition/turnover projection for the coming periods is shown alongside the historical trend, so leaders see expected (not just past) churn.","Given a team's turnover exceeds the company average by the alert threshold, when the section renders, then it is visually flagged with a retention insight.","Given no attrition in the period, when the section renders, then an empty state is shown."],"story_points":5,"roles":["BOD","PMO"],"dependencies":["EN-M1.1-01"],"status":"not-started"},{"id":"US-M1.1.S1-07","type":"story","title":"View team performance summary","story":"As an Admin/BOD or PMO, I want a score distribution and review-completion summary across my people so that I can see overall performance health and who needs attention.","acceptance_criteria":["Given the dashboard loads, when the performance section renders, then a score distribution (Top→Below buckets) with the average and verdict, plus a review-completion % with a 'needs attention' list of below-bar people are shown.","Given no reviews are recorded for the scope, when the section renders, then an empty state explains reviews are pending.","Given a person scores below the bar, when the section renders, then they appear in the needs-attention list."],"story_points":3,"roles":["BOD","PMO"],"notes":"Below-bar threshold = 3.5 (out of 5).","dependencies":["EN-M1.1-01","EN-M1.5-01"],"status":"not-started"},{"id":"US-M1.1.S1-08","type":"story","title":"Identify skill gaps and critical-role risk","story":"As an Admin/BOD or PMO, I want a skill-gap matrix (have vs need with coverage) and a list of critical roles without backup so that I can close the gaps that will constrain delivery first.","acceptance_criteria":["Given the dashboard loads, when the skill-gap section renders, then a matrix shows have/need/coverage%/gap per tracked skill, colour-coded by coverage.","Given the dashboard loads, when the section renders, then critical roles are listed with have/need/gap and a risk level, with single points of failure highlighted.","Given a skill or role is critically under-covered, when the section renders, then it is flagged with an action insight."],"story_points":5,"roles":["BOD","PMO"],"dependencies":["EN-M1.1-01","EN-M1.2-01","EN-M2.2-01"],"status":"not-started"},{"id":"US-M1.1.S1-09","type":"story","title":"Browse the skill inventory by category","story":"As an Admin/BOD or PMO, I want a searchable, category-filterable skill inventory with capacity-by-category and supply-vs-demand status so that I can see who holds which skills against open demand.","acceptance_criteria":["Given the dashboard loads, when the skill-inventory
