 section renders, then a table lists skills with holders broken down by seniority band (Fresher / Junior / Middle / Senior), open demand and a supply-vs-demand status, plus capacity-by-category bars.","Given I filter by category or type a search term, when applied, then the table updates to matching skills only, paged when the result set is long.","Given no skill matches the filter/search, when applied, then an empty state is shown."],"story_points":5,"roles":["BOD","PMO"],"dependencies":["EN-M1.1-01","EN-M1.2-01","EN-M2.2-01"],"status":"not-started"},{"id":"US-M1.1.S1-10","type":"story","title":"Review ranked workforce signals (Seta signals)","story":"As an Admin/BOD or PMO, I want AI-surfaced workforce signals ranked by urgency and filterable by severity so that I can see what needs a decision this week.","acceptance_criteria":["Given the dashboard loads, when the signals panel renders, then signals are listed ranked by urgency, each with severity, category, why-it-matters, a recommended action and a confidence score.","Given I filter by severity (Critical/Warning/Opportunity/Positive), when applied, then only signals of that severity are shown, with counts per bucket.","Given there are no signals at a severity level, when filtered, then an empty state is shown."],"story_points":3,"roles":["BOD","PMO"],"notes":"Signals are read-only on the dashboard — no change is committed from here.","dependencies":["EN-M1.1-01"],"status":"not-started"},{"id":"US-M1.1.S1-11","type":"story","title":"Filter the dashboard by period, department, account and type","story":"As an Admin/BOD or PMO, I want to filter the dashboard by period, department, account and employment type so that I can focus the analysis.","acceptance_criteria":["Given I change any filter (period/department/account/type), when applied, then every section re-computes to the selection and the active-filter summary updates.","Given a filter combination yields no people, when applied, then sections show empty states rather than zeros."],"story_points":3,"roles":["BOD","PMO"],"dependencies":["EN-M1.1-01"],"status":"not-started"},{"id":"US-M1.1.S1-12","type":"story","title":"View the workforce dashboard scoped to my accounts (AM)","story":"As an Account Manager, I want the executive dashboard scoped to the accounts I manage so that I see workforce health for my accounts only.","acceptance_criteria":["Given I am an AM, when I open the dashboard, then the header indicates it is scoped and every KPI/section reflects only my assigned (and granted) accounts.","Given I have no granted extra accounts, when I open the dashboard, then I see only my own account(s)."],"story_points":2,"roles":["AM"],"mockup_ref":{"screen":"people/dashboard","persona":"am"},"dependencies":["EN-M1.1-01"],"status":"not-started"},{"id":"US-M1.1.S1-13","type":"story","title":"View the workforce dashboard scoped to my team (EM/TL)","story":"As an EM/Team Lead, I want the dashboard scoped to my projects/team so that I see workforce health for my people only.","acceptance_criteria":["Given I am an EM/TL, when I open the dashboard, then the header indicates it is scoped and every section reflects only my projects/team.","Given I lead no project, when I open the dashboard, then an empty state explains there is no team in scope."],"story_points":2,"roles":["EM/TL/PM"],"mockup_ref":{"screen":"people/dashboard","persona":"manager"},"dependencies":["EN-M1.1-01"],"status":"not-started"},{"id":"US-M1.1.S1-14","type":"story","title":"Request access to another account (AM)","story":"As an Account Manager, I want to request view access to an account I don't manage so that I can see its workforce after approval.","acceptance_criteria":["Given I am an AM, when I open the access-request control, then I can select an account I don't currently have access to and submit a request.","Given I submit a request, when confirmed, then it is recorded for Admin/PMO approval and the action is audit-logged.","Given I already have access to all accounts, when the section renders, then the request control is replaced with a 'you have access to all accounts' state."],"story_points":3,"roles":["AM"],"mockup_ref":{"screen":"people/dashboard","persona":"am"},"notes":"The grant is suite-wide (F-SEC-4): once approved it widens the AM's visibility to that account across People, Hiring and Project Management, and may be time-boxed. It is granted/revoked only by a PMO or Strategic user (never self-granted), and both granting and revoking are audited. In production the request routes to PMO/Strategic for approval; the prototype applies it immediately.","dependencies":["EN-M1.1-01"],"external_deps":[{"needs":"suite-wide account-access grant workflow (PMO/Strategic approve & revoke, optional time-box) and audit log","likely_module":"M0","reason":"the cross-account grant is suite-wide (F-SEC-4) and owned by Admin/access-control — it widens visibility across People, Hiring and PM at once — which is out of scope for this WBS."}],"status":"not-started"}]},{"id":"M1.1.S2","name":"My Scorecard (Member dashboard)","description":"The dashboard a Member sees: their monthly evaluation at a glance — overall score, pillar breakdown, strengths, focus areas and score trend.","roles":["Member"],"mockup_ref":{"screen":"people/dashboard","persona":"employee"},"sub_screens":[{"id":"M1.1.S2.1","name":"Scorecard summary","description":"Overall score, verdict and period selector."},{"id":"M1.1.S2.2","name":"Pillar breakdown","description":"Weighted pillars (AI, Technical, Communication, Ownership, Delivery, Growth) with deltas."},{"id":"M1.1.S2.3","name":"Strengths & focus areas","description":"Top strengths and lowest-scoring focus areas."},{"id":"M1.1.S2.4","name":"Score trend","description":"Overall score across periods."}],"items":[{"id":"US-M1.1.S2-01","type":"story","title":"View my monthly scorecard summary","story":"As a Member, I want my monthly evaluation summary — overall score, verdict and pillar breakdown with deltas — so that I understand how I'm doing at a glance.","acceptance_criteria":["Given I am a Member, when I open the dashboard, then I see my overall score, verdict and each weighted pillar scored with a delta vs the previous period.","Given I switch the period selector, when changed, then the summary reloads for that period.","Given no evaluation exists for the selected period, when it loads, then an empty state explains my TL runs the scorecard at period end."],"story_points":5,"roles":["Member"],"notes":"Visible to the member, their TL/PM and HR only.","dependencies":["EN-M1.1-01","EN-M1.5-01"],"status":"not-started"},{"id":"US-M1.1.S2-02","type":"story","title":"View my strengths, focus areas and score trend","story":"As a Member, I want to see my top strengths, focus areas and score trend across periods so that I know what to improve.","acceptance_criteria":["Given I have a scorecard, when the summary renders, then my top strengths and lowest focus areas are listed with values and deltas.","Given I have more than one period scored, when the summary renders, then a score-trend sparkline across periods is shown.","Given only one period exists, when the summary renders, then the trend is omitted gracefully."],"story_points":3,"roles":["Member"],"dependencies":["EN-M1.1-01","US-M1.1.S2-01","EN-M1.5-01"],"status":"not-started"}]}]},{"id":"M1.2","name":"Employees","description":"Employee Hub & Directory: role-scoped roster, employee profiles (with RBAC field masking), self/admin profile edits, onboarding and Excel import. Owns the employee record (incl. skills, tech, lifecycle dates) the rest of People reads.","status":"in-progress","screens":[{"id":"M1.2.S1","name":"Employee Directory","description":"Role-scoped roster of people as a table or cards, with status/account filters and search. Full roster for HR/PMO/BOD; scoped for AM, EM/TL/PM and Member.","roles":["BOD","PMO","HR","AM","EM/TL/PM","Member"],"mockup_ref":{"screen":"people/employees"},"sub_screens":[{"id":"M1.2.S1.1","name":"Roster table","description":"Tabular list: name, account, email, manager, status, onboarding/offboarding dates, phone, gender, techstack."},{"id":"M1.2.S1.2","name":"Roster cards","description":"Card layout of the same people."},{"id":"M1.2.S1.3","name":"Toolbar","description":"Table/card toggle, status filter, account filter, scoped-view badge, people count."},{"id":"M1.2.S1.4","name":"Global search","description":"Search by name, role, account, email or techstack."}],"items":[{"id":"EN-M1.2-01","type":"enabler","title":"Employee record data model & RBAC scoping","story":"Provide the employee record (identity, contact, engagement, lifecycle dates, grade, skills, techstack, documents) plus the role-based visibility, sensitive-field masking and field-level edit rights that every People screen relies on.","acceptance_criteria":["Given any employee query, when executed, then it returns only the records the caller's role is permitted to see (HR/PMO/BOD = all; AM = own accounts; EM/TL/PM = own projects + self; Member = self).","Given a record is returned, when serialized, then sensitive fields (salary, bank, tax, dob) are masked unless the caller is HR Admin or the record owner.","Given a field write, when attempted, then it is permitted only if the field is self-editable by the owner or the caller is an admin (admin-only: manager, account, project, grade, salary, bank, tax)."],"story_points":5,"roles":["BOD","PMO","HR","AM","EM/TL/PM","Member"],"notes":"Owns the canonical employee record incl. skills/techstack the dashboard aggregates. Field-level rules per MoM 1.3/1.4; enforced as a data-access rule on every path, not just hidden in the UI.","dependencies":[],"external_deps":[{"needs":"account / client master data (id, name, industry, owning AM)","likely_module":"M0","reason":"the account each employee belongs to is reference data with no management screen in the mockup; owned by Admin/org-configuration (out of scope)."}],"status":"not-started"},{"id":"EN-M1.2-02","type":"enabler","title":"MS365 / Teams account provisioning integration","story":"Provide the integration that requests provisioning of a Microsoft 365 / Teams user when a member is onboarded or their engagement changes.","acceptance_criteria":["Given a member is created via onboarding, when saved, then a provisioning request for an MS365/Teams user is sent.","Given provisioning is requested, when it is sent, then the outcome is reflected back on the member's record/notifications."],"story_points":3,"roles":["HR","BOD"],"notes":"Triggered on onboarding (MoM 2.2). In the prototype the request is simulated; in production it provisions a real Microsoft 365 / Teams account.","dependencies":[],"status":"not-started"},{"id":"EN-M1.2-03","type":"enabler","title":"Effective-dated employee history model (pay, capacity, assignment)","story":"Provide an effective-dated history model so that every change to a person's pay, capacity (full-time/part-time) and assignment (position, org unit, grade, reporting line) is stored as an append-only dated record with a reason and an effective date, never a silent overwrite.","acceptance_criteria":["Given any pay, capacity or assignment change, when it is saved, then a new dated record is appended with its reason and effective date, and the prior record is preserved (no overwrite).","Given a person's record, when queried as of any past date, then the pay, capacity, grade and position in effect on that date are returned.","Given a change is future-dated, when saved, then it shows as a scheduled future state and takes effect on its effective date, applied exactly once."],"story_points":5,"roles":["HR","BOD","PMO"],"notes":"Backbone for F-WORK-4 (pay), F-WORK-8 (capacity) and F-WORK-11 (effective-dated assignment). Distinct from the field-level audit log (US-M1.2.S2-05): the audit log records who-changed-what; this records the value in effect over time. The Movement workflow (M1.9, to be added) applies an approved move by writing to this model.","dependencies":["EN-M1.2-01"],"status":"not-started"},{"id":"US-M1.2.S1-01","type":"story","title":"Browse the full employee roster","story":"As an Admin/BOD, PMO or HR, I want to browse the full employee roster as a table or cards with status and account filters so that I can find and review any employee.","acceptance_criteria":["Given I have full access, when I open Employees, then I see all employees with name, account, email, direct manager, status, onboarding/offboarding dates, phone, gender and techstack, plus a people count.","Given I switch between table and card layout, when toggled, then the same filtered people are shown in the chosen layout.","Given I change the status or account filter, when applied, then the roster and count update to match.","Given no employee matches the filters, when applied, then a 'no matching people' empty state is shown."],"story_points":3,"roles":["BOD","PMO","HR"],"dependencies":["EN-M1.2-01"],"status":"not-started","assignee":"Hieu Nguyen"},{"id":"US-M1.2.S1-02","type":"story","title":"Search the employee directory","story":"As an Admin/BOD, PMO or HR, I want to search the directory by name, role, account, email or techstack so that I can locate a person quickly.","acceptance_criteria":["Given I type a query, when it matches a person's name, role, account, email or techstack, then the roster filters to matching people.","Given my query matches nobody, when applied, then an empty state is shown.","Given a search is active, when combined with status/account filters, then both narrow the results together."],"story_points":2,"roles":["BOD","PMO","HR"],"dependencies":["EN-M1.2-01"],"status":"not-started"},{"id":"US-M1.2.S1-03","type":"story","title":"View the directory scoped to my accounts (AM)","story":"As an Account Manager, I want the directory scoped to people in the accounts I manage so that I only see my own people.","acceptance_criteria":["Given I am an AM, when I open Employees, then only people in my assigned (and granted) accounts are listed and a 'scoped view' indicator is shown.","Given I search or filter, when applied, then results stay within my account scope."],"story_points":2,"roles":["AM"],"dependencies":["EN-M1.2-01"],"status":"not-started"},{"id":"US-M1.2.S1-04","type":"story","title":"View the directory scoped to my team (EM/TL)","story":"As an EM/Team Lead, I want the directory scoped to members of the projects I run so that I only see my team.","acceptance_criteria":["Given I am an EM/TL, when I open Employees, then only members of my projects (and myself) are listed with a 'scoped view' indicator.","Given I search or filter, when applied, then results stay within my project scope."],"story_points":2,"roles":["EM/TL/PM"],"dependencies":["EN-M1.2-01"],"status":"not-started"},{"id":"US-M1.2.S1-05","type":"story","title":"Browse the employee directory (Member)","story":"As a Member, I want to browse the employee directory so that I can find colleagues across the organization.","acceptance_criteria":["Given I am a Member, when I open Employees, then the directory list screen is accessible to me and I can see employees in the roster.","Given I am a Member, when I select a person, then opening their full profile detail is restricted for now (see US-M1.2.S2-01).","Given no employee matches my search/filters, when applied, then a 'no matching people' empty state is shown."],"story_points":2,"roles":["Member"],"notes":"Decision 2026-06-26: all Members can access the directory list screen (previously scoped to own record only). Profile detail is temporarily hidden for Members — see US-M1.2.S2-01.","dependencies":["EN-M1.2-01"],"status":"not-started"}]},{"id":"M1.2.S2","name":"Employee Profile","description":"Full employee profile drawer: overview (contact, engagement, lifecycle, compensation), documents vault, skills, scorecard and field-level history.","roles":["BOD","PMO","HR","AM","EM/TL/PM","Member"],"mockup_ref":{"screen":"people/employees"},"sub_screens":[{"id":"M1.2.S2.1","name":"Overview tab","description":"Contact, engagement (account/project/manager/type), lifecycle dates, grade."},{"id":"M1.2.S2.2","name":"Compensation & banking","description":"Salary, bank account, tax ID — masked unless HR Admin or the record owner."},{"id":"M1.2.S2.3","name":"Documents tab","description":"Access-controlled document vault with expiry warnings."},{"id":"M1.2.S2.4","name":"Skills tab","description":"Skills with proficiency level and endorsement counts."},{"id":"M1.2.S2.5","name":"History tab","description":"Immutable field-level audit timeline with before/after."}],"items":[{"id":"US-M1.2.S2-01","type":"story","title":"View an employee profile overview","story":"As an authorized viewer, I want to open an employee's profile overview so that I can see their contact, engagement and lifecycle details in one place.","acceptance_criteria":["Given I click an employee in the directory, when the profile opens, then I see contact (email, phone, location, gender), engagement (account, project, direct manager, employment type), lifecycle (onboarding/offboarding dates, grade, date of birth) and status.","Given I open a profile I am not permitted to see in full, when it renders, then restricted fields are not exposed.","Given I close the profile, when dismissed, then I return to the directory unchanged."],"story_points":3,"roles":["BOD","PMO","HR","AM","EM/TL/PM"],"notes":"Date of birth is masked unless viewer is HR Admin or the record owner. Decision 2026-06-26: profile detail is temporarily hidden for Members — Members can browse the directory list (US-M1.2.S1-05) but cannot open the profile detail for now.","dependencies":["EN-M1.2-01","EN-M1.5-01"],"status":"not-started"},{"id":"US-M1.2.S2-02","type":"story","title":"Mask sensitive compensation and banking fields by RBAC","story":"As an Admin/BOD or HR, I want salary, bank and tax fields shown only to permitted viewers so that sensitive PII is protected.","acceptance_criteria":["Given I am HR Admin or the record owner, when I view a profile, then salary, bank account and tax ID are shown.","Given I am any other role, when I view a profile, then those fields are masked as 'Restricted' with an indicator of why.","Given an unauthorized role accesses the record by any path, when the data is returned, then sensitive values are never exposed — masking is a data-access rule, not only a display choice."],"story_points":2,"roles":["BOD","HR"],"notes":"Sensitive fields: salary, bank, tax. Visible only to HR Admin or the record owner; enforced as a data-access rule on every path, not just hidden in the UI.","dependencies":["EN-M1.2-01"],"status":"not-started"},{"id":"US-M1.2.S2-03","type":"story","title":"View an employee's documents vault","story":"As an Admin/BOD, PMO or HR, I want to see an employee's documents with expiry status so that I can spot documents that need renewal.","acceptance_criteria":["Given a profile has documents, when I open the Documents tab, then each document shows its type, upload age and validity/expiry.","Given a document expires within the warning window, when listed, then it is visually flagged (e.g. expiring soon).","Given a profile has no documents, when I open the tab, then an empty state is shown."],"story_points":3,"roles":["BOD","PMO","HR"],"notes":"Uploading a new version archives the previous one; nothing is permanently deleted until the retention policy applies.","dependencies":["EN-M1.2-01"],"status":"not-started"},{"id":"US-M1.2.S2-04","type":"story","title":"View an employee's skills and endorsements","story":"As an authorized viewer, I want to see an employee's skills with proficiency level and endorsements so that I understand their capabilities.","acceptance_criteria":["Given a profile has skills, when I open the Skills tab, then each skill shows its category, proficiency level (Beginner→Expert) and endorsement count.","Given a profile has no skills recorded, when I open the tab, then an empty state is shown."],"story_points":2,"roles":["BOD","PMO","HR","AM","EM/TL/PM","Member"],"dependencies":["EN-M1.2-01"],"status":"not-started"},{"id":"US-M1.2.S2-05","type":"story","title":"View an employee's field-level change history","story":"As an Admin/BOD, PMO or HR, I want an immutable history of changes to an employee's record so that I can audit who changed what and when.","acceptance_criteria":["Given a profile has changes, when I open the History tab, then each entry shows actor, UTC timestamp, the field changed and its before/after values.","Given a record has no changes, when I open the tab, then an empty state is shown.","Given any field write occurs, when it is saved, then a new immutable history entry is recorded (no edits or deletes)."],"story_points":3,"roles":["BOD","PMO","HR"],"dependencies":["EN-M1.2-01"],"status":"not-started"},{"id":"US-M1.2.S2-06","type":"story","title":"Manage an employee's skills from the catalog","story":"As HR/Admin (and the person for their own profile), I want to add and update an employee's skills from the predefined catalog so that the skills picture stays accurate and trustworthy.","acceptance_criteria":["Given I edit the Skills tab, when I add a skill, then I can only pick from the predefined skills catalog (skills are never free-typed) and set a proficiency level from 0 to 5 with optional years of experience.","Given a skill is backed by a certification with an expiry, when that certification lapses, then the skill is flagged so the skills picture stays trustworthy.","Given the person's position carries a required-skills baseline (role × level), when the Skills tab renders, then their skills are measured against that baseline and any gap is shown.","Given a skill not in the catalog is requested, when adding, then it cannot be added."],"story_points":5,"roles":["HR","BOD","Member"],"notes":"F-WORK-6. Whether a level is self-declared or manager-confirmed is OQ-8. The required-skills baseline is defined on the position (US-M1.3.S4-03); certifications live in the document vault (US-M1.2.S2-07). Proficiency 0-5 is the canonical scale; the view tab's Beginner→Expert labels map onto it.","dependencies":["EN-M1.2-01","US-M1.3.S4-03"],"status":"not-started"},{"id":"US-M1.2.S2-07","type":"story","title":"Manage required documents and expiry","story":"As HR/Admin (and the person for their own documents), I want to upload, replace and track required documents so that every employee's document set stays complete and current.","acceptance_criteria":["Given I open the Documents tab, when I upload or replace a document, then the latest version is kept with its previous versions retained in history (nothing is hard-deleted before the retention policy).","Given the system knows which document types are required (overall and by employment type), when an employee is missing a required document, then they are flagged as missing.","Given a document (or a skill's backing certification) is nearing its expiry, when the warning window is reached, then a reminder is raised to HR and the document's owner."],"story_points":5,"roles":["HR","BOD","Member"],"notes":"F-DOC-1 (vault, versioned) and F-DOC-2 (required types, missing flag, expiry reminders). Extends the view-only US-M1.2.S2-03; certification expiry ties to skills (US-M1.2.S2-06).","dependencies":["EN-M1.2-01"],"status":"not-started"}]},{"id":"M1.2.S3","name":"Edit Profile","description":"Edit an employee record: members self-edit personal details; admins edit engagement/grade fields. Engagement changes trigger Org Chart and MS365 sync; every write is audited.","roles":["BOD","PMO","HR","Member"],"mockup_ref":{"screen":"people/employees"},"sub_screens":[{"id":"M1.2.S3.1","name":"Personal details (self-editable)","description":"Work email, phone, location, date of birth."},{"id":"M1.2.S3.2","name":"Engagement & grade (admin-only)","description":"Direct manager, account, project, job grade — locked to Admin."}],"items":[{"id":"US-M1.2.S3-01","type":"story","title":"Edit my own personal details","story":"As a Member, I want to edit my own personal details (email, phone, location, date of birth) so that my record stays current.","acceptance_criteria":["Given I open Edit profile on my own record, when I change a personal field and save, then the change is persisted and recorded in my field-level history.","Given I open my own record, when the form renders, then engagement and grade fields are shown as locked (admin-only).","Given I make no changes, when I save, then I am told there is nothing to save."],"story_points":3,"roles":["Member"],"notes":"Self-editable fields: email, phone, location, date of birth (MoM 1.3).","dependencies":["EN-M1.2-01"],"status":"not-started"},{"id":"US-M1.2.S3-02","type":"story","title":"Edit an employee's engagement and grade","story":"As an Admin/BOD, PMO or HR, I want to edit an employee's direct manager, account, project and grade so that org and staffing records stay correct.","acceptance_criteria":["Given I am an admin, when I change manager/account/project/grade and save, then the changes persist and each is written to the field-level audit log with before/after.","Given I change the direct manager, account or project, when saved, then the Org Chart and MS365 sync are triggered.","Given I am not an admin, when I open the edit form, then these fields are locked and cannot be saved."],"story_points":5,"roles":["BOD","PMO","HR"],"notes":"Admin-only fields (MoM 1.4): manager, account, project, grade, salary, bank, tax.","dependencies":["EN-M1.2-01","EN-M1.2-02"],"status":"not-started"},{"id":"US-M1.2.S3-03","type":"story","title":"Record a pay or capacity change as dated history","story":"As HR/Strategic, I want to change an employee's pay or capacity (full-time/part-time) so that the change is stored as a new dated record rather than overwriting the previous value.","acceptance_criteria":["Given I am a Strategic user, when I change pay or capacity and save, then a new dated record is added with its effective date and the prior value is preserved; a past period still reads at the value in effect then.","Given I set a future effective date, when saved, then the change is scheduled and takes effect on that date.","Given I am not a Strategic user, when I open the form, then pay and capacity are not editable."],"story_points":3,"roles":["HR","BOD","PMO"],"notes":"F-WORK-4 (pay) and F-WORK-8 (capacity); a straight pay/capacity edit. Promotions and transfers run through the Movement workflow (M1.9). Writes to the dated-history model EN-M1.2-03.","dependencies":["EN-M1.2-01","EN-M1.2-03"],"status":"not-started"}]},{"id":"M1.2.S4","name":"Onboard New Member","description":"HR creates a new member account with essentials and a CV, provisions MS365/Teams, sends an invite, and (once a manager is set) updates the Org Chart.","roles":["BOD","PMO","HR"],"mockup_ref":{"screen":"people/employees"},"sub_screens":[{"id":"M1.2.S4.1","name":"Onboarding form","description":"Name, email, role, department, grade, employment type; admin-only account/project/manager."},{"id":"M1.2.S4.2","name":"CV upload","description":"Upload CV (PDF/DOCX) to the document vault."}],"items":[{"id":"US-M1.2.S4-01","type":"story","title":"Onboard a new member and send an invite","story":"As HR, I want to create a new member account with their essentials and engagement so that they can be invited and start onboarding.","acceptance_criteria":["Given I open the onboarding form, when I enter at least a full name and save, then a new employee is created with status 'onboarding', a generated id and an invite is sent.","Given I do not supply a work email, when I save, then a work email is generated for the new member, and any work email must be unique across the organization.","Given I omit the full name, when I save, then I am warned it is required and nothing is created.","Given I set account, project and direct manager (admin-only fields), when I save, then they are stored on the new record and MS365/Teams provisioning is requested.","Given the new account is created, when saved, then the action is written to the audit log."],"story_points":5,"roles":["HR","BOD","PMO"],"notes":"Member self-completes remaining personal details on first login (MoM 1.3). Account/project/manager are admin-only. This is the manual add-member flow only — distinct from create-from-candidate (US-M1.2.S4-03) and bulk import (US-M1.2.S5-01).","dependencies":["EN-M1.2-01","EN-M1.2-02"],"status":"not-started"},{"id":"US-M1.2.S4-02","type":"story","title":"Attach and parse a CV during onboarding","story":"As HR, I want to upload a new member's CV during onboarding and have its basic details parsed to pre-fill the form so that the CV is stored in their vault and I don't re-type what it already contains.","acceptance_criteria":["Given I am onboarding a member, when I upload a CV (PDF/DOCX), then it is attached to the new record's document vault.","Given I upload a CV, when it is parsed, then basic details (e.g. name, contact, role) are extracted and pre-filled into the onboarding form for me to review and correct before saving.","Given parsing cannot read a field, when the form renders, then that field is left blank for me to fill in and onboarding still proceeds.","Given I save without a CV, when the account is created, then onboarding still succeeds and the CV can be added later."],"story_points":5,"roles":["HR"],"notes":"Keep CV parsing simple (reference: EMS) — a best-effort prefill that HR reviews and corrects, not authoritative extraction.","dependencies":["US-M1.2.S4-01"],"status":"not-started"},{"id":"US-M1.2.S4-03","type":"story","title":"Create an employee from a hired candidate","story":"As HR, I want a hired candidate to become an employee record without re-typing what Hiring already captured so that the hire-to-employee handoff is clean.","acceptance_criteria":["Given Hiring marks a candidate as hired, when the handoff runs, then a new employee record is created from the candidate's captured details (name, contact, role) and linked to the open position the hire was made against, starting at Preboarding/Onboarding.","Given the new record is created, when HR opens it, then HR can review and complete it before the person starts.","Given a candidate was not actually hired, when Hiring closes them, then no employee record is created."],"story_points":3,"roles":["HR"],"notes":"F-WORK-9. The same human is one identity seen three ways (candidate/employee/resource) — linked by id, never copied. Targeted for Sprint 2, after Hiring (M2) stabilizes.","dependencies":["EN-M1.2-01"],"external_deps":[{"needs":"a hired-candidate handoff (the candidate's captured details and the open position the hire was made against)","likely_module":"M2","reason":"the candidate, interview and hire decision are owned by Hiring (M2); People receives the hired candidate and turns them into an employee."}],"status":"not-started"},{"id":"US-M1.2.S4-04","type":"story","title":"Re-hire a former employee as a new employment period","story":"As HR, I want to re-hire an alumnus as a new employment period on their existing person so that their prior history is preserved and no duplicate record is created.","acceptance_criteria":["Given a returning person is matched to an existing record (by identity, work email, or name + date of birth), when confirmed at hire, then a new employment period is added to the same person and prior history is kept intact.","Given the re-hire is applied, when the record is created, then the original hire date is preserved and a new start date is set.","Given a returning candidate is genuinely a new person, when no match is confirmed, then a new record is created instead."],"story_points":3,"roles":["HR"],"notes":"F-WORK-10. Whether prior service bridges toward seniority/tenure is a policy choice (OQ-12); the original hire date is always preserved, the seniority date defaults to the new start unless bridged.","dependencies":["EN-M1.2-01"],"external_deps":[{"needs":"a returning candidate routed through Hiring with the match to an existing person confirmed at hire","likely_module":"M2","reason":"a re-hire comes back through Hiring's selection as a candidate; People resolves it to the same existing person."}],"status":"not-started"}]},{"id":"M1.2.S5","name":"Import Employees","description":"Bulk-load existing/pre-go-live staff from the standard Excel template, with required-column validation and a preview before import.","roles":["BOD","PMO","HR"],"mockup_ref":{"screen":"people/employees"},"sub_screens":[{"id":"M1.2.S5.1","name":"Import dialog","description":"Required-column list, file upload, validation preview and import action."}],"items":[{"id":"US-M1.2.S5-01","type":"story","title":"Bulk-import employees from an Excel template","story":"As HR, I want to import existing employees from the standard Excel template so that I can load pre-go-live staff in bulk.","acceptance_criteria":["Given I open the import dialog, when it renders, then I can download the standard import template so that I fill in the org-provided format before uploading.","Given I open the import dialog, when it renders, then the required columns are listed and I can upload a filled .xlsx/.csv file.","Given I upload a file, when it is parsed, then a preview shows the count of valid rows and any rows skipped for a missing required column.","Given valid rows exist, when I confirm import, then those employees are created, the count is reported, and the import is written to the audit log.","Given imported rows have account/project/manager, when imported, then those remain admin-controlled and editable only by admins afterward."],"story_points":5,"roles":["HR","BOD","PMO"],"notes":"Required columns: Employee ID, Full name, Email, Role, Department, Grade, Account, Project, Direct manager, Join date (MoM 1.2). The import template is org-provided and downloadable from the dialog (download-template button).","dependencies":["EN-M1.2-01"],"status":"not-started"}]}]},{"id":"M1.3","name":"Org Chart","description":"Organizational Dynamics: the reporting hierarchy rendered at three levels via a tab/segmented control — Company, Account and Project — all derived live from the employee record, with drill-down, zoom/pan and role scoping.","status":"in-progress","screens":[{"id":"M1.3.S1","name":"Company Org Chart","description":"Top-level structure: Board/CEO down the spine to Operation (internal functions) and Delivery (AMs → accounts), with PMO branching off as governance.","roles":["BOD","PMO","AM","EM/TL/PM","Member"],"mockup_ref":{"screen":"people/org"},"sub_screens":[{"id":"M1.3.S1.1","name":"Company tree","description":"CEO → Operation functions + Delivery accounts; PMO governance aside."},{"id":"M1.3.S1.2","name":"Chart viewport","description":"Zoom in/out/fit and drag-to-pan controls shared by all three levels."}],"items":[{"id":"US-M1.3.S1-01","type":"story","title":"View the company org chart","story":"As an Admin/BOD or PMO, I want to see the whole-company structure in one chart so that I understand how governance, operations and delivery are organized.","acceptance_criteria":["Given I open the Org Chart at Company level, when it renders, then the Board/CEO sits at the top with Operation (internal functions) and Delivery (Account Managers and their accounts) below, and PMO shown as a governance branch off the spine.","Given the hierarchy and reporting line derive from positions (not a hand-typed manager field), when a person's seat, department or reporting line changes, then the chart reflects it without manual editing.","Given a branch has no people, when the chart renders, then that node is still shown with an empty/zero indicator rather than breaking the layout."],"story_points":5,"roles":["BOD","PMO"],"dependencies":["EN-M1.2-01","EN-M1.3-01"],"status":"not-started"},{"id":"US-M1.3.S1-02","type":"story","title":"Navigate the org chart (zoom, fit, pan)","story":"As any viewer, I want to zoom, fit and drag to pan the org chart so that I can read large structures comfortably.","acceptance_criteria":["Given a chart is shown, when I zoom in or out or click Fit, then the chart scales within sensible bounds and the zoom percentage updates.","Given the chart is wider than the viewport, when I drag horizontally on empty space, then it pans without selecting a node.","Given I switch levels or re-render, when the view reloads, then my position does not jump unexpectedly."],"story_points":2,"roles":["BOD","PMO","AM","EM/TL/PM","Member"],"dependencies":[],"status":"not-started"},{"id":"US-M1.3.S1-03","type":"story","title":"View the org chart scoped to my access","story":"As an AM, EM/TL or Member, I want the org chart limited to the accounts/projects I can see so that I only browse my part of the organization.","acceptance_criteria":["Given I am an AM, when I open the org chart, then only my assigned (and granted) accounts and their projects are shown.","Given I am an EM/TL or Member, when I open the org chart, then only my account/project context is shown.","Given nothing is in my scope, when the chart renders, then an empty state explains there is nothing to show."],"story_points":2,"roles":["AM","EM/TL/PM","Member"],"dependencies":["EN-M1.2-01"],"status":"not-started"}]},{"id":"M1.3.S2","name":"Account Org Chart","description":"Account-level view: the chosen account's AM → projects → allocated members, with an account picker and drill-down.","roles":["BOD","PMO","AM"],"mockup_ref":{"screen":"people/org"},"sub_screens":[{"id":"M1.3.S2.1","name":"Account picker","description":"Select which account to chart."},{"id":"M1.3.S2.2","name":"Account tree","description":"AM → projects → members for the selected account."}],"items":[{"id":"US-M1.3.S2-01","type":"story","title":"View an account's org chart","story":"As an Admin/BOD, PMO or AM, I want to chart a single account's AM, projects and members so that I can see how that account is staffed.","acceptance_criteria":["Given I pick an account, when the chart renders, then it shows the account's AM, each project under it, and the members allocated to each project.","Given an account has a project with no allocated members, when it renders, then that project node shows an empty member state.","Given no account is in my scope, when I open the level, then an empty state is shown."],"story_points":3,"roles":["BOD","PMO","AM"],"dependencies":["EN-M1.2-01","EN-M1.4-01"],"status":"not-started"},{"id":"US-M1.3.S2-02","type":"story","title":"Drill from a chart into an account or project","story":"As any viewer, I want to click an account or project node to open its detailed chart so that I can navigate the hierarchy by clicking.","acceptance_criteria":["Given I am on the Company chart, when I click an account node, then the Account chart opens focused on that account.","Given I am on the Account chart, when I click a project node, then the Project chart opens focused on that project.","Given I drilled in, when I switch the level control or pick another item, then the chart updates to the new selection."],"story_points":2,"roles":["BOD","PMO","AM","EM/TL/PM","Member"],"dependencies":["US-M1.3.S1-01","US-M1.3.S2-01"],"status":"not-started"}]},{"id":"M1.3.S3","name":"Project Org Chart","description":"Project-level view: the chosen project and its allocated members, with a project picker. Members link to their employee profile.","roles":["BOD","PMO","AM","EM/TL/PM"],"mockup_ref":{"screen":"people/org"},"sub_screens":[{"id":"M1.3.S3.1","name":"Project picker","description":"Select which project to chart."},{"id":"M1.3.S3.2","name":"Project tree","description":"Project box with allocated members beneath it."}],"items":[{"id":"US-M1.3.S3-01","type":"story","title":"View a project's org chart","story":"As an Admin/BOD, PMO, AM or EM/TL, I want to chart a single project and its allocated members so that I can see the team on that project.","acceptance_criteria":["Given I pick a project, when the chart renders, then it shows the project and the members allocated to it (with the engagement manager highlighted).","Given the project has no allocated members, when it renders, then a 'No members allocated' empty state is shown.","Given no project is in my scope, when I open the level, then an empty state is shown."],"story_points":3,"roles":["BOD","PMO","AM","EM/TL/PM"],"dependencies":["EN-M1.2-01","EN-M1.4-01"],"status":"not-started"},{"id":"US-M1.3.S3-02","type":"story","title":"Open a person's profile from the chart","story":"As an authorized viewer, I want to click a person in any org chart to open their employee profile so that I can see their details without leaving the chart context.","acceptance_criteria":["Given a chart shows a person who is a known employee, when I click their node, then their employee profile opens.","Given a node is a placeholder (not a linked employee), when I click it, then nothing opens and no error occurs."],"story_points":1,"roles":["BOD","PMO","AM","EM/TL/PM"],"dependencies":["US-M1.2.S2-01"],"status":"not-started"}]},{"id":"M1.3.S4","name":"Org Structure & Positions","description":"Manage the structure behind the chart: build nested org units, define positions (a seat = role + grade, open or filled, one holder), assign/vacate seats, and set each position's required-skills baseline. Beyond the current mockup (the mockup ships the chart view only).","roles":["BOD","PMO","HR"],"sub_screens":[{"id":"M1.3.S4.1","name":"Org unit tree editor","description":"Create and nest org units (teams/departments) into the company hierarchy."},{"id":"M1.3.S4.2","name":"Position editor","description":"Define a position (role + grade) in a unit; open or filled; held by at most one person."},{"id":"M1.3.S4.3","name":"Required-skills baseline","description":"Set the role × level skills a position requires, to measure a holder against the seat."}],"items":[{"id":"EN-M1.3-01","type":"enabler","title":"Org-unit & position model (seats: role + grade, open/filled, one holder)","story":"Provide the org-unit and position model so that the organization is built as nested units containing positions — each a seat bound to a role and grade, open or filled, held by at most one person — and the reporting line is derived from positions, not a hand-typed manager field.","acceptance_criteria":["Given the org model, when a position is defined, then it is bound to a role and grade inside an org unit and is either open or filled.","Given a position, when a holder is assigned, then it can hold at most one person at a time; a second holder cannot be assigned while it is filled.","Given positions and their org units, when the reporting line is computed, then it is derived from positions (not a typed manager field), so moving a person re-binds a seat rather than rewriting their identity."],"story_points":5,"roles":["BOD","PMO","HR"],"notes":"F-ORG-1 + F-ORG-3 (reporting derivation). An open or vacated budgeted position is the unit of demand that feeds Project Management's backfill pipeline (one demand pipeline, F-HEAD-1) — to be wired when Headcount planning is added. Underpins the org chart (M1.3.S1-S3) and Headcount planning.","dependencies":["EN-M1.2-01"],"status":"not-started"},{"id":"US-M1.3.S4-01","type":"story","title":"Build and edit org units and positions","story":"As a Strategic user, I want to build the organization as nested units and define positions within them so that the structure and its seats are the source of truth the chart and headcount read.","acceptance_criteria":["Given I am a Strategic user, when I create or edit org units, then I can nest them into the company hierarchy (teams within departments).","Given an org unit, when I define a position in it, then I set its role and grade and it starts open.","Given I am not a Strategic user, when I open org-structure management, then I can view but not create or edit units or positions."],"story_points":5,"roles":["BOD","PMO","HR"],"notes":"F-ORG-1.","dependencies":["EN-M1.3-01"],"status":"not-started"},{"id":"US-M1.3.S4-02","type":"story","title":"Assign or vacate a position","story":"As a Strategic user, I want to place a person into a position or vacate it so that seats stay accurate as people are hired, moved or leave.","acceptance_criteria":["Given an open position, when I assign a person to it, then it is marked filled and the person's reporting line follows from the seat.","Given a filled position, when I vacate it (on a move or exit), then it is marked open again and available to fill.","Given a filled position, when I try to assign a second person, then it is refused — a position holds at most one person."],"story_points":3,"roles":["BOD","PMO","HR"],"notes":"F-ORG-2. Vacating a budgeted seat reopens it as demand for the PM backfill pipeline.","dependencies":["EN-M1.3-01"],"status":"not-started"},{"id":"US-M1.3.S4-03","type":"story","title":"Set a position's required-skills baseline","story":"As a Strategic user, I want to set a position's required skills (role × level) so that a holder's skills can be measured against what the seat needs.","acceptance_criteria":["Given a position, when I set its required-skills baseline, then I pick skills from the predefined catalog each with a required level.","Given a position has a baseline and a holder, when their profile is viewed, then their skills are measured against the baseline and any gap is shown (feeding the skills picture and the requisition a gap raises).","Given a position has no baseline, when a holder's skills are viewed, then no gap is computed and an empty baseline state is shown."],"story_points":3,"roles":["BOD","PMO","HR"],"notes":"F-WORK-6 (position required-skills baseline). Consumed by US-M1.2.S2-06 (measure a person's skills vs the seat) and feeds F-ANALYTICS-2 and the requisition skills a gap raises.","dependencies":["EN-M1.3-01"],"status":"not-started"}]}]},{"id":"M1.4","name":"Resource Allocation","description":"Group Resource Allocation reporting: the monthly staffing grid (planned %) and per-person utilization across the portfolio, showing over-allocation and bench. Read-only in People — allocations are created, edited and aggregated in PM RA Monitoring (M3.4); this sub-module is the People-side read that the allocation report, dashboard and org chart consume.","status":"in-progress","screens":[{"id":"M1.4.S1","name":"Resource Allocation","description":"Portfolio staffing report: effort-by-account summary, allocation KPIs, the 12-month allocation grid, and per-person utilization — role-scoped and exportable.","roles":["BOD","PMO","AM","EM/TL/PM","Member"],"mockup_ref":{"screen":"people/allocation"},"sub_screens":[{"id":"M1.4.S1.1","name":"Effort by account","description":"Man-month split across accounts (donut + legend)."},{"id":"M1.4.S1.2","name":"Allocation KPIs","description":"Average utilization (target ≥85%), total over-allocated, total members/projects."},{"id":"M1.4.S1.3","name":"Monthly allocation grid","description":"Per-person 12-month planned-% matrix, colour-coded, over-100% flagged, with YTD/FY/Total MM."},{"id":"M1.4.S1.4","name":"Utilization by person","description":"Per-person project-split bars, total %, planned-vs-actual variance, idle."}],"items":[{"id":"EN-M1.4-01","type":"enabler","title":"People-side allocation read & utilization scoping","story":"Provide the People-side read over the allocation data owned by PM RA Monitoring (EN-M3.4-01): surface per-person utilization, over-allocation and bench, and per-project membership, to the People allocation report, dashboard utilization KPIs and org chart — scoped to People RBAC. People does not create, edit or recompute allocations; it consumes them.","acceptance_criteria":["Given the allocation source (EN-M3.4-01), when People reads it, then per-person monthly load, utilization, over-allocation flag and bench are surfaced without being recomputed in People.","Given a People viewer's RBAC scope, when allocation data is read, then only in-scope people/projects are returned (HR/PMO/BOD all; AM own accounts; EM/TL/PM own projects; Member self).","Given allocations for a project, when read, then the members allocated (and their %) are available to the org chart."],"story_points":3,"roles":["BOD","PMO","AM","EM/TL/PM","Member"],"notes":"Single source of allocation data is PM RA Monitoring (EN-M3.4-01); People is read-only. The definitions (over-allocation = >100% in any month, utilization target ≥85%, bench = no allocation) are owned there, not redefined here.","dependencies":["EN-M1.2-01","EN-M3.4-01"],"status":"not-started"},{"id":"US-M1.4.S1-01","type":"story","title":"View the monthly allocation grid","story":"As an Admin/BOD or PMO, I want a per-person month-by-month allocation grid so that I can see how everyone is staffed across the year and spot over-allocation.","acceptance_criteria":["Given the allocation report loads, when the grid renders, then each row shows an employee's ID, name, account, sub-project and their planned % for each of the 12 months, plus YTD%, FY% and total man-months.","Given a person exceeds 100% in a month, when that cell renders, then it is visually flagged as over-allocated.","Given I search by name or employee ID, when applied, then the grid filters and paginates accordingly.","Given I click a row, when selected, then that person's profile opens."],"story_points":5,"roles":["BOD","PMO"],"dependencies":["EN-M1.4-01"],"status":"not-started"},{"id":"US-M1.4.S1-02","type":"story","title":"View utilization by person","story":"As an Admin/BOD or PMO, I want each person's current utilization split by project with planned-vs-actual variance so that I can see who is over-allocated, well-utilized or idle.","acceptance_criteria":["Given the report loads, when the utilization section renders, then each person shows a project-split bar, total planned %, an over-allocation warning when >100%, the planned-vs-actual variance and any idle capacity.","Given a person has no allocation, when rendered, then they are shown as idle.","Given I search by name or ID, when applied, then the list filters and paginates, with a project colour legend shown."],"story_points":5,"roles":["BOD","PMO"],"dependencies":["EN-M1.4-01"],"status":"not-started"},{"id":"US-M1.4.S1-03","type":"story","title":"View allocation summary KPIs and effort by account","story":"As an Admin/BOD or PMO, I want headline allocation KPIs and an effort-by-account breakdown so that I can gauge portfolio utilization at a glance.","acceptance_criteria":["Given the report loads, when the summary renders, then average utilization (vs the ≥85% target), the count of over-allocated people and total members/projects are shown.","Given the report loads, when the summary renders, then an effort-by-account breakdown shows man-months per account with a total.","Given a metric has no data in scope, when it renders, then an empty state is shown."],"story_points":3,"roles":["BOD","PMO"],"dependencies":["EN-M1.4-01"],"status":"not-started"},{"id":"US-M1.4.S1-04","type":"story","title":"Export the resource allocation report","story":"As an Admin/BOD or PMO, I want to export the resource allocation report so that I can share or analyze staffing outside the app.","acceptance_criteria":["Given I am viewing the allocation report, when I export, then the current (scoped, filtered) allocation data is produced as a downloadable file.","Given a scoped view is active, when I export, then the export contains only the in-scope people."],"story_points":2,"roles":["BOD","PMO"],"dependencies":["EN-M1.4-01"],"status":"not-started"},{"id":"US-M1.4.S1-05","type":"story","title":"View allocation scoped to my accounts (AM)","story":"As an Account Manager, I want the allocation report scoped to people in my accounts so that I can manage my accounts' staffing.","acceptance_criteria":["Given I am an AM, when I open Resource Allocation, then the grid, utilization and KPIs reflect only people in my assigned (and granted) accounts.","Given I search or filter, when applied, then results stay within my account scope."],"story_points":2,"roles":["AM"],"dependencies":["EN-M1.4-01"],"status":"not-started"},{"id":"US-M1.4.S1-06","type":"story","title":"View allocation scoped to my team (EM/TL)","story":"As an EM/Team Lead, I want the allocation report scoped to my projects/team so that I can balance my team's workload.","acceptance_criteria":["Given I am an EM/TL, when I open Resource Allocation, then the grid, utilization and KPIs reflect only members of my projects.","Given a member of mine is over-allocated, when the report renders, then they are flagged so I can act."],"story_points":2,"roles":["EM/TL/PM"],"dependencies":["EN-M1.4-01"],"status":"not-started"},{"id":"US-M1.4.S1-07","type":"story","title":"View my own allocation and utilization (Member)","story":"As a Member, I want to see my own allocation and utilization so that I understand my workload and where my time is committed.","acceptance_criteria":["Given I am a Member, when I open Resource Allocation, then I see only my own allocation across projects and my utilization/idle.","Given I am over-allocated in a month, when it renders, then it is clearly indicated."],"story_points":2,"roles":["Member"],"dependencies":["EN-M1.4-01"],"status":"not-started"}]}]},{"id":"M1.5","name":"Performance","description":"Monthly two-tier performance review: members self-assess, Team Leads evaluate their members, and PMO evaluate Team Leads. Each evaluation scores a person on 18 weighted criteria across pillars (AI/Technical/Communication/Ownership/Delivery/Growth) plus a 6-dimension AMMI AI-maturity sub-model, producing a weighted total that maps to a verdict band; any criterion below 4.0 feeds an action plan. Reviews run monthly with a score trend across periods.","status":"in-progress","screens":[{"id":"M1.5.S1","name":"Performance reviews","description":"The People > Performance tab, rendering a different view per persona: member self-service, Team Lead team view, AM read-only completion, and the default PMO/BOD/HR two-tier oversight. Includes a monthly period selector and per-period score trend.","roles":["BOD","PMO","HR","AM","EM/TL/PM","Member"],"mockup_ref":{"screen":"people/performance"},"sub_screens":[{"id":"M1.5.S1.1","name":"Member self-service (persona employee)"},{"id":"M1.5.S1.2","name":"Team Lead view (persona manager)"},{"id":"M1.5.S1.3","name":"AM completion view (persona am)"},{"id":"M1.5.S1.4","name":"PMO oversight, two-tier (default BOD/PMO/HR)"}],"items":[{"id":"EN-M1.5-01","type":"enabler","title":"Scorecard model & two-tier review lifecycle","story":"Establish the monthly scorecard capability: the weighted criteria across the pillars (with CORE flags), the weighted total, the verdict bands, the per-period history/trend, the auto action library, and the two-tier self-assess -> manager-evaluate -> acknowledge lifecycle. This is the model the People Dashboard and Employee profile read for scorecard data.","acceptance_criteria":["Given a person's criterion scores, when the scorecard is computed, then a weighted total is produced and mapped to the correct verdict band (Below / Meets / Solid / Strong / Top).","Given a set of criteria, when a junior person is being scored, then CORE criteria are identifiable as mandatory and non-CORE as optional.","Given any criterion scored below 4.0, when the review is saved, then that criterion is surfaced for an action plan drawn from the fixed action library.","Given multiple monthly periods exist for a person, when their history is requested, then a score trend across periods is available.","Given a review's lifecycle, when it moves through states, then status reflects Pending -> Submitted -> Acknowledged for both review tiers."],"story_points":5,"roles":["PMO","EM/TL/PM","Member","HR","BOD"],"dependencies":["EN-M1.2-01"],"notes":"Verdict bands: total >=4.5 Top, >=4.0 Strong, >=3.5 Solid, >=3.0 Meets, else Below. A person's scorecard is visible to the member, their TL/PM and HR only. Two tiers: PMO evaluate Team Leads; Team Leads evaluate members. This model is the source the People Dashboard and Employee profile read for scorecard data.","status":"not-started"},{"id":"EN-M1.5-02","type":"enabler","title":"AMMI AI-maturity sub-model","story":"Establish the AMMI AI-maturity sub-model: the 6 weighted dimensions composited into an AMMI level (0-4) that auto-pulls into the AI pillar as a criterion score.","acceptance_criteria":["Given scores on the 6 AMMI dimensions, when composited, then a weighted composite and a discrete AMMI level (0-4) are produced.","Given a computed AMMI level, when an evaluation is scored, then the corresponding AI-pillar criterion is auto-populated from that level and is not hand-editable.","Given a dimension is left blank, when the composite is computed, then it is treated as zero contribution without breaking the level calculation."],"story_points":5,"roles":["EM/TL/PM","PMO"],"dependencies":["EN-M1.5-01"],"status":"not-started"},{"id":"US-M1.5.S1-01","type":"story","title":"Member self-service review view","story":"As a Member, I want to see my-score KPIs and my review card (overall score, per-pillar scores with self-vs-manager comparison, and strengths / improve / focus) so that I understand my monthly evaluation and what to work on.","acceptance_criteria":["Given my review for the selected period exists, when I open the Performance tab, then I see my overall score, verdict, and the per-pillar scores with my self-assessment value shown alongside the manager value.","Given the review has strengths, improve, and focus-action notes, when I view it, then all three are displayed.","Given no review exists yet for the selected period, when I open the tab, then I see an empty state explaining my lead has not submitted yet.","Given I switch the period selector, when a different month is chosen, then the KPIs and review card update to that period."],"story_points":3,"roles":["Member"],"mockup_ref":{"screen":"people/performance","persona":"employee"},"dependencies":["EN-M1.5-01"],"notes":"Visible to the member, their TL/PM and HR only.","status":"not-started"},{"id":"US-M1.5.S1-02","type":"story","title":"Acknowledge my review (Member)","story":"As a Member, I want to acknowledge my review so that my lead knows I have read and accepted the feedback.","acceptance_criteria":["Given my review is submitted and not yet acknowledged, when I click Acknowledge, then the review status becomes Acknowledged and the action is recorded.","Given I have already acknowledged, when I view the review, then I see an acknowledged confirmation and no acknowledge button.","Given no review exists yet, when I view the card, then no acknowledge action is offered."],"story_points":1,"roles":["Member"],"mockup_ref":{"screen":"people/performance","persona":"employee"},"dependencies":["US-M1.5.S1-01"],"status":"not-started"},{"id":"US-M1.5.S1-03","type":"story","title":"Self-assessment status card (Member)","story":"As a Member, I want a self-assessment card showing whether I have self-assessed this period with a start/edit entry so that I can complete it before my lead reviews me.","acceptance_criteria":["Given I have not self-assessed for the selected period, when I view the card, then it shows a not-started state and a Start self-assessment action.","Given I have submitted a self-assessment, when I view the card, then it shows my per-pillar self-ratings and notes with an Edit action.","Given I switch period, when a different month is selected, then the card reflects that period's self-assessment state."],"story_points":2,"roles":["Member"],"mockup_ref":{"screen":"people/performance","persona":"employee"},"dependencies":["EN-M1.5-01"],"status":"not-started"},{"id":"US-M1.5.S1-04","type":"story","title":"Team Lead team KPIs","story":"As an EM/TL/PM, I want team KPIs (team size, evaluated count, team average, and my own PMO review score) so that I can track my team's review progress at a glance.","acceptance_criteria":["Given I lead a team, when I open the Performance tab, then I see team size, how many members are evaluated this period, and the team average score.","Given my own PMO review exists for the period, when I view the KPIs, then my review score and verdict are shown; otherwise it shows pending/awaiting.","Given I switch period, when a different month is selected, then all team KPIs recalculate for that period."],"story_points":3,"roles":["EM/TL/PM"],"mockup_ref":{"screen":"people/performance","persona":"manager"},"dependencies":["EN-M1.5-01","EN-M1.2-01"],"status":"not-started"},{"id":"US-M1.5.S1-05","type":"story","title":"Team Lead view & acknowledge own PMO review","story":"As an EM/TL/PM, I want to view the review PMO gave me and acknowledge it so that I close the loop on my own evaluation.","acceptance_criteria":["Given PMO has submitted my review, when I view my-review card, then I see its score, verdict, strengths and improve notes, and the evaluator and period.","Given my review is not yet acknowledged, when I click Acknowledge, then its status becomes Acknowledged.","Given PMO has not reviewed me yet, when I view the card, then it shows a pending/awaiting state."],"story_points":3,"roles":["EM/TL/PM"],"mockup_ref":{"screen":"people/performance","persona":"manager"},"dependencies":["EN-M1.5-01"],"status":"not-started"},{"id":"US-M1.5.S1-06","type":"story","title":"Team roster with per-member review status","story":"As an EM/TL/PM, I want a team roster table showing each member's self-assessment status, score, verdict and review status with an Evaluate/Edit action so that I can run and track each member's monthly review.","acceptance_criteria":["Given my direct reports, when I view the roster, then each row shows whether they self-assessed, their score, verdict, and review status.","Given a member has no review yet, when I view their row, then the action reads Evaluate; given a review exists, then it reads Edit.","Given I have no direct reports in scope, when I open the view, then I see an empty state.","Given I switch period, when a different month is selected, then each member's status reflects that period."],"story_points":5,"roles":["EM/TL/PM"],"mockup_ref":{"screen":"people/performance","persona":"manager"},"dependencies":["EN-M1.5-01","EN-M1.2-01"],"status":"not-started"},{"id":"US-M1.5.S1-07","type":"story","title":"Team auto action plan","story":"As an EM/TL/PM, I want an auto action plan listing team-average criteria below 4.0 so that I can focus coaching on the team's weakest areas.","acceptance_criteria":["Given my team's evaluations for the period, when any criterion's team-average is below 4.0, then it appears in the action plan with its suggested action from the action library.","Given all team-average criteria are at or above 4.0, when I view the section, then it shows an empty/healthy state.","Given I switch period, when a different month is selected, then the action plan recomputes for that period."],"story_points":3,"roles":["EM/TL/PM"],"mockup_ref":{"screen":"people/performance","persona":"manager"},"dependencies":["EN-M1.5-01"],"notes":"Draws on the shared action library defined in the scorecard model (EN-M1.5-01); aggregates each criterion across the team to surface those averaging below the 4.0 bar.","status":"not-started"},{"id":"US-M1.5.S1-08","type":"story","title":"AM read-only review completion","story":"As an AM, I want a read-only view of review completion across the people in my accounts so that I can see whether reviews are on track without editing them.","acceptance_criteria":["Given people in my accounts, when I open the Performance tab, then I see how many of them have a completed review and the completion percentage.","Given a person's review, when I view their row, then I see score and status but no Evaluate/Edit action.","Given no people are in my accounts, when I open the view, then I see an empty state."],"story_points":2,"roles":["AM"],"mockup_ref":{"screen":"people/performance","persona":"am"},"dependencies":["EN-M1.5-01","EN-M1.2-01"],"notes":"Read-only: an AM cannot evaluate; account scoping limits visibility to people in the AM's accounts.","status":"not-started"},{"id":"US-M1.5.S1-09","type":"story","title":"PMO oversight KPIs","story":"As PMO (co-viewed by BOD and HR), I want company-wide oversight KPIs (Team Leads to review, member-review completion %, company average, and cycle) so that I can monitor the monthly review cycle company-wide.","acceptance_criteria":["Given the period, when I open the oversight view, then I see the count of Team Leads to review and how many are evaluated by PMO.","Given all member reviews, when I view the KPIs, then I see member-review completion as a fraction and percentage, plus the company average score.","Given I switch period, when a different month is selected, then all oversight KPIs recalculate."],"story_points":3,"roles":["PMO","BOD","HR"],"dependencies":["EN-M1.5-01"],"status":"not-started"},{"id":"US-M1.5.S1-10","type":"story","title":"Evaluate Team Leads table","story":"As PMO, I want an Evaluate Team Leads table showing each lead's member count, team completion, lead score and status with an Evaluate/Edit action so that I can run the upper tier of the two-tier review.","acceptance_criteria":["Given the Team Leads, when I view the table, then each row shows their member count, team-done progress, lead score, and review status.","Given a Team Lead has no review yet, when I view their row, then the action reads Evaluate; given one exists, then it reads Edit.","Given I switch period, when a different month is selected, then each lead's figures reflect that period."],"story_points":3,"roles":["PMO"],"dependencies":["EN-M1.5-01","EN-M1.2-01"],"status":"not-started"},{"id":"US-M1.5.S1-11","type":"story","title":"Member-review completion matrix by team","story":"As PMO (co-viewed by BOD and HR), I want a member-review completion matrix grouped by team so that I can see exactly which members still need evaluating.","acceptance_criteria":["Given the teams and their members, when I view the matrix, then each team shows a done/total count and a per-member indicator marking done vs pending.","Given a team has no members, when the matrix renders, then that team is omitted.","Given I switch period, when a different month is selected, then the matrix recomputes done/pending for that period."],"story_points":3,"roles":["PMO","BOD","HR"],"dependencies":["EN-M1.5-01","EN-M1.2-01"],"status":"not-started"}]},{"id":"M1.5.S2","name":"Member evaluation (modal)","description":"The scoring modal used by EM/TL/PM to evaluate members and by PMO to evaluate Team Leads: score every criterion across the pillars (1-5, step 0.5) with the previous period prefilled, score the 6 AMMI dimensions (auto-computing the AMMI level that feeds the AI pillar), see a live weighted total and verdict, capture strengths / improve / action free-text, and Save.","roles":["EM/TL/PM","PMO"],"mockup_ref":{"screen":"people/performance"},"items":[{"id":"US-M1.5.S2-01","type":"story","title":"Score across the weighted criteria with live total","story":"As an EM/TL/PM (or PMO evaluating a Team Lead), I want to score a person across the 18 weighted criteria (1-5, step 0.5) with the previous period prefilled and a live weighted total and verdict so that I can produce a calibrated monthly evaluation.","acceptance_criteria":["Given I open the evaluation, when a previous-period scorecard exists, then each criterion is prefilled from it and the previous value is shown for reference.","Given I change any criterion score, when I edit it, then the weighted total and verdict band update live.","Given I save with no criteria entered, when I confirm, then I am blocked with a prompt to enter at least the CORE criteria.","Given a valid set of scores, when I save, then the evaluation is stored for the period with its total and verdict and the roster reflects it."],"story_points":5,"roles":["EM/TL/PM","PMO"],"dependencies":["EN-M1.5-01"],"status":"not-started"},{"id":"US-M1.5.S2-02","type":"story","title":"Score the AMMI dimensions in the modal","story":"As an EM/TL/PM (or PMO), I want to score the 6 AMMI dimensions within the evaluation so that the AMMI level is auto-computed and feeds the AI pillar criterion.","acceptance_criteria":["Given I enter the 6 AMMI dimension scores, when they change, then the composite and resulting AMMI level are shown and the AI-pillar AMMI criterion is auto-filled and read-only.","Given the AMMI criterion is auto-filled, when I attempt to edit it directly, then it cannot be changed by hand.","Given AMMI scores change, when the AI-pillar criterion updates, then the live weighted total reflects the new value."],"story_points":3,"roles":["EM/TL/PM","PMO"],"dependencies":["US-M1.5.S2-01","EN-M1.5-02"],"status":"not-started"},{"id":"US-M1.5.S2-03","type":"story","title":"Junior CORE-only scoring rule","story":"As an EM/TL/PM (or PMO), I want juniors scored on CORE criteria only with EXT criteria optional so that early-career people are evaluated fairly on the essentials.","acceptance_criteria":["Given the person is a junior, when I open the evaluation, then the modal indicates CORE criteria are mandatory and EXT criteria are optional.","Given a junior with any CORE criterion left blank, when I save, then I am blocked and told which CORE criteria are missing.","Given a junior with EXT criteria blank but all CORE filled, when I save, then the evaluation is accepted."],"story_points":2,"roles":["EM/TL/PM","PMO"],"dependencies":["US-M1.5.S2-01","EN-M1.2-01"],"notes":"Junior = Intern type, or onboarding/probation status (read from the employee record). CORE criteria are flagged on the scorecard model (EN-M1.5-01).","status":"not-started"},{"id":"US-M1.5.S2-04","type":"story","title":"Narrative, evidence rule and action-plan validation on save","story":"As an EM/TL/PM (or PMO), I want to capture strengths, improve and a top action with the evidence and action-plan rules enforced so that low scores always come with justification and a remediation action.","acceptance_criteria":["Given I am scoring, when I assign a 1 or a 5 to any criterion, then I am reminded that score requires specific evidence.","Given any criterion is scored below 4.0, when I save without a top action, then I am blocked and told a top action is required.","Given all criteria are at or above 4.0, when I save, then a top action is not required.","Given strengths and improve text, when I save, then they are stored with the evaluation."],"story_points":3,"roles":["EM/TL/PM","PMO"],"dependencies":["US-M1.5.S2-01"],"status":"not-started"}]},{"id":"M1.5.S3","name":"Self-assessment (modal)","description":"The member self-assessment modal: the member rates themselves 1-5 on each pillar with notes, submitted before the lead reviews so the lead can calibrate.","roles":["Member"],"mockup_ref":{"screen":"people/performance"},"items":[{"id":"US-M1.5.S3-01","type":"story","title":"Submit pillar self-assessment","story":"As a Member, I want to rate myself 1-5 on each pillar with notes and submit it before my lead reviews me so that my lead can calibrate against my self-view.","acceptance_criteria":["Given I open my self-assessment, when a prior one exists for the period, then my previous ratings and notes are prefilled for editing.","Given I leave any pillar unrated, when I submit, then I am blocked and prompted to rate all pillars.","Given all pillars rated, when I submit, then the self-assessment is saved for the period and my self-assessment status shows Done.","Given I submitted earlier, when I reopen and change values, then re-submitting updates my self-assessment."],"story_points":3,"roles":["Member"],"mockup_ref":{"screen":"people/performance","persona":"employee"},"dependencies":["EN-M1.5-01"],"status":"not-started"}]}]},{"id":"M1.6","name":"Onboarding","description":"Tracks every new joiner through Seta's defined onboarding process — 4 phases (Receive info → Prepare → Execute → Follow-up & complete), each a set of PIC-owned steps with an SLA, plus 4 PMO audit gates. A board shows per-joiner progress (phase strip, expandable step list, overall %), KPIs, and a swimlane filter so each party acts only on its own tasks. Onboarding cases enter the lifecycle when a candidate is hired.","status":"in-progress","screens":[{"id":"M1.6.S1","name":"Onboarding board","description":"The onboarding board: a KPI strip, a swimlane (PIC) filter, and per-joiner cards each with a 4-phase progress strip and an expandable step list with state, SLA, blocker toggle and PMO audit-gate sign-off. Full-access tier (BOD/PMO/HR) sees and acts on every joiner; EM/TL/PM and Member see and act only on their own swimlane.","roles":["BOD","PMO","HR","EM/TL/PM","Member"],"mockup_ref":{"screen":"lifecycle/lc_onboarding"},"sub_screens":[{"id":"M1.6.S1.1","name":"KPI strip","description":"People onboarding, steps complete %, audit gates open, blocked steps."},{"id":"M1.6.S1.2","name":"Swimlane filter","description":"All / Recruitment / IT / Leader / CPO / HR / PMO; filters the board to one PIC's tasks."},{"id":"M1.6.S1.3","name":"Joiner card","description":"Per-joiner row: name/role/account/start date, a 4-phase progress strip, an expandable per-step list, and overall %."},{"id":"M1.6.S1.4","name":"Step list & actions","description":"Each step shows its PIC, SLA and state; complete a step, toggle a blocker, and PMO audit-gate sign-off."}],"items":[{"id":"EN-M1.6-01","type":"enabler","title":"Onboarding case & 4-phase process model","story":"Establish the onboarding case and Seta's 4-phase process model: an onboarding case enters the lifecycle when a candidate is hired, runs the 4 phases (Receive info → Prepare → Execute → Follow-up & complete), each phase a set of PIC-owned steps with an SLA, with a per-step state machine (to-do / in-progress / done / blocked, and pass for audit steps), case-health recalculation, the 4 PMO audit gates (AUDIT 01–04), and the joiner events that headcount and dashboards read.","acceptance_criteria":["Given a newly hired candidate, when the hire is confirmed, then a new onboarding case is seeded in the lifecycle (stage Preboarding/Onboarding) with the 4-phase process and all steps initialised to to-do.","Given any step, when its owner advances it, then it moves to-do → in-progress → done (audit steps toggle to/from passed), the case progress % recomputes, and the case health is set to Blocked if any step is blocked, Complete at 100%, else On track.","Given a step is blocked, when the blocker is cleared, then the case health is recalculated from the remaining open blockers.","Given an onboarding case event (joiner intake, step completion, audit pass), then the event is recorded so headcount and dashboards can read it."],"story_points":5,"roles":["PMO","HR"],"dependencies":["EN-M1.2-01"],"notes":"PIC owners (Recruitment, IT, Leader/CPO/HR, PMO/Audit) are task-ownership attributes of the process model, not app roles. Each step carries an SLA (e.g. D-3, Day 1, D+7 hard, M+1/M+2). The 4 audit gates are signed off by PMO. A new joiner is seeded from a hired candidate (the hire-handoff is driven from the Candidates sub-module, M2.3).","status":"not-started"},{"id":"US-M1.6.S1-01","type":"story","title":"View onboarding KPI strip","story":"As a BOD/PMO/HR user, I want a KPI strip across all onboarding joiners so that I can see overall onboarding health at a glance.","acceptance_criteria":["Given onboarding cases exist in my scope, when I open the board, then I see KPIs for people onboarding, steps complete (count and %), audit gates open, and blocked steps.","Given a step is completed or blocked, when the board re-renders, then the affected KPIs update accordingly.","Given no one is onboarding in my scope, then the KPI strip shows zeroed values rather than an error."],"story_points":3,"roles":["BOD","PMO","HR"],"dependencies":["EN-M1.6-01"],"status":"not-started"},{"id":"US-M1.6.S1-02","type":"story","title":"Scoped KPI strip for my swimlane","story":"As an EM/TL/PM or Member, I want the KPI strip computed over only the joiners and tasks in my scope so that the numbers reflect my own responsibility.","acceptance_criteria":["Given I am a manager or member, when I open the board, then the KPI counts (people, steps complete, audit gates open, blocked) reflect only the joiners and tasks visible to me.","Given I have no joiners in scope, then the strip shows zeroed values and the empty-scope state.","Given a colleague updates a step outside my scope, then my KPI counts are unaffected."],"story_points":2,"roles":["EM/TL/PM","Member"],"dependencies":["EN-M1.6-01"],"notes":"Scope follows the same role/account/project visibility as the rest of the board; managers see their team's joiners, members see their own onboarding.","status":"not-started"},{"id":"US-M1.6.S1-03","type":"story","title":"Filter the board by swimlane (PIC)","story":"As a BOD/PMO/HR user, I want to filter the board to a single PIC swimlane (Recruitment / IT / Leader / CPO / HR / PMO) so that I can see that party's tasks across all joiners.","acceptance_criteria":["Given the board is showing All, when I pick a swimlane, then I see a role-grouped task list of only that PIC's steps across all joiners, each with joiner name, phase, SLA and state.","Given a swimlane is selected, then the list shows open vs. total counts and orders open tasks ahead of completed ones.","Given a swimlane has no tasks in scope, then an empty-swimlane message is shown.","Given I select All, then the per-joiner card view is restored."],"story_points":3,"roles":["BOD","PMO","HR"],"dependencies":["EN-M1.6-01"],"status":"not-started"},{"id":"US-M1.6.S1-04","type":"story","title":"See only my Leader swimlane","story":"As an EM/TL/PM, I want to see and act on only the Leader-owned onboarding tasks for my joiners so that I focus on what I own.","acceptance_criteria":["Given I am a manager, when I open the board, then I can see the Leader swimlane tasks for joiners in my scope and cannot act on steps owned by other PICs.","Given a step is not Leader-owned, then its action controls are disabled for me.","Given I have no Leader tasks in scope, then an empty-swimlane state is shown."],"story_points":2,"roles":["EM/TL/PM"],"mockup_ref":{"screen":"lifecycle/lc_onboarding","persona":"manager"},"dependencies":["EN-M1.6-01"],"status":"not-started"},{"id":"US-M1.6.S1-05","type":"story","title":"View my own onboarding journey","story":"As a Member (the new joiner), I want to see my own onboarding card with phase progress and step list so that I know where I am in the process and what is outstanding.","acceptance_criteria":["Given I am the joiner, when I open the board, then I see only my own onboarding card with its 4-phase strip, overall %, and expandable step list with each step's owner, SLA and state.","Given a step I do not own, then its action controls are disabled for me.","Given I am not currently onboarding, then an empty-scope message is shown."],"story_points":3,"roles":["Member"],"mockup_ref":{"screen":"lifecycle/lc_onboarding","persona":"employee"},"dependencies":["EN-M1.6-01"],"status":"not-started"},{"id":"US-M1.6.S1-06","type":"story","title":"View a joiner card with phase progress","story":"As a BOD/PMO/HR user, I want a per-joiner card with name, role, account and start date, a 4-phase progress strip and overall %, expandable into the full step list so that I can track each joiner's onboarding.","acceptance_criteria":["Given onboarding cases in my scope, when I view the board, then each joiner shows a card with name/role/account/start date, a 4-phase strip with per-phase done/total counts, overall %, and a blocked-count badge when steps are blocked.","Given I expand a card, then I see the steps grouped by phase, each with owner (PIC), SLA and state pill.","Given I collapse the card, then the detail list is hidden and only the strip remains."],"story_points":3,"roles":["BOD","PMO","HR"],"dependencies":["EN-M1.6-01","EN-
