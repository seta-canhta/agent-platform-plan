M1.2-01"],"status":"not-started"},{"id":"US-M1.6.S1-07","type":"story","title":"Complete an onboarding step","story":"As a BOD/PMO/HR user, I want to advance an onboarding step through its states so that the joiner's progress reflects the work done.","acceptance_criteria":["Given an editable non-audit step, when I advance it, then it cycles to-do → in-progress → done and the joiner's progress % and case health recompute.","Given a step is blocked, when I act on it, then it returns to an open state before advancing.","Given a step I am not permitted to edit, then its control is disabled.","Given a step changes state, then the change is captured in the audit trail."],"story_points":2,"roles":["BOD","PMO","HR"],"dependencies":["EN-M1.6-01"],"status":"not-started"},{"id":"US-M1.6.S1-08","type":"story","title":"Toggle a blocker on a step","story":"As a BOD/PMO/HR user, I want to raise or clear a blocker on an onboarding step so that the joiner's case health reflects when something is stuck.","acceptance_criteria":["Given an editable, not-done, non-audit step, when I raise a blocker, then the step shows blocked and the case health flips to Blocked.","Given a blocked step, when I clear the blocker, then the step returns to open and the case health is recalculated from any remaining blockers.","Given a done or audit step, then no blocker control is offered."],"story_points":2,"roles":["BOD","PMO","HR"],"dependencies":["EN-M1.6-01"],"status":"not-started"},{"id":"US-M1.6.S1-09","type":"story","title":"Complete my own Leader steps and blockers","story":"As an EM/TL/PM, I want to complete and raise/clear blockers on the Leader-owned steps for my joiners so that I can drive the parts of onboarding I own.","acceptance_criteria":["Given a Leader-owned non-audit step for a joiner in my scope, when I advance it, then it cycles state and the joiner's progress and health recompute.","Given a Leader-owned, not-done step, when I toggle a blocker, then the step and case health update accordingly.","Given a step owned by another PIC, then its controls are disabled for me."],"story_points":2,"roles":["EM/TL/PM"],"mockup_ref":{"screen":"lifecycle/lc_onboarding","persona":"manager"},"dependencies":["EN-M1.6-01"],"status":"not-started"},{"id":"US-M1.6.S1-10","type":"story","title":"Sign off a PMO audit gate","story":"As a PMO user, I want to sign off an onboarding audit gate (AUDIT 01–04) so that the audited phase is verified and the next phase can proceed.","acceptance_criteria":["Given an audit-gate step awaiting sign-off, when I sign it off, then it is marked passed and counts toward the joiner's progress.","Given a passed audit gate, when I revoke it, then it returns to awaiting sign-off and the 'audit gates open' KPI increases.","Given I am not PMO, then the audit-gate control is disabled.","Given an audit gate is signed off or revoked, then the action is recorded in the audit trail."],"story_points":3,"roles":["PMO"],"dependencies":["EN-M1.6-01"],"notes":"There are 4 PMO audit gates (AUDIT 01–04). Audit steps have no blocker control; only PMO (and the full-access tier) may sign them off.","status":"not-started"}]}]},{"id":"M1.7","name":"Probation","description":"Tracks new joiners through probation: weighted objectives, 30/60/90-day reviews, and a risk score, leading to a confirmation decision — Pass (→ Active/confirmed employee), Extend (+30 days), or Do-not-confirm (→ Offboarding as involuntary). A cohort board lists everyone in probation with objective progress, risk and confirmation due-date; a per-person detail captures objectives, reviews and the decision. Continues the same lifecycle case created at onboarding.","status":"in-progress","screens":[{"id":"M1.7.S1","name":"Probation board","description":"Cohort view of everyone in probation: a KPI strip (in probation, confirmation due within 14 days, high-risk count, average objective progress) and a table of each probationer with their sub-stage, weighted objective progress, risk score, confirmation due-date and decision/verdict, with a Review action. BOD/PMO/HR see all; EM/TL/PM see their team; a Member sees only their own probation.","roles":["BOD","PMO","HR","EM/TL/PM","Member"],"mockup_ref":{"screen":"lifecycle/lc_probation"},"sub_screens":[{"id":"M1.7.S1.1","name":"KPI strip","description":"In probation, confirmation due ≤14d, high-risk (≥60), average objective progress."},{"id":"M1.7.S1.2","name":"Probation cohort table","description":"Per-probationer: sub-stage, weighted objective progress, risk score, confirmation due, verdict, Review action."}],"items":[{"id":"EN-M1.7-01","type":"enabler","title":"Probation case & confirmation model","story":"Establish the probation capability on the lifecycle case: weighted probation objectives, the 30/60/90-day review set (each a 1–5 score with a reviewer note), a risk score, and the confirmation decision with its stage transitions — Pass confirms the employee and moves the case to Active; Extend pushes the confirmation date out 30 days and flags the case At risk; Do-not-confirm ends probation as not-passed and initiates offboarding as an involuntary exit.","acceptance_criteria":["Given a probation case, when objective progress is computed, then it is the weight-weighted average of the objectives' progress.","Given a 30/60/90-day review is recorded, then its score and note are stored against the case and surfaced in the case history.","Given a confirmation decision, when Pass is chosen the case moves to Active (confirmed), when Extend is chosen the confirmation date moves out 30 days and health becomes At risk, and when Do-not-confirm is chosen the case enters Offboarding as an involuntary exit with the reason 'Probation not passed'.","Given a case in probation, then its confirmation due-date and risk score are available for the cohort view."],"story_points":5,"roles":["PMO","HR","EM/TL/PM"],"dependencies":["EN-M1.2-01","EN-M1.6-01"],"notes":"Probation continues the same lifecycle case created at onboarding (stage Probation). The 30/60/90-day probation reviews are distinct from the M1.5 monthly performance scorecard. A Do-not-confirm verdict hands the case to the Offboarding sub-module (M1.8).","status":"not-started"},{"id":"US-M1.7.S1-01","type":"story","title":"View probation KPI strip","story":"As a BOD/PMO/HR user, I want a KPI strip for the probation cohort so that I can see confirmation pressure and risk at a glance.","acceptance_criteria":["Given probation cases in my scope, when I open the board, then I see counts for people in probation, confirmations due within 14 days, high-risk cases (risk ≥ 60), and the cohort's average objective progress.","Given a confirmation due-date passes or a review is recorded, when the board re-renders, then the affected KPIs update.","Given no one is in probation in my scope, then the KPIs show zero/empty values without error."],"story_points":3,"roles":["BOD","PMO","HR"],"dependencies":["EN-M1.7-01"],"status":"not-started"},{"id":"US-M1.7.S1-02","type":"story","title":"View the probation cohort table","story":"As a BOD/PMO/HR user, I want a table of everyone in probation so that I can spot who is at risk or due for confirmation.","acceptance_criteria":["Given probation cases, when the table renders, then each row shows the person, sub-stage, weighted objective progress, risk score, confirmation due-date and the decision/verdict (or pending), with a Review action.","Given a confirmation due-date is overdue or within 14 days, when its row renders, then the due-date is visually emphasised.","Given no one is in probation, then an empty state is shown instead of a table."],"story_points":3,"roles":["BOD","PMO","HR"],"dependencies":["EN-M1.7-01"],"status":"not-started"},{"id":"US-M1.7.S1-03","type":"story","title":"View my team's probationers","story":"As an EM/TL/PM, I want the probation board scoped to my own team so that I focus on the people I am responsible for confirming.","acceptance_criteria":["Given I am a manager, when I open the board, then I see only probation cases for people in my scope.","Given a probationer outside my scope, then their case is not visible to me.","Given I have no probationers, then an empty-scope state is shown."],"story_points":2,"roles":["EM/TL/PM"],"mockup_ref":{"screen":"lifecycle/lc_probation","persona":"manager"},"dependencies":["EN-M1.7-01"],"status":"not-started"},{"id":"US-M1.7.S1-04","type":"story","title":"View my own probation status","story":"As a Member on probation, I want to see my own objectives, reviews and confirmation due-date so that I know how I am tracking toward confirmation.","acceptance_criteria":["Given I am on probation, when I open the board, then I see only my own probation case with my objective progress and confirmation due-date.","Given the confirmation decision and reviews, then I can read them but cannot record reviews or make the decision.","Given I am not on probation, then an empty-scope state is shown."],"story_points":2,"roles":["Member"],"mockup_ref":{"screen":"lifecycle/lc_probation","persona":"employee"},"dependencies":["EN-M1.7-01"],"notes":"Member view is read-only — recording reviews and making the confirmation decision are reserved for the manager/HR tier.","status":"not-started"}]},{"id":"M1.7.S2","name":"Probation review detail","description":"Per-person probation detail: the weighted objectives with progress, the 30/60/90-day reviews (each recordable with a 1–5 score and note), the risk score, and the confirmation decision panel offering Pass & confirm, Extend 30 days, or Do-not-confirm. Reached by opening a probationer from the board.","roles":["BOD","PMO","HR","EM/TL/PM"],"mockup_ref":{"screen":"lifecycle/lc_probation"},"sub_screens":[{"id":"M1.7.S2.1","name":"Objectives","description":"Weighted probation objectives with per-objective progress."},{"id":"M1.7.S2.2","name":"30/60/90-day reviews","description":"The review set; record a score and note per review."},{"id":"M1.7.S2.3","name":"Confirmation decision","description":"Pass & confirm / Extend 30 days / Do-not-confirm."}],"items":[{"id":"US-M1.7.S2-01","type":"story","title":"View a probationer's objectives and reviews","story":"As a BOD/PMO/HR or EM/TL/PM user, I want to open a probationer's detail showing weighted objectives, the 30/60/90-day reviews and the risk score so that I can judge their progress before a decision.","acceptance_criteria":["Given a probation case, when I open its detail, then I see each objective with its weight and progress and the overall weighted objective %.","Given the reviews, then each of the 30/60/90-day reviews shows its score, note and reviewer when recorded, or a not-yet-recorded state otherwise.","Given the case, then its risk score and confirmation due-date are shown."],"story_points":3,"roles":["BOD","PMO","HR","EM/TL/PM"],"dependencies":["EN-M1.7-01"],"status":"not-started"},{"id":"US-M1.7.S2-02","type":"story","title":"Record a 30/60/90-day probation review","story":"As a BOD/PMO/HR or EM/TL/PM user, I want to record a 30/60/90-day review with a score and note so that the probation history captures how the person is tracking.","acceptance_criteria":["Given a not-yet-recorded review, when I record it with a 1–5 score and a note, then it is saved against the case with my name and added to the case history.","Given a recorded review, when the detail re-renders, then it shows the score, note and reviewer and is no longer pending.","Given I am a Member, then I cannot record a review."],"story_points":3,"roles":["BOD","PMO","HR","EM/TL/PM"],"dependencies":["EN-M1.7-01"],"status":"not-started"},{"id":"US-M1.7.S2-03","type":"story","title":"Make the confirmation decision (pass / extend / do-not-confirm)","story":"As a BOD/PMO/HR or EM/TL/PM user, I want to record the confirmation decision so that probation closes into confirmation, extension, or offboarding.","acceptance_criteria":["Given a probation case, when I choose Pass & confirm and confirm the prompt, then the case moves to Active as a confirmed employee.","Given I choose Extend 30 days, when I confirm, then the confirmation date moves out 30 days and the case health becomes At risk.","Given I choose Do-not-confirm, when I confirm, then probation ends as not-passed and an involuntary offboarding case is initiated with a last working day set.","Given a decision is already recorded, then the decision panel shows the recorded verdict instead of the action buttons."],"story_points":5,"roles":["BOD","PMO","HR","EM/TL/PM"],"dependencies":["EN-M1.7-01","EN-M1.8-01"],"notes":"Do-not-confirm hands the case to Offboarding (M1.8) as an involuntary exit (reason: Probation not passed). The decision is the manager recommendation confirmed by HR/PMO.","status":"not-started"}]}]},{"id":"M1.8","name":"Offboarding","description":"Tracks a leaver through Seta's defined exit process — two phases (Pre-offboarding → Last working day D) of PIC-owned steps, each with an SLA, state machine (to-do/doing/done/audit-pass/blocked) and Overdue health. Offboarding is voluntary or involuntary (e.g. probation not passed) and carries a reason and last working day. PMO audits handover & access revocation, Finance audits asset & financial clearance; on 100% completion the case moves to Alumni. A board shows per-leaver cards (progress, current step, type, last day) opening to the full workflow, with KPIs and a PIC swimlane filter.","status":"in-progress","screens":[{"id":"M1.8.S1","name":"Offboarding board","description":"Per-leaver offboarding board with KPI strip, PIC swimlane filter and leaver cards that open to the full 2-phase exit workflow where steps are completed, blocked and audit-signed. BOD/PMO/HR see all leavers; EM/TL/PM and Member act only on their own swimlane.","roles":["BOD","PMO","HR","EM/TL/PM","Member"],"mockup_ref":{"screen":"lifecycle/lc_offboarding"},"sub_screens":[{"id":"M1.8.S1.1","name":"KPI strip","description":"People offboarding, steps complete %, audit/clearance gates open, overdue/blocked steps."},{"id":"M1.8.S1.2","name":"Swimlane filter","description":"All / HR / Leader / IT / Finance / PMO — filters the workflow to one PIC's tasks."},{"id":"M1.8.S1.3","name":"Leaver card","description":"Per-leaver: name/role/account, offboarding type (voluntary/involuntary), reason, last working day, progress %, current step."},{"id":"M1.8.S1.4","name":"Exit workflow detail & actions","description":"The 2-phase step workflow; complete a step, toggle a blocker, PMO/Finance audit-gate sign-off; on 100% the case becomes Alumni."}],"items":[{"id":"EN-M1.8-01","type":"enabler","title":"Offboarding case & exit-process model","story":"Establish the offboarding case and Seta's exit-process model: a leaver case created from a resignation or a failed probation carrying offboarding type (voluntary/involuntary), reason and last working day; the 2-phase PIC-owned exit workflow (Pre-offboarding → Last working day D) with per-step SLAs; the per-step state machine (to-do / doing / done / audit-pass / blocked) with Overdue-health recalculation when a step is blocked; the PMO and Finance audit & clearance gates; and the transition to Alumni when all steps complete. This is also the home for 'leaver' events that headcount and dashboards read.","acceptance_criteria":["Given a resignation or a probation-not-passed decision, when an offboarding case is created, then it carries type (voluntary/involuntary), reason and last working day and is seeded with the full 2-phase step workflow each with a PIC owner and SLA.","Given a step changes state, when it is set to blocked, then the case health recalculates to Overdue; when no step is blocked it returns to On track.","Given every step is done and every audit gate is passed, when progress reaches 100%, then the case moves to Alumni and a leaver/offboarding-complete event is recorded.","Given a step has an audit owner (PMO or Finance), then it cannot be treated as complete until that owner records an audit-pass."],"story_points":5,"roles":["BOD","PMO","HR"],"dependencies":["EN-M1.2-01"],"notes":"PIC owners (HR, Leader, IT, Finance, PMO/Audit) and the Employee (the leaver) are task-ownership attributes of the process model, not app roles. A leaver case is seeded from a resignation or a failed probation.","status":"not-started"},{"id":"US-M1.8.S1-01","type":"story","title":"View offboarding KPI strip","story":"As a BOD/PMO/HR user, I want to see offboarding KPIs at the top of the board so that I can gauge exit volume, progress and risk at a glance.","acceptance_criteria":["Given active offboarding cases, when I open the board, then I see counts for people offboarding, average completion %, audit/clearance gates open, and overdue/blocked steps.","Given no active offboarding, when I open the board, then the KPIs show zero/empty values without error.","Given audit gates are open or steps are overdue, then those KPIs are visually emphasised."],"story_points":3,"roles":["BOD","PMO","HR"],"dependencies":["EN-M1.8-01"],"status":"not-started"},{"id":"US-M1.8.S1-02","type":"story","title":"Filter exit workflow by PIC swimlane","story":"As a BOD/PMO/HR user, I want to filter the exit workflow by PIC swimlane (All / HR / Leader / IT / Finance / PMO) so that I can focus on one owner's tasks.","acceptance_criteria":["Given a leaver's workflow, when I select a swimlane, then only steps owned by that PIC are shown.","Given I select All, then every step across both phases is shown.","Given a selected swimlane has no steps, then the phase shows no rows without error."],"story_points":2,"roles":["BOD","PMO","HR","EM/TL/PM","Member"],"dependencies":["EN-M1.8-01"],"status":"not-started"},{"id":"US-M1.8.S1-03","type":"story","title":"View offboarding board with leaver cards","story":"As a BOD/PMO/HR user, I want to see all active leavers as cards so that I can review each exit's progress and current step.","acceptance_criteria":["Given active offboarding cases, when I open the board, then each leaver card shows name, role, account, offboarding type, reason, last working day, progress % and the current step with its PIC.","Given a card, when I click it, then the leaver's full 2-phase workflow opens.","Given there are no leavers, then an empty-state message is shown instead of cards."],"story_points":3,"roles":["BOD","PMO","HR"],"dependencies":["EN-M1.8-01","EN-M1.2-01"],"status":"not-started"},{"id":"US-M1.8.S1-04","type":"story","title":"View my team's leaver cards","story":"As an EM/TL/PM, I want to see only the leavers in my own swimlane so that I can act on exits I am responsible for without seeing others.","acceptance_criteria":["Given I am a manager, when I open the board, then I only see leavers within my scope.","Given a leaver outside my scope, then their card is not shown.","Given I open a leaver in my scope, then I can only act on steps owned by Leader."],"story_points":2,"roles":["EM/TL/PM"],"mockup_ref":{"screen":"lifecycle/lc_offboarding","persona":"manager"},"dependencies":["EN-M1.8-01"],"notes":"Manager persona is scoped to Leader-owned steps only.","status":"not-started"},{"id":"US-M1.8.S1-05","type":"story","title":"View my own offboarding case","story":"As a Member who is leaving, I want to see my own offboarding card and progress so that I know where my exit stands and what I still owe.","acceptance_criteria":["Given I am the leaver, when I open the board, then I see only my own offboarding case with progress and current step.","Given another person's case, then it is not visible to me.","Given I open my case, then I can only act on steps owned by Employee."],"story_points":2,"roles":["Member"],"mockup_ref":{"screen":"lifecycle/lc_offboarding","persona":"employee"},"dependencies":["EN-M1.8-01"],"notes":"Employee persona is scoped to Employee-owned steps only.","status":"not-started"},{"id":"US-M1.8.S1-06","type":"story","title":"Open a leaver's full 2-phase exit workflow","story":"As a BOD/PMO/HR user, I want to open a leaver's full exit workflow so that I can see every step across both phases with its PIC, SLA, state and audit gates.","acceptance_criteria":["Given a leaver, when I open the detail, then I see the Pre-offboarding and Last-working-day phases with each step's title, PIC chip, SLA and state pill.","Given a step is an audit gate, then it is visually marked as a PMO or Finance audit step.","Given the workflow, then the header shows offboarding type, reason, last working day and overall progress %."],"story_points":5,"roles":["BOD","PMO","HR"],"dependencies":["EN-M1.8-01"],"status":"not-started"},{"id":"US-M1.8.S1-07","type":"story","title":"Advance a step through its states","story":"As a BOD/PMO/HR user, I want to advance a step through to-do → doing → done so that the exit process reflects real progress.","acceptance_criteria":["Given a non-audit step I can edit, when I advance it, then it cycles to-do → doing → done and overall progress recalculates.","Given a step is blocked, when I advance it, then it leaves the blocked state and resumes the normal cycle.","Given I lack edit rights for a step's PIC, then its control is disabled."],"story_points":2,"roles":["BOD","PMO","HR"],"dependencies":["EN-M1.8-01","US-M1.8.S1-06"],"notes":"Generic step-advance mechanic; covers steps without a dedicated story (e.g. IT prepare device-recovery / access-revoke list).","status":"not-started"},{"id":"US-M1.8.S1-08","type":"story","title":"Confirm resignation and notify stakeholders","story":"As a BOD/PMO/HR user acting as HR, I want to confirm the resignation (date, reason, offboarding type) and notify IT/Finance/PM and schedule the exit interview so that the exit process starts on time.","acceptance_criteria":["Given a new leaver, when I confirm the resignation, then the date, reason and offboarding type (voluntary/involuntary) are recorded and the step is completed.","Given the resignation is confirmed, then IT, Finance and PM are notified and the exit interview is scheduled.","Given required details are missing, then the step cannot be confirmed."],"story_points":3,"roles":["BOD","PMO","HR"],"dependencies":["EN-M1.8-01","US-M1.8.S1-06"],"notes":"First Pre-offboarding step (PIC: HR, SLA within 24h); confirming it notifies IT/Finance/PM and schedules the exit interview.","status":"not-started"},{"id":"US-M1.8.S1-09","type":"story","title":"Plan replacement and confirm handover as Leader","story":"As an EM/TL/PM, I want to plan the replacement and confirm the work/repo handover for my leaver so that knowledge and responsibilities transfer before the last day.","acceptance_criteria":["Given my leaver, when I complete the replacement-planning step, then it is marked done with the handover receiver and task list recorded.","Given the last working day, when I confirm the work/docs/repository handover, then the handover step is completed and submitted for PMO audit.","Given a step I do not own as Leader, then I cannot edit it."],"story_points":3,"roles":["EM/TL/PM"],"mockup_ref":{"screen":"lifecycle/lc_offboarding","persona":"manager"},"dependencies":["EN-M1.8-01","US-M1.8.S1-06","EN-M3.4-01"],"notes":"Leader-owned steps only; the handover step is a PMO audit gate. Planning the replacement also releases the leaver's project allocations (owned by the PM RA Monitoring model).","status":"not-started"},{"id":"US-M1.8.S1-10","type":"story","title":"Build my handover file as the leaver","story":"As a Member who is leaving, I want to build my handover file (tasks, docs, receiver) and send it to my Leader/PM for approval so that my work is properly transferred.","acceptance_criteria":["Given I am the leaver, when I complete my handover step, then my tasks, documents and receiver are captured and the step is submitted to Leader/PM.","Given my handover is incomplete, then I can keep it in progress rather than done.","Given a step I do not own as Employee, then I cannot edit it."],"story_points":3,"roles":["Member"],"mockup_ref":{"screen":"lifecycle/lc_offboarding","persona":"employee"},"dependencies":["EN-M1.8-01","US-M1.8.S1-06"],"notes":"Employee-owned step; the built handover file is subsequently PMO-audited.","status":"not-started"},{"id":"US-M1.8.S1-11","type":"story","title":"Record access revocation and device recovery","story":"As a BOD/PMO/HR user, I want to record the IT access-revocation and device-recovery steps on the last working day so that the leaver's access and assets are accounted for.","acceptance_criteria":["Given the last working day, when I complete the access-revoke and device-recovery step, then it is marked done covering mail, VPN, GitHub, cloud, Teams, timesheet, biometric and collected devices.","Given the step is an audit gate, then it requires PMO audit-pass before it counts as cleared.","Given access is not fully revoked, then the step can be left in progress or flagged blocked."],"story_points":3,"roles":["BOD","PMO","HR"],"dependencies":["EN-M1.8-01","US-M1.8.S1-06"],"external_deps":[{"needs":"revoke the leaver's system access across platforms","likely_module":"M0","reason":"per-person access control is owned by Admin/access-control (out of scope)"}],"notes":"This tracks the offboarding STEP only; the actual cross-platform revoke is performed by Admin/access-control. PMO audit gate.","status":"not-started"},{"id":"US-M1.8.S1-12","type":"story","title":"Sign off PMO audit gates","story":"As a PMO user, I want to sign off the handover and access-revocation audit gates so that the exit cannot complete until these are independently confirmed.","acceptance_criteria":["Given a handover or access-revocation step is done, when I record an audit-pass, then the gate shows Audited and counts toward completion.","Given I revoke an audit-pass, then the gate returns to an unaudited state and completion drops accordingly.","Given I am not PMO, then I cannot sign off a PMO audit gate."],"story_points":3,"roles":["PMO"],"dependencies":["EN-M1.8-01","US-M1.8.S1-06"],"notes":"PMO signs off handover and access-revocation audit gates; offboarding only completes when all audit parties confirm.","status":"not-started"},{"id":"US-M1.8.S1-13","type":"story","title":"Complete asset & financial clearance sign-off","story":"As a BOD/PMO/HR user (acting on Finance's behalf), I want to complete the asset & financial audit/clearance and sign off so that the leaver has no outstanding debt and settlement is confirmed.","acceptance_criteria":["Given the last working day, when I complete the financial-clearance step, then assets are reconciled, no-debt is confirmed and pay/bonus/leave settlement is finalized.","Given I record the Finance audit-pass, then the gate shows Audited and counts toward completion.","Given the financial clearance is not signed off, then the case cannot reach Alumni."],"story_points":3,"roles":["BOD","PMO","HR"],"dependencies":["EN-M1.8-01","US-M1.8.S1-06"],"notes":"Finance audit gate — asset & financial clearance is owned by the Finance PIC (a process attribute, not an app role); in the app it is signed off by the full-access tier.","status":"not-started"},{"id":"US-M1.8.S1-14","type":"story","title":"Finalize payroll, liquidation and exit interview","story":"As a BOD/PMO/HR user acting as HR, I want to finalize payroll, contract liquidation, records and the exit interview so that the case can complete and move to Alumni.","acceptance_criteria":["Given all prior steps are done, when I complete the HR final step, then payroll and contract liquidation are finalized, records are archived and the exit interview is completed.","Given this completes the workflow at 100%, then the case moves to Alumni and an offboarding-complete event is recorded.","Given earlier audit gates are still open, then completing this step alone does not move the case to Alumni."],"story_points":3,"roles":["BOD","PMO","HR"],"dependencies":["EN-M1.8-01","US-M1.8.S1-06","US-M1.8.S1-12","US-M1.8.S1-13"],"notes":"Final Last-day HR step (hard SLA on day D); the case only becomes Alumni once every step is done and every audit gate passed.","status":"not-started"},{"id":"US-M1.8.S1-15","type":"story","title":"Raise or clear a blocker on a step","story":"As a BOD/PMO/HR user, I want to flag a step as blocked/overdue or clear it so that stalled clearances are visible and the case health reflects reality.","acceptance_criteria":["Given an editable non-audit step, when I flag it blocked, then it shows Blocked and the case health becomes Overdue.","Given a blocked step, when I clear the blocker, then it returns to to-do and the case health returns to On track if no other step is blocked.","Given a step's PIC I cannot edit, then I cannot raise or clear its blocker."],"story_points":2,"roles":["BOD","PMO","HR","EM/TL/PM","Member"],"dependencies":["EN-M1.8-01","US-M1.8.S1-06"],"notes":"Blockers can only be toggled on steps the actor is allowed to edit (full-access any; manager Leader steps; employee Employee steps).","status":"not-started"}]}]}]},{"id":"M2","name":"Hiring Management","description":"Position management and internal mobility: open requisitions, an internal job board with skill-matched recommendations, and a releasing-EM → receiving-EM → PMO endorsement/approval chain whose approval creates an allocation. Phase-2 module that rolls out as hiring moves into People.","status":"in-progress","sub_modules":[{"id":"M2.1","name":"Reports","description":"Strategic recruitment analytics for hiring leadership: a one-screen executive dashboard giving the 30-second read on hiring health (KPIs, pipeline, open-position deadlines, demand vs capacity, recruiter/channel performance, weekly AI signals), plus a built-but-unwired insights screen (on-time fulfillment, hiring leadtime, an AI JD↔CV match analyzer, and pass/fail case-study patterns). Company-wide analytics for the executive/governance audience; the report reads from requisitions, candidates and interviews owned by sibling Hiring sub-modules.","status":"not-started","screens":[{"id":"M2.1.S1","name":"Recruitment Reports (executive dashboard)","description":"A single scrolling executive dashboard for hiring leadership: an at-a-glance KPI strip with a composite hiring-health score, the candidate pipeline (funnel pass-through and stage leadtimes), open positions against their deadlines, a 6-month opened-vs-filled trend and 4-month demand forecast, recruiter and source performance, and weekly AI action signals.","roles":["BOD","PMO"],"mockup_ref":{"screen":"hiring/reports"},"sub_screens":[{"id":"M2.1.S1.1","name":"Executive KPI strip"},{"id":"M2.1.S1.2","name":"Hiring pipeline (funnel + stage leadtimes)"},{"id":"M2.1.S1.3","name":"Open positions vs deadline"},{"id":"M2.1.S1.4","name":"Can we keep up with demand?"},{"id":"M2.1.S1.5","name":"Recruiters & channels"},{"id":"M2.1.S1.6","name":"What to act on this week"}],"items":[{"id":"EN-M2.1-01","type":"enabler","title":"Recruitment reporting dataset & aggregations","story":"Provide the report-specific computed layer that powers both recruitment report screens — funnel pass-through, per-stage leadtimes, average time-to-hire, offer-accept rate, the composite hiring-health score, source performance, the recruiter scorecard, the opened-vs-filled hire trend and the next-months demand forecast — derived from requisitions, candidates and interviews.","acceptance_criteria":["Given the underlying requisition, candidate and interview records, when the reporting layer runs, then it produces the funnel counts with step-to-step pass-through, per-stage average leadtimes, average days-to-hire and offer-accept rate.","Given role ageing, pipeline volume, conversion and offer-accept rate, when the hiring-health score is computed, then it returns a 0–100 score with a Healthy / Needs attention / At risk band.","Given source and recruiter activity, when aggregates are computed, then source performance is ranked by hire-rate (with cost-per-hire) and recruiters are scored by a weighted blend of hires, on-time %, time-to-fill and CSAT.","Given missing or empty source records for a period, when an aggregate cannot be computed, then it returns an empty/neutral result rather than failing the dashboard."],"story_points":5,"roles":["BOD","PMO"],"dependencies":["EN-M2.2-01","EN-M2.3-01","EN-M2.4-01"],"notes":"Recruiter performance, source performance, offer stats, the funnel snapshot, the hire trend and the demand forecast are report-owned aggregates computed in this layer; only requisition, candidate and interview source records are external.","status":"not-started"},{"id":"US-M2.1.S1-01","type":"story","title":"View the executive KPI strip","story":"As a member of hiring leadership, I want an at-a-glance KPI strip showing open positions with month-over-month change, candidates in process, average days to hire against the 30-day goal, and offers-accepted percentage so that I can read hiring health in seconds.","acceptance_criteria":["Given the current reporting data, when I open the dashboard, then I see open positions with the +/- change versus last month, candidates in process, average days to hire, and offers-accepted percentage.","Given average days to hire exceeds the 30-day goal, when the avg-days KPI renders, then it is flagged as over goal and shows how many days over; otherwise it shows as within goal.","Given the offers KPI, when it renders, then it shows the accepted-versus-extended count alongside the percentage.","Given no open positions in scope, when the strip renders, then per-role derived values degrade gracefully without error."],"story_points":3,"roles":["BOD","PMO"],"dependencies":["EN-M2.1-01"],"status":"not-started"},{"id":"US-M2.1.S1-02","type":"story","title":"View the composite hiring-health score","story":"As a member of hiring leadership, I want a single hiring-health score out of 100 blended from role ageing, pipeline volume, conversion and offer-accept rate so that I get one governance-level signal of overall hiring health.","acceptance_criteria":["Given the computed inputs, when the health card renders, then it shows a score out of 100 with a progress bar and one of Healthy, Needs attention, or At risk.","Given a score of 75 or above, when the band is shown, then it reads Healthy; 55–74 reads Needs attention; below 55 reads At risk, each in its corresponding colour.","Given the score blends role ageing, pipeline volume, conversion and offer-accept rate, when any one input shifts, then the score and band update accordingly."],"story_points":5,"roles":["BOD","PMO"],"dependencies":["EN-M2.1-01"],"notes":"Hiring-health score = equal blend of role-ageing score, pipeline-volume score, conversion score and offer-accept rate, normalised to 0–100.","status":"not-started"},{"id":"US-M2.1.S1-03","type":"story","title":"View the hiring pipeline funnel with pass-through","story":"As a member of hiring leadership, I want a funnel of how many candidates sit at each step from Applied to Hired with the step-to-step pass-through percentage and the biggest-drop call-out so that I can see where the pipeline stalls.","acceptance_criteria":["Given the pipeline data, when the funnel renders, then each step (Applied, Screening, Interview, Offer, Hired) shows its count and its share of the Applied total.","Given consecutive steps, when the funnel renders, then the percentage of candidates moving on to the next step is shown between steps.","Given the step with the lowest pass-through, when the funnel renders, then it is highlighted as the biggest drop with a summary insight naming that step.","Given no candidates in the pipeline, when the funnel renders, then it shows zero counts without dividing-by-zero errors."],"story_points":3,"roles":["BOD","PMO"],"dependencies":["EN-M2.1-01"],"status":"not-started"},{"id":"US-M2.1.S1-04","type":"story","title":"View average time spent at each pipeline step","story":"As a member of hiring leadership, I want to see the average number of days candidates spend at each pipeline step derived from candidate history so that I can find the slowest stage to fix.","acceptance_criteria":["Given candidate stage history, when the leadtime section renders, then each step transition shows its average days and the number of candidates it is based on.","Given a step transition with no historical data, when it renders, then it shows a no-data state rather than a misleading zero.","Given the computed leadtimes, when the section renders, then the slowest step is highlighted and the end-to-end total leadtime is summarised in an insight."],"story_points":3,"roles":["BOD","PMO"],"dependencies":["EN-M2.1-01"],"status":"not-started"},{"id":"US-M2.1.S1-05","type":"story","title":"View open positions against their deadlines","story":"As a member of hiring leadership, I want a table of every open role showing how long it has been open, its due date, time left, and an On track / Due soon / Overdue status with a summary insight so that I can see which roles will miss their deadline.","acceptance_criteria":["Given the open requisitions in my scope, when the table renders, then each row shows the role, account, days open, due date, time left, and a status of On track, Due soon, or Overdue.","Given a role past its due date, when its row renders, then it is marked Overdue; a role due within three weeks is marked Due soon; otherwise On track.","Given the rows, when the summary insight renders, then it states how many are overdue, how many are due soon, the longest-open role, and the overall on-track percentage.","Given no open positions in scope, when the section renders, then it shows an empty state without error."],"story_points":3,"roles":["BOD","PMO"],"dependencies":["EN-M2.1-01","EN-M2.2-01"],"notes":"This section respects requisition scope — only requisitions the viewer is permitted to see are counted, even though the dashboard audience is BOD/PMO.","status":"not-started"},{"id":"US-M2.1.S1-06","type":"story","title":"View roles-opened-vs-filled trend","story":"As a member of hiring leadership, I want a trend of roles opened versus roles filled over the last six months so that I can see whether we are filling roles as fast as we open them.","acceptance_criteria":["Given six months of hiring data, when the chart renders, then it plots roles opened and people hired as two series across the months with a legend.","Given opened consistently exceeds hired, when the chart renders, then the accompanying insight flags hiring capacity as the constraint.","Given a month with no data, when the chart renders, then that month plots at zero without breaking the line."],"story_points":3,"roles":["BOD","PMO"],"dependencies":["EN-M2.1-01"],"status":"not-started"},{"id":"US-M2.1.S1-07","type":"story","title":"View the demand-vs-expected-hires forecast","story":"As a member of hiring leadership, I want a next-4-months forecast of people needed versus expected hires with the projected shortfall so that I can plan recruiter capacity ahead of demand.","acceptance_criteria":["Given the forecast data, when the chart renders, then it plots demand and expected hires as two series across the next four months with a legend.","Given the cumulative gap, when the insight renders, then it states the projected shortfall by the second month and the total shortfall over four months.","Given expected hires meet demand, when the insight renders, then it reflects no projected shortfall rather than a negative figure."],"story_points":5,"roles":["BOD","PMO"],"dependencies":["EN-M2.1-01"],"status":"not-started"},{"id":"US-M2.1.S1-08","type":"story","title":"View the recruiter leaderboard","story":"As a member of hiring leadership, I want recruiters ranked by a composite score blending hires, on-time percentage, time-to-fill and CSAT so that I can see who is delivering and pair others with the strongest performer.","acceptance_criteria":["Given recruiter performance data, when the leaderboard renders, then recruiters are ranked by their composite score, each row showing hires, average days to fill, on-time percentage and the score.","Given the weighted blend, when scores are computed, then hires, on-time %, time-to-fill and CSAT are combined per their weights into the displayed score.","Given the ranking, when the insight renders, then it names the top recruiter and recommends pairing others with them on the hardest roles.","Given no recruiter activity, when the section renders, then it shows an empty state without error."],"story_points":5,"roles":["BOD","PMO"],"dependencies":["EN-M2.1-01"],"status":"not-started"},{"id":"US-M2.1.S1-09","type":"story","title":"View hiring sources ranked by hire-rate","story":"As a member of hiring leadership, I want a table of where hires come from ranked by hire-rate rather than CV volume, with cost-per-hire, so that I can invest in the best-value channels.","acceptance_criteria":["Given source performance data, when the table renders, then channels are ranked by hire-rate and each row shows applicants, hires, hire-rate and cost-per-hire.","Given a high cost-per-hire, when the row renders, then the cost is visually flagged.","Given the ranking, when the insight renders, then it names the best-value channel by its share of hires versus its share of applicants and advises spending less on low-converting high-volume boards."],"story_points":3,"roles":["BOD","PMO"],"dependencies":["EN-M2.1-01"],"status":"not-started"},{"id":"US-M2.1.S1-10","type":"story","title":"View weekly AI action signals","story":"As a member of hiring leadership, I want AI signal cards surfacing the biggest at-risk role with a fill-probability, the slowest funnel step, and the best-value source so that I know what to act on this week.","acceptance_criteria":["Given the computed analytics, when the signal cards render, then I see a biggest-risk card naming the most at-risk role with its days open, candidates in process and a fill-probability percentage.","Given the funnel data, when the slowest-step card renders, then it names the step with the lowest pass-through and its percentage with a recommended action.","Given source performance, when the best-opportunity card renders, then it names the best-value source and its hire share versus applicant share."],"story_points":3,"roles":["BOD","PMO"],"dependencies":["EN-M2.1-01"],"notes":"AI signals are advisory summaries computed from the dashboard's own analytics; no action is taken automatically.","status":"not-started"}]},{"id":"M2.1.S2","name":"Recruitment Insights (built-but-unwired)","description":"A second analytics screen, designed in the mockup but not currently reachable from the tab navigation: an on-time fulfillment gauge over recently closed positions, hiring-leadtime breakdown bars, an AI JD↔CV match analyzer, and AI pass/fail case-study pattern analysis.","roles":["BOD","PMO"],"sub_screens":[{"id":"M2.1.S2.1","name":"On-time fulfillment"},{"id":"M2.1.S2.2","name":"Hiring leadtime"},{"id":"M2.1.S2.3","name":"JD ↔ CV match analysis (AI)"},{"id":"M2.1.S2.4","name":"Case studies — pass/fail patterns (AI)"}],"items":[{"id":"US-M2.1.S2-01","type":"story","title":"View on-time fulfillment gauge","story":"As a member of hiring leadership, I want a gauge of how many of the last N closed positions were filled on or before their due date plus the count that missed SLA so that I can judge fulfillment reliability.","acceptance_criteria":["Given the most recent closed positions, when the gauge renders, then it shows the percentage filled on or before their due date and the on-time count out of the total.","Given positions that missed their due date, when the section renders, then it shows the count that missed SLA with a prompt to review sourcing channels and approval lag.","Given the rate, when the gauge renders, then its colour reflects healthy, warning or at-risk thresholds.","Given no closed positions yet, when the section renders, then it shows an empty state without dividing by zero."],"story_points":3,"roles":["BOD","PMO"],"dependencies":["EN-M2.1-01","EN-M2.2-01"],"notes":"This screen is built in the mockup but is not currently wired to the tab navigation, so it cannot yet be opened from the live app.","status":"not-started"},{"id":"US-M2.1.S2-02","type":"story","title":"View hiring leadtime breakdown","story":"As a member of hiring leadership, I want average sourcing, evaluation and total leadtime bars across closed positions so that I can see which phase consumes the most time.","acceptance_criteria":["Given closed-position history, when the leadtime card renders, then it shows average sourcing days, average evaluation days and total leadtime as proportional bars.","Given the breakdown, when the insight renders, then it states what share of total leadtime evaluation represents and identifies the biggest lever.","Given no closed positions, when the card renders, then it shows an empty state without error."],"story_points":3,"roles":["BOD","PMO"],"dependencies":["EN-M2.1-01","EN-M2.2-01"],"notes":"This screen is built in the mockup but is not currently wired to the tab navigation, so it cannot yet be opened from the live app.","status":"not-started"},{"id":"US-M2.1.S2-03","type":"story","title":"Run a JD ↔ CV match analysis","story":"As a member of hiring leadership, I want to paste or prefill a job description and a CV and have the agent extract skills from both, score the match, list matched and gap skills, and propose suggested edits so that I can quickly judge candidate fit.","acceptance_criteria":["Given a job description and a CV, when I run the analysis, then the agent extracts skills from each, computes a match score, and labels it as a strong, partial or weak match.","Given the extracted skills, when results render, then matched skills and gap skills are listed with counts, plus any extra skills the CV adds beyond the JD.","Given the results, when suggested edits render, then they call out gap skills to probe, light CVs to expand, and a recommended next step, which I can apply or dismiss.","Given a JD or CV with too little detail, when I run the analysis, then I am warned to add more detail before a meaningful match can be produced.","Given a chosen requisition, when I prefill the JD, then the JD field is populated from that requisition before analysis."],"story_points":5,"roles":["BOD","PMO"],"dependencies":["EN-M2.2-01"],"notes":"AI-assisted analysis; suggested edits are a proposal pending human review and are not auto-applied. This screen is built in the mockup but is not currently wired to the tab navigation, so it cannot yet be opened from the live app.","status":"not-started"},{"id":"US-M2.1.S2-04","type":"story","title":"View AI pass/fail case-study patterns","story":"As a member of hiring leadership, I want a set of past pass/fail interview write-ups with an AI summary of the dominant failure clusters and a recommendation so that I can improve our interview process.","acceptance_criteria":["Given the case-study set, when the section renders, then each case shows the candidate, role, round, pass/fail result, reason and tags, with pass and fail counts summarised.","Given the failure cases, when the AI summary renders, then it identifies the dominant failure clusters and a recommended process change.","Given the user re-analyzes, when re-analysis runs, then the summary regenerates from the current case studies.","Given no failure cases, when the summary renders, then it states no dominant failure pattern yet rather than fabricating one."],"story_points":3,"roles":["BOD","PMO"],"dependencies":["EN-M2.4-01"],"notes":"AI-generated summary and recommendation are advisory. This screen is built in the mockup but is not currently wired to the tab navigation, so it cannot yet be opened from the live app.","status":"not-started"}]}]},{"id":"M2.2","name":"Requisitions","description":"Position Management & internal-mobility hub: managers/PMO create and manage open requisitions (job positions) on a board/list with a Sourcing→Screening→Interview→Offer stage track; members browse open roles on an internal job board and apply; applications flow through a releasing-EM → receiving-EM → PMO endorsement/approval chain, and PMO approval creates an allocation. Phase-2 module (hiring moves into People).","status":"not-started","screens":[{"id":"M2.2.S1","name":"Requisition Management & Approval","description":"Board/List management view of open positions for management personas: KPI strip, per-requisition card (title→JD, tech-stack tags, note, stage track, inline-editable Status/Start/Due, Open Nd/Overdue badge) and an internal-applicants list. Scoped: BOD/PMO see all, AM own account(s), EM/TL/PM own projects.","roles":["BOD","PMO","AM","EM/TL/PM"],"mockup_ref":{"screen":"hiring/requisitions"},"sub_screens":[{"id":"M2.2.S1.1","name":"KPI strip","description":"Open positions, Internal applicants, Pending review, Approved counters."},{"id":"M2.2.S1.2","name":"Board/List toggle","description":"Switch between card board and table list of open positions."},{"id":"M2.2.S1.3","name":"Requisition card","description":"Stage track + inline status/stage/date edit + Open Nd/Overdue badge."},{"id":"M2.2.S1.4","name":"Applicants-on-card list","description":"Internal applicants per requisition; tap a row to review."}],"items":[{"id":"EN-M2.2-01","type":"enabler","title":"Requisition / open-position data record","story":"Establish the open-position record (title, account, project, grade, type new/replacement, current stage, status, start/due dates, tech stack, JD detail) together with its open/filled/on-hold lifecycle and Sourcing→Screening→Interview→Offer stage progression, as the single source the management board, job board, demand metrics and skill-demand all read.","acceptance_criteria":["Given a requisition exists, when it is read by any view, then title, account, project, grade, type, stage, status, start/due dates, tech stack and JD detail are available","Given a requisition status is set to a stage name, when saved, then it stays Open and its stage advances accordingly; setting Filled or On hold changes status without a stage","Given a requisition is On hold or Filled, when shown, then its stage track reflects paused/completed state rather than an active stage"],"story_points":5,"roles":["BOD","PMO","AM","EM/TL/PM"],"status":"not-started"},{"id":"EN-M2.2-02","type":"enabler","title":"Role-based requisition scoping","story":"Provide the scoping rule that restricts which requisitions and their applicants a management persona sees: BOD/PMO see all, AM sees requisitions for their own account(s), EM/TL/PM see requisitions for their own projects.","acceptance_criteria":["Given I am BOD or PMO, when I open the requisitions view, then I see every requisition company-wide","Given I am an AM, when I open the view, then I see only requisitions belonging to my account(s), with a scope note shown","Given I am an EM/TL/PM, when I open the view, then I see only requisitions for my own projects, with a scope note shown"],"story_points":3,"roles":["BOD","PMO","AM","EM/TL/PM"],"external_deps":[{"needs":"grant-based access (an AM viewing accounts they were specifically granted) and the system audit log of access","likely_module":"M0","reason":"per-person access grants and the audit trail are owned by Admin/access-control"}],"status":"not-started"},{"id":"US-M2.2.S1-01","type":"story","title":"View all open requisitions as BOD/PMO","story":"As a BOD or PMO, I want to view every open requisition company-wide on a board so that I can oversee all hiring demand.","acceptance_criteria":["Given I am BOD or PMO, when the view loads, then all non-filled requisitions across all accounts and projects are listed","Given there are no open requisitions, when the view loads, then an empty state is shown instead of an empty board","Given a requisition exists, when it is shown, then its title, account/project, grade, type and current stage are visible"],"story_points":3,"roles":["BOD","PMO"],"dependencies":["EN-M2.2-01","EN-M2.2-02"],"status":"not-started"},{"id":"US-M2.2.S1-02","type":"story","title":"View account-scoped requisitions as AM","story":"As an AM, I want to view the open requisitions for my own account(s) so that I can manage hiring demand on accounts I own.","acceptance_criteria":["Given I am an AM, when the view loads, then only requisitions for my account(s) are shown with a scope note","Given my account has no open requisitions, when the view loads, then an empty state is shown","Given a requisition belongs to another account, when I browse, then it is not visible to me"],"story_points":2,"roles":["AM"],"dependencies":["EN-M2.2-02"],"status":"not-started","mockup_ref":{"screen":"hiring/requisitions","persona":"am"}},{"id":"US-M2.2.S1-03","type":"story","title":"View project-scoped requisitions as EM/TL/PM","story":"As an EM/TL/PM, I want to view the open requisitions for my own projects so that I can manage hiring demand on teams I run.","acceptance_criteria":["Given I am an EM/TL/PM, when the view loads, then only requisitions for my projects are shown with a scope note","Given my projects have no open requisitions, when the view loads, then an empty state is shown","Given a requisition belongs to another project, when I browse, then it is not visible to me"],"story_points":2,"roles":["EM/TL/PM"],"dependencies":["EN-M2.2-02"],"status":"not-started","mockup_ref":{"screen":"hiring/requisitions","persona":"manager"}},{"id":"US-M2.2.S1-04","type":"story","title":"View requisition KPI strip","story":"As a management user, I want a KPI strip of Open positions, Internal applicants, Pending review and Approved so that I can gauge hiring pipeline health at a glance.","acceptance_criteria":["Given the view loads, when the KPI strip renders, then it shows counts for Open positions, Internal applicants, Pending review and Approved scoped to what I can see","Given there are no applications, when the strip renders, then Internal applicants, Pending review and Approved show zero gracefully","Given an application moves to a decided state, when I refresh, then Pending review and Approved counts update accordingly"],"story_points":3,"roles":["BOD","PMO","AM","EM/TL/PM"],"dependencies":["EN-M2.2-01"],"status":"not-started"},{"id":"US-M2.2.S1-05","type":"story","title":"Toggle requisitions between Board and List","story":"As a management user, I want to switch the open positions between a card board and a table list so that I can read them in whichever layout suits the task.","acceptance_criteria":["Given I am on the requisitions view, when I select List, then the same scoped requisitions are shown as a table of position, account/project, grade, type, stage, applicants count, status and due","Given I am on the List, when I select Board, then the card layout is restored","Given I switch layout, when the view re-renders, then my current scope and data are preserved"],"story_points":2,"roles":["BOD","PMO","AM","EM/TL/PM"],"dependencies":["EN-M2.2-01"],"status":"not-started"},{"id":"US-M2.2.S1-06","type":"story","title":"View requisition card with stage track and ageing badge","story":"As a management user, I want each requisition card to show its tech-stack tags, note, Sourcing→Screening→Interview→Offer stage track and an Open Nd / Overdue badge so that I can see status and ageing at a glance.","acceptance_criteria":["Given a requisition is Open, when its card renders, then the stage track highlights the current stage and the badge shows how many days it has been open","Given a requisition is past its due date, when its card renders, then it shows an Overdue badge instead of an open-days count","Given a requisition is On hold or Filled, when its card renders, then the stage track and status pill reflect that state"],"story_points":3,"roles":["BOD","PMO","AM","EM/TL/PM"],"dependencies":["EN-M2.2-01"],"status":"not-started"},{"id":"US-M2.2.S1-07","type":"story","title":"Inline-edit requisition status, stage and dates","story":"As a management user, I want to inline-edit a requisition's status/stage and its start and due dates so that I can keep the board current without leaving it.","acceptance_criteria":["Given a requisition card, when I pick a stage name as status, then it stays Open and advances to that stage; when I pick Filled or On hold, then its status changes accordingly","Given I change a start or due date, when I confirm, then the card updates and the ageing/Overdue badge recalculates","Given I change any of these fields, when it saves, then the change is recorded to the audit trail"],"story_points":3,"roles":["BOD","PMO","AM","EM/TL/PM"],"dependencies":["EN-M2.2-01"],"status":"not-started"},{"id":"US-M2.2.S1-08","type":"story","title":"View internal applicants on a requisition","story":"As a management user, I want each requisition to list its internal applicants with name, role, applied date and application status so that I can see who is in the running and open one to review.","acceptance_criteria":["Given a requisition has applicants, when its card renders, then each applicant row shows name, role, applied date and current application status","Given a requisition has no applicants, when its card renders, then a clear no-applicants state is shown","Given an applicant row, when I tap it, then the application review opens for that application"],"story_points":2,"roles":["BOD","PMO","AM","EM/TL/PM"],"dependencies":["EN-M2.2-01"],"status":"not-started"}]},{"id":"M2.2.S2","name":"New Requisition form","description":"Modal to raise a new requisition: job title, account, grade, type (new/replacement), required interview mode, due date, comma-separated tech stack, and a required JD detail (About the role, Responsibilities, Requirements, Nice-to-have, one per line). On submit creates an Open requisition at stage 1, saves the JD, and logs to audit.","roles":["BOD","PMO","AM","EM/TL/PM"],"mockup_ref":{"screen":"hiring/requisitions"},"items":[{"id":"US-M2.2.S2-01","type":"story","title":"Create a new requisition with full JD","story":"As a management user, I want to raise a new requisition with its overview fields and full job description so that an open position is posted and ready for applicants.","acceptance_criteria":["Given the New requisition form, then it presents these fields — Overview: Job title (required), Account, Grade (L3/L4/L5), Type (new/replacement), Interview mode (Online/Onsite/Either, required), Due date, Tech stack; JD Detail: About the role (required), Responsibilities, Requirements, Nice to have (optional)","Given the form, when I submit without a job title or without the About-the-role JD detail, then a validation message blocks submission","Given valid input, when I submit, then a new requisition is created Open at the first stage with its tech stack and JD detail saved","Given I enter Responsibilities/Requirements/Nice-to-have one per line, when saved, then each line is captured as a separate JD entry","Given a requisition is created, when it is saved, then the creation is recorded to the audit trail and it appears on the board"],"story_points":5,"roles":["BOD","PMO","AM","EM/TL/PM"],"notes":"Form fields — Overview: Job title (required), Account, Grade (L3/L4/L5), Type (new/replacement), Interview mode (Online/Onsite/Either — required), Due date, Tech stack (comma-separated, shown on the overview card). JD Detail (required): About the role (required), Responsibilities, Requirements, Nice to have (optional) — Responsibilities/Requirements/Nice-to-have are captured one entry per line. A requisition may also be raised from the Project Monitoring backfill flow (which carries a pre-filled title/account/replacement type); the requisition record itself is owned by this sub-module.","dependencies":["EN-M2.2-01"],"status":"not-started"}]},{"id":"M2.2.S3","name":"Job Description detail","description":"Read-only JD modal: stack tags, About the role, Responsibilities, Requirements, Nice-to-have, posted/closes dates. A Member viewing an open (not On-hold) role they have not applied to sees an Apply button.","roles":["BOD","PMO","AM","EM/TL/PM","Member"],"mockup_ref":{"screen":"hiring/requisitions"},"items":[{"id":"US-M2.2.S3-01","type":"story","title":"View read-only job description detail","story":"As any user, I want to open a requisition's full job description so that I can understand the role before acting on it.","acceptance_criteria":["Given a requisition, when I open its JD, then I see stack tags, About the role, Responsibilities, Requirements, Nice-to-have and the posted/closes dates","Given a requisition has no detailed JD, when I open it, then its note or a no-detail message is shown gracefully","Given the JD modal is open, when I close it, then I return to where I was without losing context"],"story_points":3,"roles":["BOD","PMO","AM","EM/TL/PM","Member"],"dependencies":["EN-M2.2-01"],"status":"not-started"},{"id":"US-M2.2.S3-02","type":"story","title":"Apply for a role from the JD","story":"As a Member, I want an Apply button on the job description of an eligible role so that I can apply directly while reading it.","acceptance_criteria":["Given I am a Member viewing an open role I have not applied to, when the JD opens, then an Apply-for-this-role button is shown","Given the role is On hold or I already have a live application for it, when the JD opens, then no Apply button is shown","Given the Apply button, when I tap it, then the apply flow opens for that role"],"story_points":2,"roles":["Member"],"dependencies":["US-M2.2.S5-01"],"status":"not-started","mockup_ref":{"screen":"hiring/requisitions","persona":"employee"}}]},{"id":"M2.2.S4","name":"Internal Job Board / Open Roles","description":"Member-facing render of the requisitions tab: KPI strip (Open roles, Recommended for you, My applications, Approved), a decision banner when applications were decided, a My-applications card (tap → status history), a Recommended-for-you band (AI skill-and-grade match, top 3), and All open positions with Board/List toggle, text search and follow/unfollow. Internal posts intentionally do not publish effort/allocation requirements.","roles":["Member"],"mockup_ref":{"screen":"hiring/requisitions","persona":"employee"},"sub_screens":[{"id":"M2.2.S4.1","name":"Member KPI strip","description":"Open roles, Recommended for you, My applications, Approved."},{"id":"M2.2.S4.2","name":"Decision banner + My applications card","description":"Banner when applications were decided; list of my applications."},{"id":"M2.2.S4.3","name":"Recommended for you band","description":"Top-3 skill-and-grade matched open roles."},{"id":"M2.2.S4.4","name":"All open positions","description":"Board/List toggle + text search + follow/unfollow."}],"items":[{"id":"US-M2.2.S4-01","type":"story","title":"Browse all open roles with toggle and search","story":"As a Member, I want to browse all open positions company-wide with a board/list toggle and text search so that I can find roles to apply for.","acceptance_criteria":["Given I am a Member, when the job board loads, then all non-filled roles are shown with their account/project, grade, type and stack","Given I type in search, when it filters, then only roles matching title, account, project or skill remain and a count of shown-of-total is displayed","Given no role matches my search, when it filters, then a clear no-results message is shown","Given the board, when I toggle to List, then the same roles render as a table and back to cards when toggled again"],"story_points":3,"roles":["Member"],"dependencies":["EN-M2.2-01"],"notes":"Internal posts do not publish effort/allocation requirements; the human approval gate handles fit.","status":"not-started"},{"id":"US-M2.2.S4-02","type":"story","title":"View member job-board KPI strip","story":"As a Member, I want a KPI strip of Open roles, Recommended for you, My applications and Approved so that I can see my internal-mobility status at a glance.","acceptance_criteria":["Given the job board loads, when the strip renders, then it shows Open roles count, my Recommended count, my applications count and my Approved count","Given I have no applications, when the strip renders, then My applications and Approved show zero gracefully","Given I submit or withdraw an application, when I refresh, then the relevant counters update"],"story_points":2,"roles":["Member"],"dependencies":["EN-M2.2-01"],"status":"not-started"},{"id":"US-M2.2.S4-03","type":"story","title":"See recommended roles matched to my skills and grade","story":"As a Member, I want a Recommended-for-you band of the top open roles matched to my skills and grade so that the best stretch fits surface first.","acceptance_criteria":["Given I have a skill and grade profile, when the job board loads, then up to three open (non-paused) roles best matching my skills and grade are shown with a match indicator, highest match first","Given no open role matches my profile, when the board loads, then the recommended band is omitted rather than shown empty","Given a recommended role, when I act on it, then I can view its JD or apply like any other role"],"story_points":5,"roles":["Member"],"dependencies":["EN-M2.2-01","EN-M1.2-01"],"notes":"Match is computed from the member's own skill holdings and grade; supply data is owned by the People Employees model.","status":"not-started"},{"id":"US-M2.2.S4-04","type":"story","title":"View my applications and decision banner","story":"As a Member, I want a My-applications card and a banner when any of my applications have been decided so that I can track and react to outcomes.","acceptance_criteria":["Given I have applications, when the board loads, then each is listed with role, account/project, applied date and current status","Given one or more of my applications were approved or rejected, when the board loads, then a decision banner summarises how many decisions await my attention","Given an application row, when I tap it, then its status history opens","Given I have no applications, when the board loads, then the My-applications card and banner are omitted"],"story_points":3,"roles":["Member"],"dependencies":["EN-M2.2-01"],"status":"not-started"},{"id":"US-M2.2.S4-05","type":"story","title":"Follow or unfollow a role","story":"As a Member, I want to star a role to follow it and unstar to stop so that I can keep track of positions I am interested in.","acceptance_criteria":["Given an open role, when I tap its follow star, then it becomes followed and the star shows active state","Given a followed role, when I tap the star again, then it is unfollowed","Given I follow or unfollow, when the action completes, then a confirmation is shown"],"story_points":2,"roles":["Member"],"dependencies":["EN-M2.2-01"],"status":"not-started"}]},{"id":"M2.2.S5","name":"Apply to a role","description":"Member apply modal: shows role plus the member's current utilization, requires a CV upload, optional why-a-fit note. On submit creates the application (status Submitted), routes it to the releasing EM, and surfaces the applicant as an internal candidate to recruitment. It is a stretch assignment (extra % on top of current work).","roles":["Member"],"mockup_ref":{"screen":"hiring/requisitions","persona":"employee"},"items":[{"id":"US-M2.2.S5-01","type":"story","title":"Apply to a role with CV and optional note","story":"As a Member, I want to apply to an open role by uploading my CV and optionally explaining my fit so that I can be considered for stretch work.","acceptance_criteria":["Given the apply modal, when I try to submit without a CV, then submission is blocked with a prompt to upload one","Given I upload a CV and submit, then an application is created with status Submitted and routed to the releasing EM","Given the modal is open, then it shows the role context and my current utilization and states the role is a stretch assignment on top of my current work","Given I submit, then a confirmation is shown and the application appears under my applications"],"story_points":5,"roles":["Member"],"dependencies":["EN-M2.2-01","EN-M3.4-01","EN-M2.3-01"],"notes":"A stretch assignment adds extra % on top of current work; the application enters the releasing-EM → receiving-EM → PMO chain.","status":"not-started"}]},{"id":"M2.2.S6","name":"Application Review (endorsement → PMO approval)","description":"Review modal with applicant, current utilization, a 4-step tracker (Releasing EM → Receiving EM → PMO review → Decision), applicant note and a full audit timeline. Releasing EM endorses or declines (spare capacity); receiving EM endorses or declines (role wants them); PMO sets an additive allocation %, sees an over-allocation warning if current+new exceeds 100% (must override to proceed), then Approves (creates the allocation) or Rejects with a note. Every transition is logged.","roles":["EM/TL/PM","PMO"],"mockup_ref":{"screen":"hiring/requisitions"},"items":[{"id":"US-M2.2.S6-01","type":"story","title":"View application review with tracker and audit trail","story":"As an EM/TL/PM or PMO, I want to open an application showing the applicant, their current utilization, the 4-step tracker, the applicant note and the full audit timeline so that I can act on it with full context.","acceptance_criteria":["Given an application, when I open the review, then it shows the applicant, role, current utilization, status pill, the 4-step tracker and the applicant's note","Given the review is open, then the full audit timeline of every transition is shown newest-context first","Given the application is at a given stage, then the tracker highlights the current step and marks completed steps"],"story_points":3,"roles":["EM/TL/PM","PMO"],"dependencies":["EN-M2.2-01","EN-M3.4-01"],"status":"not-started"},{"id":"US-M2.2.S6-02","type":"story","title":"Releasing EM endorses or declines","story":"As the releasing EM/TL/PM, I want to endorse that I can spare the applicant's capacity or decline so that only viable applications move forward.","acceptance_criteria":["Given an application is Submitted, when I record a releasing-EM endorsement, then its status advances to Receiving EM and the transition is logged","Given I decline, when I confirm, then the application is rejected, ends, and the applicant will see the decision and reason in their history","Given I act, then the transition is recorded to the audit trail"],"story_points":3,"roles":["EM/TL/PM"],"dependencies":["US-M2.2.S6-01"],"status":"not-started"},{"id":"US-M2.2.S6-03","type":"story","title":"Receiving EM endorses or declines","story":"As the receiving EM/TL/PM, I want to endorse that the role wants this person or decline so that PMO only reviews mutually-confirmed applications.","acceptance_criteria":["Given an application is at Receiving EM, when I record a receiving-EM endorsement, then its status advances to PMO review and the transition is logged","Given I decline, when I confirm, then the application is rejected and ends, with the reason visible in the applicant's history","Given I act, then the transition is recorded to the audit trail"],"story_points":3,"roles":["EM/TL/PM"],"dependencies":["US-M2.2.S6-01"],"status":"not-started"},{"id":"US-M2.2.S6-04","type":"story","title":"PMO approves and sets allocation","story":"As PMO, I want to set an additive allocation % and approve an application so that the internal move is confirmed and the allocation is created.","acceptance_criteria":["Given an application is at PMO review, when I set an allocation % and approve, then the application becomes Approved at that %, the decision and note are logged","Given the applicant's current utilization plus the new % exceeds 100, when I approve, then an over-allocation warning appears and I must tick an override to proceed","Given I do not tick the override, when I try to approve an over-allocating %, then approval is blocked with the warning","Given approval succeeds, then the resulting allocation is recorded to the audit trail"],"story_points":5,"roles":["PMO"],"dependencies":["US-M2.2.S6-01","EN-M3.4-01"],"notes":"Allocation is additive (stretch, on top of current). Over-allocation (over 100%) requires an explicit override. Creating the allocation and the utilization figure are owned by the PM RA Monitoring model (EN-M3.4-01); this story is the approval decision and the additive-percent / override gate.","status":"not-started"},{"id":"US-M2.2.S6-05","type":"story","title":"PMO rejects with a note","story":"As PMO, I want to reject an application with a note so that the applicant and record capture the rationale.","acceptance_criteria":["Given an application is at PMO review, when I reject with a note and confirm, then the application becomes Rejected and the note is logged","Given I confirm rejection, then the decision is recorded to the audit trail and cannot be undone","Given the application is rejected, then the applicant sees the outcome and note in their status history"],"story_points":3,"roles":["PMO"],"dependencies":["US-M2.2.S6-01"],"status":"not-started"}]},{"id":"M2.2.S7","name":"My Application detail","description":"Member modal showing the application status pill, the job description and the full status history; while the application is still in flight (Submitted / Receiving EM / PMO review) the member can withdraw it.","roles":["Member"],"mockup_ref":{"screen":"hiring/requisitions","persona":"employee"},"items":[{"id":"US-M2.2.S7-01","type":"story","title":"View my application detail and status history","story":"As a Member, I want to open my application to see its status, the job description and the full status history so that I know exactly where it stands.","acceptance_criteria":["Given one of my applications, when I open it, then it shows the current status pill, the applied date, the role's job description and the full status history","Given the application has progressed through endorsements or a decision, then each step appears in the history with its actor, timestamp and note","Given I close the modal, then I return to the job board without losing context"],"story_points":3,"roles":["Member"],"dependencies":["EN-M2.2-01"],"status":"not-started"},{"id":"US-M2.2.S7-02","type":"story","title":"Withdraw my in-flight application","story":"As a Member, I want to withdraw an application that is still in progress so that I can pull out before a decision is made.","acceptance_criteria":["Given my application is Submitted, at Receiving EM or at PMO review, when I open it, then a Withdraw action is available","Given my application is already Approved, Rejected or Withdrawn, when I open it, then no Withdraw action is shown","Given I confirm withdrawal, then the application becomes Withdrawn, the action is logged, and I am told I can re-apply later while the role is open"],"story_points":3,"roles":["Member"],"dependencies":["US-M2.2.S7-01"],"notes":"Withdrawal is allowed only while in flight (Submitted / Receiving EM / PMO review); the member may re-apply later while the role is open.","status":"not-started"}]}]},{"id":"M2.3","name":"Candidates","description":"The external recruitment pipeline: a kanban of candidates progressing New → Screening → Interview → Offer → Hired (plus Rejected), a candidate detail drawer for stage moves / rejection / interview scheduling, a CV-parse intake form, and a talent pool that re-matches rejected candidates to open roles. Candidate visibility is scoped exactly like requisitions (BOD/PMO see all; AM sees their account's roles; EM/TL/PM sees their projects' roles).","status":"not-started","screens":[{"id":"M2.3.S1","name":"Candidate Pipeline","description":"A KPI strip of per-stage counts, a search/open-role filter toolbar with a Board/List toggle, a 5-column kanban of candidate cards (with age-in-stage warning badges), a List table alternative, and a Talent pool of rejected candidates auto-matched to open roles.","roles":["BOD","PMO","AM","EM/TL/PM"],"mockup_ref":{"screen":"hiring/candidates"},"sub_screens":[{"id":"M2.3.S1.1","name":"Stage KPI strip"},{"id":"M2.3.S1.2","name":"Search, open-role filter & Board/List toggle"},{"id":"M2.3.S1.3","name":"Kanban columns & candidate card (age-in-stage)"},{"id":"M2.3.S1.4","name":"Talent pool (rejected re-match)"}],"items":[{"id":"EN-M2.3-01","type":"enabler","title":"Candidate data record & pipeline lifecycle","story":"Provide the candidate record and its pipeline lifecycle: identity and contact, seniority, the requisition applied for, source, rating, skills, parsed CV and notes, with status across New → Screening → Interview → Offer → Hired plus Rejected, and a full activity history of every creation, stage change and decision. This record is also the home for internal applicants ingested from the Requisitions apply flow (source 'Internal application').","acceptance_criteria":["Given a candidate is created (via CV intake or internal application), when the record is saved, then it stores identity, contact, seniority, the applied requisition, source, rating, skills, CV and notes with status New.","Given any stage change, rejection or hire, when it occurs, then it is appended to the candidate's activity history with actor and timestamp.","Given an internal applicant submitted through the Requisitions apply flow, when it is ingested, then a candidate record is created here with source 'Internal application'."],"story_points":5,"roles":["BOD","PMO","AM","EM/TL/PM"],"dependencies":["EN-M2.2-01"],"notes":"Candidate visibility scoping is intentionally not built here; it is reused from the Requisitions role-based scoping (EN-M2.2-02) by the role-scoped pipeline views.","status":"not-started"},{"id":"US-M2.3.S1-01","type":"story","title":"View stage KPI strip","story":"As a recruiter or hiring stakeholder (BOD/PMO/AM/EM/TL/PM), I want a strip of per-stage candidate counts so that I can see pipeline health at a glance.","acceptance_criteria":["Given I open the candidate pipeline, when it loads, then I see counts for New, Screening, Interviewing, Offering and Hired plus a separate Cancelled/Rejected count.","Given a stage has no candidates, when I view the strip, then that stage shows zero."],"story_points":3,"roles":["BOD","PMO","AM","EM/TL/PM"],"dependencies":["EN-M2.3-01"],"status":"not-started"},{"id":"US-M2.3.S1-02","type":"story","title":"View full candidate pipeline kanban (BOD/PMO)","story":"As a BOD or PMO user, I want to see every candidate on a 5-column kanban so that I can oversee the whole recruitment pipeline.","acceptance_criteria":["Given I am BOD or PMO, when I open the pipeline in Board view, then I see columns New, Screening, Interview, Offer and Hired, each listing its candidate cards with a per-column count.","Given a column has no candidates, when I view it, then an empty placeholder is shown.","Given a candidate is Hired or Rejected, when I view the active columns, then they no longer appear in the in-progress stages."],"story_points":3,"roles":["BOD","PMO"],"dependencies":["EN-M2.3-01"],"status":"not-started"},{"id":"US-M2.3.S1-03","type":"story","title":"View account-scoped pipeline as AM","story":"As an Account Manager, I want the pipeline limited to candidates applying for roles on my account(s) so that I only see candidates relevant to me.","acceptance_criteria":["Given I am an Account Manager, when I open the pipeline, then I only see candidates applying to roles on my account(s) across the board, list and counts.","Given a candidate applies to a role outside my account, when I view the pipeline, then they are hidden from me."],"story_points":2,"roles":["AM"],"mockup_ref":{"screen":"hiring/candidates","persona":"am"},"dependencies":["EN-M2.3-01","EN-M2.2-01","EN-M2.2-02"],"status":"not-started"},{"id":"US-M2.3.S1-04","type":"story","title":"View project-scoped pipeline as EM/TL/PM","story":"As an EM/TL/PM, I want the pipeline limited to candidates applying for roles on my project(s) so that I only see candidates relevant to my team.","acceptance_criteria":["Given I am an EM/TL/PM, when I open the pipeline, then I only see candidates applying to roles on my project(s).","Given a candidate applies to a role on another project, when I view the
