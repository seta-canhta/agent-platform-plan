<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Agent Platform — WBS</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Instrument+Serif:ital@0;1&family=Archivo:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/d3@7"></script>
<script src="https://cdn.jsdelivr.net/npm/xlsx-js-style@1.2.0/dist/xlsx.bundle.js"></script>
<style>
  :root {
    --paper:   #eef2f8;
    --paper-2: #f6f8fc;
    --ink:     #1c2738;
    --ink-dim: #5a6b82;
    --ink-faint:#94a3b8;
    --line:    rgba(40,72,116,0.14);
    --line-bright: rgba(37,99,235,0.45);
    --card:    #ffffff;
    --accent:  #2563eb;
    --done:    #16a34a;
    --prog:    #d97706;
    --block:   #dc2626;
    --idle:    #64748b;
    --enabler: #7c3aed;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  html, body { height: 100%; }
  body {
    font-family: 'Archivo', system-ui, sans-serif;
    color: var(--ink);
    background-color: var(--paper);
    background-image:
      radial-gradient(circle at 1px 1px, rgba(40,80,140,0.10) 1px, transparent 0),
      radial-gradient(circle at 1px 1px, rgba(40,80,140,0.05) 1px, transparent 0);
    background-size: 28px 28px, 140px 140px;
    overflow: hidden;
    position: relative;
  }
  /* soft paper lighting */
  body::before {
    content: ''; position: fixed; inset: 0; pointer-events: none; z-index: 0;
    background:
      radial-gradient(75% 60% at 15% -5%, rgba(255,255,255,0.85), transparent 60%),
      radial-gradient(60% 60% at 100% 105%, rgba(219,232,250,0.55), transparent 55%);
  }

  /* ── instrument bar ─────────────────────────────────────── */
  #header {
    position: fixed; top: 0; left: 0; right: 0; z-index: 100;
    height: 60px; padding: 0 22px;
    display: flex; align-items: center; gap: 22px;
    background: linear-gradient(180deg, rgba(255,255,255,0.92), rgba(246,248,252,0.74));
    border-bottom: 1px solid var(--line);
    backdrop-filter: blur(10px) saturate(120%);
  }
  #header h1 {
    font-family: 'Instrument Serif', Georgia, serif;
    font-size: 26px; font-weight: 400; font-style: italic;
    letter-spacing: 0.2px; color: var(--ink); white-space: nowrap;
  }
  #header h1 .v { font-family: 'JetBrains Mono', monospace; font-style: normal; font-size: 11px; color: var(--accent); vertical-align: super; margin-left: 5px; }
  .rule { width: 1px; height: 30px; background: var(--line); }
  .readout { display: flex; flex-direction: column; gap: 2px; }
  .readout .k { font-family: 'JetBrains Mono', monospace; font-size: 9px; letter-spacing: 1.5px; text-transform: uppercase; color: var(--ink-faint); }
  .readout .val { font-family: 'JetBrains Mono', monospace; font-size: 15px; font-weight: 600; color: var(--ink); }
  .readout .val small { font-size: 10px; color: var(--ink-dim); font-weight: 400; margin-left: 5px; }
  .hist { display: flex; gap: 5px; align-items: flex-end; height: 30px; padding-bottom: 11px; }
  .hist .bar { width: 13px; background: linear-gradient(180deg, var(--accent), rgba(37,99,235,0.35)); border-radius: 2px 2px 0 0; position: relative; min-height: 2px; }
  .hist .bar span { position: absolute; bottom: -12px; left: 0; right: 0; text-align: center; font-family: 'JetBrains Mono', monospace; font-size: 8px; color: var(--ink-faint); }

  #live { margin-left: auto; display: flex; align-items: center; gap: 7px; font-family: 'JetBrains Mono', monospace; font-size: 10px; letter-spacing: 1px; text-transform: uppercase; padding: 5px 11px; border-radius: 20px; border: 1px solid var(--line); background: var(--card); }
  #live::before { content: ''; width: 7px; height: 7px; border-radius: 50%; }
  #live.on  { color: var(--done); border-color: rgba(22,163,74,0.35); }
  #live.on::before  { background: var(--done); box-shadow: 0 0 0 0 rgba(22,163,74,0.5); animation: pulse 2s infinite; }
  #live.off { color: var(--block); border-color: rgba(220,38,38,0.3); }
  #live.off::before { background: var(--block); }
  @keyframes pulse { 0% { box-shadow: 0 0 0 0 rgba(22,163,74,0.45); } 70% { box-shadow: 0 0 0 7px rgba(22,163,74,0); } 100% { box-shadow: 0 0 0 0 rgba(22,163,74,0); } }

  .legend { display: flex; gap: 13px; font-size: 10.5px; color: var(--ink-dim); font-family: 'JetBrains Mono', monospace; letter-spacing: 0.3px; }
  .legend-item { display: flex; align-items: center; gap: 6px; }
  .legend-dot { width: 8px; height: 8px; border-radius: 2px; }
  #hint { font-size: 10px; color: var(--ink-faint); font-family: 'JetBrains Mono', monospace; letter-spacing: 0.3px; }

  #svg-container { position: fixed; inset: 60px 0 0 0; z-index: 1; }
  #tree-svg { width: 100%; height: 100%; cursor: grab; display: block; }
  #tree-svg:active { cursor: grabbing; }

  /* ── mindmap nodes & links ──────────────────────────────── */
  .link { fill: none; stroke: var(--line-bright); stroke-width: 1.3px; opacity: 0.4; }
  .node { cursor: pointer; }
  .node text { pointer-events: none; }
  .node-bg { transition: stroke .16s ease, filter .16s ease; }
  .node:hover .node-bg { stroke: var(--accent); filter: drop-shadow(0 6px 18px rgba(37,99,235,0.22)); }
  .node .node-id    { font-family: 'JetBrains Mono', monospace; font-size: 9.5px; fill: var(--accent); opacity: 0.9; letter-spacing: 0.3px; }
  .node .node-name  { font-family: 'Archivo', sans-serif; font-weight: 600; font-size: 12px; fill: var(--ink); }
  .node .node-name.is-module { font-weight: 800; font-size: 13px; letter-spacing: 0.2px; }
  .node .node-sp    { font-family: 'JetBrains Mono', monospace; font-size: 10px; font-weight: 700; }
  .node .node-meta  { font-family: 'JetBrains Mono', monospace; font-size: 9px; fill: var(--ink-faint); letter-spacing: 0.5px; }
  .node .node-expand{ font-family: 'JetBrains Mono', monospace; font-size: 10px; fill: var(--ink-dim); }

  /* ── tooltip ────────────────────────────────────────────── */
  .tooltip {
    position: fixed; z-index: 200; max-width: 380px; pointer-events: none;
    opacity: 0; transform: translateY(4px); transition: opacity .16s, transform .16s;
    background: var(--card); border: 1px solid var(--line); border-radius: 10px;
    padding: 13px 16px; font-size: 12.5px; line-height: 1.6; color: var(--ink-dim);
    box-shadow: 0 18px 44px rgba(28,46,82,0.18);
  }
  .tooltip.visible { opacity: 1; transform: translateY(0); }
  .tt-id { font-family: 'JetBrains Mono', monospace; font-size: 10px; letter-spacing: 1px; color: var(--accent); }
  .tt-name { font-family: 'Archivo', sans-serif; font-weight: 700; font-size: 14px; color: var(--ink); margin: 2px 0 8px; line-height: 1.3; }
  .tt-badge { display: inline-block; font-family: 'JetBrains Mono', monospace; font-size: 10px; font-weight: 600; letter-spacing: 0.5px; padding: 2px 9px; border-radius: 5px; margin-bottom: 9px; border: 1px solid currentColor; }
  .tt-story { color: var(--ink); }
  .tt-ac { margin-top: 9px; }
  .tt-ac b { font-family: 'JetBrains Mono', monospace; font-size: 9px; letter-spacing: 1.5px; text-transform: uppercase; color: var(--ink-faint); }
  .tt-ac ul { list-style: none; margin-top: 4px; }
  .tt-ac li { position: relative; padding-left: 16px; margin: 4px 0; color: var(--ink-dim); }
  .tt-ac li::before { content: '▸'; position: absolute; left: 2px; color: var(--accent); }
  .tt-meta { margin-top: 8px; font-family: 'JetBrains Mono', monospace; font-size: 10.5px; color: var(--ink-faint); }
  .dep-link { color: var(--accent); text-decoration: underline; text-underline-offset: 2px; cursor: pointer; }
  .tooltip .dep-link { pointer-events: none; }

  /* ── detail modal (click to pin) ────────────────────────── */
  .modal-back {
    position: fixed; inset: 0; z-index: 250; display: flex; align-items: center; justify-content: center;
    background: rgba(20,34,60,0.34); opacity: 0; pointer-events: none; transition: opacity .18s;
  }
  .modal-back.visible { opacity: 1; pointer-events: auto; }
  .modal-panel {
    position: relative; max-width: 1100px; width: calc(100% - 56px); max-height: 90vh; overflow-y: auto;
    background: var(--card); border: 1px solid var(--line); border-radius: 14px;
    padding: 34px 40px; font-size: 15px; line-height: 1.7; color: var(--ink-dim);
    box-shadow: 0 28px 70px rgba(28,46,82,0.32);
    transform: translateY(8px) scale(.98); transition: transform .18s;
  }
  .modal-panel .tt-id { font-size: 12px; }
  .modal-panel .tt-name { font-size: 19px; margin: 4px 0 12px; }
  .modal-panel .tt-badge { font-size: 12px; padding: 3px 12px; margin-bottom: 12px; }
  .modal-panel .tt-ac b { font-size: 11px; }
  .modal-panel .tt-ac li { padding-left: 20px; margin: 7px 0; }
  .modal-panel .tt-meta { font-size: 13px; margin-top: 11px; }
  .modal-back.visible .modal-panel { transform: translateY(0) scale(1); }
  .modal-close {
    position: absolute; top: 10px; right: 12px; width: 26px; height: 26px; border: none; cursor: pointer;
    background: none; color: var(--ink-faint); font-size: 22px; line-height: 1; border-radius: 6px;
    transition: background .14s, color .14s;
  }
  .modal-close:hover { background: rgba(37,99,235,0.08); color: var(--accent); }

  /* ── related-screen screenshot (modal only) ─────────────── */
  .tt-shot-wrap { margin-top: 16px; }
  .tt-shot-h { display: block; font-family: 'JetBrains Mono', monospace; font-size: 11px; letter-spacing: 1.5px; color: var(--ink-faint); margin-bottom: 7px; }
  .tt-shot {
    display: block; width: 100%; height: auto; border-radius: 10px;
    border: 1px solid var(--line); background: var(--paper-2);
    box-shadow: 0 8px 24px rgba(28,46,82,0.14); transition: box-shadow .16s, transform .08s;
  }
  .tt-shot-wrap a { display: block; }
  .tt-shot-wrap a:hover .tt-shot { box-shadow: 0 12px 32px rgba(37,99,235,0.26); }
  .tt-shot-wrap a:active .tt-shot { transform: translateY(1px); }

  #flash {
    position: fixed; bottom: 26px; left: 50%; transform: translateX(-50%) translateY(24px);
    z-index: 300; pointer-events: none; opacity: 0; transition: all .3s cubic-bezier(.2,.9,.3,1);
    font-family: 'JetBrains Mono', monospace; font-size: 11px; letter-spacing: 1px; text-transform: uppercase;
    color: #fff; background: var(--accent); padding: 9px 20px; border-radius: 22px;
    box-shadow: 0 8px 24px rgba(37,99,235,0.35);
  }
  #flash.show { opacity: 1; transform: translateX(-50%) translateY(0); }
  #err {
    position: fixed; top: 60px; left: 0; right: 0; z-index: 90; display: none;
    background: #fef2f2; border-bottom: 1px solid var(--block);
    color: #b91c1c; font-family: 'JetBrains Mono', monospace; font-size: 11.5px;
    padding: 10px 22px; white-space: pre-wrap;
  }

  /* ── page nav (two items) + export ──────────────────────── */
  .nav { display: flex; gap: 2px; padding: 3px; background: var(--paper); border: 1px solid var(--line); border-radius: 9px; }
  .nav-item {
    display: flex; align-items: center; gap: 7px; text-decoration: none; white-space: nowrap; cursor: pointer;
    font-family: 'JetBrains Mono', monospace; font-size: 10.5px; letter-spacing: 0.6px; text-transform: uppercase;
    color: var(--ink-dim); background: none; border-radius: 6px;
    padding: 6px 13px; transition: background .14s, color .14s;
  }
  .nav-item:hover { color: var(--ink); }
  .nav-item.active { color: #fff; background: var(--accent); box-shadow: 0 2px 8px rgba(37,99,235,0.32); }
  #btn-export {
    font-family: 'JetBrains Mono', monospace; font-size: 10.5px; letter-spacing: 0.6px; text-transform: uppercase;
    display: flex; align-items: center; gap: 7px; cursor: pointer;
    color: var(--done); background: var(--card); border: 1px solid rgba(22,163,74,0.35); border-radius: 8px;
    padding: 7px 14px; transition: background .14s, box-shadow .14s, transform .08s;
  }
  #btn-export:hover { background: rgba(22,163,74,0.08); box-shadow: 0 4px 14px rgba(22,163,74,0.18); }
  #btn-export:active { transform: translateY(1px); }
  #btn-export svg { width: 13px; height: 13px; }

  /* ── table view ─────────────────────────────────────────── */
  #table-container { position: fixed; inset: 60px 0 0 0; z-index: 1; display: none; flex-direction: column; background: var(--card); }
  body.page-table #table-container { display: flex; }
  body.page-table #svg-container, body.page-table #hint { display: none; }
  body.page-map #table-container { display: none; }

  .t-toolbar {
    display: flex; align-items: center; gap: 16px; padding: 10px 22px; flex: 0 0 auto;
    background: linear-gradient(180deg, rgba(255,255,255,0.9), rgba(246,248,252,0.7));
    border-bottom: 1px solid var(--line); backdrop-filter: blur(6px);
  }
  .t-search { display: flex; align-items: center; gap: 8px; color: var(--ink-faint);
    background: var(--card); border: 1px solid var(--line); border-radius: 8px; padding: 6px 11px; min-width: 320px; }
  .t-search:focus-within { border-color: var(--line-bright); box-shadow: 0 0 0 3px rgba(37,99,235,0.1); }
  .t-search input { border: none; outline: none; background: none; flex: 1;
    font-family: 'JetBrains Mono', monospace; font-size: 12px; color: var(--ink); letter-spacing: 0.2px; }
  .t-search input::placeholder { color: var(--ink-faint); }
  .t-count { font-family: 'JetBrains Mono', monospace; font-size: 11px; font-weight: 600; color: var(--accent); white-space: nowrap; }
  .t-hint { margin-left: auto; font-family: 'JetBrains Mono', monospace; font-size: 10px; color: var(--ink-faint); letter-spacing: 0.3px; }

  .t-scroll { flex: 1 1 auto; overflow: auto; padding: 0 0 60px; background: var(--card); }
  .t-table { border-collapse: separate; border-spacing: 0; min-width: 100%; font-size: 12px; background: var(--card); }
  .t-table thead th {
    position: sticky; top: 0; z-index: 5; text-align: left; cursor: pointer; user-select: none;
    font-family: 'JetBrains Mono', monospace; font-size: 9.5px; font-weight: 600; letter-spacing: 0.8px; text-transform: uppercase;
    color: var(--ink-dim); background: var(--paper-2); padding: 10px 12px; white-space: nowrap;
    border-bottom: 2px solid var(--line-bright); box-shadow: 0 1px 0 var(--line);
  }
  .t-table thead th:hover { color: var(--accent); }
  .t-table th.sorted { color: var(--accent); }
  .t-table th .sort-i { margin-left: 5px; font-size: 8px; }
  .th-num span, .td-num { text-align: center; }

  .t-table td { padding: 8px 12px; border-bottom: 1px solid var(--line); vertical-align: top; color: var(--ink); line-height: 1.5; }
  .t-table tbody tr:hover td { background: rgba(37,99,235,0.045); }
  .t-table tr.is-enabler td { background: rgba(124,58,237,0.04); }
  .t-table tr.is-enabler:hover td { background: rgba(124,58,237,0.08); }
  .td-code { font-family: 'JetBrains Mono', monospace; font-size: 11px; color: var(--ink-dim); white-space: nowrap; }
  .td-num { font-family: 'JetBrains Mono', monospace; font-weight: 700; color: var(--accent); }
  .td-text { white-space: normal; min-width: 120px; max-width: 210px; }
  .td-wide { white-space: normal; }
  .td-wide .t-wide { min-width: 240px; max-width: 380px; color: var(--ink); font-size: 12px; }
  .td-tag { white-space: nowrap; text-align: center; }
  .t-tag { display: inline-block; font-family: 'JetBrains Mono', monospace; font-size: 9px; font-weight: 600;
    letter-spacing: 0.5px; text-transform: uppercase; padding: 2px 8px; border-radius: 5px; border: 1px solid currentColor; }
  .t-sp { font-family: 'JetBrains Mono', monospace; }
  .t-ac { list-style: none; min-width: 260px; max-width: 420px; }
  .t-ac li { position: relative; padding-left: 15px; margin: 3px 0; color: #34425a; font-size: 12px; line-height: 1.5; }
  .t-ac li::before { content: '▸'; position: absolute; left: 2px; color: var(--accent); }
  .t-dep { font-family: 'JetBrains Mono', monospace; font-size: 11px; color: var(--ink-dim); white-space: nowrap; }
  .t-dep.x { color: var(--block); }

  /* band/total use an inner flex div — flex on a <td> would cancel its colspan */
  .t-band td { padding: 0; position: sticky; top: 34px; z-index: 4; }
  .t-band-row { display: flex; align-items: center; gap: 12px; padding: 8px 14px; cursor: pointer;
    background: linear-gradient(180deg, #eef3fb, #e6edf8); border-bottom: 2px solid var(--line-bright);
    transition: background .12s; user-select: none; }
  .t-band-row:hover { background: linear-gradient(180deg, #e6eefb, #dde8f6); }
  .t-band .b-caret { font-family: 'JetBrains Mono', monospace; font-size: 10px; color: var(--accent); width: 10px; text-align: center; }
  .t-band .b-id { font-family: 'JetBrains Mono', monospace; font-size: 10px; font-weight: 700; color: var(--accent); }
  .t-band .b-name { font-family: 'Archivo', sans-serif; font-weight: 800; font-size: 13px; color: var(--ink); }
  .t-band .b-stat { margin-left: auto; font-family: 'JetBrains Mono', monospace; font-size: 10.5px; color: var(--ink-dim); }
  .t-empty { text-align: center; color: var(--ink-faint); padding: 40px; font-family: 'JetBrains Mono', monospace; font-size: 12px; }
</style>
</head>
<body class="page-map">

<div id="header">
  <h1 id="title"></h1>
  <div class="rule"></div>
  <nav class="nav">
    <a class="nav-item active" href="index.html">◰ Mindmap</a>
    <a class="nav-item" href="table.html">▦ Table</a>
  </nav>
  <div class="rule"></div>
  <div class="readout"><span class="k">Items</span><span class="val" id="s-items"></span></div>
  <div class="readout"><span class="k">Points</span><span class="val" id="s-points"></span></div>
  <div class="readout"><span class="k">Blockers</span><span class="val" id="s-blockers"></span></div>
  <div class="readout"><span class="k">Distribution</span><div class="hist" id="hist"></div></div>
  <span id="live" class="off">offline</span>
  <div class="rule"></div>
  <div class="legend">
    <span class="legend-item"><span class="legend-dot" style="background:var(--done)"></span>done</span>
    <span class="legend-item"><span class="legend-dot" style="background:var(--prog)"></span>active</span>
    <span class="legend-item"><span class="legend-dot" style="background:var(--block)"></span>blocked</span>
    <span class="legend-item"><span class="legend-dot" style="background:var(--idle)"></span>queued</span>
    <span class="legend-item"><span class="legend-dot" style="background:var(--enabler)"></span>enabler</span>
  </div>
</div>
<div id="err"></div>
<div id="svg-container"><svg id="tree-svg"></svg></div>
<div id="table-container"></div>
<div class="tooltip" id="tooltip"></div>
<div class="modal-back" id="modal-back"><div class="modal-panel"><button class="modal-close" id="modal-close" aria-label="Close">×</button><div id="modal-body"></div></div></div>
<div id="hint" style="position:fixed; bottom:14px; left:22px; z-index:80;">drag · scroll-zoom · click branch to expand · click item for detail</div>

<script>/* WBS row-shaping — the single source of truth for both the table view and the
   Excel export, so the two can never drift. Plain browser script (no modules).
   Exposes window.WBS.toRows(data) → { columns, rows, modules, total }.

   One row per item (story | enabler). Hierarchy (Module ▸ Epic ▸ Screen) is
   carried in columns; a deterministic WBS code (m.s.sc.i, 1-based ordinals)
   gives the outline. modules[] / total carry the subtotals both views render. */
(function () {
  // Column contract — order, header label, kind (drives alignment/width/wrap),
  // and an Excel column width in characters. `kind`: code | text | wide | num | tag.
  const COLUMNS = [
    { key: 'wbs',    label: 'WBS',                 kind: 'code', width: 10 },
    { key: 'module', label: 'Module',              kind: 'text', width: 20 },
    { key: 'epic',   label: 'Epic',                kind: 'text', width: 24 },
    { key: 'screen', label: 'Screen',              kind: 'text', width: 22 },
    { key: 'id',     label: 'Item ID',             kind: 'code', width: 16 },
    { key: 'type',   label: 'Type',                kind: 'tag',  width: 9  },
    { key: 'title',  label: 'Title',               kind: 'text', width: 34 },
    { key: 'story',  label: 'User Story',          kind: 'wide', width: 52 },
    { key: 'ac',     label: 'Acceptance Criteria', kind: 'wide', width: 60 },
    { key: 'sp',     label: 'SP',                  kind: 'num',  width: 5  },
    { key: 'roles',  label: 'Roles',               kind: 'text', width: 22 },
    { key: 'deps',   label: 'Dependencies',        kind: 'text', width: 22 },
    { key: 'notes',  label: 'Notes',               kind: 'wide', width: 40 },
    { key: 'status', label: 'Status',              kind: 'tag',  width: 13 },
  ];

  const join = (a, sep) => (Array.isArray(a) ? a.filter(Boolean).join(sep) : (a || ''));
  const normExt = (e) => (typeof e === 'string' ? { needs: e } : (e || {}));

  function toRows(data) {
    // id → module id, so a dependency can be flagged cross-module.
    const idMod = {};
    for (const m of data.modules || [])
      for (const sm of m.sub_modules || [])
        for (const sc of sm.screens || [])
          for (const it of sc.items || []) idMod[it.id] = m.id;

    const rows = [];
    const modules = [];
    let gItems = 0, gPoints = 0;

    (data.modules || []).forEach((m, mi) => {
      let modItems = 0, modPoints = 0;
      (m.sub_modules || []).forEach((sm, si) => {
        (sm.screens || []).forEach((sc, ci) => {
          (sc.items || []).forEach((it, ii) => {
            const deps = (it.dependencies || []).map((d) =>
              idMod[d] && idMod[d] !== m.id ? d + ' ⤴' : d);

  const ENABLER = '#7c3aed';
  const statusColor = (s) => STATUS[s] || STATUS['not-started'];
  const stripColor = (r) => (r._type === 'enabler' ? ENABLER : statusColor(r._status));
  const statusLabel = (s) => ({ 'not-started': 'queued', 'in-progress': 'active' }[s] || s);

  const esc = (s) => String(s == null ? '' : s)
    .replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;');
  const lines = (s) => esc(s).split('\n').filter(Boolean);

  // Per-column-kind cell HTML.
  function cell(r, col) {
    const v = r[col.key];
    if (col.key === 'type') {
      const c = r._type === 'enabler' ? ENABLER : 'var(--ink-dim)';
      return `<span class="t-tag" style="color:${c};border-color:${c}">${esc(v)}</span>`;
    }
    if (col.key === 'status') {
      const c = statusColor(r._status);
      return `<span class="t-tag" style="color:${c};border-color:${c}">${esc(statusLabel(r._status))}</span>`;
    }
    if (col.key === 'sp') return `<span class="t-sp">${esc(v)}</span>`;
    if (col.key === 'ac' && v) return `<ul class="t-ac">${lines(v).map((l) => `<li>${l}</li>`).join('')}</ul>`;
    if (col.key === 'deps' && v) {
      return lines(v).map((l) => {
        const warn = /[⤴⚠]/.test(l);
        return `<div class="t-dep${warn ? ' x' : ''}">${l}</div>`;
      }).join('');
    }
    if (col.kind === 'code') return `<span class="t-code">${esc(v)}</span>`;
    if (col.kind === 'wide') return `<div class="t-wide">${esc(v).replace(/\n/g, '<br>')}</div>`;
    return esc(v);
  }

  function renderTable(data) {
    const host = document.getElementById('table-container');
    if (!host) return;
    const { columns, rows, modules, total } = window.WBS.toRows(data);
    const modName = Object.fromEntries(modules.map((m) => [m.id, m]));

    const state = { q: '', sort: null, dir: 1, collapsed: new Set() }; // sort:null ⇒ natural WBS order (grouped)

    host.innerHTML = `
      <div class="t-toolbar">
        <div class="t-search">
          <svg viewBox="0 0 24 24" width="13" height="13" aria-hidden="true"><path fill="none" stroke="currentColor" stroke-width="2" d="M10 4a6 6 0 1 0 0 12A6 6 0 0 0 10 4zm5 11 5 5"/></svg>
          <input id="t-q" type="text" placeholder="filter id · title · story · role · screen" autocomplete="off" spellcheck="false">
        </div>
        <span class="t-count" id="t-count"></span>
        <span class="t-hint">click a header to sort · click WBS to restore groups</span>
      </div>
      <div class="t-scroll">
        <table class="t-table">
          <thead><tr>${columns.map((c) =>
            `<th data-key="${c.key}" class="th-${c.kind}"><span>${esc(c.label)}</span><i class="sort-i"></i></th>`).join('')}</tr></thead>
          <tbody id="t-body"></tbody>
        </table>
      </div>`;

    const body = host.querySelector('#t-body');
    const count = host.querySelector('#t-count');
    const ncol = columns.length;

    function visibleRows() {
      let rs = rows;
      const q = state.q.trim().toLowerCase();
      if (q) rs = rs.filter((r) =>
        (r.id + ' ' + r.title + ' ' + r.story + ' ' + r.roles + ' ' + r.epic + ' ' + r.screen)
          .toLowerCase().includes(q));
      if (state.sort) {
        const k = state.sort, d = state.dir;
        rs = rs.slice().sort((a, b) => {
          let x = a[k], y = b[k];
          if (k === 'sp') return (x - y) * d;
          return String(x).localeCompare(String(y), undefined, { numeric: true }) * d;
        });
      }
      return rs;
    }

    function rowHtml(r) {
      return `<tr class="${r._type === 'enabler' ? 'is-enabler' : ''}">` +
        columns.map((c, i) => {
          const strip = i === 0 ? ` style="box-shadow: inset 3px 0 0 ${stripColor(r)}"` : '';
          return `<td class="td-${c.kind}"${strip}>${cell(r, c)}</td>`;
        }).join('') + '</tr>';
    }

    function bandHtml(m, collapsed) {
      return `<tr class="t-band" data-mod="${esc(m.id)}"><td colspan="${ncol}">` +
        `<div class="t-band-row" title="click to ${collapsed ? 'expand' : 'collapse'}">` +
        `<span class="b-caret">${collapsed ? '▸' : '▾'}</span>` +
        `<span class="b-id">${esc(m.id)}</span><span class="b-name">${esc(m.name)}</span>` +
        `<span class="b-stat">${m.items} items · Σ ${m.points} pt</span></div></td></tr>`;
    }

    function draw() {
      const rs = visibleRows();
      const grouped = !state.sort && !state.q.trim();
      let html = '';
      if (grouped) {
        for (const m of modules) {
          const mr = rs.filter((r) => r._moduleId === m.id);
          if (!mr.length) continue;
          const collapsed = state.collapsed.has(m.id);
          html += bandHtml(m, collapsed) + (collapsed ? '' : mr.map(rowHtml).join(''));
        }
      } else {
        html += rs.map(rowHtml).join('');
      }
      body.innerHTML = html || `<tr><td colspan="${ncol}" class="t-empty">no items match “${esc(state.q)}”</td></tr>`;

      const vItems = rs.length;
      const vPoints = rs.reduce((a, r) => a + (r.sp || 0), 0);
      count.textContent = `${vItems}${vItems !== total.items ? ' / ' + total.items : ''} item${vItems === 1 ? '' : 's'} · Σ ${vPoints} pt`;

      host.querySelectorAll('th').forEach((th) => {
        const on = th.dataset.key === state.sort;
        th.classList.toggle('sorted', on);
        th.querySelector('.sort-i').textContent = on ? (state.dir > 0 ? '▲' : '▼') : '';
      });
    }

    host.querySelector('#t-q').addEventListener('input', (e) => { state.q = e.target.value; draw(); });
    body.addEventListener('click', (e) => {                         // collapse/expand a module band
      const band = e.target.closest && e.target.closest('tr.t-band');
      if (!band) return;
      const id = band.dataset.mod;
      if (state.collapsed.has(id)) state.collapsed.delete(id); else state.collapsed.add(id);
      draw();
    });
    host.querySelectorAll('th').forEach((th) => th.addEventListener('click', () => {
      const k = th.dataset.key;
      if (k === 'wbs') { state.sort = null; state.dir = 1; }       // restore natural grouped order
      else if (state.sort === k) state.dir *= -1;
      else { state.sort = k; state.dir = 1; }
      draw();
    }));

    draw();
  }

  window.WBS = window.WBS || {};
  window.WBS.renderTable = renderTable;
})();

;
/* WBS → styled .xlsx export. Plain browser script. Needs the global `XLSX`
   from the xlsx-js-style CDN bundle (loaded in the page <head>).
   Exposes window.WBS.exportExcel(data). Reuses WBS.toRows() so the spreadsheet
   matches the table view exactly. */
(function () {
  // Blueprint palette (rgb hex, no '#').
  const NAVY = '1F3A5F', ACCENT = '2563EB', BAND = 'E8EEF7', ZEBRA = 'F7F9FC',
        BORDER = 'D7E0EC', INK = '1C2738', WHITE = 'FFFFFF';
  const SCOL = { done: '16A34A', 'in-progress': 'D97706', blocked: 'DC2626', 'not-started': '64748B' };
  const ENABLER = '7C3AED';
  const sColor = (s) => SCOL[s] || SCOL['not-started'];
  const sLabel = (s) => ({ 'not-started': 'queued', 'in-progress': 'active' }[s] || s);

  const edge = { style: 'thin', color: { rgb: BORDER } };
  const allBorders = { top: edge, bottom: edge, left: edge, right: edge };

  function exportExcel(data) {
    if (typeof XLSX === 'undefined') {
      (window.WBS.flash || console.warn)('Excel library not loaded — check your connection');
      return;
    }
    const { columns, rows, modules, total } = window.WBS.toRows(data);
    const ncol = columns.length;
    const ws = {};
    let r = 0;

    const put = (row, col, v, s, t) => {
      ws[XLSX.utils.encode_cell({ r: row, c: col })] =
        { v: v == null ? '' : v, t: t || (typeof v === 'number' ? 'n' : 's'), s };
    };
    const merges = [];
    const rowMeta = [];           // !rows: heights + outline levels

    // ── Title banner ──────────────────────────────────────────
    const meta = data._meta || {};
    const titleTxt = `${meta.project || 'Work Breakdown Structure'}  ·  WBS` +
      (meta.version ? `  ·  v${meta.version}` : '') + (meta.updated ? `  ·  ${meta.updated}` : '');
    put(r, 0, titleTxt, {
      font: { name: 'Arial', sz: 14, bold: true, color: { rgb: WHITE } },
      fill: { patternType: 'solid', fgColor: { rgb: NAVY } },
      alignment: { horizontal: 'left', vertical: 'center' },
    });
    for (let c = 1; c < ncol; c++) put(r, c, '', { fill: { patternType: 'solid', fgColor: { rgb: NAVY } } });
    merges.push({ s: { r, c: 0 }, e: { r, c: ncol - 1 } });
    rowMeta[r] = { hpt: 30 }; r++;

    // ── Header row ────────────────────────────────────────────
    const headerRow = r;
    columns.forEach((col, c) => put(r, c, col.label, {
      font: { name: 'Arial', sz: 10, bold: true, color: { rgb: WHITE } },
      fill: { patternType: 'solid', fgColor: { rgb: ACCENT } },
      alignment: { horizontal: col.kind === 'num' ? 'center' : 'left', vertical: 'center', wrapText: true },
      border: allBorders,
    }));
    rowMeta[r] = { hpt: 22 }; r++;

    // ── Per-module bands + item rows ──────────────────────────
    const cellStyle = (col, r0, isEnabler, zebra) => {
      const base = {
        font: { name: 'Arial', sz: 9, color: { rgb: INK } },
        alignment: {
          horizontal: col.kind === 'num' ? 'center' : 'left',
          vertical: 'top',
          wrapText: col.kind === 'wide' || col.kind === 'text',
        },
        border: allBorders,
      };
      if (zebra) base.fill = { patternType: 'solid', fgColor: { rgb: ZEBRA } };
      if (col.key === 'id' || col.kind === 'code') base.font.name = 'Consolas';
      return base;
    };

    let zebra = false;
    for (const m of modules) {
      const mr = rows.filter((row) => row._moduleId === m.id);
      if (!mr.length) continue;

      // band row (merged, tinted)
      put(r, 0, `${m.id}  ${m.name}`, {
        font: { name: 'Arial', sz: 10, bold: true, color: { rgb: NAVY } },
        fill: { patternType: 'solid', fgColor: { rgb: BAND } },
        alignment: { horizontal: 'left', vertical: 'center' },
        border: { bottom: { style: 'medium', color: { rgb: ACCENT } } },
      });
      for (let c = 1; c < ncol; c++) {
        const last = c === ncol - 1;
        put(r, c, last ? `${m.items} items · Σ ${m.points} pt` : '', {
          font: { name: 'Arial', sz: 9, bold: true, italic: last, color: { rgb: NAVY } },
          fill: { patternType: 'solid', fgColor: { rgb: BAND } },
          alignment: { horizontal: last ? 'right' : 'left', vertical: 'center' },
          border: { bottom: { style: 'medium', color: { rgb: ACCENT } } },
        });
      }
      merges.push({ s: { r, c: 0 }, e: { r, c: ncol - 2 } });
      rowMeta[r] = { hpt: 18 }; r++;
      zebra = false;

      for (const row of mr) {
        columns.forEach((col, c) => {
          const s = cellStyle(col, r, row._type === 'enabler', zebra);
          if (col.key === 'sp') { put(r, c, row.sp, { ...s, numFmt: '0', font: { ...s.font, bold: true } }, 'n'); return; }
          if (col.key === 'type') {
            const cc = row._type === 'enabler' ? ENABLER : '5A6B82';
            put(r, c, row.type, { ...s, font: { ...s.font, bold: true, color: { rgb: cc } }, alignment: { ...s.alignment, horizontal: 'center' } });
            return;
          }
          if (col.key === 'status') {
            const cc = sColor(row._status);
            put(r, c, sLabel(row._status), { ...s, font: { ...s.font, bold: true, color: { rgb: cc } }, alignment: { ...s.alignment, horizontal: 'center' } });
            return;
          }
          put(r, c, row[col.key], s);
        });
        // outline: items nest under the band (collapsible in Excel; ignored if unsupported)
        rowMeta[r] = { level: 1 };
        r++; zebra = !zebra;
      }
    }

    // ── Grand total ───────────────────────────────────────────
    const totStyle = (align, last) => ({
      font: { name: 'Arial', sz: 10, bold: true, italic: !!last, color: { rgb: WHITE } },
      fill: { patternType: 'solid', fgColor: { rgb: NAVY } },
      alignment: { horizontal: align, vertical: 'center' },
      border: { top: { style: 'medium', color: { rgb: NAVY } } },
    });
    put(r, 0, 'TOTAL', totStyle('left'));
    for (let c = 1; c < ncol; c++) {
      const last = c === ncol - 1;
      put(r, c, last ? `${total.items} items · Σ ${total.points} pt` : '', totStyle(last ? 'right' : 'left', last));
    }
    merges.push({ s: { r, c: 0 }, e: { r, c: ncol - 2 } });
    rowMeta[r] = { hpt: 20 }; r++;

    // ── Sheet assembly ────────────────────────────────────────
    ws['!ref'] = XLSX.utils.encode_range({ s: { r: 0, c: 0 }, e: { r: r - 1, c: ncol - 1 } });
    ws['!cols'] = columns.map((c) => ({ wch: c.width }));
    ws['!merges'] = merges;
    ws['!rows'] = rowMeta;
    ws['!autofilter'] = { ref: XLSX.utils.encode_range({ s: { r: headerRow, c: 0 }, e: { r: headerRow, c: ncol - 1 } }) };
    ws['!freeze'] = { xSplit: 0, ySplit: headerRow + 1, topLeftCell: XLSX.utils.encode_cell({ r: headerRow + 1, c: 0 }), activePane: 'bottomLeft', state: 'frozen' };

    const wb = XLSX.utils.book_new();
    XLSX.utils.book_append_sheet(wb, ws, 'WBS');

    const safe = (meta.project || 'WBS').replace(/[^A-Za-z0-9]+/g, '-').replace(/^-|-$/g, '');
    const fname = `${safe}-WBS${meta.version ? '-v' + meta.version : ''}.xlsx`;
    XLSX.writeFile(wb, fname);
    (window.WBS.flash || console.log)('exported ' + fname);
  }

  window.WBS = window.WBS || {};
  window.WBS.exportExcel = exportExcel;
})();

/* App glue — shared by the mindmap page and the table page.
   The two views now live on separate pages (no tabs); this just stashes the
   latest data for the Excel button and wires that button once.
   Plain browser script; depends on WBS.exportExcel. */
(function () {
  let current = null; // latest data — what the Excel button exports

  function setData(data) { current = data; }

  function bindExport() {
    const ex = document.getElementById('btn-export');
    if (ex) ex.addEventListener('click', () => { if (current) window.WBS.exportExcel(current); });
  }

  window.WBS = window.WBS || {};
  Object.assign(window.WBS, { setData, bindExport });
})();
</script>

le People sub-module; tracked separately."}],"modules":[{"id":"M1","name":"People","description":"Workforce management across the employee lifecycle — dashboard, employees, org, resource allocation, performance, and lifecycle (onboarding, probation, offboarding).","status":"in-progress","sub_modules":[{"id":"M1.1","name":"Dashboard","description":"Role-aware workforce analytics: an executive Workforce Overview for leadership/management (company-, account- or project-scoped) and a personal My Scorecard for members.","status":"in-progress","screens":[{"id":"M1.1.S1","name":"Workforce Overview (Executive Dashboard)","description":"The 30-second read on the workforce for BOD/PMO (company-wide), AM (account-scoped) and EM/TL/PM (project-scoped): KPIs, utilization, forecast, distribution, attrition, performance, skills and AI signals.","roles":["BOD","PMO","AM","EM/TL/PM"],"mockup_ref":{"screen":"people/dashboard"},"sub_screens":[{"id":"M1.1.S1.1","name":"Scoped page header","description":"Role-aware title + subtitle indicating company-wide vs account/project scope."},{"id":"M1.1.S1.2","name":"Seta signals (AI insights)","description":"Ranked workforce signals filterable by severity (Critical/Warning/Opportunity/Positive)."},{"id":"M1.1.S1.3","name":"Filter bar","description":"Period / department / account / employment-type filters."},{"id":"M1.1.S1.4","name":"Executive KPI strip","description":"Active workforce, Utilization, Attrition, Workforce health — each with sparkline."},{"id":"M1.1.S1.5","name":"Workforce overview","description":"Headcount movement (joiners vs leavers) and people by department."},{"id":"M1.1.S1.6","name":"Utilization & allocation","description":"Deployment split (billable/internal/idle/leave) overall and per department."},{"id":"M1.1.S1.7","name":"Forecast & planning","description":"6-month forecast headcount vs demand with the projected gap."},{"id":"M1.1.S1.8","name":"Workforce distribution","description":"Seniority mix, tech-stack coverage, tenure, exit reasons."},{"id":"M1.1.S1.9","name":"Attrition & retention","description":"Attrition trend, leavers by tenure, turnover by team/account."},{"id":"M1.1.S1.10","name":"Performance summary","description":"Score distribution and review completion/flags across in-scope people."},{"id":"M1.1.S1.11","name":"Skill gaps & capacity risk","description":"Skill-gap matrix and critical roles without backup."},{"id":"M1.1.S1.12","name":"Skill inventory & capacity","description":"Searchable, category-filterable skill inventory vs open demand."},{"id":"M1.1.S1.13","name":"Account-access request (AM)","description":"AM requests a grant to view another account."}],"items":[{"id":"EN-M1.1-01","type":"enabler","title":"Apply role scoping to dashboard metric aggregation","story":"Apply the canonical role/account/project visibility (EN-M1.2-01) when aggregating dashboard metrics, so every KPI and section reflects only the data the current role may see.","acceptance_criteria":["Given the caller's canonical RBAC scope, when a dashboard metric is aggregated, then only in-scope people contribute to it, with no out-of-scope figures leaking in.","Given an AM, EM/TL or Member, when they open the dashboard, then KPIs and sections recompute to their account(s) / projects / self respectively.","Given a fully scoped view contains no people, when metrics aggregate, then empty states are shown rather than zeros."],"story_points":3,"roles":["BOD","PMO","AM","EM/TL/PM","Member"],"notes":"Builds on the canonical RBAC (EN-M1.2-01) rather than re-defining it. Scope tiers: BOD/PMO = company-wide; AM = assigned + granted accounts; EM/TL/PM = own projects; Member = self.","dependencies":["EN-M1.2-01"],"status":"not-started"},{"id":"EN-M1.1-02","type":"enabler","title":"Shared dashboard visualization building blocks","story":"Provide a reusable set of dashboard visualization building blocks (KPI cards with sparklines, trend lines, stacked/segmented bars, donuts, coverage tables) used consistently across every dashboard section.","acceptance_criteria":["Given any dashboard section renders a metric, when displayed, then it uses the shared visual style consistently (colors, legends, tooltips).","Given a metric has no data, when its chart renders, then a shared empty state is shown instead of a broken or zeroed chart."],"story_points":5,"roles":["BOD","PMO","AM","EM/TL/PM","Member"],"notes":"Shared across all dashboard sections and reusable by other analytical People screens.","dependencies":[],"status":"not-started"},{"id":"US-M1.1.S1-01","type":"story","title":"View the executive workforce KPI strip","story":"As an Admin/BOD or PMO, I want a KPI strip showing active workforce, utilization, attrition rate and workforce health with trend sparklines so that I can assess overall workforce health in seconds.","acceptance_criteria":["Given I am BOD or PMO, when the dashboard loads, then the KPI strip shows active workforce (active/total, % active, MoM delta, on-leave), utilization % (idle count, target, gap to target), attrition rate (vs prior) and workforce health, each with a sparkline.","Given a metric has no data for the selected period, when the strip renders, then an empty state is shown instead of a misleading zero.","Given the view is scoped (AM/EM/TL), when the strip renders, then every KPI reflects only the in-scope people."],"story_points":3,"roles":["BOD","PMO"],"dependencies":["EN-M1.1-01","EN-M1.1-02","EN-M1.4-01"],"status":"not-started"},{"id":"US-M1.1.S1-02","type":"story","title":"View workforce growth and department breakdown","story":"As an Admin/BOD or PMO, I want to see headcount movement (joiners vs leavers over 12 months) and people by department so that I understand how the workforce is growing and where people sit.","acceptance_criteria":["Given the dashboard loads, when the overview renders, then a 12-month joiners-vs-leavers trend is shown with a net-change summary.","Given the dashboard loads, when the overview renders, then a people-by-department breakdown shows each department's share of total headcount.","Given no movement data for the period, when the section renders, then an empty state is shown."],"story_points":3,"roles":["BOD","PMO"],"dependencies":["EN-M1.1-01"],"external_deps":[{"needs":"joiners / leavers (onboarding & offboarding events)","likely_module":"M1.6/M1.8","reason":"headcount movement is sourced from Onboarding (M1.6) and Offboarding (M1.8), now People sub-modules."}],"status":"not-started"},{"id":"US-M1.1.S1-03","type":"story","title":"Analyze workforce utilization and allocation","story":"As an Admin/BOD or PMO, I want to see how the workforce is deployed (billable / internal / idle / on-leave) overall and per department so that I can find idle capacity before opening new hires.","acceptance_criteria":["Given the dashboard loads, when the utilization section renders, then an overall deployment bar shows billable, internal, idle and on-leave counts with percentages.","Given the dashboard loads, when the section renders, then a per-department breakdown shows how each team splits across billable/internal/idle/leave.","Given there are idle (bench) people, when the section renders, then they are highlighted as staffable capacity."],"story_points":5,"roles":["BOD","PMO"],"notes":"Utilization = billable share of active staff vs target. Bench = available, not yet staffed.","dependencies":["EN-M1.1-01","EN-M1.4-01"],"status":"not-started"},{"id":"US-M1.1.S1-04","type":"story","title":"Review the 6-month workforce forecast vs demand","story":"As an Admin/BOD or PMO, I want a 6-month forecast of headcount vs demand with the projected gap so that I know whether we can staff upcoming work.","acceptance_criteria":["Given the dashboard loads, when the forecast section renders, then a forecast-vs-demand trend and table show projected headcount, demand and the monthly gap for the next 6 months.","Given the projected gap is widening, when the section renders, then an insight quantifies the shortfall and the implied change in hiring velocity.","Given no forecast data, when the section renders, then an empty state is shown."],"story_points":5,"roles":["BOD","PMO"],"dependencies":["EN-M1.1-01"],"external_deps":[{"needs":"demand / open-role figures driving forecast demand","likely_module":"M2","reason":"demand is derived from open requisitions owned by the Hiring module."}],"status":"not-started"},{"id":"US-M1.1.S1-05","type":"story","title":"Explore workforce distribution","story":"As an Admin/BOD or PMO, I want to see seniority mix, tech-stack coverage, tenure and exit reasons so that I understand the shape and risks of the team.","acceptance_criteria":["Given the dashboard loads, when the distribution section renders, then seniority mix (with % shares), tech-stack coverage (people per technology), tenure bands and exit-reason breakdown are each shown.","Given a thin senior layer or a thin skill bench, when the section renders, then the relevant chart surfaces a risk insight.","Given a category has no data, when its chart renders, then an empty state is shown."],"story_points":5,"roles":["BOD","PMO"],"dependencies":["EN-M1.1-01","EN-M1.2-01"],"status":"not-started"},{"id":"US-M1.1.S1-06","type":"story","title":"Analyze attrition and retention","story":"As an Admin/BOD or PMO, I want attrition trend, leavers-by-tenure and turnover by team/account so that I can target retention where it matters.","acceptance_criteria":["Given the dashboard loads, when the attrition section renders, then a voluntary-vs-involuntary attrition trend, a leavers-by-tenure breakdown and turnover-by-team/account (vs company average) are shown.","Given a team's turnover exceeds the company average by the alert threshold, when the section renders, then it is visually flagged with a retention insight.","Given no attrition in the period, when the section renders, then an empty state is shown."],"story_points":5,"roles":["BOD","PMO"],"dependencies":["EN-M1.1-01"],"status":"not-started"},{"id":"US-M1.1.S1-07","type":"story","title":"View team performance summary","story":"As an Admin/BOD or PMO, I want a score distribution and review-completion summary across my people so that I can see overall performance health and who needs attention.","acceptance_criteria":["Given the dashboard loads, when the performance section renders, then a score distribution (Top→Below buckets) with the average and verdict, plus a review-completion % with a 'needs attention' list of below-bar people are shown.","Given no reviews are recorded for the scope, when the section renders, then an empty state explains reviews are pending.","Given a person scores below the bar, when the section renders, then they appear in the needs-attention list."],"story_points":3,"roles":["BOD","PMO"],"notes":"Below-bar threshold = 3.5 (out of 5).","dependencies":["EN-M1.1-01"],"external_deps":[{"needs":"monthly scorecard / evaluation results","likely_module":"M1.5","reason":"review scores are produced by the Performance sub-module; the dashboard only aggregates them."}],"status":"not-started"},{"id":"US-M1.1.S1-08","type":"story","title":"Identify skill gaps and critical-role risk","story":"As an Admin/BOD or PMO, I want a skill-gap matrix (have vs need with coverage) and a list of critical roles without backup so that I can close the gaps that will constrain delivery first.","acceptance_criteria":["Given the dashboard loads, when the skill-gap section renders, then a matrix shows have/need/coverage%/gap per tracked skill, colour-coded by coverage.","Given the dashboard loads, when the section renders, then critical roles are listed with have/need/gap and a risk level, with single points of failure highlighted.","Given a skill or role is critically under-covered, when the section renders, then it is flagged with an action insight."],"story_points":5,"roles":["BOD","PMO"],"dependencies":["EN-M1.1-01","EN-M1.2-01"],"external_deps":[{"needs":"skill demand from open roles","likely_module":"M2","reason":"demand is derived from open requisitions owned by the Hiring module; skill supply now resolves to the Employees data model (EN-M1.2-01)."}],"status":"not-started"},{"id":"US-M1.1.S1-09","type":"story","title":"Browse the skill inventory by category","story":"As an Admin/BOD or PMO, I want a searchable, category-filterable skill inventory with capacity-by-category and supply-vs-demand status so that I can see who holds which skills against open demand.","acceptance_criteria":["Given the dashboard loads, when the skill-inventory section renders, then a table lists skills with holders by level, open demand and a supply-vs-demand status, plus capacity-by-category bars.","Given I filter by category or type a search term, when applied, then the table updates to matching skills only.","Given no skill matches the filter/search, when applied, then an empty state is shown."],"story_points":5,"roles":["BOD","PMO"],"dependencies":["EN-M1.1-01","EN-M1.2-01"],"external_deps":[{"needs":"open-role demand","likely_module":"M2","reason":"demand comes from Hiring (M2); skill holdings now resolve to the Employees data model (EN-M1.2-01)."}],"status":"not-started"},{"id":"US-M1.1.S1-10","type":"story","title":"Review ranked workforce signals (Seta signals)","story":"As an Admin/BOD or PMO, I want AI-surfaced workforce signals ranked by urgency and filterable by severity so that I can see what needs a decision this week.","acceptance_criteria":["Given the dashboard loads, when the signals panel renders, then signals are listed ranked by urgency, each with severity, category, why-it-matters, a recommended action and a confidence score.","Given I filter by severity (Critical/Warning/Opportunity/Positive), when applied, then only signals of that severity are shown, with counts per bucket.","Given there are no signals at a severity level, when filtered, then an empty state is shown."],"story_points":3,"roles":["BOD","PMO"],"notes":"Signals are read-only on the dashboard — no change is committed from here.","dependencies":["EN-M1.1-01"],"status":"not-started"},{"id":"US-M1.1.S1-11","type":"story","title":"Filter the dashboard by period, department, account and type","story":"As an Admin/BOD or PMO, I want to filter the dashboard by period, department, account and employment type so that I can focus the analysis.","acceptance_criteria":["Given I change any filter (period/department/account/type), when applied, then every section re-computes to the selection and the active-filter summary updates.","Given a filter combination yields no people, when applied, then sections show empty states rather than zeros."],"story_points":3,"roles":["BOD","PMO"],"dependencies":["EN-M1.1-01"],"status":"not-started"},{"id":"US-M1.1.S1-12","type":"story","title":"View the workforce dashboard scoped to my accounts (AM)","story":"As an Account Manager, I want the executive dashboard scoped to the accounts I manage so that I see workforce health for my accounts only.","acceptance_criteria":["Given I am an AM, when I open the dashboard, then the header indicates it is scoped and every KPI/section reflects only my assigned (and granted) accounts.","Given I have no granted extra accounts, when I open the dashboard, then I see only my own account(s)."],"story_points":2,"roles":["AM"],"mockup_ref":{"screen":"people/dashboard","persona":"am"},"dependencies":["EN-M1.1-01"],"status":"not-started"},{"id":"US-M1.1.S1-13","type":"story","title":"View the workforce dashboard scoped to my team (EM/TL)","story":"As an EM/Team Lead, I want the dashboard scoped to my projects/team so that I see workforce health for my people only.","acceptance_criteria":["Given I am an EM/TL, when I open the dashboard, then the header indicates it is scoped and every section reflects only my projects/team.","Given I lead no project, when I open the dashboard, then an empty state explains there is no team in scope."],"story_points":2,"roles":["EM/TL/PM"],"mockup_ref":{"screen":"people/dashboard","persona":"manager"},"dependencies":["EN-M1.1-01"],"status":"not-started"},{"id":"US-M1.1.S1-14","type":"story","title":"Request access to another account (AM)","story":"As an Account Manager, I want to request view access to an account I don't manage so that I can see its workforce after approval.","acceptance_criteria":["Given I am an AM, when I open the access-request control, then I can select an account I don't currently have access to and submit a request.","Given I submit a request, when confirmed, then it is recorded for Admin/PMO approval and the action is audit-logged.","Given I already have access to all accounts, when the section renders, then the request control is replaced with a 'you have access to all accounts' state."],"story_points":3,"roles":["AM"],"mockup_ref":{"screen":"people/dashboard","persona":"am"},"notes":"In production the grant routes to Admin/PMO for approval and is logged; the prototype applies it immediately.","dependencies":["EN-M1.1-01"],"external_deps":[{"needs":"account-access approval workflow and audit log","likely_module":"M0","reason":"grant approval and audit are owned by Admin/access-control, which is out of scope for this WBS."}],"status":"not-started"}]},{"id":"M1.1.S2","name":"My Scorecard (Member dashboard)","description":"The dashboard a Member sees: their monthly evaluation at a glance — overall score, pillar breakdown, strengths, focus areas and score trend.","roles":["Member"],"mockup_ref":{"screen":"people/dashboard","persona":"employee"},"sub_screens":[{"id":"M1.1.S2.1","name":"Scorecard summary","description":"Overall score, verdict and period selector."},{"id":"M1.1.S2.2","name":"Pillar breakdown","description":"Weighted pillars (AI, Technical, Communication, Ownership, Delivery, Growth) with deltas."},{"id":"M1.1.S2.3","name":"Strengths & focus areas","description":"Top strengths and lowest-scoring focus areas."},{"id":"M1.1.S2.4","name":"Score trend","description":"Overall score across periods."}],"items":[{"id":"US-M1.1.S2-01","type":"story","title":"View my monthly scorecard summary","story":"As a Member, I want my monthly evaluation summary — overall score, verdict and pillar breakdown with deltas — so that I understand how I'm doing at a glance.","acceptance_criteria":["Given I am a Member, when I open the dashboard, then I see my overall score, verdict and each weighted pillar scored with a delta vs the previous period.","Given I switch the period selector, when changed, then the summary reloads for that period.","Given no evaluation exists for the selected period, when it loads, then an empty state explains my TL runs the scorecard at period end."],"story_points":5,"roles":["Member"],"notes":"Visible to the member, their TL/PM and HR only.","dependencies":["EN-M1.1-01"],"external_deps":[{"needs":"the member's monthly scorecard / evaluation","likely_module":"M1.5","reason":"scorecards are produced by the Performance sub-module; the dashboard only displays the member's own."}],"status":"not-started"},{"id":"US-M1.1.S2-02","type":"story","title":"View my strengths, focus areas and score trend","story":"As a Member, I want to see my top strengths, focus areas and score trend across periods so that I know what to improve.","acceptance_criteria":["Given I have a scorecard, when the summary renders, then my top strengths and lowest focus areas are listed with values and deltas.","Given I have more than one period scored, when the summary renders, then a score-trend sparkline across periods is shown.","Given only one period exists, when the summary renders, then the trend is omitted gracefully."],"story_points":3,"roles":["Member"],"dependencies":["EN-M1.1-01","US-M1.1.S2-01"],"external_deps":[{"needs":"the member's scorecard history across periods","likely_module":"M1.5","reason":"historical scores are owned by the Performance sub-module."}],"status":"not-started"}]}]},{"id":"M1.2","name":"Employees","description":"Employee Hub & Directory: role-scoped roster, employee profiles (with RBAC field masking), self/admin profile edits, onboarding and Excel import. Owns the employee record (incl. skills, tech, lifecycle dates) the rest of People reads.","status":"in-progress","screens":[{"id":"M1.2.S1","name":"Employee Directory","description":"Role-scoped roster of people as a table or cards, with status/account filters and search. Full roster for HR/PMO/BOD; scoped for AM, EM/TL/PM and Member.","roles":["BOD","PMO","HR","AM","EM/TL/PM","Member"],"mockup_ref":{"screen":"people/employees"},"sub_screens":[{"id":"M1.2.S1.1","name":"Roster table","description":"Tabular list: name, account, email, manager, status, onboarding/offboarding dates, phone, gender, techstack."},{"id":"M1.2.S1.2","name":"Roster cards","description":"Card layout of the same people."},{"id":"M1.2.S1.3","name":"Toolbar","description":"Table/card toggle, status filter, account filter, scoped-view badge, people count."},{"id":"M1.2.S1.4","name":"Global search","description":"Search by name, role, account, email or techstack."}],"items":[{"id":"EN-M1.2-01","type":"enabler","title":"Employee record data model & RBAC scoping","story":"Provide the employee record (identity, contact, engagement, lifecycle dates, grade, skills, techstack, documents) plus the role-based visibility, sensitive-field masking and field-level edit rights that every People screen relies on.","acceptance_criteria":["Given any employee query, when executed, then it returns only the records the caller's role is permitted to see (HR/PMO/BOD = all; AM = own accounts; EM/TL/PM = own projects + self; Member = self).","Given a record is returned, when serialized, then sensitive fields (salary, bank, tax, dob) are masked unless the caller is HR Admin or the record owner.","Given a field write, when attempted, then it is permitted only if the field is self-editable by the owner or the caller is an admin (admin-only: manager, account, project, grade, salary, bank, tax)."],"story_points":5,"roles":["BOD","PMO","HR","AM","EM/TL/PM","Member"],"notes":"Owns the canonical employee record incl. skills/techstack the dashboard aggregates. Field-level rules per MoM 1.3/1.4; enforced as a data-access rule on every path, not just hidden in the UI.","dependencies":[],"external_deps":[{"needs":"account / client master data (id, name, industry, owning AM)","likely_module":"M0","reason":"the account each employee belongs to is reference data with no management screen in the mockup; owned by Admin/org-configuration (out of scope)."}],"status":"not-started"},{"id":"EN-M1.2-02","type":"enabler","title":"MS365 / Teams account provisioning integration","story":"Provide the integration that requests provisioning of a Microsoft 365 / Teams user when a member is onboarded or their engagement changes.","acceptance_criteria":["Given a member is created via onboarding, when saved, then a provisioning request for an MS365/Teams user is sent.","Given provisioning is requested, when it is sent, then the outcome is reflected back on the member's record/notifications."],"story_points":3,"roles":["HR","BOD"],"notes":"Triggered on onboarding (MoM 2.2). In the prototype the request is simulated; in production it provisions a real Microsoft 365 / Teams account.","dependencies":[],"status":"not-started"},{"id":"US-M1.2.S1-01","type":"story","title":"Browse the full employee roster","story":"As an Admin/BOD, PMO or HR, I want to browse the full employee roster as a table or cards with status and account filters so that I can find and review any employee.","acceptance_criteria":["Given I have full access, when I open Employees, then I see all employees with name, account, email, direct manager, status, onboarding/offboarding dates, phone, gender and techstack, plus a people count.","Given I switch between table and card layout, when toggled, then the same filtered people are shown in the chosen layout.","Given I change the status or account filter, when applied, then the roster and count update to match.","Given no employee matches the filters, when applied, then a 'no matching people' empty state is shown."],"story_points":3,"roles":["BOD","PMO","HR"],"dependencies":["EN-M1.2-01"],"status":"not-started"},{"id":"US-M1.2.S1-02","type":"story","title":"Search the employee directory","story":"As an Admin/BOD, PMO or HR, I want to search the directory by name, role, account, email or techstack so that I can locate a person quickly.","acceptance_criteria":["Given I type a query, when it matches a person's name, role, account, email or techstack, then the roster filters to matching people.","Given my query matches nobody, when applied, then an empty state is shown.","Given a search is active, when combined with status/account filters, then both narrow the results together."],"story_points":2,"roles":["BOD","PMO","HR"],"dependencies":["EN-M1.2-01"],"status":"not-started"},{"id":"US-M1.2.S1-03","type":"story","title":"View the directory scoped to my accounts (AM)","story":"As an Account Manager, I want the directory scoped to people in the accounts I manage so that I only see my own people.","acceptance_criteria":["Given I am an AM, when I open Employees, then only people in my assigned (and granted) accounts are listed and a 'scoped view' indicator is shown.","Given I search or filter, when applied, then results stay within my account scope."],"story_points":2,"roles":["AM"],"dependencies":["EN-M1.2-01"],"status":"not-started"},{"id":"US-M1.2.S1-04","type":"story","title":"View the directory scoped to my team (EM/TL)","story":"As an EM/Team Lead, I want the directory scoped to members of the projects I run so that I only see my team.","acceptance_criteria":["Given I am an EM/TL, when I open Employees, then only members of my projects (and myself) are listed with a 'scoped view' indicator.","Given I search or filter, when applied, then results stay within my project scope."],"story_points":2,"roles":["EM/TL/PM"],"dependencies":["EN-M1.2-01"],"status":"not-started"},{"id":"US-M1.2.S1-05","type":"story","title":"View my own record (Member)","story":"As a Member, I want to see my own employee record so that I can review my details, while other profiles stay restricted.","acceptance_criteria":["Given I am a Member, when I open Employees, then only my own record is shown with a note that other profiles are restricted by RBAC.","Given I attempt to access another person's record, when requested, then it is not returned."],"story_points":2,"roles":["Member"],"dependencies":["EN-M1.2-01"],"status":"not-started"}]},{"id":"M1.2.S2","name":"Employee Profile","description":"Full employee profile drawer: overview (contact, engagement, lifecycle, compensation), documents vault, skills, scorecard and field-level history.","roles":["BOD","PMO","HR","AM","EM/TL/PM","Member"],"mockup_ref":{"screen":"people/employees"},"sub_screens":[{"id":"M1.2.S2.1","name":"Overview tab","description":"Contact, engagement (account/project/manager/type), lifecycle dates, grade."},{"id":"M1.2.S2.2","name":"Compensation & banking","description":"Salary, bank account, tax ID — masked unless HR Admin or the record owner."},{"id":"M1.2.S2.3","name":"Documents tab","description":"Access-controlled document vault with expiry warnings."},{"id":"M1.2.S2.4","name":"Skills tab","description":"Skills with proficiency level and endorsement counts."},{"id":"M1.2.S2.5","name":"History tab","description":"Immutable field-level audit timeline with before/after."}],"items":[{"id":"US-M1.2.S2-01","type":"story","title":"View an employee profile overview","story":"As an authorized viewer, I want to open an employee's profile overview so that I can see their contact, engagement and lifecycle details in one place.","acceptance_criteria":["Given I click an employee in the directory, when the profile opens, then I see contact (email, phone, location, gender), engagement (account, project, direct manager, employment type), lifecycle (onboarding/offboarding dates, grade, date of birth) and status.","Given I open a profile I am not permitted to see in full, when it renders, then restricted fields are not exposed.","Given I close the profile, when dismissed, then I return to the directory unchanged."],"story_points":3,"roles":["BOD","PMO","HR","AM","EM/TL/PM","Member"],"notes":"Date of birth is masked unless viewer is HR Admin or the record owner.","dependencies":["EN-M1.2-01"],"external_deps":[{"needs":"the employee's monthly scorecards","likely_module":"M1.5","reason":"the profile's scorecard tab surfaces evaluations owned by the Performance sub-module."}],"status":"not-started"},{"id":"US-M1.2.S2-02","type":"story","title":"Mask sensitive compensation and banking fields by RBAC","story":"As an Admin/BOD or HR, I want salary, bank and tax fields shown only to permitted viewers so that sensitive PII is protected.","acceptance_criteria":["Given I am HR Admin or the record owner, when I view a profile, then salary, bank account and tax ID are shown.","Given I am any other role, when I view a profile, then those fields are masked as 'Restricted' with an indicator of why.","Given an unauthorized role accesses the record by any path, when the data is returned, then sensitive values are never exposed — masking is a data-access rule, not only a display choice."],"story_points":2,"roles":["BOD","HR"],"notes":"Sensitive fields: salary, bank, tax. Visible only to HR Admin or the record owner; enforced as a data-access rule on every path, not just hidden in the UI.","dependencies":["EN-M1.2-01"],"status":"not-started"},{"id":"US-M1.2.S2-03","type":"story","title":"View an employee's documents vault","story":"As an Admin/BOD, PMO or HR, I want to see an employee's documents with expiry status so that I can spot documents that need renewal.","acceptance_criteria":["Given a profile has documents, when I open the Documents tab, then each document shows its type, upload age and validity/expiry.","Given a document expires within the warning window, when listed, then it is visually flagged (e.g. expiring soon).","Given a profile has no documents, when I open the tab, then an empty state is shown."],"story_points":3,"roles":["BOD","PMO","HR"],"notes":"Uploading a new version archives the previous one; nothing is permanently deleted until the retention policy applies.","dependencies":["EN-M1.2-01"],"status":"not-started"},{"id":"US-M1.2.S2-04","type":"story","title":"View an employee's skills and endorsements","story":"As an authorized viewer, I want to see an employee's skills with proficiency level and endorsements so that I understand their capabilities.","acceptance_criteria":["Given a profile has skills, when I open the Skills tab, then each skill shows its category, proficiency level (Beginner→Expert) and endorsement count.","Given a profile has no skills recorded, when I open the tab, then an empty state is shown."],"story_points":2,"roles":["BOD","PMO","HR","AM","EM/TL/PM","Member"],"dependencies":["EN-M1.2-01"],"status":"not-started"},{"id":"US-M1.2.S2-05","type":"story","title":"View an employee's field-level change history","story":"As an Admin/BOD, PMO or HR, I want an immutable history of changes to an employee's record so that I can audit who changed what and when.","acceptance_criteria":["Given a profile has changes, when I open the History tab, then each entry shows actor, UTC timestamp, the field changed and its before/after values.","Given a record has no changes, when I open the tab, then an empty state is shown.","Given any field write occurs, when it is saved, then a new immutable history entry is recorded (no edits or deletes)."],"story_points":3,"roles":["BOD","PMO","HR"],"dependencies":["EN-M1.2-01"],"status":"not-started"}]},{"id":"M1.2.S3","name":"Edit Profile","description":"Edit an employee record: members self-edit personal details; admins edit engagement/grade fields. Engagement changes trigger Org Chart and MS365 sync; every write is audited.","roles":["BOD","PMO","HR","Member"],"mockup_ref":{"screen":"people/employees"},"sub_screens":[{"id":"M1.2.S3.1","name":"Personal details (self-editable)","description":"Work email, phone, location, date of birth."},{"id":"M1.2.S3.2","name":"Engagement & grade (admin-only)","description":"Direct manager, account, project, job grade — locked to Admin."}],"items":[{"id":"US-M1.2.S3-01","type":"story","title":"Edit my own personal details","story":"As a Member, I want to edit my own personal details (email, phone, location, date of birth) so that my record stays current.","acceptance_criteria":["Given I open Edit profile on my own record, when I change a personal field and save, then the change is persisted and recorded in my field-level history.","Given I open my own record, when the form renders, then engagement and grade fields are shown as locked (admin-only).","Given I make no changes, when I save, then I am told there is nothing to save."],"story_points":3,"roles":["Member"],"notes":"Self-editable fields: email, phone, location, date of birth (MoM 1.3).","dependencies":["EN-M1.2-01"],"status":"not-started"},{"id":"US-M1.2.S3-02","type":"story","title":"Edit an employee's engagement and grade","story":"As an Admin/BOD, PMO or HR, I want to edit an employee's direct manager, account, project and grade so that org and staffing records stay correct.","acceptance_criteria":["Given I am an admin, when I change manager/account/project/grade and save, then the changes persist and each is written to the field-level audit log with before/after.","Given I change the direct manager, account or project, when saved, then the Org Chart and MS365 sync are triggered.","Given I am not an admin, when I open the edit form, then these fields are locked and cannot be saved."],"story_points":5,"roles":["BOD","PMO","HR"],"notes":"Admin-only fields (MoM 1.4): manager, account, project, grade, salary, bank, tax.","dependencies":["EN-M1.2-01","EN-M1.2-02"],"status":"not-started"}]},{"id":"M1.2.S4","name":"Onboard New Member","description":"HR creates a new member account with essentials and a CV, provisions MS365/Teams, sends an invite, and (once a manager is set) updates the Org Chart.","roles":["BOD","PMO","HR"],"mockup_ref":{"screen":"people/employees"},"sub_screens":[{"id":"M1.2.S4.1","name":"Onboarding form","description":"Name, email, role, department, grade, employment type; admin-only account/project/manager."},{"id":"M1.2.S4.2","name":"CV upload","description":"Upload CV (PDF/DOCX) to the document vault."}],"items":[{"id":"US-M1.2.S4-01","type":"story","title":"Onboard a new member and send an invite","story":"As HR, I want to create a new member account with their essentials and engagement so that they can be invited and start onboarding.","acceptance_criteria":["Given I open the onboarding form, when I enter at least a full name and save, then a new employee is created with status 'onboarding', a generated id and an invite is sent.","Given I omit the full name, when I save, then I am warned it is required and nothing is created.","Given I set account, project and direct manager (admin-only fields), when I save, then they are stored on the new record and MS365/Teams provisioning is requested.","Given the new account is created, when saved, then the action is written to the audit log."],"story_points":5,"roles":["HR","BOD","PMO"],"notes":"Member self-completes remaining personal details on first login (MoM 1.3). Account/project/manager are admin-only.","dependencies":["EN-M1.2-01","EN-M1.2-02"],"status":"not-started"},{"id":"US-M1.2.S4-02","type":"story","title":"Attach a CV during onboarding","story":"As HR, I want to upload a new member's CV during onboarding so that it is stored in their document vault from day one.","acceptance_criteria":["Given I am onboarding a member, when I upload a CV (PDF/DOCX), then it is attached to the new record's document vault.","Given I save without a CV, when the account is created, then onboarding still succeeds and the CV can be added later."],"story_points":2,"roles":["HR"],"dependencies":["US-M1.2.S4-01"],"status":"not-started"}]},{"id":"M1.2.S5","name":"Import Employees","description":"Bulk-load existing/pre-go-live staff from the standard Excel template, with required-column validation and a preview before import.","roles":["BOD","PMO","HR"],"mockup_ref":{"screen":"people/employees"},"sub_screens":[{"id":"M1.2.S5.1","name":"Import dialog","description":"Required-column list, file upload, validation preview and import action."}],"items":[{"id":"US-M1.2.S5-01","type":"story","title":"Bulk-import employees from an Excel template","story":"As HR, I want to import existing employees from the standard Excel template so that I can load pre-go-live staff in bulk.","acceptance_criteria":["Given I open the import dialog, when it renders, then the required columns are listed and I can upload a filled .xlsx/.csv file.","Given I upload a file, when it is parsed, then a preview shows the count of valid rows and any rows skipped for a missing required column.","Given valid rows exist, when I confirm import, then those employees are created, the count is reported, and the import is written to the audit log.","Given imported rows have account/project/manager, when imported, then those remain admin-controlled and editable only by admins afterward."],"story_points":5,"roles":["HR","BOD","PMO"],"notes":"Required columns: Employee ID, Full name, Email, Role, Department, Grade, Account, Project, Direct manager, Join date (MoM 1.2).","dependencies":["EN-M1.2-01"],"status":"not-started"}]}]},{"id":"M1.3","name":"Org Chart","description":"Organizational Dynamics: the reporting hierarchy rendered at three levels via a tab/segmented control — Company, Account and Project — all derived live from the employee record, with drill-down, zoom/pan and role scoping.","status":"in-progress","screens":[{"id":"M1.3.S1","name":"Company Org Chart","description":"Top-level structure: Board/CEO down the spine to Operation (internal functions) and Delivery (AMs → accounts), with PMO branching off as governance.","roles":["BOD","PMO","AM","EM/TL/PM","Member"],"mockup_ref":{"screen":"people/org"},"sub_screens":[{"id":"M1.3.S1.1","name":"Company tree","description":"CEO → Operation functions + Delivery accounts; PMO governance aside."},{"id":"M1.3.S1.2","name":"Chart viewport","description":"Zoom in/out/fit and drag-to-pan controls shared by all three levels."}],"items":[{"id":"US-M1.3.S1-01","type":"story","title":"View the company org chart","story":"As an Admin/BOD or PMO, I want to see the whole-company structure in one chart so that I understand how governance, operations and delivery are organized.","acceptance_criteria":["Given I open the Org Chart at Company level, when it renders, then the Board/CEO sits at the top with Operation (internal functions) and Delivery (Account Managers and their accounts) below, and PMO shown as a governance branch off the spine.","Given the hierarchy derives from employee records, when a person's department or reporting line changes, then the chart reflects it without manual editing.","Given a branch has no people, when the chart renders, then that node is still shown with an empty/zero indicator rather than breaking the layout."],"story_points":5,"roles":["BOD","PMO"],"dependencies":["EN-M1.2-01"],"status":"not-started"},{"id":"US-M1.3.S1-02","type":"story","title":"Navigate the org chart (zoom, fit, pan)","story":"As any viewer, I want to zoom, fit and drag to pan the org chart so that I can read large structures comfortably.","acceptance_criteria":["Given a chart is shown, when I zoom in or out or click Fit, then the chart scales within sensible bounds and the zoom percentage updates.","Given the chart is wider than the viewport, when I drag horizontally on empty space, then it pans without selecting a node.","Given I switch levels or re-render, when the view reloads, then my position does not jump unexpectedly."],"story_points":2,"roles":["BOD","PMO","AM","EM/TL/PM","Member"],"dependencies":[],"status":"not-started"},{"id":"US-M1.3.S1-03","type":"story","title":"View the org chart scoped to my access","story":"As an AM, EM/TL or Member, I want the org chart limited to the accounts/projects I can see so that I only browse my part of the organization.","acceptance_criteria":["Given I am an AM, when I open the org chart, then only my assigned (and granted) accounts and their projects are shown.","Given I am an EM/TL or Member, when I open the org chart, then only my account/project context is shown.","Given nothing is in my scope, when the chart renders, then an empty state explains there is nothing to show."],"story_points":2,"roles":["AM","EM/TL/PM","Member"],"dependencies":["EN-M1.2-01"],"status":"not-started"}]},{"id":"M1.3.S2","name":"Account Org Chart","description":"Account-level view: the chosen account's AM → projects → allocated members, with an account picker and drill-down.","roles":["BOD","PMO","AM"],"mockup_ref":{"screen":"people/org"},"sub_screens":[{"id":"M1.3.S2.1","name":"Account picker","description":"Select which account to chart."},{"id":"M1.3.S2.2","name":"Account tree","description":"AM → projects → members for the selected account."}],"items":[{"id":"US-M1.3.S2-01","type":"story","title":"View an account's org chart","story":"As an Admin/BOD, PMO or AM, I want to chart a single account's AM, projects and members so that I can see how that account is staffed.","acceptance_criteria":["Given I pick an account, when the chart renders, then it shows the account's AM, each project under it, and the members allocated to each project.","Given an account has a project with no allocated members, when it renders, then that project node shows an empty member state.","Given no account is in my scope, when I open the level, then an empty state is shown."],"story_points":3,"roles":["BOD","PMO","AM"],"dependencies":["EN-M1.2-01","EN-M1.4-01"],"status":"not-started"},{"id":"US-M1.3.S2-02","type":"story","title":"Drill from a chart into an account or project","story":"As any viewer, I want to click an account or project node to open its detailed chart so that I can navigate the hierarchy by clicking.","acceptance_criteria":["Given I am on the Company chart, when I click an account node, then the Account chart opens focused on that account.","Given I am on the Account chart, when I click a project node, then the Project chart opens focused on that project.","Given I drilled in, when I switch the level control or pick another item, then the chart updates to the new selection."],"story_points":2,"roles":["BOD","PMO","AM","EM/TL/PM","Member"],"dependencies":["US-M1.3.S1-01","US-M1.3.S2-01"],"status":"not-started"}]},{"id":"M1.3.S3","name":"Project Org Chart","description":"Project-level view: the chosen project and its allocated members, with a project picker. Members link to their employee profile.","roles":["BOD","PMO","AM","EM/TL/PM"],"mockup_ref":{"screen":"people/org"},"sub_screens":[{"id":"M1.3.S3.1","name":"Project picker","description":"Select which project to chart."},{"id":"M1.3.S3.2","name":"Project tree","description":"Project box with allocated members beneath it."}],"items":[{"id":"US-M1.3.S3-01","type":"story","title":"View a project's org chart","story":"As an Admin/BOD, PMO, AM or EM/TL, I want to chart a single project and its allocated members so that I can see the team on that project.","acceptance_criteria":["Given I pick a project, when the chart renders, then it shows the project and the members allocated to it (with the engagement manager highlighted).","Given the project has no allocated members, when it renders, then a 'No members allocated' empty state is shown.","Given no project is in my scope, when I open the level, then an empty state is shown."],"story_points":3,"roles":["BOD","PMO","AM","EM/TL/PM"],"dependencies":["EN-M1.2-01","EN-M1.4-01"],"status":"not-started"},{"id":"US-M1.3.S3-02","type":"story","title":"Open a person's profile from the chart","story":"As an authorized viewer, I want to click
