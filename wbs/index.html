 a person in any org chart to open their employee profile so that I can see their details without leaving the chart context.","acceptance_criteria":["Given a chart shows a person who is a known employee, when I click their node, then their employee profile opens.","Given a node is a placeholder (not a linked employee), when I click it, then nothing opens and no error occurs."],"story_points":1,"roles":["BOD","PMO","AM","EM/TL/PM"],"dependencies":["US-M1.2.S2-01"],"status":"not-started"}]}]},{"id":"M1.4","name":"Resource Allocation","description":"Group Resource Allocation reporting: the monthly staffing grid (planned %) and per-person utilization across the portfolio, showing over-allocation and bench. Read-only in People — allocations are created, edited and aggregated in PM RA Monitoring (M3.4); this sub-module is the People-side read that the allocation report, dashboard and org chart consume.","status":"in-progress","screens":[{"id":"M1.4.S1","name":"Resource Allocation","description":"Portfolio staffing report: effort-by-account summary, allocation KPIs, the 12-month allocation grid, and per-person utilization — role-scoped and exportable.","roles":["BOD","PMO","AM","EM/TL/PM","Member"],"mockup_ref":{"screen":"people/allocation"},"sub_screens":[{"id":"M1.4.S1.1","name":"Effort by account","description":"Man-month split across accounts (donut + legend)."},{"id":"M1.4.S1.2","name":"Allocation KPIs","description":"Average utilization (target ≥85%), total over-allocated, total members/projects."},{"id":"M1.4.S1.3","name":"Monthly allocation grid","description":"Per-person 12-month planned-% matrix, colour-coded, over-100% flagged, with YTD/FY/Total MM."},{"id":"M1.4.S1.4","name":"Utilization by person","description":"Per-person project-split bars, total %, planned-vs-actual variance, idle."}],"items":[{"id":"EN-M1.4-01","type":"enabler","title":"People-side allocation read & utilization scoping","story":"Provide the People-side read over the allocation data owned by PM RA Monitoring (EN-M3.4-01): surface per-person utilization, over-allocation and bench, and per-project membership, to the People allocation report, dashboard utilization KPIs and org chart — scoped to People RBAC. People does not create, edit or recompute allocations; it consumes them.","acceptance_criteria":["Given the allocation source (EN-M3.4-01), when People reads it, then per-person monthly load, utilization, over-allocation flag and bench are surfaced without being recomputed in People.","Given a People viewer's RBAC scope, when allocation data is read, then only in-scope people/projects are returned (HR/PMO/BOD all; AM own accounts; EM/TL/PM own projects; Member self).","Given allocations for a project, when read, then the members allocated (and their %) are available to the org chart."],"story_points":3,"roles":["BOD","PMO","AM","EM/TL/PM","Member"],"notes":"Single source of allocation data is PM RA Monitoring (EN-M3.4-01); People is read-only. The definitions (over-allocation = >100% in any month, utilization target ≥85%, bench = no allocation) are owned there, not redefined here.","dependencies":["EN-M1.2-01","EN-M3.4-01"],"status":"not-started"},{"id":"US-M1.4.S1-01","type":"story","title":"View the monthly allocation grid","story":"As an Admin/BOD or PMO, I want a per-person month-by-month allocation grid so that I can see how everyone is staffed across the year and spot over-allocation.","acceptance_criteria":["Given the allocation report loads, when the grid renders, then each row shows an employee's ID, name, account, sub-project and their planned % for each of the 12 months, plus YTD%, FY% and total man-months.","Given a person exceeds 100% in a month, when that cell renders, then it is visually flagged as over-allocated.","Given I search by name or employee ID, when applied, then the grid filters and paginates accordingly.","Given I click a row, when selected, then that person's profile opens."],"story_points":5,"roles":["BOD","PMO"],"dependencies":["EN-M1.4-01"],"status":"not-started"},{"id":"US-M1.4.S1-02","type":"story","title":"View utilization by person","story":"As an Admin/BOD or PMO, I want each person's current utilization split by project with planned-vs-actual variance so that I can see who is over-allocated, well-utilized or idle.","acceptance_criteria":["Given the report loads, when the utilization section renders, then each person shows a project-split bar, total planned %, an over-allocation warning when >100%, the planned-vs-actual variance and any idle capacity.","Given a person has no allocation, when rendered, then they are shown as idle.","Given I search by name or ID, when applied, then the list filters and paginates, with a project colour legend shown."],"story_points":5,"roles":["BOD","PMO"],"dependencies":["EN-M1.4-01"],"status":"not-started"},{"id":"US-M1.4.S1-03","type":"story","title":"View allocation summary KPIs and effort by account","story":"As an Admin/BOD or PMO, I want headline allocation KPIs and an effort-by-account breakdown so that I can gauge portfolio utilization at a glance.","acceptance_criteria":["Given the report loads, when the summary renders, then average utilization (vs the ≥85% target), the count of over-allocated people and total members/projects are shown.","Given the report loads, when the summary renders, then an effort-by-account breakdown shows man-months per account with a total.","Given a metric has no data in scope, when it renders, then an empty state is shown."],"story_points":3,"roles":["BOD","PMO"],"dependencies":["EN-M1.4-01"],"status":"not-started"},{"id":"US-M1.4.S1-04","type":"story","title":"Export the resource allocation report","story":"As an Admin/BOD or PMO, I want to export the resource allocation report so that I can share or analyze staffing outside the app.","acceptance_criteria":["Given I am viewing the allocation report, when I export, then the current (scoped, filtered) allocation data is produced as a downloadable file.","Given a scoped view is active, when I export, then the export contains only the in-scope people."],"story_points":2,"roles":["BOD","PMO"],"dependencies":["EN-M1.4-01"],"status":"not-started"},{"id":"US-M1.4.S1-05","type":"story","title":"View allocation scoped to my accounts (AM)","story":"As an Account Manager, I want the allocation report scoped to people in my accounts so that I can manage my accounts' staffing.","acceptance_criteria":["Given I am an AM, when I open Resource Allocation, then the grid, utilization and KPIs reflect only people in my assigned (and granted) accounts.","Given I search or filter, when applied, then results stay within my account scope."],"story_points":2,"roles":["AM"],"dependencies":["EN-M1.4-01"],"status":"not-started"},{"id":"US-M1.4.S1-06","type":"story","title":"View allocation scoped to my team (EM/TL)","story":"As an EM/Team Lead, I want the allocation report scoped to my projects/team so that I can balance my team's workload.","acceptance_criteria":["Given I am an EM/TL, when I open Resource Allocation, then the grid, utilization and KPIs reflect only members of my projects.","Given a member of mine is over-allocated, when the report renders, then they are flagged so I can act."],"story_points":2,"roles":["EM/TL/PM"],"dependencies":["EN-M1.4-01"],"status":"not-started"},{"id":"US-M1.4.S1-07","type":"story","title":"View my own allocation and utilization (Member)","story":"As a Member, I want to see my own allocation and utilization so that I understand my workload and where my time is committed.","acceptance_criteria":["Given I am a Member, when I open Resource Allocation, then I see only my own allocation across projects and my utilization/idle.","Given I am over-allocated in a month, when it renders, then it is clearly indicated."],"story_points":2,"roles":["Member"],"dependencies":["EN-M1.4-01"],"status":"not-started"}]}]},{"id":"M1.5","name":"Performance","description":"Monthly scorecards/evaluations (pillars, criteria, AMMI). Owns the review scores the dashboard summarizes.","status":"not-started","screens":[]},{"id":"M1.6","name":"Onboarding","description":"Employee onboarding journey — task/checklist tracking and progress from offer to fully ramped. Moved from the former Journey module into People; complements the account creation in M1.2 Employees. Source of joiner events the dashboard reads.","status":"not-started","screens":[]},{"id":"M1.7","name":"Probation","description":"Probation tracking and verdicts across a new joiner's probationary period. Moved from the former Journey module into People.","status":"not-started","screens":[]},{"id":"M1.8","name":"Offboarding","description":"Employee offboarding workflow — exit process and alumni. Moved from the former Journey module into People; source of leaver/attrition events the dashboard reads.","status":"not-started","screens":[]}]},{"id":"M3","name":"Project Monitoring","description":"PM/PMO project-governance module: portfolio health, project-request approvals, weekly reports, resource-allocation monitoring, risks & issues, and KPI metrics. Owns the project record, QCDP health and staffing/allocations the People module reads.","status":"in-progress","sub_modules":[{"id":"M3.1","name":"Portfolio","description":"The portfolio command centre: a role-scoped, week-by-week read on delivery health — headline KPIs, an insights-and-exceptions feed of everything non-green, and an account-by-account health rollup that drills into individual projects' weekly reports.","status":"in-progress","screens":[{"id":"M3.1.S1","name":"Portfolio Overview","description":"The default portfolio view for BOD/PMO (full) and AM/EM/TL/Member (scoped): a scoped header with week picker, the portfolio KPI strip, the insights & exceptions summary, and the Account Health rollup table.","roles":["BOD","PMO","AM","EM/TL/PM","Member"],"mockup_ref":{"screen":"project/portfolio"},"sub_screens":[{"id":"M3.1.S1.1","name":"Scoped header & week picker","description":"Role-aware title/subtitle (full vs scoped persona) and a reporting-week selector."},{"id":"M3.1.S1.2","name":"Portfolio KPI strip","description":"Account health counts (healthy/watch/critical), billable rate (≥80% target), predictability, report compliance."},{"id":"M3.1.S1.3","name":"Insights & exceptions summary","description":"Critical/watch/not-reported/stale-green counts and a paginated list of non-green projects, with 'View all'."},{"id":"M3.1.S1.4","name":"Account Health table","description":"Per-account rollup (health, QCDP, team, BMM, CSS, owner) expandable to project rows; expand/collapse-all."}],"items":[{"id":"EN-M3.1-01","type":"enabler","title":"Project record & account-health rollup model","story":"Provide the canonical project record (account, PM, phase, status [active/on-hold/closed], RAG health, QCDP pillars with auto vs reported values, team size, billable man-months, CSS, predictability, weekly-reported flag, open risk) and the account-level rollups every PM screen reads: account health (worst-of project RAG), account QCDP (worst pillar across projects), team/BMM totals and average CSS.","acceptance_criteria":["Given a set of projects, when an account is rolled up, then its health is the worst RAG among its projects, its QCDP is the worst value per pillar, and team, BMM and CSS are aggregated.","Given a project's QCDP has an auto-computed value and a reported override, when surfaced, then both are available and an override is distinguishable from the auto value.","Given an account has no projects in the current scope, when rolled up, then it is omitted rather than shown with zeroes.","Given a project's status, when active health, billability and report-compliance are aggregated, then only active and on-hold projects are counted and closed projects are excluded (surfaced separately as closed)."],"story_points":5,"roles":["BOD","PMO","AM","EM/TL/PM","Member"],"notes":"Health rollup: Red if any project Red, else Yellow if any Yellow, else Green. QCDP pillars = Quality, Cost, Delivery, Process (each RAG); account QCDP = worst pillar across its projects. Owns the project record the People allocation/org views and the rest of M3 read. Status lifecycle: active → on-hold → closed (default active on creation); closed projects leave the active portfolio and closure releases their allocations (M3.8).","dependencies":[],"external_deps":[{"needs":"account / client master data (and account→AM ownership)","likely_module":"M0","reason":"projects and the portfolio are keyed by account; the account master record has no management screen here and is owned by Admin/org-configuration (out of scope)."}],"status":"not-started"},{"id":"EN-M3.1-02","type":"enabler","title":"PM-module role/scope visibility","story":"Provide the visibility rules that scope every portfolio/project view to the caller: full portfolio for BOD/PMO, account-scoped for AM, project-scoped for EM/TL, and own-projects for Member.","acceptance_criteria":["Given a BOD/PMO caller, when the portfolio loads, then all accounts and projects are visible.","Given an AM, when the portfolio loads, then only projects in their assigned (and granted) account(s) are visible.","Given an EM/TL or Member, when the portfolio loads, then only the projects they lead / are staffed on are visible, and an empty state is shown when nothing is in scope."],"story_points":3,"roles":["BOD","PMO","AM","EM/TL/PM","Member"],"notes":"Scope tiers: BOD/PMO = whole portfolio; AM = own + granted accounts; EM/TL = projects they run; Member = projects they are allocated to.","dependencies":["EN-M3.1-01"],"status":"not-started"},{"id":"US-M3.1.S1-01","type":"story","title":"View the portfolio KPI strip","story":"As a BOD or PMO, I want a portfolio KPI strip — account health counts, billable rate, predictability and report compliance — so that I can gauge delivery health in seconds.","acceptance_criteria":["Given the portfolio loads, when the KPI strip renders, then it shows account counts split into healthy/watch/critical, billable rate against the ≥80% target (with billable/total man-months), average predictability, and report compliance (% of in-scope projects reported this week).","Given billable rate is below 80% or report compliance below 90%, when rendered, then the metric is visually flagged.","Given a metric has no data in scope, when rendered, then an empty state is shown instead of a zero."],"story_points":3,"roles":["BOD","PMO"],"dependencies":["EN-M3.1-01","EN-M3.4-01","EN-M3.3-01"],"status":"not-started"},{"id":"US-M3.1.S1-02","type":"story","title":"Review the insights & exceptions summary","story":"As a BOD or PMO, I want a summary that counts critical, watch, not-reported and stale-green projects and lists the non-green ones so that I can see what needs attention this week.","acceptance_criteria":["Given the portfolio loads, when the summary renders, then it shows counts of critical, watch, not-reported and stale-green projects, plus a paginated list of non-green projects each with its account, open risk and a critical/watch tag.","Given more non-green projects than fit one page, when rendered, then the list paginates.","Given all in-scope projects are green this week, when rendered, then an all-green empty state is shown."],"story_points":3,"roles":["BOD","PMO"],"dependencies":["EN-M3.1-01","EN-M3.3-01"],"status":"not-started"},{"id":"US-M3.1.S1-03","type":"story","title":"View the Account Health rollup table","story":"As a BOD or PMO, I want an account-health table that rolls each account's projects up into health, QCDP, team, BMM, CSS and owner so that I can compare account delivery health at a glance.","acceptance_criteria":["Given the portfolio loads, when the table renders, then each account row shows its health (with project count), worst-of QCDP pillars, total team, total BMM, average CSS and the owning Account Manager.","Given accounts exist, when rendered, then they can be expanded/collapsed individually and via expand-all / collapse-all.","Given no accounts are in scope, when rendered, then an empty state is shown."],"story_points":5,"roles":["BOD","PMO"],"notes":"Owner = AM on account rows. BMM = billable man-months. CSS = customer satisfaction /5. Account QCDP = worst pillar across its projects.","dependencies":["EN-M3.1-01","EN-M3.4-01"],"status":"not-started"},{"id":"US-M3.1.S1-04","type":"story","title":"Expand an account to its projects","story":"As a BOD, PMO or AM, I want to expand an account to see its projects so that I can drill from account health into the individual projects driving it.","acceptance_criteria":["Given an account row, when I expand it, then its projects are listed, each with phase, QCDP, staff, BMM, CSS and PM.","Given I collapse it (or use collapse-all), when applied, then the project rows are hidden.","Given an account has a single project, when expanded, then that one project row is shown."],"story_points":2,"roles":["BOD","PMO","AM"],"dependencies":["US-M3.1.S1-03"],"status":"not-started"},{"id":"US-M3.1.S1-05","type":"story","title":"Switch the reporting week","story":"As any portfolio viewer, I want to switch the reporting week so that I can view delivery health for a chosen week.","acceptance_criteria":["Given the portfolio is shown, when I pick a different week, then the KPIs, exceptions and account health recompute for that week.","Given a project has no report for the selected week, when rendered, then its RAG is carried over and it is counted as not-reported."],"story_points":2,"roles":["BOD","PMO","AM","EM/TL/PM","Member"],"dependencies":["EN-M3.1-01","EN-M3.3-01"],"status":"not-started"},{"id":"US-M3.1.S1-06","type":"story","title":"Drill into a project's weekly report from the portfolio","story":"As an authorized viewer, I want to click a project in the portfolio to open its weekly report so that I can see the detail behind its health.","acceptance_criteria":["Given a project row in the account-health table or the exceptions list, when I click it, then that project's weekly report opens.","Given the row is an account (not a project), when I click it, then it expands/collapses instead of opening a report."],"story_points":2,"roles":["BOD","PMO","AM","EM/TL/PM","Member"],"dependencies":["EN-M3.1-01","US-M3.3.S2-01"],"status":"not-started"},{"id":"US-M3.1.S1-07","type":"story","title":"View the portfolio scoped to my accounts (AM)","story":"As an Account Manager, I want the portfolio scoped to my account(s) so that I see only my accounts' projects and health.","acceptance_criteria":["Given I am an AM, when the portfolio loads, then the header indicates a scoped view and the KPIs, exceptions and account health reflect only my assigned (and granted) accounts.","Given I have no projects in scope, when rendered, then an empty state is shown."],"story_points":2,"roles":["AM"],"mockup_ref":{"screen":"project/portfolio","persona":"am"},"dependencies":["EN-M3.1-02"],"status":"not-started"},{"id":"US-M3.1.S1-08","type":"story","title":"View the portfolio scoped to my projects (EM/TL)","story":"As an EM/Team Lead, I want the portfolio scoped to the projects I run so that I see only my projects' delivery health.","acceptance_criteria":["Given I am an EM/TL, when the portfolio loads, then the header indicates a scoped view and every section reflects only the projects I lead.","Given I lead no project, when rendered, then an empty state explains there is nothing in scope."],"story_points":2,"roles":["EM/TL/PM"],"mockup_ref":{"screen":"project/portfolio","persona":"manager"},"dependencies":["EN-M3.1-02"],"status":"not-started"},{"id":"US-M3.1.S1-09","type":"story","title":"View the portfolio scoped to my projects (Member)","story":"As a Member, I want the portfolio scoped to the projects I'm staffed on so that I can see my projects' delivery health.","acceptance_criteria":["Given I am a Member, when the portfolio loads, then only the projects I am allocated to are shown.","Given I am on no project, when rendered, then an empty state is shown."],"story_points":2,"roles":["Member"],"mockup_ref":{"screen":"project/portfolio","persona":"employee"},"dependencies":["EN-M3.1-02","EN-M3.4-01"],"status":"not-started"}]},{"id":"M3.1.S2","name":"Insights & Exceptions (detail)","description":"The 'View all' detail reached from the summary: a full table of every non-green project this week with health, QCDP, open risk, reporting status and PM, plus the not-reported and stale-green compliance flags. Rows drill into the weekly report.","roles":["BOD","PMO"],"mockup_ref":{"screen":"project/portfolio"},"sub_screens":[{"id":"M3.1.S2.1","name":"Exceptions KPIs","description":"Critical, watch, not-reported and stale-green counts for the selected week."},{"id":"M3.1.S2.2","name":"Non-green projects table","description":"Every non-green project with health, QCDP, open risk/issue, reported status and PM; critical first."},{"id":"M3.1.S2.3","name":"Reporting flags","description":"Not-reported and stale-green project lists."}],"items":[{"id":"US-M3.1.S2-01","type":"story","title":"View all non-green projects (exceptions detail)","story":"As a BOD or PMO, I want a full table of every non-green project — with health, QCDP, open risk, reporting status and PM — so that I can triage everything that needs attention this week.","acceptance_criteria":["Given I open 'View all' from the summary, when the detail renders, then a table lists every non-green project with its account, health, QCDP, open risk/issue, reported status and PM, sorted critical first, above a critical/watch/not-reported/stale-green KPI row.","Given I click a row, when selected, then that project's weekly report opens.","Given all in-scope projects are green, when rendered, then a no-exceptions empty state is shown."],"story_points":3,"roles":["BOD","PMO"],"dependencies":["EN-M3.1-01","US-M3.1.S1-02","EN-M3.3-01","US-M3.3.S2-01"],"status":"not-started"},{"id":"US-M3.1.S2-02","type":"story","title":"Review reporting-compliance flags","story":"As a BOD or PMO, I want the not-reported and stale-green projects called out so that I can chase missing reports and unverified green status.","acceptance_criteria":["Given the exceptions detail renders, when projects have no report for the selected week, then they are listed as not-reported.","Given a project has been green for 3+ weeks with no metric movement, when rendered, then it is flagged as stale-green for a PMO spot-check.","Given neither applies, when rendered, then the flags are omitted."],"story_points":2,"roles":["BOD","PMO"],"notes":"Stale green = Green for ≥3 consecutive weeks with no metric movement. Not-reported = no weekly report submitted for the selected week.","dependencies":["EN-M3.1-01","EN-M3.3-01"],"status":"not-started"}]}]},{"id":"M3.2","name":"Project Requests","description":"Project-charter governance, visible to BOD/PMO and the requesting PM (EM/TL): submit a charter → PMO sign-off → BoD approval (creates the project live in Portfolio) → staffing & access (R&R: Owner/Edit/View per person). Owns the request/approval workflow and the initial staffing; the workspace-access grant crosses to Admin/access-control (M0).","status":"in-progress","screens":[{"id":"M3.2.S1","name":"Project Requests list","description":"The request pipeline: counts by stage (total, awaiting PMO, awaiting BoD, approved & created, rejected) and a card per request with its stage badge and stepper. Entry point for a new request.","roles":["BOD","PMO","EM/TL/PM"],"mockup_ref":{"screen":"project/requests"},"sub_screens":[{"id":"M3.2.S1.1","name":"Pipeline KPIs","description":"Total, awaiting PMO, awaiting BoD, approved & created, rejected."},{"id":"M3.2.S1.2","name":"Request cards","description":"Per-request card: id, name, account, PM, BMM, team, stage badge and stepper; rejection reason if rejected."}],"items":[{"id":"EN-M3.2-01","type":"enabler","title":"Project request (charter) model & approval workflow","story":"Provide the project-request record (charter: name, account, requesting PM, budget BMM, team size, methodology, pricing, timeline, objective, scope) and its approval stage machine — Submitted → PMO Review → BoD Review → Project created — with rejection (and a reason) possible at either review stage.","acceptance_criteria":["Given a request, when its stage is shown, then it reflects exactly one of awaiting-PMO, awaiting-BoD, Approved & created, or Rejected, with a stepper showing progress.","Given a request is rejected, when displayed, then the stage it was rejected at and the reason are retained.","Given a request advances or is rejected, when the change is made, then it is recorded with an audit entry."],"story_points":5,"roles":["BOD","PMO","EM/TL/PM"],"notes":"Stages: Submitted → PMO sign-off → BoD approval → Project created (live in Portfolio). PM = the requesting manager (EM/TL).","dependencies":[],"status":"not-started"},{"id":"US-M3.2.S1-01","type":"story","title":"View the project-request pipeline","story":"As a BOD, PMO or PM, I want to see the project-request pipeline with counts by stage so that I can track what needs review and what's been approved.","acceptance_criteria":["Given I open Project Requests, when the list renders, then it shows counts of total, awaiting PMO, awaiting BoD, approved & created and rejected, plus a card per request with its stage badge and stepper.","Given a request was rejected, when its card renders, then the rejection reason is shown.","Given there are no requests, when the list renders, then an empty state is shown."],"story_points":3,"roles":["BOD","PMO","EM/TL/PM"],"dependencies":["EN-M3.2-01"],"status":"not-started"}]},{"id":"M3.2.S2","name":"Request charter & approval","description":"The charter modal: full charter, stage stepper and rejection reason, with the stage-gated actions — PMO sign-off, BoD approval (creates the project), and reject with a reason.","roles":["BOD","PMO","EM/TL/PM"],"mockup_ref":{"screen":"project/requests"},"sub_screens":[{"id":"M3.2.S2.1","name":"Charter detail","description":"Account, PM, BMM, team, methodology, pricing, timeline, submitted, objective, scope, stepper."},{"id":"M3.2.S2.2","name":"Approval actions","description":"Stage-gated PMO sign-off, BoD approve & create, and reject."}],"items":[{"id":"US-M3.2.S2-01","type":"story","title":"Open a request's charter","story":"As a BOD, PMO or PM, I want to open a request's charter so that I can review its objective, scope and commercials before deciding.","acceptance_criteria":["Given I open a request, when the charter renders, then it shows account, requesting PM, budget (BMM), team size, methodology, pricing, timeline, submitted date, objective and scope, plus the stage stepper.","Given the request is rejected, when opened, then the rejection stage and reason are shown.","Given the request has been created into a project, when opened, then the linked project and its staffing are shown."],"story_points":3,"roles":["BOD","PMO","EM/TL/PM"],"dependencies":["EN-M3.2-01"],"status":"not-started"},{"id":"US-M3.2.S2-02","type":"story","title":"PMO sign-off on a request","story":"As a PMO, I want to sign off a submitted request so that only PMO-approved charters reach the Board.","acceptance_criteria":["Given a request is awaiting PMO review, when I approve it, then it advances to BoD review and the action is audit-logged.","Given a request is not at PMO review, when I open it, then the PMO sign-off action is not available."],"story_points":3,"roles":["PMO","BOD"],"dependencies":["US-M3.2.S2-01"],"status":"not-started"},{"id":"US-M3.2.S2-03","type":"story","title":"BoD approval that creates the project","story":"As a BOD member, I want to approve a PMO-signed request so that the project is created live in the Portfolio.","acceptance_criteria":["Given a request is awaiting BoD review, when I approve it, then a new project is created in the Portfolio with a generated id and the request is marked Approved & created.","Given the project is created, when I confirm, then the action is audit-logged and staffing & access can be granted next.","Given a request is not at BoD review, when I open it, then the BoD approval action is not available."],"story_points":5,"roles":["BOD"],"dependencies":["US-M3.2.S2-01","EN-M3.1-01"],"status":"not-started"},{"id":"US-M3.2.S2-04","type":"story","title":"Reject a request with a reason","story":"As a PMO or BOD member, I want to reject a request with a reason so that the requester knows why it didn't proceed.","acceptance_criteria":["Given a request is at PMO or BoD review, when I reject it with a reason, then it is marked Rejected at that stage with the reason recorded and audit-logged.","Given I cancel the rejection, when dismissed, then the request is unchanged."],"story_points":2,"roles":["PMO","BOD"],"dependencies":["US-M3.2.S2-01"],"status":"not-started"}]},{"id":"M3.2.S3","name":"Staffing & Access (R&R)","description":"After a project is created: staff people onto it with a role and allocation %, and grant each their workspace access (Owner/Edit/View).","roles":["BOD","PMO","EM/TL/PM"],"mockup_ref":{"screen":"project/requests"},"sub_screens":[{"id":"M3.2.S3.1","name":"Staffing list","description":"People on the project with role, RA % and access level."},{"id":"M3.2.S3.2","name":"Add person","description":"Add a person with role, RA % and access."}],"items":[{"id":"US-M3.2.S3-01","type":"story","title":"Staff people and grant access on a created project","story":"As a PMO or PM, I want to staff people onto a created project and grant each their access (Owner/Edit/View) so that the team can start with the right permissions.","acceptance_criteria":["Given a created project, when I add a person with a role, allocation % and access level, then they appear on the project's staffing list, the project's staff count updates and the grant is audit-logged.","Given I add someone already staffed, when I try, then they are not added twice.","Given the project is not yet created, when I open the request, then the staffing section is unavailable."],"story_points":5,"roles":["PMO","EM/TL/PM","BOD"],"notes":"Initial staffing creates allocations (the RA source, EN-M3.4-01); the Owner/Edit/View workspace-access grant is an access-control concern owned by Admin (M0).","dependencies":["US-M3.2.S2-03","EN-M3.4-01"],"external_deps":[{"needs":"grant/revoke workspace access (Owner/Edit/View) and audit it","likely_module":"M0","reason":"per-person access control is owned by Admin/access-control, which is out of scope for this WBS."}],"status":"not-started"}]},{"id":"M3.2.S4","name":"New Project Request","description":"The charter submission form: name (required), account, PM, budget BMM, team size, methodology, pricing, timeline, objective and scope.","roles":["BOD","PMO","EM/TL/PM"],"mockup_ref":{"screen":"project/requests"},"sub_screens":[{"id":"M3.2.S4.1","name":"Charter form","description":"Charter fields with name required; submit enters the pipeline awaiting PMO."}],"items":[{"id":"US-M3.2.S4-01","type":"story","title":"Submit a new project request","story":"As a PM (EM/TL), PMO or BOD, I want to submit a new project-request charter so that it enters the approval pipeline.","acceptance_criteria":["Given I open the new-request form, when I enter at least a project name (plus account, budget, team, methodology, pricing, timeline, objective, scope), then on submit a request is created at 'awaiting PMO review' and audit-logged.","Given I omit the project name, when I submit, then I am warned it is required and nothing is created.","Given the request is created, when I return to the list, then it appears at the top awaiting PMO review."],"story_points":3,"roles":["EM/TL/PM","PMO","BOD"],"dependencies":["EN-M3.2-01"],"status":"not-started"}]}]},{"id":"M3.3","name":"Weekly Reports","description":"Per-project weekly delivery reporting: a role-scoped list (account→project, by week), the report drawer Portfolio drills into (health, QCDP, trend, staffing, narrative, comments), and the submit form (QCDP per pillar, overall = worst, mandatory road-to-green for non-Green). Owns the per-week health, reported flag and stale-green basis the Portfolio reads; non-Green reports spawn Recovery actions in Risks & Issues (M3.5).","status":"in-progress","screens":[{"id":"M3.3.S1","name":"Weekly Reports list","description":"Role-scoped list of projects and their weekly-report status for a chosen week: cards with RAG, QCDP, latest summary, reporter (PM/PMO) and report count, with week/account/project filters and pagination.","roles":["BOD","PMO","AM","EM/TL/PM","Member"],"mockup_ref":{"screen":"project/weekly"},"sub_screens":[{"id":"M3.3.S1.1","name":"Filter toolbar","description":"Week, account and project selectors with project count."},{"id":"M3.3.S1.2","name":"Report cards","description":"Per-project card: RAG, QCDP, latest summary, reporter tag(s), report count for the week."}],"items":[{"id":"EN-M3.3-01","type":"enabler","title":"Weekly report model & project-health write-back","story":"Provide the weekly report record (project × week × reporter PM/PMO, QCDP per pillar, overall RAG = worst of the four, executive summary, risk/issue, optional road-to-green, comments) and the rule that submitting a report writes its QCDP/RAG back to the project, marks it reported for the week and resets its green-streak — the basis the Portfolio reads for per-week health, the reported flag and stale-green.","acceptance_criteria":["Given a submitted report, when stored, then it captures project, week, reporter (PM or PMO), QCDP per pillar, overall RAG, summary, risk and any road-to-green, with overall RAG = the worst of the four QCDP pillars.","Given a report is submitted for a project and week, when saved, then the project's QCDP/RAG are updated, it is marked reported for that week and its green-streak is reset.","Given a reporter already submitted for the same project and week, when they submit again, then their report is replaced rather than duplicated (one report per reporter per project per week)."],"story_points":5,"roles":["BOD","PMO","EM/TL/PM"],"notes":"Reporter = PMO for full-access submitters, otherwise PM. The reported flag and reset green-streak feed Portfolio report-compliance and stale-green via the project record (EN-M3.1-01).","dependencies":["EN-M3.1-01"],"status":"not-started"},{"id":"US-M3.3.S1-01","type":"story","title":"Browse weekly reports by account and project","story":"As a BOD or PMO, I want to browse weekly reports by account and project for a chosen week so that I can find and open any project's report.","acceptance_criteria":["Given I open Weekly Reports, when the list renders, then each in-scope project shows a card with its RAG, QCDP, latest summary, who reported (PM/PMO) and how many reports it has for the selected week.","Given I change the week, account or project filter, when applied, then the cards update and paginate to match.","Given a project has no report for the selected week, when its card renders, then it shows a 'no report' indicator."],"story_points":3,"roles":["BOD","PMO"],"dependencies":["EN-M3.3-01","EN-M3.1-01"],"status":"not-started"},{"id":"US-M3.3.S1-02","type":"story","title":"View weekly reports scoped to my access","story":"As an AM, EM/TL or Member, I want the weekly-reports list scoped to my access so that I only see reports for my accounts/projects.","acceptance_criteria":["Given I am an AM, when I open Weekly Reports, then only my accounts' projects are listed; given an EM/TL or Member, then only my projects are listed.","Given nothing is in my scope, when the list renders, then an empty state is shown."],"story_points":2,"roles":["AM","EM/TL/PM","Member"],"dependencies":["EN-M3.1-02"],"status":"not-started"}]},{"id":"M3.3.S2","name":"Weekly Report (detail)","description":"The report drawer Portfolio and the list drill into: project header and health, QCDP and trend, staffing/utilization/predictability/CSS, each report's summary/risk/road-to-green, a comment thread, and a backfill action when understaffed.","roles":["BOD","PMO","AM","EM/TL/PM","Member"],"mockup_ref":{"screen":"project/weekly"},"sub_screens":[{"id":"M3.3.S2.1","name":"Report header & health","description":"Account/PM/PMO/phase, RAG + QCDP, health trend, staffing/util/predictability/CSS, not-reported badge."},{"id":"M3.3.S2.2","name":"Report narrative","description":"Per-report summary, risk/issue and road-to-green (action/owner/due)."},{"id":"M3.3.S2.3","name":"Comments","description":"Per-report comment thread."},{"id":"M3.3.S2.4","name":"Backfill action","description":"Raise a backfill requisition when staffed below plan."}],"items":[{"id":"US-M3.3.S2-01","type":"story","title":"Open a project's weekly report","story":"As an authorized viewer, I want to open a project's weekly report to see its health, QCDP, trend, staffing and narrative so that I understand the detail behind its status.","acceptance_criteria":["Given I open a project's report for the selected week, when the drawer renders, then it shows the project header (account, PM, PMO, phase), overall RAG with QCDP, a health trend, staffing (staffed/plan, utilization, predictability, CSS) and each report's summary, risk and road-to-green.","Given the project has not reported for the week, when the drawer renders, then a 'not reported' badge is shown and the carried-over health is indicated.","Given a report has a road-to-green, when shown, then its action, owner and due are displayed."],"story_points":5,"roles":["BOD","PMO","AM","EM/TL/PM","Member"],"dependencies":["EN-M3.3-01","EN-M3.1-01"],"status":"not-started"},{"id":"US-M3.3.S2-02","type":"story","title":"Comment on a weekly report","story":"As an authorized viewer, I want to comment on a weekly report so that I can discuss it in context.","acceptance_criteria":["Given I open a report, when I write a comment and send it, then it is added to that report's thread with my name, role and timestamp.","Given a report has comments, when the drawer renders, then they are listed in order with author and role."],"story_points":2,"roles":["BOD","PMO","AM","EM/TL/PM","Member"],"dependencies":["US-M3.3.S2-01"],"status":"not-started"},{"id":"US-M3.3.S2-03","type":"story","title":"Raise a backfill from a report","story":"As a BOD, PMO or EM/TL, I want to raise a backfill from an understaffed project's report so that the staffing gap is sent to recruitment.","acceptance_criteria":["Given a project is staffed below plan, when I view its report, then a 'raise backfill' action shows the number of open seats.","Given I raise the backfill, when confirmed, then a backfill requisition is created for the gap and the action is audit-logged.","Given the project is fully staffed, when I view the report, then no backfill action is shown."],"story_points":3,"roles":["BOD","PMO","EM/TL/PM"],"dependencies":["US-M3.3.S2-01"],"external_deps":[{"needs":"create a backfill requisition in recruitment","likely_module":"M2","reason":"the backfill creates a requisition owned by the Hiring/Recruitment module (M2)."}],"status":"not-started"}]},{"id":"M3.3.S3","name":"Submit Weekly Report","description":"The submit form: pick a project, set QCDP per pillar (overall = worst, auto), executive summary and risk, with a mandatory road-to-green when non-Green that becomes a tracked Recovery action.","roles":["BOD","PMO","EM/TL/PM"],"mockup_ref":{"screen":"project/weekly"},"sub_screens":[{"id":"M3.3.S3.1","name":"QCDP & overall","description":"Quality/Cost/Delivery/Process selectors with auto overall = worst."},{"id":"M3.3.S3.2","name":"Summary & risk","description":"Executive summary and risk/issue."},{"id":"M3.3.S3.3","name":"Road-to-green","description":"Mandatory action/owner/due when non-Green."}],"items":[{"id":"US-M3.3.S3-01","type":"story","title":"Submit a weekly report with QCDP","story":"As a PM (EM/TL) or PMO, I want to submit a project's weekly report with QCDP per pillar and an overall status so that its health is recorded for the week.","acceptance_criteria":["Given I open the submit form and pick a project, when the QCDP pillars pre-fill from the project's current auto values, then I can adjust each pillar (Green/Yellow/Red) and the overall status updates to the worst of the four.","Given I provide the QCDP, summary and any risk, when I submit a Green report, then the report is saved, the project's health is updated and it is marked reported for the week.","Given I am a PM, when I submit, then it is recorded as a PM report (PMO when submitted by full-access), and a second submission for the same project/week replaces my earlier one."],"story_points":5,"roles":["EM/TL/PM","PMO","BOD"],"notes":"PM submits their own projects; PMO/BOD any project. Overall status = worst of the four QCDP pillars.","dependencies":["EN-M3.3-01"],"status":"not-started"},{"id":"US-M3.3.S3-02","type":"story","title":"Require a road-to-green for a non-Green report","story":"As a PM or PMO, I want a non-Green report to require a road-to-green so that every amber/red status has a tracked recovery action.","acceptance_criteria":["Given my overall status is non-Green, when I submit, then a road-to-green action with an owner (and due) is mandatory and submission is blocked until it is provided.","Given I submit a non-Green report with a road-to-green, when saved, then it is recorded on the report and a tracked Recovery action is created in Risks & Issues.","Given the status is Green, when I submit, then no road-to-green is required."],"story_points":3,"roles":["EM/TL/PM","PMO","BOD"],"dependencies":["US-M3.3.S3-01","EN-M3.5-01"],"status":"not-started"}]}]},{"id":"M3.4","name":"RA Monitoring","description":"Resource-allocation monitoring: the editable staffing grid where people are allocated onto projects with a planned effort over a date range, yielding calendar man-months, billable rate and per-person utilization. Owns the single allocation source the People module reads (resolves EN-M1.4-01) and the portfolio's billable-rate man-months.","status":"in-progress","screens":[{"id":"M3.4.S1","name":"RA Monitoring","description":"Role-scoped resource-allocation grid: allocation KPIs, the per-person planned-effort table (with computed calendar effort), inline add/edit/remove and assign dialog, and account/project filters. BOD/PMO edit all; EM/TL edit their own projects; AM read-only.","roles":["BOD","PMO","AM","EM/TL/PM"],"mockup_ref":{"screen":"project/resourcing"},"sub_screens":[{"id":"M3.4.S1.1","name":"Allocation KPIs","description":"Total calendar effort (MM), billable effort (MM and % of total), people allocated (and editable count), active scope."},{"id":"M3.4.S1.2","name":"Allocation table","description":"Per-person rows: name, seniority, planned effort, start/end dates, computed calendar effort, note."},{"id":"M3.4.S1.3","name":"Add / assign allocation","description":"Inline quick-add row and the 'Assign person to project' dialog (person, project, role, level, effort)."},{"id":"M3.4.S1.4","name":"Filters","description":"Account and project filters scoping the grid and KPIs."}],"items":[{"id":"EN-M3.4-01","type":"enabler","title":"Allocation source model, man-month aggregation & edit rights","story":"Provide the canonical resource-allocation record (person × project × planned effort × date range, billable flag, seniority/role) and the derived aggregations every consumer reads — calendar effort, billable man-months and billable rate, per-account/project rollups, and per-person utilization/bench — together with the edit-rights rules (BOD/PMO edit all; EM/TL edit only their own projects; AM and Member read-only).","acceptance_criteria":["Given an allocation with a planned effort and a start/end date, when aggregated, then its calendar effort = whole months in the range (inclusive) × planned effort.","Given a set of allocations, when rolled up for the current scope, then total and billable man-months, billable rate and people-allocated counts are computed.","Given a caller edits an allocation, when attempted, then it succeeds only for BOD/PMO (any allocation) or an EM/TL on their own project; AM and Member are read-only.","Given allocations exist, when queried per person or per project, then per-person utilization (and bench when unallocated in a period) and per-project membership are returned for the People module and org chart to read."],"story_points":5,"roles":["BOD","PMO","AM","EM/TL/PM","Member"],"notes":"The single allocation source of truth; People M1.4 (EN-M1.4-01) and the org chart read it. Billable rate = billable effort ÷ total effort. Bench = no allocation in a period.","dependencies":["EN-M3.1-01","EN-M1.2-01"],"status":"not-started"},{"id":"US-M3.4.S1-01","type":"story","title":"View allocation KPIs","story":"As a BOD or PMO, I want allocation KPIs — total calendar effort, billable man-months and rate, people allocated, and current scope — so that I can see staffing load and billability at a glance.","acceptance_criteria":["Given the RA Monitoring screen loads, when the KPI row renders, then it shows total calendar effort (MM), billable effort (MM and % of total), the number of people allocated (with how many are editable by me), and the active scope (all projects or the selected one).","Given a filter narrows the scope, when applied, then the KPIs recompute to the filtered allocations.","Given no allocations are in scope, when rendered, then an empty state is shown instead of zeros."],"story_points":3,"roles":["BOD","PMO"],"dependencies":["EN-M3.4-01"],"status":"not-started"},{"id":"US-M3.4.S1-02","type":"story","title":"View the per-person allocation table","story":"As a BOD or PMO, I want a per-person allocation table showing planned effort over a date range with the computed calendar effort so that I can review how each person is staffed.","acceptance_criteria":["Given the screen loads, when the table renders, then each row shows the person's name, seniority, planned effort, start and end dates, computed calendar effort and an optional note.","Given allocations span multiple accounts/projects, when rendered, then they are grouped/sorted by account then project.","Given there are no allocations in scope, when rendered, then an empty-table state is shown."],"story_points":3,"roles":["BOD","PMO"],"dependencies":["EN-M3.4-01"],"status":"not-started"},{"id":"US-M3.4.S1-03","type":"story","title":"Staff a person onto a project","story":"As a BOD, PMO or EM/TL, I want to staff a person onto a project with a planned effort so that the allocation is tracked and rolled into utilization and billability.","acceptance_criteria":["Given I add a person via the inline quick-add row or the assign dialog, when I provide at least a name and a project, then a new allocation is created with the chosen seniority/role, planned effort and date range, and the action is audit-logged.","Given I omit the name (or, for inline add, have not selected a project first), when I try to add, then I am warned and nothing is created.","Given the allocation is created, when the table refreshes, then the new row and the recomputed KPIs include it."],"story_points":3,"roles":["BOD","PMO","EM/TL/PM"],"notes":"Two entry points: the inline top-row quick-add and the 'Assign person to project' dialog.","dependencies":["EN-M3.4-01"],"status":"not-started"},{"id":"US-M3.4.S1-04","type":"story","title":"Edit an allocation inline","story":"As a BOD or PMO, I want to edit an allocation's planned effort, dates, seniority or note inline so that I can keep staffing current.","acceptance_criteria":["Given I edit a row's planned effort, start/end date, seniority or note, when I save, then the change persists, the calendar effort recomputes and the change is audit-logged.","Given I change the date range or planned effort, when saved, then the row's calendar effort and the KPI totals update.","Given I make no change, when I leave the field, then nothing is saved."],"story_points":3,"roles":["BOD","PMO"],"dependencies":["EN-M3.4-01"],"status":"not-started"},{"id":"US-M3.4.S1-05","type":"story","title":"Remove an allocation","story":"As a BOD or PMO, I want to remove an allocation so that people no longer staffed drop off the plan.","acceptance_criteria":["Given I remove an allocation, when I confirm, then it is deleted, the KPIs recompute and the removal is audit-logged.","Given I cancel the confirmation, when dismissed, then nothing is removed."],"story_points":2,"roles":["BOD","PMO"],"dependencies":["EN-M3.4-01"],"status":"not-started"},{"id":"US-M3.4.S1-06","type":"story","title":"Filter allocations by account and project","story":"As any RA Monitoring viewer, I want to filter allocations by account and project so that I can focus on a team's staffing.","acceptance_criteria":["Given I pick an account, when applied, then the table and KPIs show only that account's allocations and the project filter narrows to its projects.","Given I pick a project, when applied, then only that project's allocations are shown.","Given a filter yields nothing, when applied, then an empty state is shown."],"story_points":2,"roles":["BOD","PMO","AM","EM/TL/PM"],"dependencies":["EN-M3.4-01"],"status":"not-started"},{"id":"US-M3.4.S1-07","type":"story","title":"Manage allocations for my own projects (EM/TL)","story":"As an EM/Team Lead, I want to add, edit and remove allocations only for the projects I run so that I can manage my team's staffing without affecting others.","acceptance_criteria":["Given I am an EM/TL, when I open RA Monitoring, then I can add/edit/remove allocations on my own projects while rows outside my projects are read-only.","Given I add a person, when I have not selected one of my own projects, then I cannot allocate them to a project I don't run."],"story_points":2,"roles":["EM/TL/PM"],"dependencies":["EN-M3.4-01"],"status":"not-started"},{"id":"US-M3.4.S1-08","type":"story","title":"View allocations read-only scoped to my accounts (AM)","story":"As an Account Manager, I want a read-only view of allocations for my accounts so that I can see how my accounts are staffed without editing.","acceptance_criteria":["Given I am an AM, when I open RA Monitoring, then allocations for my assigned (and granted) accounts are shown read-only with no add/edit/remove controls.","Given nothing is in my scope, when rendered, then an empty state is shown."],"story_points":2,"roles":["AM"],"dependencies":["EN-M3.4-01"],"status":"not-started"}]}]},{"id":"M3.5","name":"Risks & Issues","description":"Consolidated RAID log across the portfolio — risks/issues with type, severity, priority, status, owner and due — with headline counts and a type filter. Read-only in the mockup: items originate from manual seed, Recovery actions auto-created by non-Green weekly reports (M3.3) and Action items promoted from Retro (M3.7).","status":"in-progress","screens":[{"id":"M3.5.S1","name":"Risk & Issue log","description":"Role-scoped RAID log: KPIs (total, open, recovery, critical/P0), a type filter and the consolidated risk/issue table.","roles":["BOD","PMO","AM","EM/TL/PM","Member"],"mockup_ref":{"screen":"project/risks"},"sub_screens":[{"id":"M3.5.S1.1","name":"RAID KPIs","description":"Total logged, open, Recovery actions (from road-to-green), Critical/P0."},{"id":"M3.5.S1.2","name":"Type filter","description":"Filter by item type (Customer, Bug, Resource, Stability, Recovery, Action…)."},{"id":"M3.5.S1.3","name":"RAID table","description":"ID, project, title/action, type, severity, priority, status, owner, due."}],"items":[{"id":"EN-M3.5-01","type":"enabler","title":"RAID register model","story":"Provide the consolidated risk/issue (RAID) register — each item with project, title, type, severity, priority, status, owner, due and action — aggregating manually-noted risks/issues, Recovery actions auto-created by non-Green weekly reports (M3.3) and Action items promoted from Retro (M3.7) into one log.","acceptance_criteria":["Given risk/issue items exist, when the register is read, then each carries project, title, type, severity (Critical/High/Important), priority (P0–P2), status (Open/In Progress/Monitoring/Resolved), owner, due and action.","Given a non-Green weekly report with a road-to-green, when submitted, then a Recovery item is added to the register linked to that project.","Given a Retro Try item is promoted, when actioned, then an Action item is added to the register."],"story_points":3,"roles":["BOD","PMO","AM","EM/TL/PM","Member"],"notes":"Read-only log in the mockup: items originate from manual seed, weekly-report Recovery (M3.3) and Retro Action (M3.7). There is no manual create/edit/resolve screen — manual risk logging and status updates are a likely future requirement, not in the current mockup.","dependencies":["EN-M3.1-01"],"status":"not-started"},{"id":"US-M3.5.S1-01","type":"story","title":"View the consolidated RAID log","story":"As a BOD or PMO, I want the consolidated RAID log with headline counts so that I can see every open risk and issue across the portfolio.","acceptance_criteria":["Given I open Risks & Issues, when it renders, then KPIs show total logged, open, Recovery actions (from road-to-green) and Critical/P0, above a table of all in-scope items with project, title/action, type, severity, priority, status, owner and due.","Given an item is a Recovery action, when listed, then it is visually distinguished from ordinary risks/issues.","Given there are no items in scope, when it renders, then an empty state is shown."],"story_points":3,"roles":["BOD","PMO"],"dependencies":["EN-M3.5-01"],"status":"not-started"},{"id":"US-M3.5.S1-02","type":"story","title":"Filter the RAID log by type","story":"As a BOD or PMO, I want to filter the log by type so that I can focus on a category (e.g. Resource, Bug, Recovery).","acceptance_criteria":["Given I select a type, when applied, then only items of that type are shown.","Given I reset to All, when applied, then all in-scope items are shown again."],"story_points":2,"roles":["BOD","PMO"],"dependencies":["US-M3.5.S1-01"],"status":"not-started"},{"id":"US-M3.5.S1-03","type":"story","title":"View the RAID log scoped to my access","story":"As an AM, EM/TL or Member, I want the RAID log scoped to my access so that I only see risks/issues for my accounts/projects.","acceptance_criteria":["Given I am an AM, when I open Risks & Issues, then only items on my accounts' projects are shown; given an EM/TL or Member, then only items on my projects.","Given nothing is in my scope, when it renders, then an empty state is shown."],"story_points":2,"roles":["AM","EM/TL/PM","Member"],"dependencies":["EN-M3.1-02"],"status":"not-started"}]}]},{"id":"M3.6","name":"KPI Metrics","description":"Operational Health Score (OHS) and QCDP pillar KPIs across the portfolio. S1 is the wired screen (OHS hero, AI summary, configurable KPI Explorer, manual KPI input). S2 captures the KPI deep-dive sections that exist in the mockup code (per-KPI drill, trends/benchmark, EQI×TDI matrix, CAPA register) but are NOT currently wired — the KPI sub-tab navigation that would surface them is never rendered (flagged, like Retro).","status":"in-progress","screens":[{"id":"M3.6.S1","name":"KPI Metrics (Performance)","description":"The reachable KPI screen: OHS gauge + pillar scores, an AI performance summary, the configurable per-project KPI Explorer table (rows drill to the weekly report), and manual KPI input. Role-scoped.","roles":["BOD","PMO","AM","EM/TL/PM","Member"],"mockup_ref":{"screen":"project/metrics"},"sub_screens":[{"id":"M3.6.S1.1","name":"OHS hero","description":"OHS gauge (0–100) with RAG verdict and the four pillar scores."},{"id":"M3.6.S1.2","name":"AI summary","description":"OHS, weakest pillar and projects needing attention."},{"id":"M3.6.S1.3","name":"KPI Explorer","description":"Per-project metric table with configurable columns; rows open the weekly report."},{"id":"M3.6.S1.4","name":"Manual KPI input","description":"Enter a project's weekly KPIs → live QCDP/RAG; current-week writes back project health."}],"items":[{"id":"EN-M3.6-01","type":"enabler","title":"KPI scoring & OHS model","story":"Provide the KPI scoring model: the catalog of 16 KPIs across Quality/Cost/Delivery/Process (each with unit, direction, green/amber thresholds and a defined formula), the per-KPI RAG status rule, the pillar scores (average of a pillar's KPI status scores) and the Operational Health Score (OHS = Quality×0.3 + Delivery×0.3 + Cost×0.2 + Process×0.2) with its RAG bands.","acceptance_criteria":["Given a project and a KPI, when its value is computed, then it is rated Green/Amber/Red against that KPI's threshold and direction (higher-is-better, lower-is-better, or in-band).","Given a set of projects, when a pillar is scored, then it is the average of its KPIs' status scores, and the OHS is the weighted roll-up (Quality 0.3, Delivery 0.3, Cost 0.2, Process 0.2) with bands Green ≥80 / Amber ≥62 / Red below.","Given a KPI is requested, when surfaced, then its formula and threshold are available."],"story_points":5,"roles":["BOD","PMO","AM","EM/TL/PM","Member"],"notes":"16 KPIs — Quality: Defect Leakage, Reopened Rate, DRE, Defect Density; Cost: Gross Margin, Billable Rate, Utilization, Effort Consumption; Delivery: On-time, Forecast Accuracy, Release Predictability, SPI; Process: Process Compliance, Retro Closure, Audit Compliance, CAPA Closure. Values derive from project QCDP/metrics owned by EN-M3.1-01.","dependencies":["EN-M3.1-01"],"status":"not-started"},{"id":"US-M3.6.S1-01","type":"story","title":"View the OHS hero and pillar scores","story":"As a BOD or PMO, I want the Operational Health Score with its pillar breakdown so that I can read overall delivery health at a glance.","acceptance_criteria":["Given KPI Metrics loads, when the hero renders, then an OHS gauge (0–100) with its RAG verdict and the four pillar scores (Quality/Cost/Delivery/Process) are shown.","Given projects are in scope, when the hero renders, then the project count, critical-project count and reported count are shown.","Given no projects are in scope, when it renders, then an empty state is shown."],"story_points":3,"roles":["BOD","PMO"],"dependencies":["EN-M3.6-01"],"status":"not-started"},{"id":"US-M3.6.S1-02","type":"story","title":"Read the AI performance summary","story":"As a BOD or PMO, I want an AI summary of performance so that I know the weakest pillar and which projects need attention.","acceptance_criteria":["Given the hero is shown, when the summary renders, then it states the OHS, the weakest pillar and the projects needing attention (or that none are critical).","Given scope changes via the account/project filter, when applied, then the summary recomputes."],"story_points":2,"roles":["BOD","PMO"],"dependencies":["EN-M3.6-01"],"status":"not-started"},{"id":"US-M3.6.S1-03","type":"story","title":"Explore per-project KPIs in the KPI Explorer","story":"As a BOD or PMO, I want a per-project KPI table so that I can compare projects across the key delivery metrics.","acceptance_criteria":["Given the explorer renders, when shown, then each project row lists its health and the selected metrics (on-time, leakage, defect, predictability, utilization, CSAT), colour-coded by threshold and sorted with the weakest predictability first.","Given I click a project row, when selected, then its weekly report opens.","Given there are no projects in scope, when it renders, then an empty state is shown."],"story_points":5,"roles":["BOD","PMO"],"dependencies":["EN-M3.6-01","US-M3.3.S2-01"],"status":"not-started"},{"id":"US-M3.6.S1-04","type":"story","title":"Configure the KPI Explorer columns","story":"As a BOD, PMO or EM/TL, I want to choose which KPI columns appear in the Explorer so that I can focus on the metrics I care about.","acceptance_criteria":["Given the configure dialog, when I toggle a metric, then the Explorer adds or removes that column.","Given I try to turn off the last remaining metric, when attempted, then it is kept and I am told at least one must stay on."],"story_points":2,"roles":["BOD","PMO","EM/TL/PM"],"dependencies":["US-M3.6.S1-03"],"status":"not-started"},{"id":"US-M3.6.S1-05","type":"story","title":"Manually input a project's weekly KPIs","story":"As a PM (EM/TL) or PMO, I want to manually input a project's KPIs for a week so that its QCDP and RAG are recorded when not auto-derived.","acceptance_criteria":["Given I open Manual KPI input and pick a project and week, when I enter on-time, leakage/defect, cost and velocity, then the QCDP pillars and overall RAG compute live from the inputs.","Given I save for the current week, when confirmed, then the project's QCDP/RAG are updated, it is marked reported, and the record is stored for that week (editing an existing record if present).","Given a non-current week, when I save, then the record is stored without overwriting the project's live health."],"story_points":5,"roles":["EM/TL/PM","PMO","BOD"],"notes":"Current-week input writes back project health & the reported flag (same effect as a weekly report, EN-M3.3-01); past weeks store a record only. Only full-access and EM/TL on their own projects can input.","dependencies":["EN-M3.6-01","EN-M3.3-01"],"status":"not-started"},{"id":"US-M3.6.S1-06","type":"story","title":"View KPI Metrics scoped to my access","story":"As an AM, EM/TL or Member, I want KPI Metrics scoped to my access so that I only see my accounts'/projects' performance.","acceptance_criteria":["Given I am an AM, when KPI Metrics loads, then the OHS, pillars and explorer reflect only my accounts' projects; given an EM/TL or Member, only my projects.","Given nothing is in scope, when it renders, then an empty state is shown."],"story_points":2,"roles":["AM","EM/TL/PM","Member"],"dependencies":["EN-M3.1-02"],"status":"not-started"}]},{"id":"M3.6.S2","name":"KPI deep-dive sections (built, not wired)","description":"FLAGGED: these sections exist in the mockup code (kpiDrill, kpiTrends, kpiMatrix, kpiCapa) but are not reachable — the KPI sub-tab navigation that would render them is never invoked (kpiSub is declared but unused). Decomposed because they are clearly intended PM capabilities; confirm wiring/scope with the team before build.","roles":["BOD","PMO"],"mockup_ref":{"screen":"project/metrics"},"sub_screens":[{"id":"M3.6.S2.1","name":"Per-KPI drill","description":"Single-KPI value, formula, threshold, trend, root cause, action history."},{"id":"M3.6.S2.2","name":"Trends & benchmark","description":"OHS history vs portfolio; pillars vs portfolio & industry target."},{"id":"M3.6.S2.3","name":"Engineering Health Matrix","description":"EQI × TDI quadrant (Healthy / Hidden Risk / Legacy Burden / System Failure)."},{"id":"M3.6.S2.4","name":"Corrective action register","description":"CAPA / Risk / Improvement from KPI breaches; filter and advance status."}],"items":[{"id":"US-M3.6.S2-01","type":"story","title":"Drill into a single KPI","story":"As a BOD or PMO, I want to drill into a single KPI so that I can see its formula, trend and root cause.","acceptance_criteria":["Given I open a KPI, when the drill renders, then it shows the current value and status, its formula, its threshold, a historical trend and a root-cause note.","Given the KPI has corrective history, when shown, then an action timeline (e.g. threshold breached → CAPA opened → recovered/in-progress) is displayed."],"story_points":3,"roles":["BOD","PMO"],"notes":"Built in the mockup (kpiDrill) but not currently reachable — surfaced only from the unwired KPI Explorer cards.","dependencies":["EN-M3.6-01"],"status":"not-started"},{"id":"US-M3.6.S2-02","type":"story","title":"Compare OHS and pillars against benchmarks","story":"As a BOD or PMO, I want OHS trend and pillar benchmarks so that I can compare against the portfolio and industry.","acceptance_criteria":["Given the trends section renders, when shown, then the OHS history is plotted against the portfolio average.","Given the benchmark section renders, when shown, then each pillar is shown versus the portfolio average and an industry target."],"story_points":3,"roles":["BOD","PMO"],"notes":"Built in the mockup (kpiTrends) but not currently wired.","dependencies":["EN-M3.6-01"],"status":"not-started"},{"id":"US-M3.6.S2-03","type":"story","title":"View the Engineering Health Matrix","story":"As a BOD or PMO, I want an EQI×TDI matrix so that I can see which projects are healthy versus in system failure.","acceptance_criteria":["Given the matrix renders, when shown, then each project is plotted by Engineering Quality Index (EQI) and Technical Debt Index (TDI) into one of four quadrants (Healthy / Hidden Risk / Legacy Burden / System Failure).","Given projects fall in System Failure, when shown, then they are called out for refactoring / quality recovery."],"story_points":3,"roles":["BOD","PMO"],"notes":"Built in the mockup (kpiMatrix) but not currently wired. EQI = quality+process composite; TDI = technical-debt index.","dependencies":["EN-M3.6-01"],"status":"not-started"},{"id":"US-M3.6.S2-04","type":"story","title":"Track corrective actions (CAPA register)","story":"As a BOD or PMO, I want a corrective-action register so that I can track CAPA, risks and improvements raised from KPI breaches.","acceptance_criteria":["Given KPIs breach their thresholds, when the register builds, then a corrective action (CAPA / Risk / Improvement) is generated per breach with severity, owner, due, progress and status.","Given I filter by type, when applied, then only that type is shown, with open / CAPA / risk / improvement counts.","Given an action is not done, when I advance it, then its status moves Open → In progress → Done and progress updates."],"story_points":5,"roles":["BOD","PMO"],"notes":"Built in the mockup (kpiCapa/pmBuildCapa) but not currently wired. CAPA here is KPI-breach-driven, distinct from the weekly-report Recovery actions in M3.5 (RAID) — the two registers may need to converge; flag for the team.","dependencies":["EN-M3.6-01"],"status":"not-started"}]}]},{"id":"M3.7","name":"Retro","description":"Account-level retrospective (Keep / Problem / Try) seeded from the week's reports and open risks; a Try item can be promoted into a tracked Action in Risks & Issues (M3.5). FLAGGED: built in the mockup (pmRetro) but not wired to a module tab — its only entry trigger (data-gotoretro) is never rendered, so it is currently unreachable. Decomposed (it's a genuine continuous-improvement capability); confirm wiring/scope with the team before build.","status":"in-progress","screens":[{"id":"M3.7.S1","name":"Retro board","description":"Account-level Keep / Problem / Try board seeded from the account's project health and open risks, with an account selector, free-add (with @owner) and promote-Try-to-task. Built in the mockup but not currently reachable.","roles":["BOD","PMO","EM/TL/PM"],"sub_screens":[{"id":"M3.7.S1.1","name":"Account selector","description":"Pick which account to retrospect."},{"id":"M3.7.S1.2","name":"Keep / Problem / Try columns","description":"Seeded retro items with owners across three columns."},{"id":"M3.7.S1.3","name":"Add & promote","description":"Add an item with @owner; promote a Try item into a tracked task."}],"items":[{"id":"EN-M3.7-01","type":"enabler","title":"Account retro seed model","story":"Provide the account-level retrospective seed: from an account's projects derive Keep (stable/green projects, reliable estimates), Problem (non-Green project risks plus the account's open RAID items) and Try (the next corrective actions on non-Green projects) — each item carrying an owner.","acceptance_criteria":["Given an account, when the retro is seeded, then Keep lists its green/stable and reliable-estimate projects, Problem lists its non-Green project risks and open RAID items, and Try lists the next actions on its non-Green projects.","Given an account has no green projects, when seeded, then a default Keep item (reporting discipline maintained) is shown.","Given each seeded item, when shown, then it carries an owner."],"story_points":3,"roles":["BOD","PMO","EM/TL/PM"],"notes":"Built in the mockup (pmRetroSeed) but the Retro view is not currently wired. Seed draws on project health (EN-M3.1-01) and open RAID items (EN-M3.5-01).","dependencies":["EN-M3.1-01","EN-M3.5-01"],"status":"not-started"},{"id":"US-M3.7.S1-01","type":"story","title":"View the account retrospective board","story":"As a BOD, PMO or PM, I want an account-level retrospective board (Keep / Problem / Try) so that I can run continuous improvement from the week's signals.","acceptance_criteria":["Given I open Retro and pick an account, when it renders, then three columns — Keep, Problem, Try — show the seeded items with their owners.","Given I change the account, when applied, then the board reseeds for that account.","Given an account has nothing to surface in a column, when it renders, then that column shows an empty/default state."],"story_points":3,"roles":["BOD","PMO","EM/TL/PM"],"notes":"Built in the mockup (pmRetro) but not currently reachable (no nav entry).","dependencies":["EN-M3.7-01"],"status":"not-started"},{"id":"US-M3.7.S1-02","type":"story","title":"Add a retro item with an owner","story":"As a BOD, PMO or PM, I want to add a retro item with an owner to any column so that I can capture points the seed missed.","acceptance_criteria":["Given a column, when I add text with an @owner mention, then a new item is added to that column with the parsed owner.","Given I add without an @owner, when saved, then the item is created with me as owner."],"story_points":2,"roles":["BOD","PMO","EM/TL/PM"],"notes":"Built in the mockup but not currently wired.","dependencies":["US-M3.7.S1-01"],"status":"not-started"},{"id":"US-M3.7.S1-03","type":"story","title":"Promote a Try item into a tracked task","story":"As a BOD, PMO or PM, I want to promote a Try item into a tracked task so that improvement actions are followed up in Risks & Issues.","acceptance_criteria":["Given a Try item, when I promote it, then an Action item is created in the Risks & Issues register (M3.5) with its owner, and the action is audit-logged.","Given the item is promoted, when I open Risks & Issues, then it appears as a tracked Action."],"story_points":3,"roles":["BOD","PMO","EM/TL/PM"],"notes":"Built in the mockup but not currently wired. Closes the Retro→RAID loop: the Action item lands in EN-M3.5-01.","dependencies":["US-M3.7.S1-01","EN-M3.5-01"],"status":"not-started"}]}]},{"id":"M3.8","name":"Project Closure","description":"USER-DEFINED (beyond the current mockup): the project status lifecycle and shutdown. Set a project active / on-hold / closed, and on closure release its resource allocations so staff return to the bench. Status is owned by the project record (EN-M3.1-01); closure cascades to the allocation source (EN-M3.4-01). No closure screen exists in the mockup yet — likely hosted on the Portfolio or a project-detail view.","status":"in-progress","screens":[{"id":"M3.8.S1","name":"Project status & closure","description":"Governance control to change a project's status and shut it down; on closure the project's allocations are released and it leaves the active portfolio. User-defined; not in the current mockup.","roles":["BOD","PMO"],"sub_screens":[{"id":"M3.8.S1.1","name":"Status control","description":"Set project status: active / on-hold / closed."},{"id":"M3.8.S1.2","name":"Closure confirmation","description":"Confirm shutdown and the resulting allocation release."}],"items":[{"id":"US-M3.8.S1-01","type":"story","title":"Set a project's status (active / on-hold / closed)","story":"As a BOD or PMO, I want to set a project's status to active, on-hold or closed so that the portfolio reflects where each project really is in its lifecycle.","acceptance_criteria":["Given a project, when I change its status to active, on-hold or closed, then the new status is saved and the change is audit-logged.","Given a project is put on-hold, when the portfolio renders, then it is shown as on-hold and is not chased for a weekly report while remaining visible.","Given a status change, when applied, then it is reversible (e.g. on-hold back to active), except that closure has already released allocations."],"story_points":3,"roles":["BOD","PMO"],"notes":"Status lifecycle: active → on-hold → closed; default active on creation (M3.2). On-hold pauses reporting expectations but keeps staffing; closed triggers allocation release (US-M3.8.S1-02).","dependencies":["EN-M3.1-01"],"status":"not-started"},{"id":"US-M3.8.S1-02","type":"story","title":"Release allocations when a project is closed","story":"As a BOD or PMO, I want closing a project to release its resource allocations so that staff free up to the bench and utilization stops counting the closed work.","acceptance_criteria":["Given I close a project, when I confirm, then every allocation on that project is ended (planned effort set to 0 / end-dated at closure) and the people return to the bench.","Given allocations are released, when People utilization and the portfolio billable rate next aggregate, then the closed project's effort no longer contributes.","Given a person was staffed only on the closed project, when it closes, then they are shown as idle/bench rather than mis-counted."],"story_points":3,"roles":["BOD","PMO"],"notes":"Closure cascade: ending the project's allocations is a write to the allocation source (EN-M3.4-01); the freed capacity flows to People utilization via EN-M1.4-01.","dependencies":["US-M3.8.S1-01","EN-M3.4-01"],"status":"not-started"},{"id":"US-M3.8.S1-03","type":"story","title":"Drop closed projects from the active portfolio","story":"As a BOD or PMO, I want closed projects to leave the active portfolio so that health, billability and report-compliance reflect only live work.","acceptance_criteria":["Given a project is closed, when the portfolio aggregates active health, billable rate and report compliance, then the closed project is excluded and shown separately as closed.","Given a closed project, when Weekly Reports renders, then it is not expected to report and is not flagged as not-reported.","Given a closed project is reopened to active, when applied, then it re-enters the active portfolio."],"story_points":2,"roles":["BOD","PMO"],"dependencies":["EN-M3.1-01","US-M3.8.S1-01"],"status":"not-started"}]}]}]}]};
